---
# Déploie le cluster Rook-Ceph (operator + CephCluster + toolbox) via le rôle
# platform-ceph-cluster (ADR 0033/0049). Manifestes figés appliqués via
# kubernetes.core.k8s ; gate sur HEALTH_OK + OSD up. À jouer APRÈS le bootstrap
# k8s et le pré-vol ceph-checks (lvm2 + /var/lib/rook node-side).
#
# Hôte d'exécution k8s : dataops_k8s_host (défaut localhost). Play localhost →
# pas d'audit-log (cf. metrics-server.yaml). Surcharges banc en -e :
#   -e ceph_cluster_src=<copie dé-épinglée> -e ceph_metadata_device=vde
#   -e ceph_osd_memory_request=512Mi -e ceph_osd_expected=9
- name: Rook-Ceph cluster (operator + CephCluster + toolbox)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  pre_tasks:
    # GARDE (#277) : les libs de pilotage (kubernetes, certifi) sont versionnées
    # dans pyproject.toml et provisionnées par `uv sync` dans le .venv du projet,
    # vers lequel pointe l'interpréteur du groupe `control_host` (group_vars). On
    # NE les installe plus au coup par coup via `pip` (qui échouait sur un
    # contrôleur macOS « externally-managed ») : on VÉRIFIE leur présence et on
    # oriente vers `uv sync` si elles manquent.
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle avant de jouer ce play :
              `uv sync` à la racine du dépôt (ADR 0006/0023, #277). Si le .venv
              vit ailleurs, surcharger `ansible_python_interpreter` sur l'hôte
              localhost de l'inventaire.
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: ceph_cluster_certifi
      changed_when: false
      check_mode: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        ceph_cluster_ca_bundle: '{{ ceph_cluster_certifi.stdout | trim }}'
  environment:
    SSL_CERT_FILE: '{{ ceph_cluster_ca_bundle | default(omit) }}'
  tasks:
    - name: Rook-Ceph cluster
      ansible.builtin.import_role:
        name: platform-ceph-cluster
      tags: ceph-cluster
