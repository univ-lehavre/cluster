[defaults]
# Permet à ansible-lint de résoudre les `import_role: name: <role>` même
# quand l'analyse est lancée depuis la racine du dépôt (sans ce fichier,
# il ne sait pas où chercher le rôle `audit-log` invoqué par `k8s-rollback`).
roles_path = ./roles
inventory = ./hosts.yaml

# Les facts sont consommés via `ansible_facts.<nom>` (jamais les variables
# top-level `ansible_<nom>`), conformément à la dépréciation INJECT_FACTS_AS_VARS
# (suppression en ansible-core 2.24). On désactive donc l'injection top-level :
# rend la dépréciation sans objet et impose le bon usage.
inject_facts_as_vars = False

# Fige la découverte de l'interpréteur Python des cibles (sinon warning
# « discovered Python interpreter could change »). `auto_silent` = découverte
# automatique, sans avertissement. Surchargeable par hôte via
# ansible_python_interpreter (variable de connexion, pas un fact).
interpreter_python = auto_silent
