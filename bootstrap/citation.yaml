# code: language=ansible
# Layer CITATION — build de l'image applicative de la code-location atlas `citation`
# (exemple générique ADR 0023 ; ADR 0094/0095 §1.a « premier pas »). Layer AUTONOME
# (nestor `up --layers citation` / arm générique `layers`), DÉCOUPLÉE des autres couches.
#
# UNE SEULE étape (nœuds) — contrairement à portal/mlflow qui ont un 2e play k8s : le
# DÉPLOIEMENT de citation n'est PAS piloté par Ansible mais par GitOps (Argo CD tire
# l'overlay atlas par DIGEST, ADR 0095 §2). Ce play se contente donc de BUILD + PUSH
# l'image maison vers le registry interne ; le seed (banc-citation / prod) publie ensuite
# le digest exposé (`build_image_digests`) dans cluster/apps. Frontière ADR 0094 : cluster
# FABRIQUE l'image + connaît le digest ; le déploiement passe par le flux App-of-Apps.
#
# CONTEXTE DE BUILD MULTI-DOSSIER (cas portal) : le Dockerfile citation (dépôt atlas,
# dataops/citation-dagster/Dockerfile) a pour contexte `dataops/` — il embarque la
# code-location `citation-dagster/` ET le projet dbt frère `citation-dbt/`. Le mécanisme
# `src_context` générique (un dossier) ne couvre pas ce cas → on RÉPLIQUE node-side, sous
# build_workdir/citation/, l'arborescence minimale attendue par le Dockerfile AVANT
# d'importer le rôle ; citation_build_images (defaults) pointe son build_context/dockerfile
# dessus. platform-build-images reste générique (inchangé).
#
# SOURCES = dépôt atlas EXTERNE. `citation_repo_dir` (chemin du dépôt atlas sur l'HÔTE)
# est une valeur d'INSTANCE (le dépôt atlas ne vit pas dans cluster, ADR 0023) : injectée
# via `-e citation_repo_dir=…` ou le bloc `atlas.repo_dir` de la topo. AUCUN défaut
# versionné pointant un chemin réel — un garde explicite échoue si elle manque.

- name: Layer Citation — étape nœuds (containerd registry + build image applicative)
  hosts: cloud
  # Contexte de build sur le NŒUD (build_workdir/citation) : DOIT matcher
  # citation_build_images.build_context (defaults platform-build-images).
  vars:
    citation_build_workdir: /tmp/dataops-build/citation
  # GARDE D'ISOLATION (ADR 0053) : ce play SSH sur les nœuds (`cloud`) et build/pousse
  # dans le registry → il DOIT vérifier EXPECTED_STACK_ID via audit-log AVANT toute
  # tâche distante (comme portal/mlflow/dataops). gather_facts requis : platform-build-images
  # teste ansible_architecture. force_handlers : filet restart containerd même si un build
  # échoue en aval (incident 2026-06-16).
  force_handlers: true
  pre_tasks:
    - name: Audit-log — record playbook execution (+ garde d'identité stack_id)
      ansible.builtin.import_role:
        name: audit-log
      vars:
        audit_log_playbook: citation.yaml

    # Garde : le chemin du dépôt atlas DOIT être fourni (aucun défaut réel versionné).
    - name: "Garde : citation_repo_dir fourni (dépôt atlas sur l'hôte)"
      ansible.builtin.assert:
        that:
          - citation_repo_dir is defined
          - citation_repo_dir | length > 0
        fail_msg: >-
          `citation_repo_dir` est requis : chemin LOCAL du dépôt atlas sur l'hôte de
          contrôle (il ne vit pas dans cluster, ADR 0023). Le fournir via
          `-e citation_repo_dir=/chemin/vers/atlas` ou le bloc `atlas.repo_dir` de la topo.
      run_once: true
      delegate_to: localhost
  tasks:
    # Config containerd pour le registry interne AVANT le build (push vers registry:80).
    - name: Configuration containerd pour le registry interne
      ansible.builtin.import_role:
        name: platform-registry
        tasks_from: node
      tags: registry-node

    # FLUSH (ADR 0051) : containerd doit avoir RELU sa config avant le build/push HTTP.
    - name: Recharger containerd si sa config a changé (avant build/push)
      ansible.builtin.meta: flush_handlers
      tags: registry-node

    # rsync est REQUIS par `ansible.posix.synchronize` (copie du projet dbt ci-dessous) ET
    # doit exister SUR LE NŒUD (le module lance `sudo -u root rsync` côté distant). Il est
    # ABSENT des nœuds Debian par défaut (constaté prod dirqual : `sudo: rsync: command not
    # found`) → on l'installe avant la synchro (idempotent ; cache apt 1 h).
    - name: Ensure rsync is present on the build node (required by synchronize)
      ansible.builtin.apt:
        name: rsync
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true

    # ── Contexte de build préparé node-side (cas multi-dossier, cf. en-tête) ──────
    # On reconstruit, à la racine du build_context citation, l'arborescence que le
    # Dockerfile attend (chemins relatifs `citation-dagster/…` et `citation-dbt/`).
    # build_all_arch=true → ces copies tournent AUSSI en x86 (pas de garde arch, sinon
    # le build x86 échouerait sur « COPY: no such file »).
    - name: Ensure the citation build context tree exists
      ansible.builtin.file:
        path: '{{ citation_build_workdir }}/{{ item }}'
        state: directory
        mode: '0755'
      loop:
        - citation-dagster
      become: true

    - name: Copy the citation Dockerfile to the build context root
      ansible.builtin.copy:
        src: '{{ citation_repo_dir }}/dataops/citation-dagster/Dockerfile'
        dest: '{{ citation_build_workdir }}/Dockerfile'
        mode: '0644'
      become: true

    # Fichiers racine du paquet (COPY citation-dagster/pyproject.toml uv.lock README.md).
    - name: Copy the citation-dagster package files into the build context
      ansible.builtin.copy:
        src: '{{ citation_repo_dir }}/dataops/citation-dagster/{{ item }}'
        dest: '{{ citation_build_workdir }}/citation-dagster/{{ item }}'
        mode: '0644'
      loop:
        - pyproject.toml
        - uv.lock
        - README.md
      become: true

    # Dossiers du paquet (COPY citation-dagster/src, citation-dagster/scripts). Le `/`
    # final sur src copie le CONTENU du dossier (arborescence conservée).
    - name: Copy the citation-dagster source directories into the build context
      ansible.builtin.copy:
        src: '{{ citation_repo_dir }}/dataops/citation-dagster/{{ item }}/'
        dest: '{{ citation_build_workdir }}/citation-dagster/{{ item }}/'
        mode: '0644'
        directory_mode: '0755'
      loop:
        - src
        - scripts
      become: true

    # Projet dbt frère (COPY citation-dbt /opt/dagster/citation-dbt), requis au build
    # (dbt parse hors-ligne) — copié à la racine du contexte, hors de citation-dagster/.
    # `synchronize` (rsync) plutôt que `copy` : le projet dbt contient `logs/` (~54 Mo) et
    # `target/` (artefacts régénérés par `dbt parse` AU BUILD) — inutiles au build et
    # transférés fichier-par-fichier par `copy` (module lent → play bloqué ~minutes, vécu
    # au banc). rsync avec `--exclude` ne transfère que le nécessaire (delta + exclusions).
    #
    # `--delete` (CRITIQUE) : le workdir node-side PERSISTE entre deux builds de révisions
    # DIFFÉRENTES. Sans `--delete`, rsync copie les fichiers présents mais NE SUPPRIME PAS les
    # orphelins d'un build antérieur — un modèle dbt retiré dans la nouvelle révision (ex.
    # `stg_citation_authors.sql`, supprimé par le refonte co-autorat ADR atlas 0094) subsiste
    # dans le workdir et fait ÉCHOUER `dbt parse` au build (« source citation_raw.authors not
    # found »). `--delete` fait refléter EXACTEMENT la source → le workdir n'a jamais de
    # modèle fantôme. Les exclusions restent protégées de la suppression (`--delete-excluded`
    # NON posé) : logs/target/pycache locaux du nœud ne sont pas purgés.
    - name: Copy the citation-dbt project into the build context (sans logs/target)
      ansible.posix.synchronize:
        src: '{{ citation_repo_dir }}/dataops/citation-dbt/'
        dest: '{{ citation_build_workdir }}/citation-dbt/'
        delete: true
        rsync_opts:
          - '--exclude=logs/'
          - '--exclude=target/'
          - '--exclude=__pycache__/'
      become: true

    # Build (les 2 arches, build_all_arch) de l'image maison citation → registry:80, puis
    # lecture du digest (gitops_writeback) exposé pour publication par le seed.
    # build_images RESTREINTE à citation (override) — ne touche pas la liste dataops.
    - name: Build de l'image applicative Citation (code-location + dbt embarqués)
      ansible.builtin.import_role:
        name: platform-build-images
      vars:
        build_images: '{{ citation_build_images }}'
      tags: build-images
