# code: language=ansible
# Layer REGISTRY — le registre d'images interne SEUL, phase AUTONOME (ADR 0112).
#
# Extrait du play dataops (mêmes imports de rôle, idempotents) pour qu'un socle CI/CD
# (registry + buildkit) se monte SANS la chaîne dataops (CNPG/Dagster/Marquez). Les rôles
# `platform-registry` (cluster + node) sont aussi importés par `dataops.yaml` : l'idempotence
# rend le double appel inoffensif (rejouer ne fait rien de plus). `registry` reste tiré par
# la CLÔTURE de dataops (dagster/marquez → registry), donc monter dataops le monte quand même.
#
# DEUX plays, comme dans dataops.yaml :
#   1. étape CLUSTER (`localhost`) : applique les manifestes du registre + les CRDs Gateway API ;
#   2. étape NŒUDS (`cloud`) : configure containerd pour tirer registry:80 en HTTP (certs.d).

- name: Layer Registry — étape cluster (manifestes + CRDs Gateway API)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  # SSL_CERT_FILE (drift L23) : le Python d'Ansible n'utilise pas toujours le CA système →
  # requêtes HTTPS (get_url des CRDs, module k8s) en échec SSL. On pointe le bundle certifi.
  environment:
    SSL_CERT_FILE: '{{ dataops_ca_bundle | default(omit) }}'
  pre_tasks:
    # GARDE (#277) : les libs de pilotage (kubernetes, certifi) sont provisionnées par
    # `uv sync` dans le .venv du projet. On VÉRIFIE leur présence, on oriente sinon.
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle : `uv sync` à la racine
              du dépôt (ADR 0006/0023, #277).
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: registry_certifi
      changed_when: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        dataops_ca_bundle: '{{ registry_certifi.stdout | trim }}'
  tasks:
    - name: Registry interne + CRDs Gateway API
      ansible.builtin.import_role:
        name: platform-registry
        tasks_from: cluster
      tags: registry-cluster

- name: Layer Registry — étape nœuds (containerd tire registry:80 en HTTP)
  hosts: cloud
  # GARDE D'ISOLATION (ADR 0053, #359) : ce play SSH sur les nœuds (`cloud`) et reconfigure
  # containerd → il DOIT vérifier que la topologie ciblée correspond à l'intention (via
  # audit-log/stack_id), comme tout play qui mute des nœuds.
  # force_handlers : FILET (incident 2026-06-16) — garantit le restart containerd même si
  # une tâche aval échoue (sinon ImagePullBackOff « HTTP response to HTTPS client »).
  force_handlers: true
  pre_tasks:
    - name: Audit-log — record playbook execution (+ garde d'identité stack_id)
      ansible.builtin.import_role:
        name: audit-log
      vars:
        audit_log_playbook: registry.yaml
  tasks:
    - name: Configuration containerd pour le registry interne
      ansible.builtin.import_role:
        name: platform-registry
        tasks_from: node
      tags: registry-node
    - name: Recharger containerd si sa config a changé
      ansible.builtin.meta: flush_handlers
      tags: registry-node
