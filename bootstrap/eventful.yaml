# code: language=ansible
# Layer EVENTFUL (ADR 0095 §1.b) — monte la CHAÎNE ÉVÉNEMENTIELLE : Argo Workflows
# (build in-pod, ns `argo`) + Argo Events (webhook #2 → EventBus NATS → Sensor,
# ns `argo-events`). C'est le « git push atlas → build → write-back → déploiement,
# zéro geste » de l'ADR 0095 §1.b. Remplace les ~10 gestes kubectl manuels du banc par
# un montage Ansible idempotent (ADR 0046 : corriger le CODE, pas l'état), sur le MODÈLE
# du play gitops.yaml (rôle k8s piloté depuis localhost).
#
# UN SEUL play (contrairement à portal/citation) : ce rôle N'A PAS d'étape node-side (il
# n'BUILD rien — les images publiques du builder sont mirrorées à part par le play node-side
# `bootstrap/eventful-mirror.yaml`, à jouer AVANT au banc air-gappé). Ici on APPLIQUE des
# manifestes figés (bundles vendorés en server-side + CR + NetworkPolicies + NodePort).
#
# HÔTE D'EXÉCUTION k8s (`dataops_k8s_host`, défaut localhost) : pilote l'API via le
# KUBECONFIG de l'exécuteur, comme gitops/dataops/mlflow (mêmes pré-tâches).
#
# PAS d'audit-log : ce play pilote l'API k8s depuis le poste de contrôle (localhost), il
# ne `become` pas sur un nœud (cf. gitops.yaml / mlflow.yaml Play k8s). GARDE D'ISOLATION
# (ADR 0053) : l'isolation vient du KUBECONFIG CIBLÉ (comme tous les plays k8s) — le play
# ne mute que ce que le kubeconfig désigne. Le PATCH BANC du WorkflowTemplate est dérivé
# de EXPECTED_TARGET_KIND (posé par le runner / run-phases.sh), lu par le rôle comme la
# garde audit-log (lookup env) → prod GARDE le nodeSelector worker, banc le retire.
#
# Surcharges par topologie : group_vars d'inventaire non versionné. Défauts de rôle = prod.

- name: Layer Eventful — chaîne événementielle (Argo Workflows + Argo Events)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  # SSL_CERT_FILE : le Python d'Ansible peut ne pas utiliser le CA système pour les
  # requêtes HTTPS du module k8s → on pointe le bundle certifi de CE python (cf. gitops).
  environment:
    SSL_CERT_FILE: '{{ dataops_ca_bundle | default(omit) }}'
  pre_tasks:
    # kubernetes.core exige la lib Python `kubernetes` ; certifi fournit le CA.
    # GARDE (#277) : libs versionnées (pyproject.toml) provisionnées par `uv sync` dans le
    # .venv du projet — on VÉRIFIE leur présence, on n'installe plus au coup par coup.
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle avant de jouer ce play :
              `uv sync` à la racine du dépôt (ADR 0006/0023, #277). Si le .venv
              vit ailleurs, surcharger `ansible_python_interpreter` sur l'hôte
              localhost de l'inventaire.
    # Résout le bundle CA avec le MÊME interpréteur que les modules Ansible.
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: eventful_certifi
      changed_when: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        dataops_ca_bundle: '{{ eventful_certifi.stdout | trim }}'
  tasks:
    # Chaîne événementielle (ADR 0095 §1.b) : bundles Argo Workflows/Events (server-side),
    # RBAC de soumission, NetworkPolicies ordonnées, CR (EventBus/EventSource/Sensor),
    # WorkflowTemplate + CronWorkflow filet, NodePort UI, patch banc du nodeSelector.
    - name: Chaîne événementielle (Argo Workflows + Argo Events)
      ansible.builtin.import_role:
        name: platform-eventful
      tags: eventful
