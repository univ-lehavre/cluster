# code: language=ansible
#
# Génère les Secrets de mots de passe des rôles PostgreSQL managés par CNPG, avec
# des mots de passe ROBUSTES et NON VERSIONNÉS (ADR 0023). Remplace l'application
# directe de `role-secrets.example.yaml` (valeurs de test) pour la PRODUCTION.
#
# Mécanisme provisoire « inline » (issue #280 trace la version générique/factorisée
# réutilisable par tous les rôles à secrets). Idempotent : le lookup `password`
# avec un chemin de fichier PERSISTE le mot de passe au 1er run et le RELIT ensuite
# → un rejeu ne régénère pas (ne casse pas un cluster pg en place).
#
# Les mots de passe vivent sous `secrets/` (gitignoré). Garder ce dossier sur un
# poste de confiance (les mots de passe pg y sont en clair).
#
# Usage :
#   ansible-playbook -i hosts.yaml cnpg-secrets.yaml
# puis déployer CNPG (qui consomme ces Secrets au lieu des .example).
- name: Génère les Secrets de rôles PostgreSQL (mots de passe robustes, non versionnés)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  vars:
    # Dossier local gitignoré où persister les mots de passe générés.
    pg_secrets_store: '{{ playbook_dir }}/../secrets/cnpg'
    # Rôles managés (alignés sur platform/cloudnative-pg/role-secrets.example.yaml
    # et le contrat namespaces-secrets.example.yaml).
    pg_roles:
      - dagster
      - pgvector
      - marquez
    pg_namespace: postgres
  pre_tasks:
    # GARDE (#277) : les libs de pilotage (kubernetes, certifi) sont versionnées
    # dans pyproject.toml et provisionnées par `uv sync` dans le .venv du projet,
    # vers lequel pointe l'interpréteur du groupe `control_host` (group_vars). On
    # NE les installe plus au coup par coup via `pip` (qui échouait sur un
    # contrôleur macOS « externally-managed ») : on VÉRIFIE leur présence et on
    # oriente vers `uv sync` si elles manquent.
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle avant de jouer ce play :
              `uv sync` à la racine du dépôt (ADR 0006/0023, #277). Si le .venv
              vit ailleurs, surcharger `ansible_python_interpreter` sur l'hôte
              localhost de l'inventaire.
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: cnpg_secrets_certifi
      changed_when: false
      check_mode: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        cnpg_secrets_ca_bundle: '{{ cnpg_secrets_certifi.stdout | trim }}'
  environment:
    SSL_CERT_FILE: '{{ cnpg_secrets_ca_bundle | default(omit) }}'
  tasks:
    - name: Le namespace postgres existe (les Secrets y vivent)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ pg_namespace }}'

    # `lookup('password', <fichier> ...)` génère un mot de passe au 1er appel et le
    # PERSISTE dans <fichier> ; les appels suivants relisent la même valeur →
    # idempotent (un rejeu ne change pas le Secret, ne casse pas le rôle pg).
    - name: Applique les Secrets basic-auth des rôles managés (pwd générés, persistés)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          type: kubernetes.io/basic-auth
          metadata:
            name: 'pg-role-{{ item }}'
            namespace: '{{ pg_namespace }}'
          stringData:
            username: '{{ item }}'
            password: >-
              {{ lookup('password',
                 pg_secrets_store ~ '/pg-role-' ~ item ~ '.txt length=32 chars=ascii_letters,digits') }}
      loop: '{{ pg_roles }}'
      loop_control:
        label: 'pg-role-{{ item }}'
      no_log: true # ne pas logguer les mots de passe
