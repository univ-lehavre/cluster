# code: language=ansible
# Rôle platform-argocd (ADR 0022/0044) — pose Argo CD, le moteur GitOps
# applicatif, depuis l'hôte qui pilote l'API (kubernetes.core).
#
# INFRA, pas applicatif : Argo CD ne se gère pas lui-même (anti-bootstrap-
# circulaire, ADR 0022). Ce rôle traduit la séquence kubectl du README
# (platform/argocd/README.md) en tâches idempotentes.
#
# Images : le bundle argocd.yaml épingle ses images par digest (ADR 0006). En
# prod SANS Internet, elles doivent être mirrorées dans le registry interne
# (ADR 0011) — hors de ce rôle (cf. platform-build-images). Sur un banc avec
# egress, le pull direct fonctionne.
- name: Deploy Argo CD (moteur GitOps applicatif)
  tags: argocd
  run_once: true
  block:
    # Namespace explicite (le bundle ne le crée pas).
    - name: Ensure the argocd namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ argocd_namespace }}'

    # --server-side OBLIGATOIRE : la CRD applicationsets.argoproj.io dépasse la
    # limite d'annotation de l'apply client-side (validé banc, Run #11).
    - name: Apply the Argo CD bundle (server-side)
      kubernetes.core.k8s:
        state: present
        namespace: '{{ argocd_namespace }}'
        src: '{{ platform_repo_dir }}/platform/argocd/argocd.yaml'
        server_side_apply:
          field_manager: ansible-platform-argocd
          force_conflicts: true

    # requests/limits par PATCH hors-bundle (audit code-first 2026-07-05) : le bundle
    # vendored ne pose aucune resource → 7/7 BestEffort (perte de réconciliation GitOps si
    # évincés sous pression). On les injecte SANS éditer le fichier figé (ADR 0006). Strategic
    # merge sur le conteneur ; `item.value.kind` distingue le StatefulSet (application-
    # controller) des Deployments. Idempotent (re-jeu = no-op si déjà en place).
    - name: Set Argo CD resources (patch hors-bundle)
      kubernetes.core.k8s:
        state: patched
        kind: '{{ item.value.kind }}'
        namespace: '{{ argocd_namespace }}'
        name: '{{ item.key }}'
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: '{{ item.value.container }}'
                    resources: '{{ item.value.resources }}'
      loop: '{{ argocd_resources | dict2items }}'
      loop_control:
        label: '{{ item.key }}'

    # NetworkPolicies : default-deny AVANT les allow (sinon fenêtre de deny ou
    # allow ignoré). Ordre explicite via loop, pas un apply de dossier.
    - name: Apply argocd network policies (ordered)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/network-policies/argocd/{{ item }}'
      loop:
        - 00-default-deny.yaml
        - allow-dns.yaml
        - allow-server-ingress.yaml
        - allow-egress.yaml

    # AppProject atlas : cadre le périmètre GitOps (sourceRepos surchargeable,
    # ADR 0023/0044). Appliqué après les CRDs argoproj.io du bundle.
    - name: Apply the atlas AppProject
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/argocd/appproject-atlas.yaml'

    # Exposition UI en L4 (NodePort, ADR 0092) : http://<IP-nœud>:<nodePort>,
    # zéro DNS. Service séparé du bundle vendored, même selector que le ClusterIP
    # argocd-server. nodePort auto-attribué (pas figé). Sans dépendance CRD,
    # appliqué inconditionnellement (contrairement au Gateway L7).
    - name: Apply the Argo CD NodePort Service (L4 UI exposure)
      kubernetes.core.k8s:
        state: present
        namespace: '{{ argocd_namespace }}'
        src: '{{ platform_repo_dir }}/platform/argocd/nodeport.yaml'

    - name: Wait for the argocd-server deployment to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: argocd-server
        namespace: '{{ argocd_namespace }}'
      register: argocd_server_deploy
      until: >-
        argocd_server_deploy.resources | default([]) | length > 0
        and (argocd_server_deploy.resources[0].status.readyReplicas | default(0)) == 1
      retries: '{{ argocd_ready_retries }}'
      delay: '{{ argocd_ready_delay }}'

  # Rollback AU PLUS PRÈS (ADR 0050, issue #236) : un apply k8s est DÉCLARATIF/idempotent
  # — un « rollback » qui supprimerait Argo CD serait contre-productif (on veut
  # réparer, pas tout défaire, et un re-run reprend là où ça a cassé). Le rescue
  # utile ici est DIAGNOSTIQUE : capturer l'état réel (pods non prêts, derniers
  # events) et échouer avec un message actionnable, plutôt qu'un « until » muet.
  rescue:
    - name: Collect argocd pods state (diagnostic)
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: '{{ argocd_namespace }}'
      register: argocd_pods_diag
      run_once: true

    - name: Report not-ready argocd pods
      ansible.builtin.debug:
        msg: >-
          Argo CD non convergé. Pods non prêts :
          {{ argocd_pods_diag.resources
             | rejectattr('status.phase', 'equalto', 'Running')
             | map(attribute='metadata.name') | list }}.
          Causes fréquentes (drifts connus) : egress apiserver (L48), egress
          interne controller→repo-server:8081 / redis (L52), egress
          repo-server→gitea (L53). Diagnostic : kubectl -n {{ argocd_namespace }}
          get pods ; kubectl -n {{ argocd_namespace }} get events --sort-by=.lastTimestamp.
      run_once: true

    - name: Fail with an actionable message
      ansible.builtin.fail:
        msg: >-
          Déploiement Argo CD échoué (voir le diagnostic ci-dessus). Le re-run du
          rôle est idempotent et reprend la convergence — corriger d'abord la
          cause réseau/manifeste signalée.

  always:
    - name: Argo CD deployment outcome (état final)
      ansible.builtin.debug:
        msg: >-
          platform-argocd terminé. Vérifier l'état applicatif :
          kubectl -n {{ argocd_namespace }} get applications.
      run_once: true
