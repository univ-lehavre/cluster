# code: language=ansible
# Volet CLUSTER du rôle platform-registry (importé via tasks_from: cluster) —
# CRDs Gateway API + manifestes registry, appliqués depuis l'hôte qui pilote
# l'API (kubernetes.core). Voir tasks/main.yaml pour la vue d'ensemble.

- name: Deploy registry and Gateway API CRDs
  tags: registry-cluster
  run_once: true
  block:
    # Gateway API CRDs : cert-manager les exige (cni.sh active gatewayAPI ;
    # Cilium ne les embarque pas, ADR 0006/0020). Sources figées au tag.
    # Téléchargées via get_url (respecte le CA via SSL_CERT_FILE) puis appliquées
    # en local : le module k8s charge un src URL avec un bundle CA Python qui peut
    # échouer en SSL hors cluster (drift L23) — get_url découple le téléchargement.
    - name: Ensure the Gateway API CRD download directory exists
      ansible.builtin.file:
        path: '{{ gateway_api_crd_tmp }}'
        state: directory
        mode: '0755'

    - name: Download Gateway API CRDs ({{ gateway_api_version }})
      ansible.builtin.get_url:
        url: '{{ gateway_api_crd_base }}/gateway.networking.k8s.io_{{ item }}.yaml'
        dest: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
        mode: '0644'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    - name: Apply Gateway API CRDs ({{ gateway_api_version }})
      kubernetes.core.k8s:
        state: present
        src: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    - name: Apply registry namespace
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/container-registry/namespace.yaml'

    # PVC templé : storageClass paramétrable (drift L10 / #158), défaut prod.
    - name: Apply registry PVC (storageClass={{ registry_storage_class }})
      kubernetes.core.k8s:
        state: present
        template: registry-pvc.yaml.j2

    - name: Apply registry deployment and service
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/container-registry/{{ item }}'
      loop:
        - deployment.yaml
        - service.yaml
        - garbage-collect-cronjob.yaml

    # NetworkPolicies : default-deny AVANT les allow (sinon fenêtre de deny ou
    # allow ignoré). Ordre explicite via loop, pas un apply de dossier.
    - name: Apply registry network policies (ordered)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/network-policies/registry/{{ item }}'
      loop:
        - 00-default-deny.yaml
        - allow-dns.yaml
        - allow-registry.yaml

    - name: Wait for registry deployment to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: registry
        namespace: '{{ registry_namespace }}'
      register: registry_deploy
      until: >-
        registry_deploy.resources | default([]) | length > 0
        and (registry_deploy.resources[0].status.readyReplicas | default(0)) == 1
      retries: '{{ registry_ready_retries }}'
      delay: '{{ registry_ready_delay }}'
