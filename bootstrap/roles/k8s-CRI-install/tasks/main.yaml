# code: language=ansible
# Following https://kubernetes.io/docs/setup/production-environment/container-runtimes/
- name: Install container runtime
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Load required kernel modules at boot
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: Load required kernel modules now
      ansible.builtin.command: modprobe {{ item }} # noqa: command-instead-of-module
      loop:
        - overlay
        - br_netfilter
      changed_when: false

    - name: Persist kernel parameters required by Kubernetes
      ansible.builtin.copy:
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: '0644'

    - name: Apply kernel parameters
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Gather IPv4 forwarding value
      ansible.builtin.command: sysctl --values net.ipv4.ip_forward
      register: output_ipv4_forward
      changed_when: false

    - name: IPv4 forwarding is enabled
      ansible.builtin.assert:
        that: output_ipv4_forward.stdout == '1'
        fail_msg: IPv4 forwarding is not enabled on {{ ansible_facts.hostname }}.

    - name: Install APT dependencies
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - apt-transport-https
          - curl
          - gpg
          - python3-debian # requis par deb822_repository (ajout du dépôt ci-dessous)
        state: present

    # Debian 13 ships containerd 1.7.x (deprecated in Kubernetes 1.34, removed
    # in 1.36), so install containerd.io 2.x from the Docker repository — which
    # also avoids the user-namespace gap (default-enabled since Kubernetes 1.33).
    - name: Ensure the APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download the Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    # deb822_repository remplace apt_repository (déprécié, retiré en
    # ansible-core 2.25). Dépôt Docker classique : suite = release Debian,
    # component stable, arch dérivée des facts.
    - name: Add the Docker repository
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: https://download.docker.com/linux/debian
        suites: ['{{ ansible_facts.distribution_release }}']
        components: [stable]
        architectures: ["{{ 'amd64' if ansible_facts.architecture == 'x86_64' else 'arm64' }}"]
        signed_by: /etc/apt/keyrings/docker.asc
        state: present
        enabled: true

    - name: Update apt cache after adding the Docker repository
      ansible.builtin.apt:
        update_cache: true

    - name: Install the container runtime (containerd.io)
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: true

    # Fige containerd.io comme kubelet/kubeadm/cri-tools (ADR 0005/0006, #295) :
    # l'ADR 0005 affirme ce hold (« compensation : un apt-mark hold containerd.io
    # posé par le rôle, à libérer explicitement pour bumper ») et k8s-rollback le
    # LÈVE déjà — il ne manquait que la pose. Sans lui, containerd flotte au
    # premier `apt upgrade` (os-upgrade.yaml fait `upgrade: full`), brisant la
    # reproductibilité (ADR 0052) et le couplage CRI↔kubelet de la matrice.
    # Bump containerd VOLONTAIRE (hors cycle k8s-upgrade, qui ne touche PAS
    # containerd) : `apt-mark unhold containerd.io` → installer la version cible
    # de la matrice ADR 0006 → re-hold ; ou rollback.yaml (qui un-hold) puis
    # re-bootstrap. dpkg_selections est idempotent (changed=0 au re-jeu).
    - name: Hold containerd.io at its installed version
      ansible.builtin.dpkg_selections:
        name: containerd.io
        selection: hold

    # containerd.io ships a config.toml that disables the CRI plugin, so
    # generate the full default and force the systemd cgroup driver.
    - name: Generate the default containerd configuration
      ansible.builtin.command: containerd config default
      register: containerd_default
      changed_when: false
      check_mode: false # lecture pure consommée en aval — doit tourner même en --check (ADR 0051)

    - name: Write containerd config with the systemd cgroup driver
      ansible.builtin.copy:
        content: "{{ containerd_default.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
        dest: /etc/containerd/config.toml
        mode: '0644'
      notify: Restart containerd

    # FIX DURABLE Yunix (containerd 2.3.x, issue #513 / drift L66) : containerd 2.3 garde
    # des sockets shim TTRPC dans /run/containerd/s/ qui survivent à un arrêt non-propre de
    # la machine (reboot, VM relancée). Au démarrage suivant, le shim runc reçoit une adresse
    # de socket mal parsée (« unsupported protocol: Yunix ») → TOUT nouveau pod reste bloqué
    # en ContainerCreating. Le palliatif manuel (restart containerd + delete pod) marche car
    # il RECRÉE les sockets — on l'automatise via un drop-in `ExecStartPre` qui PURGE les
    # sockets shim AVANT chaque démarrage de containerd (sûr : containerd est arrêté à ce
    # moment, aucun pod actif côté CRI ; au boot, kubelet recrée les sandboxes proprement).
    # S'applique à CHAQUE boot/restart, pas seulement au montage (le bug revient à chaque
    # reboot). À retirer quand containerd corrige le transport socket (cf. issue #513).
    - name: Ensure the containerd systemd drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/containerd.service.d
        state: directory
        mode: '0755'

    - name: Purge stale TTRPC shim sockets before each containerd start (Yunix fix)
      ansible.builtin.copy:
        dest: /etc/systemd/system/containerd.service.d/10-purge-stale-shims.conf
        mode: '0644'
        content: |
          # Drop-in généré par k8s-CRI-install (issue #513 / drift L66, containerd 2.3.x).
          # Purge les sockets shim TTRPC périmés avant CHAQUE démarrage de containerd —
          # ils survivent à un arrêt non-propre et causent « unsupported protocol: Yunix ».
          [Service]
          ExecStartPre=-/bin/rm -rf /run/containerd/s
      notify: Restart containerd

    - name: Ensure containerd is enabled and running
      ansible.builtin.systemd_service:
        name: containerd
        daemon_reload: true
        enabled: true
        state: started
