# code: language=ansible
# Following https://kubernetes.io/docs/setup/production-environment/container-runtimes/
- name: Install container runtime
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Load required kernel modules at boot
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: Load required kernel modules now
      ansible.builtin.command: modprobe {{ item }} # noqa: command-instead-of-module
      loop:
        - overlay
        - br_netfilter
      changed_when: false

    - name: Persist kernel parameters required by Kubernetes
      ansible.builtin.copy:
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: '0644'

    - name: Apply kernel parameters
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Gather IPv4 forwarding value
      ansible.builtin.command: sysctl --values net.ipv4.ip_forward
      register: output_ipv4_forward
      changed_when: false

    - name: IPv4 forwarding is enabled
      ansible.builtin.assert:
        that: output_ipv4_forward.stdout == '1'
        fail_msg: IPv4 forwarding is not enabled on {{ ansible_hostname }}.

    - name: Install APT dependencies
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - apt-transport-https
          - curl
          - gpg
        state: present

    # Debian 13 ships a recent containerd; use the distribution package instead
    # of the Docker repository (one less external dependency, no extra keyring).
    - name: Install the container runtime (containerd)
      ansible.builtin.apt:
        name: containerd
        state: present
        update_cache: true

    # The Debian package ships a minimal config.toml without a SystemdCgroup
    # line, so generate the full default and force the systemd cgroup driver.
    - name: Generate the default containerd configuration
      ansible.builtin.command: containerd config default
      register: containerd_default
      changed_when: false

    - name: Write containerd config with the systemd cgroup driver
      ansible.builtin.copy:
        content: "{{ containerd_default.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
        dest: /etc/containerd/config.toml
        mode: '0644'
      notify: Restart containerd

    - name: Ensure containerd is enabled and running
      ansible.builtin.systemd_service:
        name: containerd
        daemon_reload: true
        enabled: true
        state: started
