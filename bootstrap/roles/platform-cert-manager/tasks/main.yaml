# code: language=ansible
# Rôle platform-cert-manager (ADR 0033) — TLS interne du cluster (ADR 0021),
# prérequis du plugin Barman Cloud (CNPG, ADR 0024). Appliqué depuis le
# control-plane. Manifestes vendored figés (platform/cert-manager/).

- name: Deploy cert-manager
  run_once: true
  block:
    # CRDs Gateway API AVANT cert-manager : il tourne avec --enable-gateway-api
    # et crashe au boot si elles manquent (drift L37). Téléchargées via get_url
    # (CA via SSL_CERT_FILE, cf. L23) puis appliquées en local. Idempotent.
    - name: Ensure the Gateway API CRD download directory exists
      ansible.builtin.file:
        path: '{{ gateway_api_crd_tmp }}'
        state: directory
        mode: '0755'

    - name: Download Gateway API CRDs ({{ gateway_api_version }})
      ansible.builtin.get_url:
        url: '{{ gateway_api_crd_base }}/gateway.networking.k8s.io_{{ item }}.yaml'
        dest: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
        mode: '0644'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    - name: Apply Gateway API CRDs ({{ gateway_api_version }})
      kubernetes.core.k8s:
        state: present
        src: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    # CRDs volumineuses → server-side apply (comme operator CNPG / le RUNBOOK).
    - name: Apply cert-manager (server-side)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cert-manager/cert-manager.yaml'
        server_side_apply:
          field_manager: ansible-platform-cert-manager

    # Le webhook d'admission doit être Ready avant d'appliquer des ressources
    # cert-manager (Issuers) — sinon « failed calling webhook ».
    - name: Wait for cert-manager webhook to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cert-manager-webhook
        namespace: '{{ cert_manager_namespace }}'
      register: cm_webhook
      until: >-
        cm_webhook.resources | default([]) | length > 0
        and (cm_webhook.resources[0].status.readyReplicas | default(0)) >= 1
      retries: '{{ cert_manager_ready_retries }}'
      delay: '{{ cert_manager_ready_delay }}'

    # Chaîne de CA interne (selfsigned-bootstrap → root-ca → internal-ca).
    - name: Apply internal CA issuers
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cert-manager/issuers.yaml'
