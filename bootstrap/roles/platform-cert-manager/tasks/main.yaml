# code: language=ansible
# Rôle platform-cert-manager (ADR 0033) — TLS interne du cluster (ADR 0021),
# prérequis du plugin Barman Cloud (CNPG, ADR 0024). Appliqué depuis le
# control-plane. Manifestes vendored figés (platform/cert-manager/).

- name: Deploy cert-manager
  run_once: true
  block:
    # CRDs Gateway API AVANT cert-manager : il tourne avec --enable-gateway-api
    # et crashe au boot si elles manquent (drift L37). Téléchargées via get_url
    # (CA via SSL_CERT_FILE, cf. L23) puis appliquées en local. Idempotent.
    # Le répertoire de cache vit sur le POSTE de contrôle (localhost) à un chemin FIXE
    # partagé : un run antérieur sous un AUTRE utilisateur macOS (ex. renommage du compte)
    # le laisse non-writable (propriétaire ≠ user courant → `Destination is not writable`).
    # On le supprime s'il appartient à quelqu'un d'autre, puis on le (re)crée sous le user
    # courant — idempotent (no-op si déjà au bon propriétaire). `chown` ne suffirait pas :
    # sans privilège, on ne peut pas s'approprier le répertoire d'un autre.
    - name: Stat the Gateway API CRD download directory
      ansible.builtin.stat:
        path: '{{ gateway_api_crd_tmp }}'
      register: gw_crd_dir

    # `ansible_user_id` n'est PAS disponible ici : le play (monitoring.yaml) tourne avec
    # `gather_facts: false` → aucun fact peuplé. On lit le user courant via `lookup('env',
    # 'USER')`, indépendant du fact gathering (ce rôle s'exécute sur le POSTE, localhost).
    - name: Remove the CRD download directory if owned by another user
      ansible.builtin.file:
        path: '{{ gateway_api_crd_tmp }}'
        state: absent
      when:
        - gw_crd_dir.stat.exists
        - gw_crd_dir.stat.pw_name is defined
        - gw_crd_dir.stat.pw_name != lookup('env', 'USER')

    - name: Ensure the Gateway API CRD download directory exists
      ansible.builtin.file:
        path: '{{ gateway_api_crd_tmp }}'
        state: directory
        mode: '0755'

    - name: Download Gateway API CRDs ({{ gateway_api_version }})
      ansible.builtin.get_url:
        url: '{{ gateway_api_crd_base }}/gateway.networking.k8s.io_{{ item }}.yaml'
        dest: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
        mode: '0644'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    - name: Apply Gateway API CRDs ({{ gateway_api_version }})
      kubernetes.core.k8s:
        state: present
        src: '{{ gateway_api_crd_tmp }}/gateway.networking.k8s.io_{{ item }}.yaml'
      loop:
        - gatewayclasses
        - gateways
        - httproutes
        - referencegrants
        - grpcroutes

    # CRDs volumineuses → server-side apply (comme operator CNPG / le RUNBOOK).
    - name: Apply cert-manager (server-side)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cert-manager/cert-manager.yaml'
        server_side_apply:
          field_manager: ansible-platform-cert-manager

    # requests/limits par PATCH hors-bundle (audit code-first 2026-07-05) : le bundle
    # vendored ne pose aucune resource → BestEffort. On les injecte SANS éditer le fichier
    # figé (ADR 0006). Strategic merge sur le conteneur : son nom diffère du Deployment pour
    # le controller (`cert-manager` → conteneur `cert-manager-controller`), d'où la map.
    # Idempotent (re-jeu = no-op si déjà en place). resource_definition car le patch cible
    # une clé (containers[name]) que `patch` par nom ne sait pas fusionner seul.
    - name: Set cert-manager resources (patch hors-bundle)
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        namespace: '{{ cert_manager_namespace }}'
        name: '{{ item.deploy }}'
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: '{{ item.container }}'
                    resources: '{{ cert_manager_resources[item.deploy] }}'
      loop:
        - deploy: cert-manager
          container: cert-manager-controller
        - deploy: cert-manager-cainjector
          container: cert-manager-cainjector
        - deploy: cert-manager-webhook
          container: cert-manager-webhook
      loop_control:
        label: '{{ item.deploy }}'

    # Le webhook d'admission doit être Ready avant d'appliquer des ressources
    # cert-manager (Issuers) — sinon « failed calling webhook ... connection refused ».
    # ATTENDRE LA FIN DU ROLLOUT, pas juste `readyReplicas >= 1` : la tâche « Set
    # cert-manager resources » ci-dessus PATCHE le Deployment webhook → rollout. Pendant
    # celui-ci, l'ANCIEN pod reste Ready (readyReplicas=1) alors que le nouveau n'écoute
    # pas encore → `Apply internal CA issuers` appelle un webhook mort (drift, famille L36 :
    # ressource appliquée avant que le porteur du webhook réponde). On exige donc l'équivalent
    # `kubectl rollout status` : génération observée, tous les replicas à jour/dispo/prêts,
    # aucun indisponible.
    - name: Wait for cert-manager webhook rollout to complete
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cert-manager-webhook
        namespace: '{{ cert_manager_namespace }}'
      register: cm_webhook
      vars:
        _cm_dep: '{{ cm_webhook.resources[0] | default({}) }}'
        _cm_status: '{{ _cm_dep.status | default({}) }}'
        _cm_desired: '{{ _cm_dep.spec.replicas | default(1) }}'
      until: >-
        cm_webhook.resources | default([]) | length > 0
        and (_cm_status.observedGeneration | default(0)) >= (_cm_dep.metadata.generation | default(1))
        and (_cm_status.updatedReplicas | default(0)) | int >= (_cm_desired | int)
        and (_cm_status.availableReplicas | default(0)) | int >= (_cm_desired | int)
        and (_cm_status.readyReplicas | default(0)) | int >= (_cm_desired | int)
        and (_cm_status.unavailableReplicas | default(0)) | int == 0
      retries: '{{ cert_manager_ready_retries }}'
      delay: '{{ cert_manager_ready_delay }}'

    # Chaîne de CA interne (selfsigned-bootstrap → root-ca → internal-ca).
    # RETRY filet : même rollout terminé, les Endpoints du Service webhook:443 peuvent
    # router avec un court délai vers le nouveau pod → un premier appel peut encore voir
    # « connection refused ». On réessaie l'apply jusqu'à ce que le webhook réponde (la
    # gate ci-dessus rend ce cas rare ; ce retry ferme la fenêtre Endpoints résiduelle).
    - name: Apply internal CA issuers
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cert-manager/issuers.yaml'
      register: cm_issuers
      until: cm_issuers is not failed
      retries: '{{ cert_manager_ready_retries }}'
      delay: '{{ cert_manager_ready_delay }}'
