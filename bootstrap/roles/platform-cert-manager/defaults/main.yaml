---
# Valeurs par défaut du rôle platform-cert-manager (ADR 0033).
# cert-manager fournit le TLS interne (ADR 0021) ; prérequis du plugin Barman
# (TLS plugin↔operator, ADR 0024) et de l'exposition de bordure.

# Racine du dépôt côté control-plane (manifestes lus puis appliqués).
platform_repo_dir: '{{ playbook_dir }}/..'

cert_manager_namespace: cert-manager

# CRDs Gateway API : cert-manager du dépôt tourne avec --enable-gateway-api
# (gateway-shim, ADR 0020/0021) → il CRASHE au démarrage si les CRDs Gateway API
# sont absentes (drift L37). Ce rôle les garantit donc lui-même (idempotent ;
# registry les pose aussi côté dataops, sans conflit). Version figée (ADR 0006).
gateway_api_version: '1.4.1'
gateway_api_crd_base: >-
  https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v{{ gateway_api_version }}/config/crd/standard
gateway_api_crd_tmp: /tmp/gateway-api-crds
# Gate : attente que le webhook cert-manager soit Ready avant d'appliquer les
# Issuers (un apply trop tôt échoue sur le webhook d'admission).
cert_manager_ready_retries: 30
cert_manager_ready_delay: 5

# requests/limits des 3 Deployments cert-manager (audit code-first 2026-07-05).
# Le bundle vendored (cert-manager.yaml) ne pose AUCUNE resource → BestEffort ; on
# les injecte par PATCH strategic APRÈS l'apply (jamais en éditant le fichier figé,
# ADR 0006/0023). Dimensionné sur le repos observé en prod (cainjector ~136 MiB —
# cache cluster-wide croissant, le plus gourmand ; controller ~57 MiB ; webhook
# ~30 MiB). PAS de limits.cpu (CPU compressible, convention du dépôt). Par composant
# (clé = nom du Deployment) → une topo peut surcharger via group_vars (ADR 0023).
cert_manager_resources:
  cert-manager:
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      memory: 256Mi
  cert-manager-cainjector:
    requests:
      cpu: 20m
      memory: 192Mi
    limits:
      memory: 512Mi
  cert-manager-webhook:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
