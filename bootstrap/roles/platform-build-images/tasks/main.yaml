# code: language=ansible
# Rôle platform-build-images (ADR 0033) — fournit les images maison de la chaîne
# DataOps dans le registry interne. S'exécute sur UN nœud builder (run_once).
#   - arm64 (banc) : build interne via nerdctl + buildkit (images officielles
#     publiées amd64-only, ADR 0026/0028).
#   - x86 (bare-metal) : pas de build, re-tag des images officielles amd64.
# Idempotent : on saute une image déjà présente dans le registry.
#
# Le banc Lima ne monte pas le home hôte (mounts: []) → les sources du dépôt
# (Dockerfiles + contexte Dagster) sont COPIÉES sur le nœud (drift L27). Le
# source Marquez est cloné sur le nœud (gradle/web volumineux, non versionnés).

- name: Build or retag DataOps images into the internal registry
  run_once: true
  become: true
  become_method: ansible.builtin.sudo
  block:
    # ── Prépa build (drift L18 : git absent, buildkit disabled) ──────────────
    - name: Install build prerequisites (git)
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts.architecture == 'aarch64'

    - name: Enable and start buildkit
      ansible.builtin.systemd_service:
        name: buildkit
        enabled: true
        state: started
      when: ansible_facts.architecture == 'aarch64'

    # ── Sources sur le nœud (drift L27 : pas de montage hôte) ────────────────
    - name: Ensure per-image build directories exist
      ansible.builtin.file:
        path: '{{ build_workdir }}/{{ item }}'
        state: directory
        mode: '0755'
      loop:
        - dagster
        - marquez
        - marquez-web
      when: ansible_facts.architecture == 'aarch64'

    # Dagster : contexte local (Dockerfile pur Python) copié tel quel sur le nœud.
    - name: Copy Dagster build context to the builder node
      ansible.builtin.copy:
        src: '{{ platform_repo_dir }}/platform/dagster/image/'
        dest: '{{ build_workdir }}/dagster/'
        mode: '0644'
      when: ansible_facts.architecture == 'aarch64'

    # Marquez : clone du source upstream SUR le nœud (contexte gradle/web).
    - name: Clone Marquez source at the pinned tag
      ansible.builtin.git:
        repo: '{{ marquez_git_repo }}'
        dest: '{{ marquez_src_dir }}'
        version: '{{ marquez_version }}'
        depth: 1
        single_branch: true
      when: ansible_facts.architecture == 'aarch64'

    # Les Dockerfiles Marquez sont VERSIONNÉS dans le dépôt (copies fidèles
    # upstream, ADR 0028) → copiés sur le nœud à côté des contextes de build.
    - name: Copy Marquez Dockerfiles to the builder node
      ansible.builtin.copy:
        src: '{{ item.src }}'
        dest: '{{ item.dest }}'
        mode: '0644'
      loop:
        - src: '{{ platform_repo_dir }}/platform/marquez/image/Dockerfile'
          dest: '{{ build_workdir }}/marquez/Dockerfile'
        - src: '{{ platform_repo_dir }}/platform/marquez/image-web/Dockerfile'
          dest: '{{ build_workdir }}/marquez-web/Dockerfile'
      loop_control:
        label: '{{ item.dest }}'
      when: ansible_facts.architecture == 'aarch64'

    # Émetteur OpenLineage jetable (harnais e2e, ADR 0022) — contexte copié sur
    # le nœud UNIQUEMENT si la preuve lineage du banc est demandée (drift L31).
    - name: Copy emitter build context to the builder node
      ansible.builtin.copy:
        src: '{{ platform_repo_dir }}/platform/dagster/image-openlineage/'
        dest: '{{ build_workdir }}/emitter/'
        mode: '0644'
      when:
        - ansible_facts.architecture == 'aarch64'
        - build_emitter_image | bool

    # ── Build (arm64) ou re-tag (x86) image par image ────────────────────────
    # L'émetteur est ajouté à la liste seulement si build_emitter_image (banc e2e).
    - name: Provision each DataOps image
      ansible.builtin.include_tasks: image.yaml
      loop: '{{ build_images + ([emitter_image] if (build_emitter_image | bool) else []) }}'
      loop_control:
        loop_var: img
        label: '{{ img.name }}:{{ img.tag }}'
