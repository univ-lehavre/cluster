# code: language=ansible
# Rôle platform-build-images (ADR 0033) — fournit les images maison de la chaîne
# DataOps dans le registry interne. S'exécute sur UN nœud builder (run_once).
#   - arm64 (banc) : build interne via nerdctl + buildkit (images officielles
#     publiées amd64-only, ADR 0026/0028).
#   - x86 (bare-metal) : pas de build, re-tag des images officielles amd64.
# Idempotent : on saute une image déjà présente dans le registry.
#
# Le banc Lima ne monte pas le home hôte (mounts: []) → les sources du dépôt
# (Dockerfiles + contexte Dagster) sont COPIÉES sur le nœud (drift L27). Le
# source Marquez est cloné sur le nœud (gradle/web volumineux, non versionnés).

- name: Build or retag DataOps images into the internal registry
  run_once: true
  become: true
  become_method: ansible.builtin.sudo
  block:
    # ── nerdctl (client containerd) — REQUIS par toutes les branches ─────────
    # containerd.io (dépôt Docker, ADR 0005) ne fournit PAS nerdctl. Le banc Lima
    # l'a dans son image VM, mais un nœud bare-metal (Debian) ne l'a pas → ce rôle
    # échouait en prod (« nerdctl: Aucun fichier ou dossier »). On l'installe ICI,
    # avant tout usage, épinglé par checksum (ADR 0006). Variante `-full` : embarque
    # buildkit/buildctl (requis pour le build arm64). Idempotent : on (re)télécharge
    # seulement si nerdctl est absent ou à une autre version que la cible.
    - name: Map node architecture to the nerdctl asset arch
      ansible.builtin.set_fact:
        _nerdctl_arch: "{{ nerdctl_arch_map[ansible_facts.architecture] | default('') }}"

    - name: Fail clearly on an unsupported architecture for nerdctl
      ansible.builtin.fail:
        msg: >-
          architecture {{ ansible_facts.architecture }} non gérée pour nerdctl
          (attendu : {{ nerdctl_arch_map.keys() | list | join(', ') }}).
      when: not _nerdctl_arch

    - name: Check the installed nerdctl version (if any)
      ansible.builtin.command: nerdctl --version
      register: _nerdctl_installed
      changed_when: false
      failed_when: false

    - name: Install nerdctl-full at the pinned version
      when: nerdctl_version not in (_nerdctl_installed.stdout | default(''))
      block:
        - name: Download the pinned nerdctl-full archive (verified by checksum)
          ansible.builtin.get_url:
            url: >-
              https://github.com/containerd/nerdctl/releases/download/v{{ nerdctl_version }}/nerdctl-full-{{ nerdctl_version }}-linux-{{ _nerdctl_arch }}.tar.gz
            dest: '/tmp/nerdctl-full-{{ nerdctl_version }}-{{ _nerdctl_arch }}.tar.gz'
            checksum: '{{ nerdctl_checksums[_nerdctl_arch] }}'
            mode: '0644'

        # `-full` s'extrait sous le préfixe (bin/, lib/, libexec/…). /usr/local est
        # standard et déjà dans le PATH des nœuds.
        - name: Extract nerdctl-full into /usr/local
          ansible.builtin.unarchive:
            src: '/tmp/nerdctl-full-{{ nerdctl_version }}-{{ _nerdctl_arch }}.tar.gz'
            dest: /usr/local
            remote_src: true

    # `_needs_local_build` : un BUILD nerdctl tourne sur CE nœud si l'arch est arm64
    # (rebuild des officielles amd64-only) OU si une image de la liste a `build_all_arch`
    # (image dérivée à builder sur TOUTE arche, ex. mlflow — ADR 0082). En x86 SANS
    # build_all_arch, on ne fait que pull+retag : ni git ni buildkit requis.
    - name: Determine whether a local build runs on this node
      ansible.builtin.set_fact:
        _needs_local_build: >-
          {{ ansible_facts.architecture == 'aarch64'
             or (build_images | selectattr('build_all_arch', 'defined')
                              | selectattr('build_all_arch') | list | length > 0) }}

    # ── Prépa build (drift L18 : git absent, buildkit disabled) ──────────────
    - name: Install build prerequisites (git)
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: _needs_local_build | bool

    - name: Enable and start buildkit
      ansible.builtin.systemd_service:
        name: buildkit
        enabled: true
        state: started
      when: _needs_local_build | bool

    # ── Sources sur le nœud (drift L27 : pas de montage hôte) ────────────────
    # Images à CONTEXTE LOCAL (clé `src_context`) : dossier copié tel quel sur le nœud
    # (Dagster pur Python, MLflow officielle+psycopg2). Générique sur `build_images` →
    # une image build_all_arch (mlflow) est copiée même en x86. Marquez (clé
    # `src_dockerfile` + clone) est traité séparément ci-dessous.
    - name: Copy local build contexts to the builder node
      ansible.builtin.copy:
        src: '{{ item.src_context }}'
        dest: '{{ item.build_context }}/'
        mode: '0644'
      loop: "{{ build_images | selectattr('src_context', 'defined') | list }}"
      loop_control:
        label: '{{ item.name }}'
      when:
        - _needs_local_build | bool
        - ansible_facts.architecture == 'aarch64' or (item.build_all_arch | default(false) | bool)

    # Répertoires des images Marquez (Dockerfile versionné copié à côté du clone source).
    - name: Ensure Marquez build directories exist
      ansible.builtin.file:
        path: '{{ build_workdir }}/{{ item }}'
        state: directory
        mode: '0755'
      loop:
        - marquez
        - marquez-web
      when: ansible_facts.architecture == 'aarch64'

    # Marquez : clone du source upstream SUR le nœud (contexte gradle/web).
    - name: Clone Marquez source at the pinned tag
      ansible.builtin.git:
        repo: '{{ marquez_git_repo }}'
        dest: '{{ marquez_src_dir }}'
        version: '{{ marquez_version }}'
        depth: 1
        single_branch: true
      when: ansible_facts.architecture == 'aarch64'

    # Les Dockerfiles Marquez sont VERSIONNÉS dans le dépôt (copies fidèles
    # upstream, ADR 0028) → copiés sur le nœud à côté des contextes de build.
    - name: Copy Marquez Dockerfiles to the builder node
      ansible.builtin.copy:
        src: '{{ item.src }}'
        dest: '{{ item.dest }}'
        mode: '0644'
      loop:
        - src: '{{ platform_repo_dir }}/platform/marquez/image/Dockerfile'
          dest: '{{ build_workdir }}/marquez/Dockerfile'
        - src: '{{ platform_repo_dir }}/platform/marquez/image-web/Dockerfile'
          dest: '{{ build_workdir }}/marquez-web/Dockerfile'
      loop_control:
        label: '{{ item.dest }}'
      when: ansible_facts.architecture == 'aarch64'

    # Émetteur OpenLineage jetable (harnais e2e, ADR 0022) — contexte copié sur le nœud
    # si la preuve lineage est demandée. L'émetteur est `build_all_arch` (image maison
    # sans officielle à retaguer) → BUILDÉ sur TOUTE arche (x86 prod inclus, pas que le
    # banc arm64) ; le contexte doit donc être présent partout où on build, sinon
    # `nerdctl build` échoue (« Dockerfile no such file », constaté prod x86 2026-06-22).
    - name: Copy emitter build context to the builder node
      ansible.builtin.copy:
        src: '{{ platform_repo_dir }}/platform/dagster/image-openlineage/'
        dest: '{{ build_workdir }}/emitter/'
        mode: '0644'
      when: build_emitter_image | bool

    # ── Build (arm64) ou re-tag (x86) image par image ────────────────────────
    # L'émetteur est ajouté à la liste seulement si build_emitter_image (banc e2e).
    - name: Provision each DataOps image
      ansible.builtin.include_tasks: image.yaml
      loop: '{{ build_images + ([emitter_image] if (build_emitter_image | bool) else []) }}'
      loop_control:
        loop_var: img
        label: '{{ img.name }}:{{ img.tag }}'
