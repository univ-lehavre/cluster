---
# Valeurs par défaut du rôle platform-build-images (ADR 0033/0026/0028).
#
# Construit (arm64) ou re-tague (x86) les images maison de la chaîne DataOps vers
# le registry interne. S'exécute sur UN nœud builder (run_once). Drift L18 :
# git + buildkit requis. Drift L27 : le banc Lima ne monte PAS le home hôte
# (mounts: []) → les sources du dépôt sont COPIÉES sur le nœud avant build.

platform_repo_dir: '{{ playbook_dir }}/..'

# Registry interne cible (cf. rôle platform-registry).
build_registry_host: registry:80

# Répertoire de build sur le nœud (sources copiées depuis l'hôte / clone Marquez).
build_workdir: /tmp/dataops-build

# Versions figées (ADR 0006) — verrou chart↔image 1:1.
dagster_version: '1.13.7'
marquez_version: '0.51.1'
mlflow_version: 'v3.4.0'
redcap_version: 'v17.1.3'

# nerdctl (client containerd) — REQUIS par ce rôle (inspect/pull/tag/push + buildkit
# pour le build arm64). containerd.io (dépôt Docker, ADR 0005) ne le fournit PAS : c'est
# un binaire upstream séparé. La variante `-full` embarque buildkit/buildctl (build arm64).
# Épinglé par version + checksum SHA256 par arch (ADR 0006). Bumper : changer la version
# ET les deux checksums (github.com/containerd/nerdctl/releases → SHA256SUMS).
#
# ⚠️ TENU À 2.2.x (PAS 2.3.x) à cause du bug Yunix (issue #513 / drift L66) : `-full`
# embarque AUSSI son propre containerd, extrait dans /usr/local/ + pose le service systemd
# /usr/local/lib/systemd/system/containerd.service → c'est CE containerd qui sert de runtime
# k8s (il masque le paquet apt containerd.io). nerdctl-full 2.3.x embarque containerd 2.3.x,
# dont le nouveau protocole `BootstrapParams` du shim partage stdout/stderr : si runc écrit
# sur stderr au démarrage, les octets polluent l'adresse socket que containerd parse
# (« unsupported protocol: \b\x03\x12Yunix:// ») → ~13 % des pods bloqués en
# ContainerCreating sous charge. nerdctl-full 2.2.2 embarque containerd 2.2.1, sans ce bug.
# Rebumper vers 2.3.x SEULEMENT quand containerd corrige le partage stdout/stderr du shim.
nerdctl_version: '2.2.2'
nerdctl_checksums:
  amd64: 'sha256:8a477f35533c6cc1120c19558d8142967c74f25a4b952b481f48104e030de914'
  arm64: 'sha256:55d68d2613b5f065021146bac21f620cde9e7fdd4bd3eff74cd324f5462e107a'
# Map arch Ansible (uname -m) → arch des assets nerdctl.
nerdctl_arch_map:
  x86_64: amd64
  aarch64: arm64

# Source upstream Marquez (clone pour build API Java + UI React, sur le nœud).
marquez_git_repo: https://github.com/MarquezProject/marquez.git
marquez_src_dir: /tmp/marquez-src

# Émetteur OpenLineage jetable : harnais e2e (#148), PAS une brique prod
# (ADR 0022). Non construit par défaut ; activé (build_emitter_image=true) UNIQUEMENT
# pour la preuve lineage du banc. Ajouté à build_images via main.yaml si activé.
build_emitter_image: false
emitter_image:
  name: dagster-openlineage-emit
  tag: dev
  src_context: '{{ platform_repo_dir }}/platform/dagster/image-openlineage/'
  build_context: '{{ build_workdir }}/emitter'
  dockerfile: '{{ build_workdir }}/emitter/Dockerfile'
  # Tag `:dev` MUTABLE (toy_assets évolue) → rebuild même si le tag existe déjà,
  # sinon la code-location jouet sert un module périmé (ADR 0086, vécu au banc).
  force_rebuild: true
  # build_all_arch : image MAISON (FROM dagster + toy_assets.py), SANS officielle à
  # retaguer. Sur x86 (prod dirqual), le retag d'une officielle n'a pas de sens (il
  # n'y en a pas) → elle DOIT être BUILDÉE sur toute arche, comme mlflow/redcap. Sans
  # ça, la code-location jouet (preuve e2e) reste en ImagePullBackOff en prod x86
  # (image `not found`, constaté 2026-06-22). Identique au banc arm64 (qui buildait déjà).
  build_all_arch: true

# Images maison de la chaîne. Chaque entrée :
#   official_image : image amd64 officielle à re-taguer sur x86 (skip build).
#   src_context    : contexte sur l'HÔTE à copier vers le nœud (Dockerfile + co).
#   build_context  : contexte effectif sur le NŒUD (où nerdctl build).
#   dockerfile     : chemin du Dockerfile sur le NŒUD.
# Dagster : contexte local (Dockerfile pur Python). Marquez : Dockerfile versionné
# copié, mais contexte = clone source upstream (gradle/web) déjà sur le nœud.
build_images:
  - name: dagster-celery-k8s
    tag: '{{ dagster_version }}'
    official_image: 'docker.io/dagster/dagster-celery-k8s:{{ dagster_version }}'
    src_context: '{{ platform_repo_dir }}/platform/dagster/image/'
    build_context: '{{ build_workdir }}/dagster'
    dockerfile: '{{ build_workdir }}/dagster/Dockerfile'
  - name: marquez
    tag: '{{ marquez_version }}'
    official_image: 'docker.io/marquezproject/marquez:{{ marquez_version }}'
    src_dockerfile: '{{ platform_repo_dir }}/platform/marquez/image/Dockerfile'
    build_context: '{{ marquez_src_dir }}'
    dockerfile: '{{ build_workdir }}/marquez/Dockerfile'
  - name: marquez-web
    tag: '{{ marquez_version }}'
    official_image: 'docker.io/marquezproject/marquez-web:{{ marquez_version }}'
    src_dockerfile: '{{ platform_repo_dir }}/platform/marquez/image-web/Dockerfile'
    build_context: '{{ marquez_src_dir }}/web'
    dockerfile: '{{ build_workdir }}/marquez-web/Dockerfile'
  # PASSTHROUGH (mirror_only) — image kubectl+jq du reconciler workspace Dagster (ADR 0103,
  # platform/dagster/reconciler.yaml). Publique multi-arch (kubectl v1.36 + jq + busybox sh),
  # épinglée par DIGEST d'index (arm64+amd64 vérifiés crane, ADR 0006). Ni build ni retag :
  # pull → tag → push (cf. mirror_only dans image.yaml). Sans elle, le CronJob du reconciler
  # fait ImagePullBackOff au banc air-gappé (ADR 0011).
  - name: dtzar/helm-kubectl
    tag: 4.2.2
    mirror_only: true
    public: docker.io/dtzar/helm-kubectl@sha256:d815939dfc36d06dde3baaa3d122dc017753006e712c111a72d7f3e1e1744807

# Image maison MLflow (ADR 0082 amendé) : officielle + psycopg2. Liste SÉPARÉE de
# build_images — consommée UNIQUEMENT par la layer autonome bootstrap/mlflow.yaml
# (override `build_images` au niveau import_role), JAMAIS par dataops (mlflow ≠ dataops,
# ADR 0083). `build_all_arch: true` : on AJOUTE un paquet (psycopg2-binary) à
# l'officielle → BUILD sur les 2 arches (le retag x86 de l'officielle ramènerait
# l'image SANS psycopg2 → CrashLoopBackOff). Contexte local (modèle Dagster).
mlflow_build_images:
  - name: mlflow
    tag: '{{ mlflow_version }}'
    official_image: 'ghcr.io/mlflow/mlflow:{{ mlflow_version }}'
    src_context: '{{ platform_repo_dir }}/platform/mlflow/image/'
    build_context: '{{ build_workdir }}/mlflow'
    dockerfile: '{{ build_workdir }}/mlflow/Dockerfile'
    build_all_arch: true

# Image maison REDCap (app autonome, hors graphe nestor — déployée à la main comme
# RStudio). Liste SÉPARÉE de build_images : consommée UNIQUEMENT au build manuel de
# l'app redcap (cf. apps/redcap/README.md), JAMAIS par dataops/mlflow. PAS de
# `official_image` : REDCap est un logiciel TIERS sous licence propriétaire sans image
# publique → on build TOUJOURS depuis les sources (`build_all_arch: true` ; sur x86 le
# retag d'une officielle n'a pas de sens, il n'y en a pas). `src_context` =
# platform/redcap/image/ (Dockerfile versionné) ; le code PHP attendu sous
# `source/redcap/` du contexte est COPIÉ node-side par main.yaml et reste GITIGNORÉ.
redcap_build_images:
  - name: redcap
    tag: '{{ redcap_version }}'
    src_context: '{{ platform_repo_dir }}/platform/redcap/image/'
    build_context: '{{ build_workdir }}/redcap'
    dockerfile: '{{ build_workdir }}/redcap/Dockerfile'
    build_all_arch: true

# Image maison du PORTAIL d'accès aux UI (ADR 0091/0092). Liste SÉPARÉE de
# build_images : consommée UNIQUEMENT par la layer autonome bootstrap/portal.yaml
# (override `build_images` au niveau import_role), JAMAIS par dataops/mlflow.
#
# CAS PARTICULIER — contexte de build MULTI-DOSSIER. Le Dockerfile du portail
# (platform/portal/image/Dockerfile) fait `COPY nestor/portal*.py` ET
# `COPY contract/endpoints.example.yaml` → son contexte effectif est la RACINE du
# dépôt (nestor/ + contract/), pas un sous-dossier auto-suffisant comme Dagster/
# MLflow/REDCap. Le mécanisme générique `src_context` de platform-build-images copie
# UN seul dossier → il ne couvre pas ce cas. Donc PAS de `src_context` ici : le play
# bootstrap/portal.yaml RÉPLIQUE node-side l'arborescence minimale (nestor/portal*.py
# + contract/endpoints.example.yaml + le Dockerfile à la racine du contexte) sous
# `build_workdir/portal/` AVANT d'importer ce rôle. Le rôle se contente alors de
# builder ce contexte déjà préparé (build_context/dockerfile pointent dessus).
#
# PAS de `official_image` : image 100 % maison (FROM python:3.12-slim + pip install
# kubernetes/pyyaml + COPY du code/contrat). `build_all_arch: true` : aucune
# officielle amd64 à retaguer → BUILD sur TOUTE arche (x86 prod inclus ; un retag y
# ramènerait une image SANS le code, comme émetteur/mlflow/redcap). `force_rebuild:
# true` : tag `:dev` MUTABLE — le code portail (nestor/portal*.py) ET le contrat
# embarqué (contract/endpoints.example.yaml) évoluent ; sans rebuild, le skip-si-présent
# servirait à jamais une image périmée (raisonnement émetteur, defaults L51-53).
portal_build_images:
  - name: portal
    tag: dev
    build_context: '{{ build_workdir }}/portal'
    dockerfile: '{{ build_workdir }}/portal/Dockerfile'
    build_all_arch: true
    force_rebuild: true

# Image APPLICATIVE de la code-location atlas `citation` (exemple générique ADR 0023 ;
# ADR 0094/0095 §1.a « premier pas »). Liste SÉPARÉE de build_images : consommée
# UNIQUEMENT par la layer autonome bootstrap/citation.yaml (override `build_images` au
# niveau import_role), JAMAIS par dataops/mlflow/portal.
#
# CAS CONTEXTE MULTI-DOSSIER (comme portal) : le Dockerfile citation (dépôt atlas,
# dataops/citation-dagster/Dockerfile) a pour contexte de build `dataops/` — il embarque
# la code-location `citation-dagster/` ET le projet dbt frère `citation-dbt/` (`COPY
# citation-dagster/… ` et `COPY citation-dbt …`). Le `src_context` générique mono-dossier
# ne couvre pas ce cas → PAS de `src_context` ici : le play bootstrap/citation.yaml
# RÉPLIQUE node-side l'arborescence minimale attendue (citation-dagster/{pyproject,uv.lock,
# README,src,scripts} + citation-dbt/ + le Dockerfile à la racine du contexte) sous
# `build_workdir/citation/` AVANT d'importer ce rôle. Le rôle build ce contexte préparé.
#
# PAS d'`official_image` : image 100 % maison (FROM python:3.10-slim + le paquet atlas).
# `build_all_arch: true` : aucune officielle amd64 à retaguer → BUILD sur TOUTE arche (x86
# prod inclus). `force_rebuild: true` : tag `:dev` MUTABLE — le code atlas évolue à chaque
# révision (raisonnement émetteur/portail, defaults L51-53). `gitops_writeback: true` : le
# DÉPLOIEMENT est GitOps par DIGEST (ADR 0095 §2), pas par tag ; le rôle lit `RepoDigests`
# après push et expose `build_image_digests` que le SEED publie dans cluster/apps.
citation_build_images:
  - name: citation-dagster
    tag: dev
    build_context: '{{ build_workdir }}/citation'
    dockerfile: '{{ build_workdir }}/citation/Dockerfile'
    build_all_arch: true
    force_rebuild: true
    gitops_writeback: true
