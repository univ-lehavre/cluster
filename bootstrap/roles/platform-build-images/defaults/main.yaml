---
# Valeurs par défaut du rôle platform-build-images (ADR 0033/0026/0028).
#
# Construit (arm64) ou re-tague (x86) les images maison de la chaîne DataOps vers
# le registry interne. S'exécute sur UN nœud builder (run_once). Drift L18 :
# git + buildkit requis. Drift L27 : le banc Lima ne monte PAS le home hôte
# (mounts: []) → les sources du dépôt sont COPIÉES sur le nœud avant build.

platform_repo_dir: '{{ playbook_dir }}/..'

# Registry interne cible (cf. rôle platform-registry).
build_registry_host: registry:80

# Répertoire de build sur le nœud (sources copiées depuis l'hôte / clone Marquez).
build_workdir: /tmp/dataops-build

# Versions figées (ADR 0006) — verrou chart↔image 1:1.
dagster_version: '1.13.7'
marquez_version: '0.51.1'
mlflow_version: 'v3.4.0'
redcap_version: 'v17.1.3'

# nerdctl (client containerd) — REQUIS par ce rôle (inspect/pull/tag/push + buildkit
# pour le build arm64). containerd.io (dépôt Docker, ADR 0005) ne le fournit PAS : c'est
# un binaire upstream séparé. La variante `-full` embarque buildkit/buildctl (build arm64).
# Épinglé par version + checksum SHA256 par arch (ADR 0006). Bumper : changer la version
# ET les deux checksums (github.com/containerd/nerdctl/releases → SHA256SUMS).
nerdctl_version: '2.3.3'
nerdctl_checksums:
  amd64: 'sha256:8d39a120d8414e3aff15ac05accf51bbbad6baf54764ae709b09087e4544c1ad'
  arm64: 'sha256:2322f29f451189dd790b5d7c599b4600c210ff0f2c10244308a8e6a024274066'
# Map arch Ansible (uname -m) → arch des assets nerdctl.
nerdctl_arch_map:
  x86_64: amd64
  aarch64: arm64

# Source upstream Marquez (clone pour build API Java + UI React, sur le nœud).
marquez_git_repo: https://github.com/MarquezProject/marquez.git
marquez_src_dir: /tmp/marquez-src

# Émetteur OpenLineage jetable : harnais e2e (#148), PAS une brique prod
# (ADR 0022). Non construit par défaut ; activé (build_emitter_image=true) UNIQUEMENT
# pour la preuve lineage du banc. Ajouté à build_images via main.yaml si activé.
build_emitter_image: false
emitter_image:
  name: dagster-openlineage-emit
  tag: dev
  src_context: '{{ platform_repo_dir }}/platform/dagster/image-openlineage/'
  build_context: '{{ build_workdir }}/emitter'
  dockerfile: '{{ build_workdir }}/emitter/Dockerfile'
  # Tag `:dev` MUTABLE (toy_assets évolue) → rebuild même si le tag existe déjà,
  # sinon la code-location jouet sert un module périmé (ADR 0086, vécu au banc).
  force_rebuild: true
  # build_all_arch : image MAISON (FROM dagster + toy_assets.py), SANS officielle à
  # retaguer. Sur x86 (prod dirqual), le retag d'une officielle n'a pas de sens (il
  # n'y en a pas) → elle DOIT être BUILDÉE sur toute arche, comme mlflow/redcap. Sans
  # ça, la code-location jouet (preuve e2e) reste en ImagePullBackOff en prod x86
  # (image `not found`, constaté 2026-06-22). Identique au banc arm64 (qui buildait déjà).
  build_all_arch: true

# Images maison de la chaîne. Chaque entrée :
#   official_image : image amd64 officielle à re-taguer sur x86 (skip build).
#   src_context    : contexte sur l'HÔTE à copier vers le nœud (Dockerfile + co).
#   build_context  : contexte effectif sur le NŒUD (où nerdctl build).
#   dockerfile     : chemin du Dockerfile sur le NŒUD.
# Dagster : contexte local (Dockerfile pur Python). Marquez : Dockerfile versionné
# copié, mais contexte = clone source upstream (gradle/web) déjà sur le nœud.
build_images:
  - name: dagster-celery-k8s
    tag: '{{ dagster_version }}'
    official_image: 'docker.io/dagster/dagster-celery-k8s:{{ dagster_version }}'
    src_context: '{{ platform_repo_dir }}/platform/dagster/image/'
    build_context: '{{ build_workdir }}/dagster'
    dockerfile: '{{ build_workdir }}/dagster/Dockerfile'
  - name: marquez
    tag: '{{ marquez_version }}'
    official_image: 'docker.io/marquezproject/marquez:{{ marquez_version }}'
    src_dockerfile: '{{ platform_repo_dir }}/platform/marquez/image/Dockerfile'
    build_context: '{{ marquez_src_dir }}'
    dockerfile: '{{ build_workdir }}/marquez/Dockerfile'
  - name: marquez-web
    tag: '{{ marquez_version }}'
    official_image: 'docker.io/marquezproject/marquez-web:{{ marquez_version }}'
    src_dockerfile: '{{ platform_repo_dir }}/platform/marquez/image-web/Dockerfile'
    build_context: '{{ marquez_src_dir }}/web'
    dockerfile: '{{ build_workdir }}/marquez-web/Dockerfile'

# Image maison MLflow (ADR 0082 amendé) : officielle + psycopg2. Liste SÉPARÉE de
# build_images — consommée UNIQUEMENT par la layer autonome bootstrap/mlflow.yaml
# (override `build_images` au niveau import_role), JAMAIS par dataops (mlflow ≠ dataops,
# ADR 0083). `build_all_arch: true` : on AJOUTE un paquet (psycopg2-binary) à
# l'officielle → BUILD sur les 2 arches (le retag x86 de l'officielle ramènerait
# l'image SANS psycopg2 → CrashLoopBackOff). Contexte local (modèle Dagster).
mlflow_build_images:
  - name: mlflow
    tag: '{{ mlflow_version }}'
    official_image: 'ghcr.io/mlflow/mlflow:{{ mlflow_version }}'
    src_context: '{{ platform_repo_dir }}/platform/mlflow/image/'
    build_context: '{{ build_workdir }}/mlflow'
    dockerfile: '{{ build_workdir }}/mlflow/Dockerfile'
    build_all_arch: true

# Image maison REDCap (app autonome, hors graphe nestor — déployée à la main comme
# RStudio). Liste SÉPARÉE de build_images : consommée UNIQUEMENT au build manuel de
# l'app redcap (cf. apps/redcap/README.md), JAMAIS par dataops/mlflow. PAS de
# `official_image` : REDCap est un logiciel TIERS sous licence propriétaire sans image
# publique → on build TOUJOURS depuis les sources (`build_all_arch: true` ; sur x86 le
# retag d'une officielle n'a pas de sens, il n'y en a pas). `src_context` =
# platform/redcap/image/ (Dockerfile versionné) ; le code PHP attendu sous
# `source/redcap/` du contexte est COPIÉ node-side par main.yaml et reste GITIGNORÉ.
redcap_build_images:
  - name: redcap
    tag: '{{ redcap_version }}'
    src_context: '{{ platform_repo_dir }}/platform/redcap/image/'
    build_context: '{{ build_workdir }}/redcap'
    dockerfile: '{{ build_workdir }}/redcap/Dockerfile'
    build_all_arch: true
