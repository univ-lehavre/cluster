# code: language=ansible
- name: Install kubernetes components
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Check apt dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - python3-debian # requis par deb822_repository (ajout du dépôt ci-dessous)
        state: present

    - name: Ensure the APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Clé du dépôt téléchargée vers un fichier TEMPORAIRE d'abord (get_url
    # idempotent), PAS dans un pipe curl|gpg dont l'échec laisserait un keyring
    # tronqué (cf. ci-dessous).
    - name: Get the kubernetes Release key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
        dest: /tmp/k8s-release.key
        mode: '0644'

    # Dé-armoricer en keyring binaire, PUIS valider (gpg --show-keys parse le
    # fichier), PUIS poser un marqueur DISTINCT (.valid). Anti « marqueur menteur »
    # (#236, même classe que le bug node-joined.log) : le `creates:` ne pointe PAS
    # le keyring écrit par la commande — sinon un keyring tronqué par un arrêt en
    # plein dearmor serait considéré « acquis » et le re-jeu le sauterait, laissant
    # `apt update` en échec BADSIG sans réparation. Le marqueur n'est posé
    # QU'APRÈS validation réussie → un keyring partiel n'a pas de .valid → le
    # re-jeu le ré-écrit et converge.
    - name: Dearmor and validate the kubernetes apt keyring
      ansible.builtin.shell: >-
        set -o pipefail &&
        gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/k8s-release.key &&
        gpg --show-keys /etc/apt/keyrings/kubernetes-apt-keyring.gpg &&
        touch /etc/apt/keyrings/.kubernetes-apt-keyring.valid
      args:
        executable: /bin/bash
        creates: /etc/apt/keyrings/.kubernetes-apt-keyring.valid
      changed_when: true

    # deb822_repository remplace apt_repository (déprécié, retiré en
    # ansible-core 2.25). Dépôt « flat » pkgs.k8s.io : suite '/' sans component.
    - name: Add kubernetes repository
      ansible.builtin.deb822_repository:
        name: kubernetes
        types: [deb]
        uris: https://pkgs.k8s.io/core:/stable:/v1.34/deb/
        suites: ['/']
        signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: present
        enabled: true

    - name: Update apt cache after adding the kubernetes repository
      ansible.builtin.apt:
        update_cache: true

    # cri-tools fournit `crictl`, requis par etcd-snapshot.sh (snapshot etcd
    # via `crictl exec` dans le static pod) et par les procédures de
    # récupération du RUNBOOK. Même dépôt pkgs.k8s.io que kubeadm/kubelet →
    # version alignée sur la matrice 1.34.
    - name: Install kubelet, kubeadm and cri-tools
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - cri-tools
        state: present

    - name: Hold kubelet, kubeadm and cri-tools at their installed version
      ansible.builtin.dpkg_selections:
        name: '{{ item }}'
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - cri-tools

    - name: Configure KUBELET_EXTRA_ARGS for --node-ip when needed
      # `kubelet_node_ip` (optionnel) surcharge l'IP que kubelet annonce
      # comme INTERNAL-IP du nœud. Utile sur le banc multi-node où chaque
      # VM a deux interfaces (NAT eth0 + privée eth1) : sans ça, kubelet
      # prend le NAT, et Cilium agent ne peut pas joindre l'API depuis
      # les workers. En prod, on laisse vide → kubelet détecte l'IP de
      # l'interface cluster (10.0.0.X).
      ansible.builtin.copy:
        dest: /etc/default/kubelet
        owner: root
        group: root
        mode: '0644'
        content: |
          # Géré par bootstrap/roles/k8s-install — ne pas éditer à la main.
          KUBELET_EXTRA_ARGS="--node-ip={{ kubelet_node_ip }}"
      when: kubelet_node_ip | default('') | length > 0
      notify: Restart kubelet

    - name: Enable and start kubernetes service
      ansible.builtin.systemd_service:
        name: kubelet
        daemon_reload: true
        enabled: true
        state: started

    - name: Map the control-plane endpoint to the primary control-plane node
      # `control_plane_ip` (optionnel) surcharge l'IP utilisée pour
      # joindre le control plane. Utile sur le banc multi-node où le
      # réseau privé inter-VM (10.0.0.x) doit être préféré au NAT par
      # défaut détecté par Ansible (10.0.2.x). En prod, on laisse la
      # variable vide et on tombe sur `ansible_facts.default_ipv4.address`.
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '\s{{ control_plane_endpoint }}$'
        line: "{{ control_plane_ip | default(hostvars[groups['control'][0]].ansible_facts.default_ipv4.address, true) }} {{ control_plane_endpoint }}"
        state: present
