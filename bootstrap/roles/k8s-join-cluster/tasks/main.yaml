# code: language=ansible
# Reprise après incident (ADR 0050, cas (b) — étape à effet de bord NON
# idempotent). Un `kubeadm join` AVORTÉ laisse un kubelet/PKI partiel sur le
# worker → un re-join nu échoue. Le rescue COMPENSE (`kubeadm reset --force`) pour
# ramener le worker à « non joint propre », re-join-able, puis re-fail actionnable.
# Le marqueur `creates:` node-joined.log (CHECKPOINT) garantit qu'un join déjà
# réussi ne re-rentre pas dans le block. Frontière (ADR 0050) : le rescue ne
# touche PAS containerd / APT (apanage du rollback global k8s-rollback).
- name: Join worker nodes to cluster
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Wait for the primary control plane API to be reachable
      # Même logique de surcharge que dans k8s-install/k8s-initialization :
      # sur le banc multi-node, `control_plane_ip` est posée à l'IP du
      # réseau privé inter-VM (10.0.0.11). En prod, on tombe sur
      # `ansible_facts.default_ipv4.address` du control plane.
      ansible.builtin.wait_for:
        host: "{{ control_plane_ip | default(hostvars[groups['control'][0]].ansible_facts.default_ipv4.address, true) }}"
        port: '{{ control_plane_port }}'
        timeout: 30

    - name: Join the cluster
      # Le CHECKPOINT (node-joined.log) est écrit en tâche SÉPARÉE, APRÈS le
      # succès de `kubeadm join` — PAS via `>> node-joined.log` qui créerait le
      # marqueur même si join ÉCHOUE en cours (la redirection crée le fichier
      # avant l'exécution). Un marqueur menteur ferait sauter le re-jeu après un
      # rescue → kubelet resterait arrêté, nœud NotReady (constaté en arrêt
      # injecté). `creates:` garde l'idempotence : un join déjà acquis ne re-tente
      # pas. Le rescue, lui, supprime ce marqueur pour forcer un vrai re-jeu.
      ansible.builtin.command: "{{ hostvars[groups['control'][0]].join_command }}"
      args:
        # Home de l'utilisateur connecté (≠ /home/debian codé en dur) : existe sur
        # les nœuds réels / Vagrant (debian) ET sur le banc Lima (/home/lima.guest).
        chdir: '{{ ansible_facts.env.HOME }}'
        creates: node-joined.log
      register: join_result

    # CHECKPOINT écrit APRÈS le join : on n'arrive ici que si la tâche précédente
    # n'a pas échoué (sinon le rescue a pris la main). `creates:` rend le tout
    # idempotent ; la copie est idempotente (même contenu → changed=0 au rejeu
    # une fois le marqueur figé). On fige le contenu (pas d'horodatage) pour ne
    # pas casser l'idempotence du rejeu.
    - name: Record the join checkpoint (after a successful join)
      ansible.builtin.copy:
        content: "node joined\n"
        dest: '{{ ansible_facts.env.HOME }}/node-joined.log'
        mode: '0644'

  # ── Reprise après incident (ADR 0050 cas (b)) ──────────────────────────────
  rescue:
    - name: Capture the kubelet state for diagnosis
      ansible.builtin.command: journalctl -u kubelet --no-pager -n 30
      register: join_kubelet_diag
      changed_when: false
      failed_when: false
    - name: Show the kubelet diagnosis
      ansible.builtin.debug:
        var: join_kubelet_diag.stdout_lines
    # COMPENSATION : reset le demi-join (kubelet config + certs partiels) pour
    # repartir d'un worker vierge côté K8s. NE touche PAS containerd/APT.
    - name: Compensate the aborted join (kubeadm reset --force)
      ansible.builtin.command: kubeadm reset --force
      register: join_reset
      changed_when: "'cleaned up' in join_reset.stdout or join_reset.rc == 0"
      failed_when: false
    # Retire le CHECKPOINT : sans ça, un marqueur node-joined.log résiduel (d'un
    # ancien run, ou laissé par une version qui le créait trop tôt) ferait SAUTER
    # `kubeadm join` au re-jeu via `creates:` → le worker resté reset (kubelet
    # arrêté) ne re-joindrait jamais, NotReady. Le rescue doit rendre le re-jeu
    # effectif. (Désormais le marqueur n'est écrit qu'après un join réussi, mais
    # on nettoie quand même — défense en profondeur, idempotent.)
    - name: Remove the stale join checkpoint so the re-run actually re-joins
      ansible.builtin.file:
        path: '{{ ansible_facts.env.HOME }}/node-joined.log'
        state: absent
    - name: Fail with an actionable message after compensation
      ansible.builtin.fail:
        msg: >-
          `kubeadm join` a échoué et a été compensé (kubeadm reset --force). Le
          worker est revenu à un état propre, re-join-able : corriger la cause
          (token expiré → re-jouer k8s-pre-join ; réseau → vérifier l'API du
          control-plane) puis RE-JOUER le même chemin.

  always:
    - name: Report the worker join outcome
      ansible.builtin.debug:
        msg: >-
          k8s-join-cluster terminé (node-joined.log présent = join acquis ;
          sinon le rescue a compensé et fait échouer pour re-jeu).
