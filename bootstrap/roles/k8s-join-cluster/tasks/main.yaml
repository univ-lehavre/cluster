# code: language=ansible
- name: Join worker nodes to cluster
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Wait for the primary control plane API to be reachable
      # Même logique de surcharge que dans k8s-install/k8s-initialization :
      # sur le banc multi-node, `control_plane_ip` est posée à l'IP du
      # réseau privé inter-VM (10.0.0.11). En prod, on tombe sur
      # `ansible_default_ipv4.address` du control plane.
      ansible.builtin.wait_for:
        host: "{{ control_plane_ip | default(hostvars[groups['control'][0]].ansible_default_ipv4.address, true) }}"
        port: '{{ control_plane_port }}'
        timeout: 30

    - name: Join the cluster
      ansible.builtin.shell: "{{ hostvars[groups['control'][0]].join_command }} >> node-joined.log"
      args:
        chdir: /home/debian
        creates: node-joined.log
