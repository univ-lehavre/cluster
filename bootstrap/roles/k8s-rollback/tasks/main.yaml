---
# Rollback du bootstrap Kubernetes : kubeadm reset + dépaquetage + suppression
# des configs noyau et fichiers d'état.
#
# Cible : un nœud qui doit être ramené à un état "Debian 13 + utilisateur
# debian + sshd durci" — comme juste après `first-access.sh`, sans rien
# de K8s/containerd installé.
#
# Ce qui n'est PAS rollback (volontairement) :
#   - first-access.sh (clé SSH + sudoers + sshd drop-in) : géré séparément
#   - secure.yml (auditd, fail2ban, etc.) : géré séparément (opt-in)
#   - le partitionnement et l'installation OS
#   - les disques Ceph + /var/lib/rook : voir storage/ceph/cleanup.sh
#
# Sécurité : exige une confirmation explicite via `-e confirm=yes`.

- name: Refuser le rollback sans confirmation explicite
  ansible.builtin.assert:
    that:
      - confirm | default('') == 'yes'
    fail_msg: >-
      Refus : lancez avec `-e confirm=yes` pour confirmer le rollback
      destructif du bootstrap K8s sur {{ inventory_hostname }}.

- name: Tracer le rollback dans le journal d'audit
  ansible.builtin.import_role:
    name: audit-log
  vars:
    audit_log_playbook: rollback.yaml (k8s-rollback)

- name: Kubeadm reset --force (si kubeadm est installé)
  become: true
  ansible.builtin.command: kubeadm reset --force
  register: kubeadm_reset
  changed_when: kubeadm_reset.rc == 0
  failed_when: false
  args:
    removes: /usr/bin/kubeadm

- name: Stopper et désactiver kubelet et containerd
  become: true
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: stopped
    enabled: false
  loop:
    - kubelet
    - containerd
  failed_when: false

- name: Retirer les holds APT sur les paquets K8s/containerd
  become: true
  ansible.builtin.dpkg_selections:
    name: '{{ item }}'
    selection: install
  loop:
    - kubelet
    - kubeadm
    - kubectl
    - containerd.io
  failed_when: false

- name: Purger les paquets K8s + containerd
  become: true
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
      - containerd.io
    state: absent
    purge: true
    autoremove: true

- name: Supprimer les fichiers de configuration K8s/containerd
  become: true
  ansible.builtin.file:
    path: '{{ item }}'
    state: absent
  loop:
    - /etc/kubernetes
    - /etc/cni
    - /etc/containerd
    - /var/lib/kubelet
    - /var/lib/etcd
    - /var/lib/cni
    - /opt/cni
    - /etc/modules-load.d/k8s.conf
    - /etc/sysctl.d/k8s.conf
    - /etc/apt/sources.list.d/kubernetes.list
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - /etc/apt/keyrings/docker.asc
    # Home de l'utilisateur connecté (≠ /home/debian codé en dur) : /home/debian
    # sur les nœuds réels / Vagrant, /home/lima.guest sur le banc Lima.
    - '{{ ansible_facts.env.HOME }}/.kube'
    - '{{ ansible_facts.env.HOME }}/cluster-setup.log'
    - '{{ ansible_facts.env.HOME }}/taint-setup.log'
    - '{{ ansible_facts.env.HOME }}/lb-setup.log'

- name: Décharger les modules noyau (best-effort, sans erreur si absents)
  become: true
  # `ansible.builtin.command` plutôt que `community.general.modprobe` pour
  # éviter une dépendance collection en CI ansible-lint. -r = remove ;
  # rmmod avec ignore failures (le module peut ne pas être chargé).
  ansible.builtin.command:
    cmd: 'modprobe -r {{ item }}'
  loop:
    - overlay
    - br_netfilter
  changed_when: false
  failed_when: false

- name: Appliquer un sysctl reset pour annuler les forwards/bridge-call
  become: true
  ansible.posix.sysctl:
    name: '{{ item }}'
    value: '0'
    state: present
    sysctl_set: true
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.bridge.bridge-nf-call-iptables
    - net.bridge.bridge-nf-call-ip6tables
  failed_when: false
