---
# Valeurs par défaut du rôle platform-cnpg (ADR 0033/0024/0036).
# Barman exige un S3 ; le backing est paramétrable par topologie (comme Loki,
# ADR 0036) — MÊME chemin de code, seul le backing change :
#   - 'rgw' (prod / banc Ceph) : bucket + creds via OBC Rook (dérivés) ;
#   - 'seaweedfs' (banc léger / single-node) : SeaweedFS, creds de test statiques.

platform_repo_dir: '{{ playbook_dir }}/..'

cnpg_namespace: postgres
cnpg_operator_namespace: cnpg-system

# storageClass du Cluster pg. Défaut PROD/banc Ceph : RBD répliqué ×3 (ADR 0001 —
# JAMAIS EC 2+1 pour ce stateful) ; banc léger surcharge en local-path.
cnpg_storage_class: rook-ceph-block-replicated

# Backing S3 des sauvegardes Barman : 'rgw' (prod) ou 'seaweedfs' (banc léger).
cnpg_s3_backing: rgw

# Endpoint S3 selon le backing (surchargeable). Défaut = RGW (prod).
cnpg_s3_endpoint: http://rook-ceph-rgw-datalake.rook-ceph:80
# Bucket des sauvegardes CNPG.
cnpg_s3_bucket: cnpg-backups

# Backing 'rgw' : OBC Rook qui provisionne le bucket + le Secret de creds (clés
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY dans son namespace).
cnpg_obc_name: cnpg-backups
cnpg_obc_namespace: rook-ceph
cnpg_obc_storage_class: rook-ceph-datalake

# Backing 'seaweedfs' : creds de test statiques (le déploiement SeaweedFS les
# pose — ADR 0036, identité seaweedadmin). Le bucket est créé par un Job mb.
cnpg_s3_access_key: seaweedadmin
cnpg_s3_secret_key: seaweedadmin-secret

# Gates (alignés sur les prédicats du shell dataops-chain).
cnpg_operator_ready_retries: 36 # 36×5s = 180s
cnpg_operator_ready_delay: 5
cnpg_cluster_healthy_retries: 60 # 60×10s = 600s
cnpg_cluster_healthy_delay: 10
