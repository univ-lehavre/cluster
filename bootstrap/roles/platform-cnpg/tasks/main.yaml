# code: language=ansible
# Rôle platform-cnpg (ADR 0033/0024) — store PostgreSQL HA managé par
# CloudNativePG, avec sauvegardes Barman vers le RGW Ceph (mode Ceph).
# Ordre fidèle au platform/cloudnative-pg/README.md. Appliqué depuis le
# control-plane. Prérequis : cert-manager (rôle platform-cert-manager) + Ceph
# (RGW datalake + storageClass RBD) + feature gate ImageVolume (bootstrap).

- name: Deploy CloudNativePG with Barman backups
  run_once: true
  block:
    # Namespace `postgres` créé EN PREMIER : les Secrets (rôles, pg-backup-s3) y
    # sont posés avant le Cluster qui, lui, le redéclare (drift L25 : sans ça, le
    # Secret dérivé échoue « namespaces postgres not found »).
    - name: Ensure the postgres namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ cnpg_namespace }}'

    # ── 1. operator (CRDs volumineuses → server-side) + plugin Barman ────────
    - name: Apply CNPG operator (server-side)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cloudnative-pg/operator.yaml'
        server_side_apply:
          field_manager: ansible-platform-cnpg

    - name: Wait for CNPG controller manager to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cnpg-controller-manager
        namespace: '{{ cnpg_operator_namespace }}'
      register: cnpg_operator
      until: >-
        cnpg_operator.resources | length > 0
        and (cnpg_operator.resources[0].status.readyReplicas | default(0)) == 1
      retries: '{{ cnpg_operator_ready_retries }}'
      delay: '{{ cnpg_operator_ready_delay }}'

    - name: Apply Barman Cloud plugin (server-side)
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cloudnative-pg/plugin-barman-cloud.yaml'
        server_side_apply:
          field_manager: ansible-platform-cnpg

    # ── 2. backing S3 (bucket + Secret creds) via le rôle platform-s3-bucket ──
    # Factorisé (ADR 0036) : le rôle produit le Secret `pg-backup-s3` (clés
    # ACCESS_KEY_ID / ACCESS_SECRET_KEY) et résout le nom réel du bucket dans
    # `s3b_bucket_resolved`, selon cnpg_s3_backing (rgw|seaweedfs). Le reste du
    # rôle CNPG est identique quel que soit le backing.
    - name: Provision the S3 backing (bucket + creds Secret)
      ansible.builtin.include_role:
        name: platform-s3-bucket
      vars:
        s3b_backing: '{{ cnpg_s3_backing }}'
        s3b_endpoint: '{{ cnpg_s3_endpoint }}'
        s3b_name: '{{ cnpg_obc_name }}'
        s3b_namespace: '{{ cnpg_namespace }}'
        s3b_secret_name: pg-backup-s3
        s3b_buckets: ['{{ cnpg_s3_bucket }}']
        s3b_obc_namespace: '{{ cnpg_obc_namespace }}'
        s3b_obc_storage_class: '{{ cnpg_obc_storage_class }}'
        s3b_access_key: '{{ cnpg_s3_access_key }}'
        s3b_secret_key: '{{ cnpg_s3_secret_key }}'

    # ── 3. secrets de mot de passe des rôles managés (drift L16) ─────────────
    # Patron .example versionné = valeurs de test (banc). En prod : Secrets hors
    # dépôt (config locale non versionnée), mêmes clés.
    - name: Apply managed role password Secrets
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cloudnative-pg/role-secrets.example.yaml'

    # ── 4. ObjectStore (RGW) + Cluster (storageClass paramétré) ──────────────
    - name: Apply CNPG ObjectStore (endpoint {{ cnpg_s3_endpoint }})
      kubernetes.core.k8s:
        state: present
        template: objectstore.yaml.j2

    # Charge le manifeste figé et n'ajuste que le storageClass (pas de .j2 du
    # rendu : une seule source de vérité, ADR 0033). Les digests pinned et le
    # bloc plugins Barman restent intacts.
    - name: Load the pinned Cluster manifest
      ansible.builtin.set_fact:
        cnpg_cluster_defs: >-
          {{ lookup('file', platform_repo_dir ~ '/platform/cloudnative-pg/cluster.yaml')
             | from_yaml_all | list }}

    - name: Apply CNPG Cluster (storageClass={{ cnpg_storage_class }})
      kubernetes.core.k8s:
        state: present
        definition: >-
          {{ item
             | combine({'spec': {'storage': {'storageClass': cnpg_storage_class}}}, recursive=True)
             if (item.kind | default('')) == 'Cluster' else item }}
      loop: '{{ cnpg_cluster_defs | select | list }}'
      loop_control:
        label: "{{ item.kind | default('?') }}/{{ item.metadata.name | default('?') }}"

    - name: Wait for the pg Cluster to be healthy
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: pg
        namespace: '{{ cnpg_namespace }}'
      register: cnpg_cluster
      until: >-
        cnpg_cluster.resources | length > 0
        and (cnpg_cluster.resources[0].status.phase | default('')) == 'Cluster in healthy state'
      retries: '{{ cnpg_cluster_healthy_retries }}'
      delay: '{{ cnpg_cluster_healthy_delay }}'

    # ── 5. bases logiques (CREATE DATABASE + CREATE EXTENSION vector) ────────
    - name: Apply logical databases
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cloudnative-pg/database.yaml'

    - name: Apply scheduled backup
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/cloudnative-pg/backup.yaml'

  # Rescue DIAGNOSTIQUE (ADR 0050, issue #236) — calqué sur platform-argocd. CNPG
  # est un OPÉRATEUR réconciliateur : un apply k8s est déclaratif/idempotent, un
  # « rollback » qui supprimerait le Cluster/les PVC/le bucket serait destructeur
  # et contre-productif (on veut réparer, pas défaire ; un re-run reprend). Les
  # gates (operator Ready, puis « Cluster in healthy state ») sont des `until`
  # MUETS à long horizon : ce rescue transforme un timeout aveugle en message
  # actionnable, en OBSERVANT l'état réel. AUCUN delete (frontière ADR 0050).
  rescue:
    - name: Collect the pg Cluster status (diagnostic)
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        name: pg
        namespace: '{{ cnpg_namespace }}'
      register: cnpg_cluster_diag
      run_once: true

    - name: Collect the postgres pods state (diagnostic)
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: '{{ cnpg_namespace }}'
        label_selectors:
          - cnpg.io/cluster=pg
      register: cnpg_pods_diag
      run_once: true

    - name: Report CNPG convergence failure (état + causes connues)
      ansible.builtin.debug:
        msg: >-
          CloudNativePG non convergé. Phase Cluster :
          {{ (cnpg_cluster_diag.resources[0].status.phase
              | default('(Cluster absent)')) }}.
          Pods non Running :
          {{ cnpg_pods_diag.resources
             | rejectattr('status.phase', 'equalto', 'Running')
             | map(attribute='metadata.name') | list }}.
          Causes fréquentes : StorageClass introuvable (PVC pg-1 Pending →
          vérifier cnpg_storage_class) ; bucket/credentials Barman (backup) ;
          image operator non pull (egress). Diagnostic :
          kubectl -n {{ cnpg_namespace }} get cluster,pods,pvc ;
          kubectl -n {{ cnpg_namespace }} get events --sort-by=.lastTimestamp.
      run_once: true

    - name: Fail with an actionable message
      ansible.builtin.fail:
        msg: >-
          Déploiement CloudNativePG échoué (voir le diagnostic ci-dessus). Le
          re-run du rôle est idempotent et reprend la convergence — corriger
          d'abord la cause signalée (souvent la StorageClass).

  always:
    - name: CNPG deployment outcome (état final)
      ansible.builtin.debug:
        msg: >-
          platform-cnpg terminé. Vérifier :
          kubectl -n {{ cnpg_namespace }} get cluster pg.
      run_once: true
