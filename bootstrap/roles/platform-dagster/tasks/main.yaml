# code: language=ansible
# Rôle platform-dagster (ADR 0033/0026) — orchestrateur Dagster (webserver +
# daemon), storage dans la base CNPG `dagster`. Appliqué depuis le control-plane.
# Prérequis : CNPG (cluster pg sain, base dagster) + registry (image
# registry:80/dagster-celery-k8s) + cert-manager (Gateway TLS).

- name: Deploy Dagster orchestrator
  run_once: true
  block:
    - name: Apply Dagster namespace
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/platform/dagster/namespace.yaml'

    # NetworkPolicies : default-deny AVANT les allow (sinon fenêtre de deny ou
    # allow ignoré). allow-marquez-egress = fix drift L19 (egress dagster→marquez) ;
    # allow-mlflow-egress = egress dagster→mlflow:5000 (logging drift/CT, #407 — sans
    # elle le logging best-effort timeout silencieusement) ;
    # allow-internet-egress = sortie 443/80 pour le sync d'un snapshot ouvert
    # (OpenAlex, aws s3 sync --no-sign-request), sans quoi l'ingestion atlas est
    # coupée par le default-deny (#256) ; allow-s3-egress = écriture du datalake
    # interne (SeaweedFS 8333 / RGW) par les pods de run — sans elle, un rclone
    # vers le S3 interne est droppé → « lenteur » par TCP retries (#264).
    - name: Apply Dagster network policies (default-deny first)
      kubernetes.core.k8s:
        state: present
        namespace: '{{ dagster_namespace }}'
        src: '{{ platform_repo_dir }}/platform/network-policies/dagster/{{ item }}'
      loop:
        - 00-default-deny.yaml
        - allow-dns.yaml
        - allow-intra-namespace.yaml
        - allow-apiserver-egress.yaml
        - allow-postgres-egress.yaml
        - allow-registry-egress.yaml
        - allow-marquez-egress.yaml
        - allow-mlflow-egress.yaml
        - allow-internet-egress.yaml
        - allow-s3-egress.yaml
        - allow-webserver-ingress.yaml

    # Secret dérivé : lit le mot de passe du rôle CNPG `dagster` (source de
    # vérité unique, fix L16/L17) et le pose au format attendu par le chart
    # (clé postgresql-password). Pas de recopie manuelle.
    - name: Read the CNPG dagster role password
      kubernetes.core.k8s_info:
        kind: Secret
        name: '{{ dagster_cnpg_role_secret }}'
        namespace: '{{ cnpg_namespace }}'
      register: dagster_role_secret

    - name: Assert the CNPG dagster role password exists
      ansible.builtin.assert:
        that:
          - dagster_role_secret.resources | default([]) | length > 0
          - dagster_role_secret.resources[0].data.password is defined
        fail_msg: >-
          Secret {{ cnpg_namespace }}/{{ dagster_cnpg_role_secret }} introuvable —
          déployer platform-cnpg avant platform-dagster.

    - name: Derive the Dagster Postgres Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: '{{ dagster_pg_auth_secret }}'
            namespace: '{{ dagster_namespace }}'
          type: Opaque
          data:
            postgresql-password: '{{ dagster_role_secret.resources[0].data.password }}'

    # Secret dérivé pgvector : recopie username+password du rôle CNPG `pgvector` dans le
    # ns `dagster`, pour que les code-locations atlas (transform_job/index_load) injectent
    # POSTGRES_USER/PASSWORD dans leurs pods de run via secretKeyRef. Le Secret CNPG vit en
    # ns `postgres` (inatteignable depuis un pod dagster) → on le dérive ici, même patron
    # que dagster-pg-auth ci-dessus (source de vérité unique = le rôle CNPG ; atlas#429).
    # Dérivation du Secret pgvector-pg-auth (auth Postgres cross-namespace pour les
    # code-locations atlas). Tag `pgvector-secret` : ces 3 tâches sont rejouables
    # SEULES (`--tags pgvector-secret`) pour (re)poser le Secret SANS ré-appliquer
    # le manifeste Dagster — qui, lui, écraserait le ConfigMap dagster-workspace
    # densifié par une code-location déjà déployée (piège ADR 0086). C'est ce qui
    # remplace l'ancien geste manuel `kubectl create secret` (ADR 0046/0095 §4).
    - name: Read the CNPG pgvector role credentials
      kubernetes.core.k8s_info:
        kind: Secret
        name: '{{ pgvector_cnpg_role_secret }}'
        namespace: '{{ cnpg_namespace }}'
      register: pgvector_role_secret
      tags: pgvector-secret

    - name: Assert the CNPG pgvector role credentials exist
      ansible.builtin.assert:
        that:
          - pgvector_role_secret.resources | default([]) | length > 0
          - pgvector_role_secret.resources[0].data.username is defined
          - pgvector_role_secret.resources[0].data.password is defined
        fail_msg: >-
          Secret {{ cnpg_namespace }}/{{ pgvector_cnpg_role_secret }} introuvable —
          déployer platform-cnpg (base pgvector) avant platform-dagster.
      tags: pgvector-secret

    - name: Derive the pgvector Postgres Secret for atlas code-locations
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: '{{ pgvector_pg_auth_secret }}'
            namespace: '{{ dagster_namespace }}'
          type: Opaque
          data:
            username: '{{ pgvector_role_secret.resources[0].data.username }}'
            password: '{{ pgvector_role_secret.resources[0].data.password }}'
      tags: pgvector-secret

    - name: Apply Dagster manifest
      kubernetes.core.k8s:
        state: present
        namespace: '{{ dagster_namespace }}'
        src: '{{ platform_repo_dir }}/platform/dagster/dagster.yaml'

    - name: Wait for Dagster webserver and daemon to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: '{{ item }}'
        namespace: '{{ dagster_namespace }}'
      register: dagster_deploy
      until: >-
        dagster_deploy.resources | default([]) | length > 0
        and (dagster_deploy.resources[0].status.readyReplicas | default(0)) == 1
      retries: '{{ dagster_ready_retries }}'
      delay: '{{ dagster_ready_delay }}'
      loop:
        - dagster-dagster-webserver
        - dagster-daemon

    # Exposition L4 NodePort de l'UI (ADR 0092) — Service séparé, mêmes labels
    # que le ClusterIP "dagster-dagster-webserver" ; ne touche pas le bundle
    # vendored. Appliqué après le webserver pour cibler des endpoints prêts.
    - name: Apply Dagster webserver NodePort Service
      kubernetes.core.k8s:
        state: present
        namespace: '{{ dagster_namespace }}'
        src: '{{ platform_repo_dir }}/platform/dagster/nodeport.yaml'

  # Rescue DIAGNOSTIQUE (ADR 0050, #236) — calqué sur argocd/cnpg. Aucun delete.
  rescue:
    - name: Collect dagster pods state (diagnostic)
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: '{{ dagster_namespace }}'
      register: dagster_pods_diag
      run_once: true
    - name: Report dagster convergence failure
      ansible.builtin.debug:
        msg: >-
          Dagster non convergé. Pods non Running :
          {{ dagster_pods_diag.resources
             | rejectattr('status.phase', 'equalto', 'Running')
             | map(attribute='metadata.name') | list }}.
          Causes fréquentes : base CNPG pas prête (dépendance dataops), code
          location/image non pull, run launcher mal configuré. Diagnostic :
          kubectl -n {{ dagster_namespace }} get pods,events --sort-by=.lastTimestamp.
      run_once: true
    - name: Fail with an actionable message
      ansible.builtin.fail:
        msg: >-
          Déploiement Dagster échoué (voir diagnostic ci-dessus). Le re-run du
          rôle est idempotent et reprend — corriger d'abord la cause signalée.

  always:
    - name: Dagster deployment outcome
      ansible.builtin.debug:
        msg: >-
          platform-dagster terminé. Vérifier :
          kubectl -n {{ dagster_namespace }} get deploy.
      run_once: true
