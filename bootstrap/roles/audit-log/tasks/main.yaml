---
# Trace chaque exécution de playbook dans /var/log/cluster-bootstrap.log
# sur le nœud cible : timestamp UTC, nom du playbook, identité de
# l'opérateur côté poste de contrôle + nom du compte SSH côté serveur.
#
# Lu ensuite par bootstrap/state.sh couche 0 pour corréler "ce qui a
# été appliqué" (registre Ansible) et "ce qui est observé" (état réel).
#
# Inclusion : chaque playbook ajoute en pre_tasks :
#   - ansible.builtin.import_role:
#       name: audit-log
#     vars:
#       audit_log_playbook: <nom du playbook>

# ── Garde-fou de cible Ansible par IDENTITÉ (ADR 0108) ─────────────────────
# Deux instances déclarent les MÊMES groupes/noms d'hôtes (cp1/node1…) ; seul le
# `stack_id` (porté par l'inventaire au niveau du groupe `cloud`, dérivé de la topo)
# les distingue. On vérifie ICI, en pre_tasks et AVANT toute tâche distante, que
# l'instance ciblée correspond à l'intention de l'invocation : EXPECTED_STACK_ID
# (posé par nestor). Un mauvais `-i` (inventaire d'une AUTRE instance) échoue alors
# immédiatement, zéro tâche mutante (au lieu d'un faux-résultat silencieux, ADR 0052).
# PLUS de défaut `prod` : l'unité de garde est une identité, pas une catégorie — il
# n'existe pas d'« instance par défaut ». delegate_to localhost + run_once : un seul
# check côté poste, pas de SSH ; changed_when:false (lecture). Les playbooks `localhost`
# (plateforme : pas de groupe cloud, donc stack_id absent) sont tolérés via le défaut ''.
- name: Assert the inventory target matches the intended instance
  run_once: true
  delegate_to: localhost
  become: false
  ansible.builtin.assert:
    that:
      - >-
        (stack_id | default('')) == ''
        or (stack_id | default('')) == (lookup('env', 'EXPECTED_STACK_ID') | default(''))
    fail_msg: >-
      Cible Ansible INCOHÉRENTE : l'inventaire déclare
      stack_id={{ stack_id | default('(absent)') }} mais l'intention est
      {{ lookup('env', 'EXPECTED_STACK_ID') | default('(non posée)') }}.
      Lancer le geste via `nestor ansible <playbook>` (l'inventaire est dérivé de la
      topologie active et pose son stack_id + EXPECTED_STACK_ID, ADR 0098/0108).
    success_msg: >-
      Cible confirmée : stack_id={{ stack_id | default('(localhost)') }}.
    quiet: true
  changed_when: false

- name: Append cluster-bootstrap audit-log entry
  become: true
  ansible.builtin.shell: |
    install -d -m 0750 -o root -g adm /var/log
    touch /var/log/cluster-bootstrap.log
    chgrp adm /var/log/cluster-bootstrap.log
    chmod 0640 /var/log/cluster-bootstrap.log
    printf '%s playbook=%s from=%s@%s ssh-as=%s\n' \
      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      "{{ audit_log_playbook | default('unknown') }}" \
      "{{ lookup('env', 'USER') | default('unknown') }}" \
      "{{ lookup('pipe', 'hostname') }}" \
      "{{ ansible_facts.user_id }}" \
      >> /var/log/cluster-bootstrap.log
  changed_when: false
  args:
    executable: /bin/bash
