---
# Trace chaque exécution de playbook dans /var/log/cluster-bootstrap.log
# sur le nœud cible : timestamp UTC, nom du playbook, identité de
# l'opérateur côté poste de contrôle + nom du compte SSH côté serveur.
#
# Lu ensuite par bootstrap/state.sh couche 0 pour corréler "ce qui a
# été appliqué" (registre Ansible) et "ce qui est observé" (état réel).
#
# Inclusion : chaque playbook ajoute en pre_tasks :
#   - ansible.builtin.import_role:
#       name: audit-log
#     vars:
#       audit_log_playbook: <nom du playbook>

# ── Garde-fou de cible Ansible (ADR 0053 (c)) ──────────────────────────────
# Banc et prod déclarent les MÊMES groupes/noms d'hôtes (cp1/node1…) ; seul
# `target_kind` (porté par l'inventaire au niveau du groupe `cloud`) les
# distingue. On vérifie ICI, en pre_tasks et AVANT toute tâche distante, que la
# topologie ciblée correspond à l'intention de l'invocation : EXPECTED_TARGET_KIND
# (défaut `prod` — une invocation nue du RUNBOOK exige un inventaire prod ; le
# banc préfixe EXPECTED_TARGET_KIND=bench). Un mauvais `-i` échoue alors
# immédiatement, zéro tâche mutante (au lieu d'un faux-résultat silencieux,
# ADR 0052). delegate_to localhost + run_once : un seul check côté poste, pas de
# SSH ; changed_when:false (lecture). Les playbooks `localhost` (plateforme :
# pas de groupe cloud, donc target_kind absent) sont tolérés via le défaut ''.
- name: Assert the inventory target matches the intended topology
  run_once: true
  delegate_to: localhost
  become: false
  ansible.builtin.assert:
    that:
      - >-
        (target_kind | default('')) == ''
        or (target_kind | default('')) == (lookup('env', 'EXPECTED_TARGET_KIND') | default('prod', true))
    fail_msg: >-
      Cible Ansible INCOHÉRENTE : l'inventaire déclare
      target_kind={{ target_kind | default('(absent)') }} mais l'intention est
      {{ lookup('env', 'EXPECTED_TARGET_KIND') | default('prod', true) }}.
      Vérifier le `-i` : prod = bootstrap/hosts.yaml (target_kind: prod) ; banc =
      bench/lima/.work/inventory.yaml (target_kind: bench, EXPECTED_TARGET_KIND=bench).
    success_msg: >-
      Cible confirmée : target_kind={{ target_kind | default('(localhost)') }}.
    quiet: true
  changed_when: false

- name: Append cluster-bootstrap audit-log entry
  become: true
  ansible.builtin.shell: |
    install -d -m 0750 -o root -g adm /var/log
    touch /var/log/cluster-bootstrap.log
    chgrp adm /var/log/cluster-bootstrap.log
    chmod 0640 /var/log/cluster-bootstrap.log
    printf '%s playbook=%s from=%s@%s ssh-as=%s\n' \
      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      "{{ audit_log_playbook | default('unknown') }}" \
      "{{ lookup('env', 'USER') | default('unknown') }}" \
      "{{ lookup('pipe', 'hostname') }}" \
      "{{ ansible_facts.user_id }}" \
      >> /var/log/cluster-bootstrap.log
  changed_when: false
  args:
    executable: /bin/bash
