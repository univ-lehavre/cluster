# code: language=ansible
# Rôle platform-loki (ADR 0033/0016/0036) — Loki (logs) en profil S3, MÊME chemin
# de code partout ; seul le backing S3 change selon la topologie :
#   - backing 'rgw' (prod / banc Ceph) : buckets via OBC Rook, creds dérivés.
#   - backing 'seaweedfs' (banc léger)  : SeaweedFS, creds de test statiques.
# Appliqué depuis l'hôte qui pilote l'API. Le ConfigMap `loki` inline de loki.yaml
# est REMPLACÉ par un ConfigMap templé (endpoint + creds) ; le reste du manifeste
# est appliqué avec le storageClass de la topologie. Pas de .j2 du rendu complet.

- name: Deploy Loki
  run_once: true
  block:
    - name: Ensure the loki namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ loki_namespace }}'

    # ── Backing S3 (bucket + Secret creds) via le rôle platform-s3-bucket ─────
    # Factorisé (ADR 0036). Le rôle crée le(s) bucket(s) + le Secret
    # `loki-s3-creds`, et résout le nom réel du bucket dans `s3b_bucket_resolved`
    # (en RGW : bucket OBC unique auto-nommé, drift L38 ; en SeaweedFS : loki-chunks).
    - name: Provision the S3 backing (bucket + creds Secret)
      ansible.builtin.include_role:
        name: platform-s3-bucket
      vars:
        s3b_backing: '{{ loki_s3_backing }}'
        s3b_endpoint: '{{ loki_s3_endpoint }}'
        s3b_name: '{{ loki_obc_name }}'
        s3b_namespace: '{{ loki_namespace }}'
        s3b_secret_name: loki-s3-creds
        s3b_buckets: '{{ loki_buckets }}'
        s3b_obc_namespace: '{{ loki_obc_namespace }}'
        s3b_obc_storage_class: '{{ loki_obc_storage_class }}'
        s3b_access_key: '{{ loki_s3_access_key }}'
        s3b_secret_key: '{{ loki_s3_secret_key }}'

    # Loki met ses creds EN CLAIR dans son ConfigMap (pas un Secret monté) → on
    # relit le Secret produit par le rôle pour les décoder.
    - name: Read the Loki S3 creds Secret (produit par platform-s3-bucket)
      kubernetes.core.k8s_info:
        kind: Secret
        name: loki-s3-creds
        namespace: '{{ loki_namespace }}'
      register: loki_creds_secret

    - name: Resolve Loki S3 creds + bucket (en clair pour le ConfigMap)
      ansible.builtin.set_fact:
        loki_s3_access_key: '{{ loki_creds_secret.resources[0].data.ACCESS_KEY_ID | b64decode }}'
        loki_s3_secret_key: '{{ loki_creds_secret.resources[0].data.ACCESS_SECRET_KEY | b64decode }}'
        # Un seul bucket résolu sert chunks ET ruler (drift L38 en RGW ; en
        # SeaweedFS, loki-chunks/loki-ruler existent mais on unifie sur le résolu).
        loki_bucket_chunks: '{{ s3b_bucket_resolved }}'
        loki_bucket_ruler: '{{ s3b_bucket_resolved }}'

    # ── ConfigMap Loki templé (endpoint + creds + bucketnames du backing actif) ─
    - name: Apply Loki ConfigMap (S3 endpoint {{ loki_s3_endpoint }})
      kubernetes.core.k8s:
        state: present
        template: loki-config-s3.yaml.j2

    # ── Manifeste Loki SANS son ConfigMap `loki` (remplacé ci-dessus) ────────
    - name: Load the Loki manifest (storageClass + sans le ConfigMap loki)
      ansible.builtin.set_fact:
        loki_defs: >-
          {{ lookup('file', platform_repo_dir ~ '/platform/loki/loki.yaml')
             | replace('storageClassName: standard', 'storageClassName: ' ~ loki_storage_class)
             | from_yaml_all | select | list
             | rejectattr('kind', 'eq', 'ConfigMap') | list
             + (lookup('file', platform_repo_dir ~ '/platform/loki/loki.yaml')
                | replace('storageClassName: standard', 'storageClassName: ' ~ loki_storage_class)
                | from_yaml_all | select | selectattr('kind', 'eq', 'ConfigMap')
                | rejectattr('metadata.name', 'eq', 'loki') | list) }}

    - name: Apply Loki resources (loki ConfigMap déjà posé)
      kubernetes.core.k8s:
        state: present
        definition: '{{ item }}'
      loop: '{{ loki_defs }}'
      loop_control:
        label: "{{ item.kind | default('?') }}/{{ item.metadata.name | default('?') }}"

    - name: Wait for Loki to be Ready
      kubernetes.core.k8s_info:
        kind: StatefulSet
        name: loki
        namespace: '{{ loki_namespace }}'
      register: loki_sts
      until: >-
        loki_sts.resources | length > 0
        and (loki_sts.resources[0].status.readyReplicas | default(0)) >= 1
      retries: '{{ loki_ready_retries }}'
      delay: '{{ loki_ready_delay }}'
