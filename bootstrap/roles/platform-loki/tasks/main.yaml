# code: language=ansible
# Rôle platform-loki (ADR 0033/0016/0036) — Loki (logs) en profil S3, MÊME chemin
# de code partout ; seul le backing S3 change selon la topologie :
#   - backing 'rgw' (prod / banc Ceph) : buckets via OBC Rook, creds dérivés.
#   - backing 'seaweedfs' (banc léger)  : SeaweedFS, creds de test statiques.
# Appliqué depuis l'hôte qui pilote l'API. Le ConfigMap `loki` inline de loki.yaml
# est REMPLACÉ par un ConfigMap templé (endpoint + creds) ; le reste du manifeste
# est appliqué avec le storageClass de la topologie. Pas de .j2 du rendu complet.

- name: Deploy Loki
  run_once: true
  block:
    - name: Ensure the loki namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: '{{ loki_namespace }}'

    # ── Backing RGW : OBC → creds dérivés ────────────────────────────────────
    - name: Provision the RGW backing (backing=rgw)
      when: loki_s3_backing == 'rgw'
      block:
        - name: Claim Loki buckets from Ceph RGW (ObjectBucketClaim)
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: objectbucket.io/v1alpha1
              kind: ObjectBucketClaim
              metadata:
                name: '{{ loki_obc_name }}'
                namespace: '{{ loki_obc_namespace }}'
              spec:
                generateBucketName: loki
                storageClassName: '{{ loki_obc_storage_class }}'

        - name: Wait for the OBC credentials Secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: '{{ loki_obc_name }}'
            namespace: '{{ loki_obc_namespace }}'
          register: loki_obc_secret
          until: >-
            loki_obc_secret.resources | length > 0
            and loki_obc_secret.resources[0].data.AWS_ACCESS_KEY_ID is defined
          retries: 30
          delay: 5

        - name: Resolve S3 credentials from the OBC Secret
          ansible.builtin.set_fact:
            loki_s3_access_key: '{{ loki_obc_secret.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}'
            loki_s3_secret_key: '{{ loki_obc_secret.resources[0].data.AWS_SECRET_ACCESS_KEY | b64decode }}'

        # L'OBC Rook fournit UN bucket auto-nommé (BUCKET_NAME du ConfigMap
        # homonyme) et des creds restreints à ce seul bucket → impossible d'en
        # créer d'autres (drift L38). On l'emploie donc pour chunks ET ruler.
        - name: Read the OBC ConfigMap (bucket name)
          kubernetes.core.k8s_info:
            kind: ConfigMap
            name: '{{ loki_obc_name }}'
            namespace: '{{ loki_obc_namespace }}'
          register: loki_obc_cm
          until: >-
            loki_obc_cm.resources | length > 0
            and loki_obc_cm.resources[0].data.BUCKET_NAME is defined
          retries: 30
          delay: 5

        - name: Use the single OBC bucket for chunks and ruler (drift L38)
          ansible.builtin.set_fact:
            loki_bucket_chunks: '{{ loki_obc_cm.resources[0].data.BUCKET_NAME }}'
            loki_bucket_ruler: '{{ loki_obc_cm.resources[0].data.BUCKET_NAME }}'

    # ── ConfigMap Loki templé (endpoint + creds + bucketnames du backing actif) ─
    - name: Apply Loki ConfigMap (S3 endpoint {{ loki_s3_endpoint }})
      kubernetes.core.k8s:
        state: present
        template: loki-config-s3.yaml.j2

    # ── Buckets : init-buckets UNIQUEMENT en SeaweedFS (creds admin). En RGW,
    #    l'OBC a déjà créé le bucket et les creds ne peuvent pas en créer d'autres.
    - name: Create the Loki S3 buckets (init-buckets Job, SeaweedFS uniquement)
      when: loki_s3_backing != 'rgw'
      kubernetes.core.k8s:
        state: present
        template: loki-init-buckets.yaml.j2

    - name: Wait for the init-buckets Job to complete
      when: loki_s3_backing != 'rgw'
      kubernetes.core.k8s_info:
        kind: Job
        name: loki-init-buckets
        namespace: '{{ loki_namespace }}'
      register: loki_buckets_job
      until: >-
        loki_buckets_job.resources | length > 0
        and (loki_buckets_job.resources[0].status.succeeded | default(0)) >= 1
      retries: 20
      delay: 6

    # ── Manifeste Loki SANS son ConfigMap `loki` (remplacé ci-dessus) ────────
    - name: Load the Loki manifest (storageClass + sans le ConfigMap loki)
      ansible.builtin.set_fact:
        loki_defs: >-
          {{ lookup('file', platform_repo_dir ~ '/platform/loki/loki.yaml')
             | replace('storageClassName: standard', 'storageClassName: ' ~ loki_storage_class)
             | from_yaml_all | select | list
             | rejectattr('kind', 'eq', 'ConfigMap') | list
             + (lookup('file', platform_repo_dir ~ '/platform/loki/loki.yaml')
                | replace('storageClassName: standard', 'storageClassName: ' ~ loki_storage_class)
                | from_yaml_all | select | selectattr('kind', 'eq', 'ConfigMap')
                | rejectattr('metadata.name', 'eq', 'loki') | list) }}

    - name: Apply Loki resources (loki ConfigMap déjà posé)
      kubernetes.core.k8s:
        state: present
        definition: '{{ item }}'
      loop: '{{ loki_defs }}'
      loop_control:
        label: "{{ item.kind | default('?') }}/{{ item.metadata.name | default('?') }}"

    - name: Wait for Loki to be Ready
      kubernetes.core.k8s_info:
        kind: StatefulSet
        name: loki
        namespace: '{{ loki_namespace }}'
      register: loki_sts
      until: >-
        loki_sts.resources | length > 0
        and (loki_sts.resources[0].status.readyReplicas | default(0)) >= 1
      retries: '{{ loki_ready_retries }}'
      delay: '{{ loki_ready_delay }}'
