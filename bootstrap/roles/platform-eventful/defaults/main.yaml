---
# Valeurs par défaut du rôle platform-eventful (chaîne événementielle, ADR 0095 §1.b).
#
# Argo Workflows (ns `argo`) + Argo Events (ns `argo-events`) sont de l'INFRA, posés
# par Ansible/kubectl — PAS réconciliés par Argo CD (anti-bootstrap-circulaire, même
# règle qu'Argo CD lui-même, ADR 0022). Ce rôle traduit la séquence kubectl du README
# (platform/argo-workflows/README.md + platform/argo-events/README.md) en tâches
# idempotentes (ADR 0046 : corriger le CODE, pas l'état — plus de gestes manuels).
#
# Défaut = valeur PROD (ADR 0023/0033). Versions figées dans les bundles vendorés
# (platform/argo-workflows/argo-workflows.yaml, platform/argo-events/argo-events.yaml ;
# images par digest, ADR 0006).

# Chemin du dépôt côté poste de contrôle (manifestes lus localement, appliqués).
platform_repo_dir: '{{ playbook_dir }}/..'

# Namespaces de la chaîne (aucun des deux bundles ne crée son ns).
eventful_workflows_namespace: argo
eventful_events_namespace: argo-events

# Timeouts des gates Ready (alignés sur les autres rôles plateforme, cf. argocd).
eventful_ready_retries: 60
eventful_ready_delay: 5

# ── PATCH BANC (CP = builder) ────────────────────────────────────────────────
# Le WorkflowTemplate `image-builder` garde le nodeSelector worker (posture PROD,
# builder JAMAIS sur le control-plane = SPOF unique, invariant 5 ADR 0095). Au banc
# Lima MONO-NŒUD, le control-plane EST le seul nœud → ce nodeSelector `DoesNotExist`
# ne matche AUCUN nœud (pod Pending) : on le RETIRE (le CP est aussi le builder,
# scénario 34, README argo-workflows « Écart banc »). Dérivé de la cible : `bench`
# retire, prod GARDE. La façade/runner pose EXPECTED_TARGET_KIND dans l'environnement
# (nestor/runner.py, run-phases.sh) — on le lit comme la garde audit-log (lookup env).
eventful_patch_worker_selector: "{{ (lookup('env', 'EXPECTED_TARGET_KIND') | default('prod', true)) == 'bench' }}"

# Overlay kustomize CIBLE du write-back du WorkflowTemplate image-builder
# (`dataops/<cl>-dagster/deploy/overlays/<overlay>`). Même dérivation que ci-dessus :
# `bench` (SeaweedFS) au banc, `prod` (OBC Ceph rook-ceph-datalake) en prod. Le rôle
# PATCHE le paramètre `overlay` du WorkflowTemplate avec cette valeur — sinon le
# write-back figeait `overlays/bench` → déploiement prod sur le mauvais stockage
# (BLOCKER #2, découverte dirqual 2026-07-04).
eventful_build_overlay: "{{ 'bench' if (lookup('env', 'EXPECTED_TARGET_KIND') | default('prod', true)) == 'bench' else 'prod' }}"
