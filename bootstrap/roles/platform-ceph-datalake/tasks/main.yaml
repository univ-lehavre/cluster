# code: language=ansible
# Rôle platform-ceph-datalake (ADR 0033/0049/0036) — porte phase_datalake : monte
# le CephObjectStore RGW (cible S3 des backups Barman/CNPG et de Loki en mode
# Ceph) + sa StorageClass bucket, gate sur le RGW Ready. Le smoke-test S3 (PUT/
# GET/DELETE) reste côté harnais (c'est un test).
# CephObjectStore = CR Rook MUTÉ par l'operator → SSA + field_manager dédié +
# force_conflicts (parade idempotence, comme le CephCluster).
- name: Deploy Ceph datalake (RGW object store)
  run_once: true
  block:
    # CephObjectStore = CR Rook DENSIFIÉ par l'operator après création (defaults
    # du spec) → generation N→N+1 → faux « changed » au rejeu immédiat, même
    # mécanisme que CephCluster/CephFilesystem. hidden_fields:[managedFields,
    # status] retire ce bruit du diff ; on boucle ensuite jusqu'à changed=0 pour
    # absorber la densification résiduelle avant de finir (idempotence rejeu).
    - name: Apply the CephObjectStore (server-side)
      kubernetes.core.k8s:
        state: present
        src: '{{ ceph_datalake_dir }}/datalake-ec.yaml'
        server_side_apply:
          field_manager: ansible-ceph-datalake
          force_conflicts: true
        hidden_fields:
          - metadata.managedFields
          - status
      register: ceph_objstore_apply
      until: not ceph_objstore_apply.changed
      retries: '{{ ceph_rgw_ready_retries }}'
      delay: '{{ ceph_rgw_ready_delay }}'
      changed_when: false

    - name: Apply the datalake bucket StorageClass
      kubernetes.core.k8s:
        state: present
        src: '{{ ceph_datalake_dir }}/storage-class.yaml'

    # Gate : le Deployment RGW est Ready (>= 1 replica, instances:3 — pas == 1).
    - name: Wait for the RGW datalake gateway to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: rook-ceph-rgw-datalake-a
        namespace: rook-ceph
      register: ceph_rgw_deploy
      until: >-
        ceph_rgw_deploy.resources | length > 0
        and (ceph_rgw_deploy.resources[0].status.readyReplicas | default(0)) >= 1
      retries: '{{ ceph_rgw_ready_retries }}'
      delay: '{{ ceph_rgw_ready_delay }}'
