# code: language=ansible
# Reprise après incident (ADR 0050, cas (b) — étape à effet de bord NON
# idempotent). `kubeadm init` écrit /etc/kubernetes + /var/lib/etcd + des static
# pods : si l'init AVORTE en milieu de course, un re-run NU se heurte au demi-état
# (« port in use », « manifests exist ») et boucle. Le rescue COMPENSE
# (`kubeadm reset --force`) pour ramener le control-plane à un point repris-able,
# puis re-fail avec un message actionnable. Le marqueur `creates:` admin.conf
# (CHECKPOINT) garantit qu'un init déjà réussi ne re-rentre pas dans le block.
# Frontière (ADR 0050) : le rescue ne fait JAMAIS de purge APT / modprobe -r —
# c'est l'apanage du rollback global (bootstrap/rollback.yaml / k8s-rollback).
- name: Install kubernetes on control plane nodes
  block:
    # ── Durcissement du plan de contrôle (ADR 0014) ────────────────────────
    # Posé AVANT l'init : chiffrement at-rest des Secrets etcd + audit-policy.
    - name: Create hardening directories (encryption + audit)
      become: true
      ansible.builtin.file:
        path: '{{ item.path }}'
        state: directory
        owner: root
        group: root
        mode: '{{ item.mode }}'
      loop:
        - path: '{{ k8s_enc_dir }}'
          mode: '0700'
        - path: '{{ k8s_audit_dir }}'
          mode: '0755'
        - path: '{{ k8s_audit_log_dir }}'
          mode: '0750'

    # Clé de chiffrement secretbox : 32 octets aléatoires base64. Générée UNE
    # SEULE FOIS (creates:) — la régénérer rendrait illisibles les Secrets déjà
    # chiffrés. Stockée hors dépôt, 0600 root, jamais commitée.
    - name: Generate the etcd Secret encryption key (once)
      become: true
      ansible.builtin.shell: 'umask 077 && openssl rand -base64 32 > {{ k8s_enc_dir }}/key1.b64'
      args:
        creates: '{{ k8s_enc_dir }}/key1.b64'

    - name: Read the encryption key
      become: true
      ansible.builtin.slurp:
        src: '{{ k8s_enc_dir }}/key1.b64'
      register: k8s_initialization_enc_key

    - name: Render EncryptionConfiguration
      become: true
      ansible.builtin.template:
        src: encryption-config.yaml.j2
        dest: '{{ k8s_enc_dir }}/encryption-config.yaml'
        owner: root
        group: root
        mode: '0600'
      vars:
        k8s_enc_key: '{{ k8s_initialization_enc_key.content | b64decode | trim }}'

    - name: Render audit policy
      become: true
      ansible.builtin.copy:
        src: audit-policy.yaml
        dest: '{{ k8s_audit_dir }}/audit-policy.yaml'
        owner: root
        group: root
        mode: '0644'

    - name: Render kubeadm init config
      become: true
      ansible.builtin.template:
        src: kubeadm-config.yaml.j2
        dest: /etc/kubernetes/kubeadm-config.yaml
        owner: root
        group: root
        mode: '0600'

    # ── LV etcd vierge : retirer le lost+found avant l'init (préflight kubeadm) ──
    # /var/lib/etcd est un LV ext4 dédié (lv_etcd, RUNBOOK) : mkfs.ext4 y laisse un
    # `lost+found` qui fait échouer le préflight `DirAvailable--var-lib-etcd` de
    # `kubeadm init`. On le retire — mais UNIQUEMENT si la LV est prouvée VIERGE
    # (lost+found est son SEUL contenu). SÛRETÉ (re-bootstrap d'un nœud où etcd
    # tournait, ADR 0046/0050) : on `find` tout SAUF lost+found ; si quoi que ce
    # soit subsiste (member/snap/wal/ ou autre), on ne supprime RIEN et kubeadm
    # échoue franchement au préflight (incident NON masqué — jamais de
    # `--ignore-preflight-errors` qui désarmerait le garde-fou face à de vraies
    # données etcd). Idempotent : une fois etcd initialisé, /var/lib/etcd n'est
    # plus vide → matched != 0 → no-op définitif. Inerte sur les bancs (pas de LV
    # etcd dédiée → pas de lost+found ; find sur un path absent : 0 match, no-op).
    # Control-plane uniquement : ce rôle ne tourne que sur le groupe `control` —
    # le lost+found des LV etcd inutilisées des workers est sans effet (le join ne
    # préflighte pas /var/lib/etcd).
    - name: Detect a pristine etcd LV (anything other than lost+found)
      become: true
      ansible.builtin.find:
        paths: /var/lib/etcd
        excludes: 'lost+found'
        hidden: true
        file_type: any
      register: etcd_dir_entries
      changed_when: false

    - name: Remove the ext4 lost+found on a pristine etcd LV (preflight kubeadm)
      become: true
      ansible.builtin.file:
        path: /var/lib/etcd/lost+found
        state: absent
      when: etcd_dir_entries.matched == 0

    - name: Initialize the control plane
      become: true
      become_method: ansible.builtin.sudo
      # Init via `--config` (et non plus en flags) pour pouvoir poser le
      # chiffrement etcd et l'audit-policy, absents de la CLI kubeadm. Le
      # fichier kubeadm-config.yaml reprend l'endpoint, le port et (sur le banc)
      # l'advertiseAddress ; `--upload-certs` reste un flag.
      ansible.builtin.command: >-
        kubeadm init
        --config /etc/kubernetes/kubeadm-config.yaml
        --upload-certs
      args:
        creates: /etc/kubernetes/admin.conf

    # Home de l'utilisateur connecté via `ansible_facts.env.HOME` (et NON
    # `/home/{{ ansible_user }}`) : `debian` → /home/debian (nœuds réels / banc
    # Vagrant), mais le banc Lima crée l'utilisateur `lima` avec un home
    # /home/lima.guest (≠ /home/lima). `ansible_facts.env.HOME` résout le vrai home
    # dans les deux cas — pas de chemin codé en dur.
    - name: Create the .kube directory for the connecting user
      ansible.builtin.file:
        path: '{{ ansible_facts.env.HOME }}/.kube'
        state: directory
        mode: '0755'

    - name: Copy kubernetes configuration
      become: true
      become_method: ansible.builtin.sudo
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        remote_src: true
        dest: '{{ ansible_facts.env.HOME }}/.kube/config'
        owner: '{{ ansible_user }}'
        mode: '0600'

    # But : le control-plane accepte les pods applicatifs (bancs mono-/few-nodes).
    # `kubectl taint …-` échoue (rc=1, « taint not found ») quand le taint est
    # DÉJÀ absent — ce qui est le cas voulu. Selon la version de kubeadm / le
    # nombre de nœuds, le taint control-plane peut ne pas être posé du tout (banc
    # Lima v1.34 : control-plane sans taint). La tâche est donc naturellement
    # idempotente : succès si le taint a été retiré OU était déjà absent ; on
    # n'échoue que sur une vraie erreur (≠ « not found »).
    - name: Control plane accepts pods (remove the control-plane taint)
      ansible.builtin.command: >-
        kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      register: taint_result
      changed_when: "'untainted' in taint_result.stdout"
      failed_when:
        - taint_result.rc != 0
        - "'not found' not in taint_result.stderr"
      args:
        chdir: '{{ ansible_facts.env.HOME }}'

    - name: Exclude the control plane from external load balancers
      ansible.builtin.shell: >-
        kubectl label nodes --all
        node.kubernetes.io/exclude-from-external-load-balancers-
        >> lb-setup.log
      args:
        chdir: '{{ ansible_facts.env.HOME }}'
        creates: lb-setup.log

    # CoreDNS (addon kubeadm) : durcir l'anti-affinité en `required` pour disperser
    # les 2 répliques sur des nœuds distincts (le défaut `preferred` les a laissées
    # sur le seul control-plane — audit dirqual 2026-06-24, #487). Patch stratégique
    # idempotent (n'écrit que si l'état diffère). CoreDNS n'a pas de manifeste source
    # versionné → ce patch post-init EST le code (ADR 0046) ; réappliqué à chaque
    # bootstrap car l'addon kubeadm repart en `preferred`.
    # Via `kubectl patch` (et NON le module kubernetes.core.k8s) : ce rôle tourne
    # SUR le control-plane (kubeadm init y exige become/sudo), or le module
    # kubernetes.core exige la lib Python `kubernetes` côté nœud — absente (elle
    # n'est provisionnée que dans le .venv du CONTRÔLEUR, cf. metrics-server.yaml).
    # Toutes les autres opérations k8s du rôle (taint, label) passent déjà par
    # `kubectl` + le kubeconfig local du nœud ; on s'aligne.
    - name: Stage the CoreDNS anti-affinity patch on the node
      ansible.builtin.copy:
        src: coredns-antiaffinity-patch.yaml
        dest: '{{ ansible_facts.env.HOME }}/coredns-antiaffinity-patch.yaml'
        mode: '0644'
      # Mono-nœud (banc 1 VM) : `required` laisserait une réplique Pending → on
      # saute le durcissement (et son staging). On compte `cloud` (control+workers =
      # les NŒUDS k8s), PAS `all` : `all` inclut aussi le `control_host` localhost (le
      # poste), ce qui ferait croire à 2 hôtes en mono-nœud (bug de seuil).
      when: groups['cloud'] | length > 1

    # `kubectl patch --type=strategic` est idempotent : no-op (« no change ») si
    # l'anti-affinité `required` est déjà en place — d'où le changed_when ciblé.
    - name: Harden CoreDNS pod anti-affinity (required, spread across nodes)
      ansible.builtin.command: >-
        kubectl patch deployment coredns -n kube-system --type=strategic
        --patch-file {{ ansible_facts.env.HOME }}/coredns-antiaffinity-patch.yaml
      args:
        chdir: '{{ ansible_facts.env.HOME }}'
      register: coredns_patch
      changed_when: "'no change' not in coredns_patch.stdout"
      # Sûr seulement s'il existe ≥ 2 nœuds schedulables éligibles (CoreDNS tolère
      # les taints control-plane) ; en mono-nœud (banc 1 VM) `required` laisserait
      # une réplique Pending → on saute alors le durcissement. `cloud` (nœuds k8s),
      # pas `all` (qui inclut le control_host localhost).
      when: groups['cloud'] | length > 1

    # Nombre de répliques CoreDNS DÉRIVÉ du nombre de nœuds — kubeadm pose `replicas: 2`
    # en dur, mais un 2ᵉ CoreDNS n'apporte de résilience que sur un 2ᵉ NŒUD. En mono-nœud
    # (banc 1 VM), le 2ᵉ réplica reste Pending (anti-affinité par hostname : aucun autre
    # nœud) et bloque le Deployment à 1/2 — faux « non sain » pour les gates. On aligne
    # donc : 1 nœud → 1 réplique (soft, patch hard sauté ci-dessus) ; ≥ 2 nœuds → 2 (hard).
    # Corriger le code, pas l'état (ADR 0046) : idempotent, rejoué à chaque rebuild.
    # `cloud` (control+workers = nœuds k8s), PAS `all` (inclut le control_host localhost).
    - name: Scale CoreDNS replicas to match node count (1 node → 1, ≥2 nodes → 2)
      ansible.builtin.command: >-
        kubectl scale deployment coredns -n kube-system
        --replicas={{ 1 if (groups['cloud'] | length) <= 1 else 2 }}
      register: coredns_scale
      # `kubectl scale --replicas=N` est DÉJÀ idempotent : rc=0 avec « scaled » si le compte
      # change, « unchanged » s'il est déjà à N. (On N'utilise PAS `--current-replicas` : il
      # exigerait de connaître le compte courant — inconnu ici — et ferait échouer un no-op.)
      # `changed` seulement quand le compte a réellement changé (pas sur « unchanged »).
      changed_when: "'unchanged' not in coredns_scale.stdout"

  # ── Reprise après incident (ADR 0050 cas (b)) ──────────────────────────────
  rescue:
    # 1. DIAGNOSTIC actionnable (ne défait rien) : dernières lignes du kubelet.
    - name: Capture the kubelet state for diagnosis
      become: true
      ansible.builtin.command: journalctl -u kubelet --no-pager -n 30
      register: init_kubelet_diag
      changed_when: false
      failed_when: false
    - name: Show the kubelet diagnosis
      ansible.builtin.debug:
        var: init_kubelet_diag.stdout_lines
    # 2. COMPENSATION : un init avorté laisse /etc/kubernetes + etcd partiels →
    #    un re-run nu boucle. `kubeadm reset --force` ramène à un état repris-able.
    #    NE touche PAS containerd/APT (frontière rollback global).
    - name: Compensate the aborted init (kubeadm reset --force)
      become: true
      ansible.builtin.command: kubeadm reset --force
      register: init_reset
      changed_when: "'cleaned up' in init_reset.stdout or init_reset.rc == 0"
      failed_when: false
    # 3. RE-FAIL actionnable : le rôle échoue (l'incident n'est pas masqué), mais
    #    le control-plane est propre → un re-run du MÊME chemin repart à neuf.
    - name: Fail with an actionable message after compensation
      ansible.builtin.fail:
        msg: >-
          `kubeadm init` a échoué et a été compensé (kubeadm reset --force). Le
          control-plane est revenu à un état propre, repris-able : corriger la
          cause (cf. diagnostic kubelet ci-dessus) puis RE-JOUER le même chemin.

  always:
    - name: Report the control-plane init outcome
      ansible.builtin.debug:
        msg: >-
          k8s-initialization terminé (admin.conf présent = init acquis ;
          sinon le rescue a compensé et fait échouer pour re-jeu).
