# code: language=ansible
# Rôle platform-local-path (ADR 0033/0049) — provisioner local-path (profil banc
# léger sans Ceph). Porte la phase shell `phase_storage_simple` : manifeste figé
# appliqué via kubernetes.core.k8s, provisioner attendu Ready, puis la
# StorageClass marquée « default » du cluster (exactement une, comme set_default_sc).
- name: Deploy local-path provisioner
  run_once: true
  block:
    - name: Apply local-path-provisioner manifest
      kubernetes.core.k8s:
        state: present
        src: '{{ platform_repo_dir }}/storage/local-path/local-path-storage.yaml'

    - name: Wait for the local-path provisioner to be Ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: local-path-provisioner
        namespace: local-path-storage
      register: local_path_deploy
      until: >-
        local_path_deploy.resources | default([]) | length > 0
        and (local_path_deploy.resources[0].status.readyReplicas | default(0)) == 1
      retries: '{{ local_path_ready_retries }}'
      delay: '{{ local_path_ready_delay }}'

    # ── StorageClass default : exactement une (équivalent de set_default_sc) ──
    - name: List all StorageClasses
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
      register: all_storage_classes

    - name: Mark the target StorageClass default, all others non-default
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: '{{ sc.metadata.name }}'
            annotations:
              storageclass.kubernetes.io/is-default-class: >-
                {{ 'true' if sc.metadata.name == local_path_storage_class else 'false' }}
      loop: '{{ all_storage_classes.resources }}'
      loop_control:
        loop_var: sc
        label: '{{ sc.metadata.name }}'

    # Assert : exactement 1 SC default après le marquage (garde-fou set_default_sc).
    - name: Re-read StorageClasses to count the default
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
      register: storage_classes_after

    # Le nom d'annotation contient des « . » et « / » → selectattr/map(attribute)
    # ne peut PAS le cibler (Jinja interprète les points comme navigation). On
    # compte donc via une expression Jinja qui indexe la clé LITTÉRALE avec .get().
    - name: Count the default StorageClasses
      ansible.builtin.set_fact:
        default_sc_count: >-
          {{ storage_classes_after.resources
             | map(attribute='metadata.annotations', default={})
             | map('default', {}, true)
             | map('dict2items')
             | map('selectattr', 'key', 'equalto', 'storageclass.kubernetes.io/is-default-class')
             | map('selectattr', 'value', 'equalto', 'true')
             | map('list') | map('length') | sum }}

    - name: Assert exactly one default StorageClass
      ansible.builtin.assert:
        that: default_sc_count | int == 1
        fail_msg: >-
          Il faut exactement 1 StorageClass default, trouvé {{ default_sc_count }}.
        success_msg: >-
          StorageClass default = {{ local_path_storage_class }} (1 seule).
