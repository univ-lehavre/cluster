# code: language=ansible
# Orchestrateur de la couche observabilité (ADR 0016/0036), à lancer APRÈS le
# bootstrap Kubernetes. Briques sans dépendance à la chaîne DataOps :
#   - kube-prometheus-stack (Prometheus + Alertmanager + Grafana) — PVC only.
#   - Loki (logs) — profil de stockage selon la topologie (s3/RGW ou filesystem).
#
# Profil de stockage paramétrable (ADR 0036) → monte aussi bien en banc léger
# (local-path, Loki en filesystem) qu'en prod/banc Ceph (rook-ceph, Loki en s3
# vers le RGW). Surcharges par topologie : group_vars d'inventaire non versionné.
#
# Hôte d'exécution k8s : `dataops_k8s_host` (défaut localhost), comme dataops.yaml.

- name: Observabilité — monitoring + logs
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  pre_tasks:
    # kubernetes.core exige la lib Python `kubernetes` ; certifi fournit le CA
    # (mêmes prérequis que dataops.yaml — drift L23).
    # GARDE (#277) : les libs de pilotage (kubernetes, certifi) sont versionnées
    # dans pyproject.toml et provisionnées par `uv sync` dans le .venv du projet,
    # vers lequel pointe l'interpréteur du groupe `control_host` (group_vars). On
    # NE les installe plus au coup par coup via `pip` (qui échouait sur un
    # contrôleur macOS « externally-managed ») : on VÉRIFIE leur présence et on
    # oriente vers `uv sync` si elles manquent.
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle avant de jouer ce play :
              `uv sync` à la racine du dépôt (ADR 0006/0023, #277). Si le .venv
              vit ailleurs, surcharger `ansible_python_interpreter` sur l'hôte
              localhost de l'inventaire.
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: monitoring_certifi
      changed_when: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        monitoring_ca_bundle: '{{ monitoring_certifi.stdout | trim }}'
  environment:
    SSL_CERT_FILE: '{{ monitoring_ca_bundle | default(omit) }}'
  tasks:
    # cert-manager AVANT monitoring : le manifeste kube-prometheus-stack contient
    # des Certificate/Issuer (webhook admission de l'operator) → cert-manager doit
    # exister (drift L35 : sinon « no match for cert-manager.io/v1.Certificate »).
    - name: TLS interne (cert-manager, prérequis du webhook monitoring)
      ansible.builtin.import_role:
        name: platform-cert-manager
      tags: cert-manager

    - name: Stack de monitoring (Prometheus + Alertmanager + Grafana)
      ansible.builtin.import_role:
        name: platform-monitoring
      tags: monitoring

    # Backing S3 léger : déployé UNIQUEMENT si Loki cible SeaweedFS (banc léger).
    # En prod / banc Ceph (loki_s3_backing=rgw), le RGW Ceph fait office de S3.
    - name: Backing S3 léger (SeaweedFS, banc léger uniquement)
      ansible.builtin.import_role:
        name: platform-seaweedfs
      when: (loki_s3_backing | default('rgw')) == 'seaweedfs'
      tags: seaweedfs

    - name: Logs (Loki)
      ansible.builtin.import_role:
        name: platform-loki
      tags: loki
