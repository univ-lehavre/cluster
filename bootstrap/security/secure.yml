# Durcissement progressif (server-security) — fusionné dans cluster sous
# bootstrap/security/.
#
# Politique : **toutes les couches de hardening sont OPT-IN**. Sans tag,
# le playbook se borne à charger les variables (`settings`) et ne touche
# à rien. L'utilisateur choisit explicitement la couche qu'il veut
# activer ; voir IMPLICATIONS.md pour le détail.
#
# Menu (chemin du playbook relatif au dépôt) :
#   nestor ansible security/secure.yml --tags os         # mises à jour auto
#   nestor ansible security/secure.yml --tags alert      # mail root
#   nestor ansible security/secure.yml --tags audit      # auditd
#   nestor ansible security/secure.yml --tags detection  # fail2ban
#   nestor ansible security/secure.yml --tags smart      # smartd (SMART disques)
#   nestor ansible security/secure.yml --tags ufw        # ⚠️ APRÈS bootstrap K8s
#   nestor ansible security/secure.yml --tags upgrade    # apt full-upgrade + reboot
#
# Pour tout activer en un coup (déconseillé sans avoir lu IMPLICATIONS.md) :
#   nestor ansible security/secure.yml \
#     --tags os,alert,audit,detection

- name: Paramétrage du playbook
  hosts: all
  roles:
    - role: settings
      tags: always

- name: Mise à niveau OS immédiate (opt-in)
  hosts: all
  become: true
  serial: 1
  tasks:
    - name: Apt full-upgrade et reboot si nécessaire
      ansible.builtin.import_role:
        name: os
        tasks_from: upgrade-now
      tags:
        - never
        - upgrade

- name: Durcissement (toutes couches en opt-in)
  hosts: all
  become: true
  tasks:
    - name: OS — comptes admin + unattended-upgrades
      ansible.builtin.import_role:
        name: os
      tags:
        - never
        - os
        - unattended-upgrades
        - accounts

    - name: Alert — postfix + redirection mail root
      ansible.builtin.import_role:
        name: alert
      tags:
        - never
        - alert
        - mail

    - name: Audit — auditd + règles
      ansible.builtin.import_role:
        name: audit
      tags:
        - never
        - audit
        - auditd

    - name: Detection — fail2ban
      ansible.builtin.import_role:
        name: detection
      tags:
        - never
        - detection
        - fail2ban

    - name: Smart — surveillance SMART des disques (smartd)
      ansible.builtin.import_role:
        name: smartmon
      tags:
        - never
        - smart
        - smartd

    # Le durcissement sshd et le dépôt de la clé publique sont la responsabilité
    # UNIQUE de bootstrap/first-access.sh (cf. roles/network/tasks/main.yml).
    # Les tags `sshd`/`ssh-keys` (doublon Ansible) ont été retirés.
    - name: Network — UFW (À ACTIVER APRÈS bootstrap K8s)
      ansible.builtin.import_role:
        name: network
        tasks_from: ufw
      tags:
        - never
        - ufw
