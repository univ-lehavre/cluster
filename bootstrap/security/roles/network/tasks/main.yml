# Le durcissement sshd et le dépôt de la clé publique sont la responsabilité
# UNIQUE de bootstrap/first-access.sh (drop-in /etc/ssh/sshd_config.d/, clé via
# ssh-copy-id). Les tasks Ansible sshd.yml/ssh.yml faisaient doublon (et avec un
# AllowUsers variable risqué) : supprimées. Ce rôle ne gère plus que le pare-feu.
- name: Limitation des accès avec un pare-feu
  ansible.builtin.import_tasks: ufw.yml
