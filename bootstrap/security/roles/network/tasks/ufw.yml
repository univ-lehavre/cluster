# Pare-feu UFW — jeu de règles K8s / Cilium / Ceph (audit P6 #24).
#
# ⚠️ À N'ACTIVER QU'APRÈS le bootstrap K8s (cf. secure.yml, tag `ufw`).
# Activer UFW sans ces règles couperait le cluster (API server, etcd, kubelet,
# VXLAN Cilium, mon/osd Ceph...).
#
# Stratégie (décision audit P6) : plutôt qu'énumérer ~30 ports inter-nœuds
# fragiles, on autorise TOUT le trafic entre nœuds du cluster (plage
# `network_ufw_cluster_cidr`). Cluster hyperconvergé, réseau privé de confiance
# (ADR 0003) → les flux est-ouest K8s/Cilium/Ceph passent sans énumération.
# On restreint en revanche les accès EXTERNES : SSH limité à `network_ufw_ssh_admin_cidr`,
# et seuls les services réellement exposés sont ouverts au-delà du cluster.

- name: Installation et activation du pare-feu UFW
  become: true
  tags:
    - install
  block:
    - name: Installation du paquet
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Activation et démarrage du service
      ansible.builtin.systemd:
        name: ufw
        state: started
        enabled: true

- name: Résolution des plages réseau (variables d'env optionnelles)
  become: true
  tags:
    - configuration
  block:
    # Réseau du cluster : tout l'inter-nœuds y est autorisé. Défaut = plage
    # de prod 10.67.2.0/22 (cf. platform/hardware.md).
    - name: Définir la plage du réseau cluster
      ansible.builtin.set_fact:
        network_ufw_cluster_cidr: "{{ lookup('ansible.builtin.env', 'CLUSTER_CIDR') | default('10.67.2.0/22', true) }}"

    # Source autorisée pour SSH. Défaut = réseau cluster (pas d'Internet,
    # cf. ADR 0003). Surchargeable via SSH_ADMIN_CIDR (ex. Tailscale 100.64.0.0/10).
    - name: Définir la plage d'administration SSH
      ansible.builtin.set_fact:
        network_ufw_ssh_admin_cidr: "{{ lookup('ansible.builtin.env', 'SSH_ADMIN_CIDR') | default(network_ufw_cluster_cidr, true) }}"

    - name: Récapituler les plages retenues
      ansible.builtin.debug:
        msg: >-
          UFW : inter-nœuds autorisé sur {{ network_ufw_cluster_cidr }} ;
          SSH limité à {{ network_ufw_ssh_admin_cidr }}.

- name: Configuration du pare-feu UFW
  become: true
  tags:
    - configuration
  block:
    - name: Définir la politique entrante par défaut (deny)
      community.general.ufw:
        direction: incoming
        policy: deny
      notify: Restart UFW

    - name: Définir la politique sortante par défaut (allow)
      community.general.ufw:
        direction: outgoing
        policy: allow
      notify: Restart UFW

    # ── Inter-nœuds : tout le trafic du cluster (K8s, etcd, Cilium, Ceph) ──
    - name: Autoriser tout le trafic entre nœuds du cluster
      community.general.ufw:
        rule: allow
        src: '{{ network_ufw_cluster_cidr }}'
      notify: Restart UFW

    # ── SSH : limité (anti-brute-force) à la plage d'administration ────────
    - name: Autoriser et limiter SSH depuis la plage d'administration
      community.general.ufw:
        rule: limit
        port: '22'
        proto: tcp
        src: '{{ network_ufw_ssh_admin_cidr }}'
      notify: Restart UFW

    # ── Services exposés au-delà du cluster ───────────────────────────────
    # NodePort par défaut (kube-proxy / Cilium) : services publiés via NodePort.
    - name: Autoriser la plage NodePort (services exposés)
      community.general.ufw:
        rule: allow
        port: '30000:32767'
        proto: tcp
      notify: Restart UFW

    - name: Activer le logging UFW
      community.general.ufw:
        logging: 'on'
      notify: Restart UFW

    - name: Activer et appliquer UFW
      community.general.ufw:
        state: enabled
      notify: Restart UFW
