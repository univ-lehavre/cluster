# Surveillance SMART des disques (audit P5 #19 / ADR 0008).
#
# `smartmontools` (smartd) surveille en continu l'état SMART des disques —
# en particulier le NVMe `block.db` (nvme1n1), SPOF par nœud : sa perte = perte
# des 12 OSDs HDD du nœud (cf. ADR 0008). smartd envoie un mail à root dès qu'un
# attribut SMART se dégrade ; la couche `alert` (postfix) redirige root vers
# l'adresse d'exploitation. Couche opt-in (`--tags smart`).
- name: Surveillance SMART (smartd)
  become: true
  block:
    - name: Installer smartmontools
      ansible.builtin.apt:
        name: smartmontools
        state: present
        update_cache: true

    - name: Configurer smartd (surveillance + mail root sur dégradation)
      ansible.builtin.copy:
        src: smartd.conf
        dest: /etc/smartd.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart smartd

    # Le service canonique sur Debian est `smartmontools.service` (`smartd` n'en
    # est qu'un alias). On l'active toujours ; le démarrage peut échouer là où
    # AUCUN disque n'expose de SMART (ex. banc VirtualBox : disques virtio sans
    # SMART → smartd sort en status 17). En prod (disques HPE réels), il démarre.
    # On n'échoue donc pas le playbook sur ce cas, signalé explicitement.
    - name: Activer smartmontools (smartd) au démarrage
      ansible.builtin.systemd:
        name: smartmontools
        enabled: true

    - name: Démarrer smartmontools (tolère l'absence de SMART sur disques virtuels)
      ansible.builtin.systemd:
        name: smartmontools
        state: started
      register: smartmon_smartd_start
      failed_when: false

    - name: Avertir si smartd n'a pas pu démarrer (aucun disque SMART détecté)
      ansible.builtin.debug:
        msg: >-
          smartd installé et activé, mais le démarrage a échoué : aucun disque
          n'expose de SMART monitorable (attendu sur un banc à disques virtuels ;
          en prod sur matériel réel, vérifier `systemctl status smartmontools`).
      when: smartmon_smartd_start is defined and smartmon_smartd_start.failed | default(false)
