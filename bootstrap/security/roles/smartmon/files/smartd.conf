# Configuration smartd — surveillance SMART (audit P5 #19 / ADR 0008).
#
# DEVICESCAN : surveille automatiquement tous les disques détectés (HDD SAS +
# NVMe), sans les énumérer (l'inventaire varie peu mais reste auto-découvert).
#
# Directives :
#   -a            surveille tous les attributs (santé, secteurs réalloués, etc.)
#   -o on         active le test offline automatique
#   -S on         active la sauvegarde des attributs (attribute autosave)
#   -n standby,q  ne réveille pas un disque en veille (silencieux)
#   -s (...)      planning des self-tests : short chaque nuit, long le week-end
#   -W 4,45,55    surveille la température : delta 4°C, info 45°C, critique 55°C
#   -m root       envoie les alertes par mail à root (redirigé par la couche
#                 `alert`/postfix vers l'adresse d'exploitation)
#   -M exec ...   exécute le notifieur par défaut (mail) ; -M test enverrait un
#                 mail de test au (re)démarrage — laissé désactivé.
#
# Le NVMe block.db (nvme1n1) est le SPOF par nœud (cf. ADR 0008) : sa
# dégradation SMART déclenche un mail → drainer le nœud, remplacer le NVMe,
# laisser Rook recréer les OSDs.
DEVICESCAN -a -o on -S on -n standby,q -s (S/../.././02|L/../../6/03) -W 4,45,55 -m root
