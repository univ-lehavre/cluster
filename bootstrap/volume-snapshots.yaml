# code: language=ansible
# Layer VOLUME-SNAPSHOTS (ADR 0013/0109) — CronJob de snapshots des PVC applicatifs, régi
# par le curseur persistence.mode. Monté par nestor (avant : apply manuel storage/ceph/backup/).
# Exige le stockage bloc Ceph (SC) + les VolumeSnapshot CRD (fournis par Rook/Ceph).

- name: Layer Volume-snapshots — CronJob de sauvegarde des données applicatives
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  environment:
    SSL_CERT_FILE: '{{ dataops_ca_bundle | default(omit) }}'
  pre_tasks:
    - name: 'Garde : client Python kubernetes+certifi présent (sinon : uv sync)'
      block:
        - name: Probe import kubernetes + certifi
          ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes, certifi'"
          changed_when: false
          check_mode: false
      rescue:
        - name: Manque le client Python — guider vers uv sync
          ansible.builtin.fail:
            msg: >-
              Le client Python `kubernetes` (ou `certifi`) est introuvable dans
              l'interpréteur {{ ansible_python_interpreter | default('python3') }}.
              Provisionner le .venv du poste de contrôle : `uv sync` à la racine
              du dépôt (ADR 0006/0023, #277).
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: snapshots_certifi
      changed_when: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        dataops_ca_bundle: '{{ snapshots_certifi.stdout | trim }}'
  tasks:
    - name: CronJob de snapshots des PVC applicatifs
      ansible.builtin.import_role:
        name: platform-volume-snapshots
      tags: volume-snapshots
