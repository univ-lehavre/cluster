# code: language=ansible
#
# Rollback DESTRUCTIF du bootstrap Kubernetes. À utiliser pour ré-essayer un
# bootstrap depuis zéro sur le banc, ou pour préparer le terrain avant un
# rebuild OS. Exige `-e confirm=yes`.
#
#   ansible-playbook -i hosts.yaml rollback.yaml -e confirm=yes --limit cp1
#
# Hors périmètre : first-access.sh (sshd drop-in), secure.yml (hardening
# opt-in), disques Ceph (cf. storage/ceph/cleanup.sh), partitionnement.
- name: Rollback bootstrap Kubernetes
  hosts: cloud
  become: true
  # GARDE D'ISOLATION (ADR 0053, #359) : rollback DESTRUCTIF sur les nœuds → vérifier la
  # cible (EXPECTED_TARGET_KIND) AVANT toute tâche distante, comme tout play `hosts: cloud`.
  pre_tasks:
    - name: Audit-log — record playbook execution (+ garde target_kind)
      ansible.builtin.import_role:
        name: audit-log
      vars:
        audit_log_playbook: rollback.yaml
  roles:
    - k8s-rollback
