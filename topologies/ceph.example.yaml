# code: language=yaml
#
# topologies/ceph.example.yaml — topologie d'EXEMPLE VERSIONNÉE d'un banc Ceph à 3 nœuds
# (ADR 0056). Valeurs GÉNÉRIQUES (ADR 0023). Modèle du catalogue : copier en
# `topologies/ceph.yaml` (gitignoré) pour une surcharge locale, ou l'activer tel quel.
#
# 3 nœuds = le plancher d'un Ceph PROUVABLE : quorum de 3 monitors et ≥ 3 OSD pour une
# réplication x3 (1 OSD par nœud minimum). Le control-plane n'est PAS HA ici (un seul
# nœud `control`, pas de VIP) — l'OBJET de ce banc est le STOCKAGE, pas la HA. Les 3
# nœuds portent des OSD Ceph (mon + OSD hyperconvergés avec k8s, ADR 0007/0055) : le
# banc minimal qui prouve la pile de stockage sans 6 VM. Pour un control-plane HA
# (3 control + VIP), voir `ha-3cp` (local-path, HA ⊥ stockage #250).
#
# Ceph/Rook exige des DISQUES BRUTS non partitionnés (OSD) → déclarés par nœud. Le
# chemin dérivé est `atlas-ceph` (backend ceph + profil dataops, nestor/plan.py).
#
# Statut `cible` : NON encore buildé ni prouvé au banc (ADR 0030/0040 ; honnêteté
# ADR 0052 — pas de `buildé` sans run de banc Ceph).

# ─── catalog : arch/terrain/topologie/profil (ADR 0039)
catalog:
  arch: arm64 # le banc Lima est arm64
  terrain: local # banc Lima ; la prod hyperconvergée Ceph serait baremetal
  topology: multi-node-3 # multi-node-3 | multi-node-4 | ha-3cp
  status: cible # cible | buildé | spike — NON prouvé tant que le run banc Ceph manque
layers: [ceph, sc, datalake, metrics-server]

# ─── nodes : node1 = control + worker + storage ; node2/node3 = worker + storage.
# Un seul control-plane (pas de HA, cf. en-tête) ; les 3 nœuds schedulent la charge
# (détaint ADR 0007) ET hébergent des OSD Ceph. Disques BRUTS par nœud (ADR 0008,
# 3 par nœud) : `vdb`/`vdc` = OSD data, `vdd` = metadata NVMe (block.db) → 2 disques
# data × 3 nœuds = 6 OSD. Le banc Lima crée ces disques virtio bruts (`vd[b-d]`).
nodes:
  - name: node1
    roles: [control, worker, storage]
    disks: [vdb, vdc, vdd]
  - name: node2
    roles: [worker, storage]
    disks: [vdb, vdc, vdd]
  - name: node3
    roles: [worker, storage]
    disks: [vdb, vdc, vdd]

# ─── storage : Ceph (l'objet de cette topologie). `osd_expected` cadre la gate OSD au
# banc ; nestor ne le DÉRIVE pas d'une liste `disks:` (il ne sait pas que `vdd` est du
# metadata, pas un OSD) → `derive_osd_expected` rend None ici. Le poser explicitement si
# la gate OSD doit avoir une cible (6 = 2 data × 3 nœuds). `metadata_device` = NVMe block.db.
storage:
  backend: ceph # ceph | local-path
  # osd_expected: 6         # 2 disques data (vdb,vdc) × 3 nœuds ; vdd = metadata, pas un OSD
  # metadata_device: vdd    # NVMe block.db (ADR 0008)

# ─── resources : ressources VM par nœud (LOT 8, ADR 0097 §3 — ex-VM_CPUS/VM_MEMORY/
# VM_DISK de l'env). Bloc GLOBAL appliqué à CHAQUE VM ; surchargeable par node via
# `nodes[].resources`. 12 GiB RAM = valeur Ceph de référence (run-phases.sh:69-73) : un
# nœud porte OSD/mon Ceph + k8s ; Ceph est sensible à la pression mémoire (OSD lents →
# HEALTH qui traîne) — on garde la marge même sur ce `layers` réduit (stockage seul, sans
# la chaîne MLOps). 40 GiB disque (OS + containerd + images). 3 × 12 GiB ≈ 36 GiB sur un
# hôte 48 GiB (marge OK macOS, README banc). 4 vCPU : charge répartie sur 3 nœuds.
resources:
  cpus: 4
  memory: 12GiB
  disk: 40GiB

# ─── hardening : axe orthogonal (ADR 0045 §3) — non durci sur ce banc Ceph
hardening:
  enabled: false

# ─── target_kind : banc Lima (garde-fou d'intention, ADR 0053)
target_kind: bench
