# code: language=yaml
#
# topologies/gateway-public.example.yaml — EXEMPLE d'une VM publique mono-NIC exposée
# en `gateway` (hostNetwork), valeurs génériques (ADR 0023). Topologie-vitrine de
# l'exposition internet (ADR 0099 : terrain cloud + exposition gateway).
#
# ⚠️ `gateway` n'est PLUS le mode par défaut : depuis l'ADR 0092, le défaut canonique est
# `nodeport` (L4 sur le port du nœud, zéro DNS/LB-IPAM, reproductible partout). `gateway`
# est un mode LEGACY à DÉCLARER explicitement (rétrocompat) — c'est ce que fait ce fichier,
# pour le cas d'une VM publique cloud qui veut la bordure L7 sur 80/443.
#
# `exposition.mode: gateway` : la bordure L7 Cilium (Gateway API) est exposée en
# **hostNetwork** — l'Envoy bind les **ports standards 80/443 directement sur l'IP du nœud**
# (`gatewayAPI.hostNetwork.enabled`, routage eBPF par `kubeProxyReplacement`), y compris les
# ports privilégiés < 1024. Le service répond sur `IP_publique:443` **sans plage LB-IPAM à
# réserver ni interface L2 annonçable**.
#
# Ce que `gateway` apporte vs un simple `nodeport`/`hostPort` : la bordure L7 — routage
# host/path (`HTTPRoute`), multiplexage de plusieurs services sur 443 par hostname (SNI),
# terminaison TLS par cert-manager (ADR 0021). Alias historiques : `hostport` → `nodeport`,
# `lb-ipam` → `gateway` (ADR 0071/0092) ; ce fichier emploie le nom canonique `gateway`.
#
# Ce fichier est VERSIONNÉ (exemple générique) ; le `topology.yaml` réel (symlink
# d'activation) reste gitignoré.

catalog:
  arch: x86 # arm64 | x86
  terrain: cloud # local | cloud | baremetal — VM publique mono-NIC
  topology: edge-public # nom de la stack
  status: cible # buildé | cible | spike

# ─── exposition : Gateway L7 en hostNetwork, 80/443 sur l'IP du nœud (ADR 0092, legacy)
exposition:
  mode: gateway # nodeport (défaut) | gateway (legacy) | none. Alias : lb-ipam→gateway, hostport→nodeport

# ─── layers : les couches voulues (ADR 0069). Ici un point d'entrée web simple.
layers: [gitops]

# ─── nodes : un nœud public (control hyperconvergé) exposant 80/443.
nodes:
  - name: node1
    roles:
      - control
      - worker

storage:
  backend: local-path

target_kind: prod # cible un déploiement réel (pas le banc Lima)
