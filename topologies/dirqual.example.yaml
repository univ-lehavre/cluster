# code: language=yaml
#
# topologies/dirqual.example.yaml — image VERSIONNÉE de l'instance PROD `dirqual`
# (4 nœuds baremetal `dirqual1-4`, `10.0.0.11-14` — plage d'EXEMPLE dans le `/22` mandaté
# ADR 0023 ; l'adressage réel du parc vit dans le `dirqual.yaml` gitignoré). ADR 0056/0090.
# SOURCE DE VÉRITÉ
# déclarative : `nestor` en DÉRIVE l'inventaire Ansible, les group_vars de profil, la
# table de nœuds. Générateur SANS ÉTAT ; Ansible reste le moteur de convergence (ADR 0056 §7).
# Le `topology.yaml` réel (symlink d'activation) et le `dirqual.yaml` de surcharge locale
# sont gitignorés ; ce `.example` est versionné.
#
# DOCTRINE de ce fichier : n'y figurent QUE les champs FONCTIONNELS — ceux qu'un accesseur
# nestor LIT réellement et qui changent le déploiement. Les champs descriptifs
# (catalog.arch/topology/status) et les placeholders ENV→YAML non lus (blocs ha/cilium,
# sous-clés network.*, exposition.plage/interface, ceph.block_device…) sont OMIS : les
# déclarer donnerait l'illusion d'un effet inexistant. `stack_id` = nom de fichier (`dirqual`).
#
# ⚠️ SPOF connu (audit 2026-06-24, M4) : `dirqual1` est le SEUL control-plane (etcd 1 membre).
# La cible HA (3 CP) est un chantier séparé (plan-ha-3cp) — cette topo décrit le RÉEL, pas la cible.

# ─── catalog : seuls les champs LUS. `terrain: baremetal` → pas de provisioning VM
# (resources ignoré), pas de phase `up`. `profile` documentaire ici : `layers` (ci-dessous)
# est posé, donc il PRIME (ADR 0069) — on rend explicite le préfixe dataops PLUS `build`.
catalog:
  terrain: baremetal # local | cloud | baremetal (défaut fail-safe : baremetal).
  profile: dataops # documentaire (base ⊂ metrics ⊂ store ⊂ obs ⊂ dataops) — `layers` prime.

# ─── layers : le profil `dataops` rendu explicite (metrics ⊂ store ⊂ obs ⊂ dataops) PLUS
# `build` (ADR 0112) = registry + buildkit. dirqual builde ses images de code IN-POD (buildctl
# → daemon buildkitd). RELÂCHEMENT PodSecurity ASSUMÉ : le ns de build (`buildkit`) n'est pas
# labellisé `enforce: baseline` (privilège du builder isolé à ce ns ; reste du cluster durci).
# `volume-snapshots` (ADR 0013) : CronJob quotidien de snapshots des PVC applicatifs (RPO 24h).
# Phase autonome (dépend de `sc`, non tirée par clôture) → à lister EXPLICITEMENT ici. Sur ce
# parc Ceph la réplication ne couvre PAS la suppression/corruption logique : sans cette couche
# l'angle mort ADR 0013 reste ouvert. `resolve_layers` l'ordonne après `sc`.
layers:
  - metrics
  - store
  - obs
  - dataops
  - build
  - volume-snapshots

# ─── nodes : les 4 nœuds RÉELS. `dirqual1` = control + worker + storage (hyperconvergé : il
# porte l'API, CoreDNS ET des OSD Ceph, audit 2026-06-24) ; `dirqual2-4` = worker + storage.
# `roles` cumulable (ADR 0007/0055). Les DISQUES bruts Ceph ne sont PAS déclarés ici : ce sont
# des devices physiques (sd*/nvme*) propres au parc, renseignés dans le `dirqual.yaml` réel
# (gitignoré) — pas dans le modèle générique. Sans `disks`, `osd_expected` reste dérivé côté run.
nodes:
  - name: dirqual1
    roles: [control, worker, storage]
  - name: dirqual2
    roles: [worker, storage]
  - name: dirqual3
    roles: [worker, storage]
  - name: dirqual4
    roles: [worker, storage]

# ─── exposition : mode d'accès applicatif. `dirqual` reste déclaré `lb-ipam` (alias historique
# de `gateway`) — INCHANGÉ (état réel du cluster). Le mécanisme effectif est piloté à
# l'installation (bootstrap/cni.sh). Seul `mode` est lu ; plage/interface sont des placeholders.
exposition:
  mode: lb-ipam # lb-ipam (→ gateway) | nodeport | none. Alias : hostport → nodeport.

# ─── persistence : curseur de rétention des DONNÉES APPLICATIVES (ADR 0109). Global à
# l'instance, EXPLICITE (ne dérive pas du terrain). `full` = on stocke tout (le comportement
# actuel, et le défaut si le bloc est absent) ; `bounded` = fenêtre glissante bornée (classe
# HDD-only, ADR 0107 §2) ; `ephemeral` = jetable (pas de volume durable). Ne régit JAMAIS
# etcd/le plan de contrôle (garde-fou). Sur le parc massif dirqual : `full` (on garde tout).
persistence:
  mode: full # full | bounded | ephemeral.

# ─── storage : backend Ceph (l'objet du parc dirqual). `osd_expected`/`metadata_device` sont
# dérivés/optionnels ; en l'absence de `nodes[].disks`, ils restent non forcés (renseignés au run).
storage:
  backend: ceph # ceph | local-path.

# ─── hardening : axe orthogonal (ADR 0045 §3). Prod : durcissement piloté séparément.
hardening:
  enabled: false # true → insère la phase de durcissement après le socle.

# ─── ceph : devices du wipe node-side (ADR 0008). En prod baremetal, ce sont les VRAIS devices
# physiques (sd*/nvme*) du parc — renseignés dans le `dirqual.yaml` réel, PAS ici (valeurs banc
# /dev/vd* fausses en prod). Laissés en commentaire pour signaler la clé sans inventer sa valeur.
# ceph:
#   nvme_block_device: /dev/nvme1n1   # NVMe block.db réel du parc.
#   data_device_glob: /dev/sd[b-e]    # glob des devices data réels.

# ─── gitea : seed du JOUET du socle. Défauts génériques (nestor/seed.py), LUS par SeedConfig.
# ADR 0111 : les clés du seed prod App-of-Apps (org_cluster/repo_apps/org_atlas/repo_atlas)
# ne sont PLUS lues — l'instanciation applicative est un geste côté dépôt atlas.
gitea:
  ns: gitea
  admin_user: atlas-admin
  admin_email: atlas-admin@example-org.lan # placeholder générique (ADR 0048).
  svc: http://gitea-http.gitea.svc.cluster.local
  api: http://localhost:3000
  argocd_ns: argocd
  org: atlas
  repo: workflows

# ─── atlas : code-locations pour l'OBSERVABILITÉ de drift digest côté cluster
# (discover.stale_deployments). ADR 0111 : l'instanciation/déploiement de la code-location
# (build, push de l'Application) est un geste côté dépôt atlas — ces champs ne sont PLUS lus
# par un seed cluster ; seul `image_digest` (si déclaré) sert à comparer déclaré vs déployé.
atlas:
  code_locations:
    - name: citation # nom court (dérive image/overlay). REQUIS.

# ─── portal : seul `access_host` est lu (host des NodePort côté navigateur). En prod, l'hôte
# Tailscale du control-plane : `dirqual1` (l'InternalIP, ex. `10.0.0.11`, est injoignable de l'extérieur).
portal:
  access_host: dirqual1

# ─── kubeconfig : cible de LECTURE (ADR 0090). Le chemin réel (`~/.kube/dirqual.config`,
# admin.conf rapatrié de dirqual1) vit HORS du dépôt (credentials). Laissé absent ici →
# résolution par défaut ; `export KUBECONFIG=…` surcharge toujours.
# kubeconfig: ~/.kube/dirqual.config
