# code: language=yaml
#
# topology.yaml — EXEMPLE du modèle `layers` (ADR 0069), valeurs génériques (ADR 0023).
#
# `layers` déclare un ENSEMBLE de couches (grain phase) ; l'outil en DÉRIVE l'ordre
# par tri topologique du DAG de dépendances RÉELLES (resolve_layers). C'est plus
# expressif que le `profile` scalaire (ADR 0039) : un profil est un PRÉFIXE de la
# chaîne cumulative `base ⊂ metrics ⊂ store ⊂ obs ⊂ dataops`, alors que `layers`
# permet un sous-ensemble ARBITRAIRE.
#
# L'exemple ci-dessous est précisément un palier NON-PRÉFIXE — impossible via
# `profile` : on veut GitOps + l'API metrics (kubectl top), SANS l'observabilité
# Prometheus/Grafana/Loki (`monitoring`). L'outil dérive l'ordre :
#   up → bootstrap → storage-simple → metrics-server → gitops
# (le stockage est tiré par GitOps qui crée des PVC ; metrics-server n'a, lui,
# aucune dépendance stockage — la fausse dépendance qu'imposait la chaîne est levée).
#
# `cluster preview` montre la séquence dérivée ; `cluster up` la monte via l'arm
# générique `layers` de run-phases.sh (Python décide l'ordre, bash exécute, ADR 0063).
#
# Ce fichier est VERSIONNÉ (exemple générique) ; le `topology.yaml` réel (symlink
# d'activation) reste gitignoré.

# ─── catalog : DESCRIPTIF pur (ADR 0039/0069 : l'intention de déploiement vit dans
#     `layers`, plus dans `catalog.profile`). arch/terrain/topologie/status.
catalog:
  arch: arm64 # arm64 | x86
  terrain: local # local | cloud | baremetal
  topology: gitops-metrics # nom de la stack (clé d'historique/fraîcheur)
  status: cible # buildé | cible | spike (ADR 0030/0040)

# ─── layers : l'ENSEMBLE de couches voulu (ADR 0069). Alias de profil
#     (metrics/store/obs/dataops) OU noms de phase bruts (gitops, monitoring…).
#     Ici un palier non-préfixe : GitOps + metrics, SANS monitoring.
layers: [gitops, metrics]

# ─── nodes : déclaration unique nœuds/rôles. 1 control hyperconvergé suffit pour
#     ce palier (pas de HA — la HA = ≥2 control, topologie ha-3cp dédiée).
nodes:
  - name: node1
    roles:
      - control
      - worker

# ─── storage : backend du stockage. `storage-simple` (local-path) est tiré
#     automatiquement par GitOps (PVC Gitea). `ceph` exigerait ≥3 nœuds storage.
storage:
  backend: local-path

target_kind: lima # lima (banc) | prod — garde-fou de cible (ADR 0053)
