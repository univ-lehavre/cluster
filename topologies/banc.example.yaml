# topologies/banc.example.yaml — modèle VERSIONNÉ d'un banc Lima mono-nœud (valeurs
# génériques, ADR 0023 ; nommage uniforme .example, ADR 0102). Copier en
# `topologies/banc.yaml` (gitignoré) pour une surcharge locale, ou l'activer tel quel.
# Générée par `nestor stack new` ; ajuste nœuds/rôles/ressources, revérifie via
# `nestor stack validate`. `status: cible` tant qu'aucun run ne l'a montée (ADR 0052).
catalog:
  topology: banc
  terrain: local
  status: cible # cible | buildé | spike — `buildé` seulement après un run réel
# `atlas` = alias de la chaîne MLOps complète (ADR 0083) : metrics + monitoring +
# gitops + gitops-seed + dataops + mlflow. C'est un alias de LAYERS (top-level),
# PAS un profil (profile reste le préfixe cumulatif base⊂…⊂dataops, ADR 0039).
layers:
  - metrics-server
  - monitoring
  - gitops
  - gitops-seed
  - dataops
  - mlflow
  - portal
nodes:
  - name: node1
    roles: [control, worker]
storage:
  backend: local-path
target_kind: bench
# Ressources de la VM Lima (LOT 8, ADR 0097 §3 — remplace les env VM_CPUS/VM_MEMORY/
# VM_DISK). Bloc GLOBAL (défaut tous nœuds) ; un node peut surcharger via
# `nodes[].resources`. nestor LIT ces valeurs du YAML et les passe au provisioning
# (le moteur Python est le SEUL, ADR 0097 — le filet bash `--engine` a été retiré).
# Mono-nœud ici → un seul jeu de ressources ; la surcharge per-node au provisioning
# multi-nœuds est un chantier en cours (aujourd'hui le provisioning applique un jeu global).
resources:
  cpus: 6
  memory: 16GiB
  disk: 128GiB
# PAS de `kubeconfig:` ici : pour un banc, nestor DÉRIVE la cible seul (le provisioning
# rapatrie `bench/lima/.work/kubeconfig`, phase cni ; `_bench_kubeconfig` le trouve par
# défaut). Le champ `kubeconfig:` ne sert QU'À la PROD (ADR 0090) — déclarer un
# `~/.kube/<stack>.config` que nestor ne peut pas deviner. Banc = nestor impose ; prod =
# l'utilisateur déclare ; `export KUBECONFIG=…` surcharge toujours (ADR 0053/0065).
