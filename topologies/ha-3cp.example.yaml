# code: language=yaml
#
# topologies/ha-3cp.example.yaml — DÉCLARATION de la topologie HA `ha-3cp`
# (ADR 0056, palier P7 / issue #250). Valeurs GÉNÉRIQUES (ADR 0023) ; le
# topology.yaml réel (symlink d'activation du catalogue) reste gitignoré.
#
# `ha-3cp` sort du SPOF « 1 control-plane » (ADR 0002) : plusieurs CP derrière
# une VIP, quorum etcd. Deux variantes partagent la MÊME mécanique HA (VIP +
# quorum) ; ce fichier déclare la variante **HYPERCONVERGÉE** (ADR 0055), celle
# que le banc peut prouver à 3 VM (minimum d'un quorum 3) — chaque nœud cumule
# control + worker (ADR 0007/0055). La variante CP **dédiés** (ADR 0047, 6 VM)
# se déclarerait à part (3 control purs + 3 worker purs).
#
# DÉLIBÉRÉMENT en `local-path` : la HA du control-plane est ORTHOGONALE au
# stockage (#250 : « HA ⊥ stockage »). On prouve VIP + quorum sans Ceph — banc
# plus léger, itérations courtes. Le statut reste `cible` : NON encore buildé ni
# prouvé au banc (ADR 0030/0040 ; honnêteté ADR 0052 — pas de `buildé` sans run).

# ─── catalog : arch/terrain/topologie/profil (ADR 0039)
catalog:
  arch: arm64 # le banc Lima est arm64
  terrain: local # banc Lima (local) ; la prod hyperconvergée serait baremetal
  topology: ha-3cp # multi-node-3 | multi-node-4 | ha-3cp
  profile: base # HA se prouve sur le socle ; la chaîne dataops est orthogonale
  status: cible # cible | buildé | spike — NON prouvé tant que le run banc manque

# ─── nodes : 3 nœuds HYPERCONVERGÉS (control+worker), quorum etcd à 3 (ADR 0055)
# Chaque nœud porte le control-plane ET schedule la charge (détaint, ADR 0007).
# Pas de 4ᵉ nœud : 3 suffisent à prouver la mécanique HA (le worker pur de la
# prod n'ajoute aucune mécanique de quorum, #250).
nodes:
  - name: cp1
    roles: [control, worker]
  - name: cp2
    roles: [control, worker]
  - name: cp3
    roles: [control, worker]

# ─── network : VIP devant les 3 CP — REQUISE dès > 1 CP (ADR 0047/0055).
# La VIP est l'endpoint stable de l'API : elle survit à la perte d'1 CP. En
# bare-metal/local, elle est portée par kube-vip (pod statique, mode ARP). La VIP
# API reste HORS du pool LB-IPAM (exposition applicative) — deux plans distincts.
network:
  control_plane_endpoint: cluster-api
  control_plane_port: 6443
  control_plane_lb:
    mode: kube-vip-arp # kube-vip-arp | kube-vip-lb | external (ADR 0047/0055)
    # ip:                   # VIP — gitignorée en réel ; sur le banc, dérivée du réseau Lima

# ─── exposition : annonce L2 des Services applicatifs (ADR 0020/0056 §4)
exposition:
  mode: lb-ipam # lb-ipam | nodeport | none

# ─── storage : local-path (HA ⊥ stockage — #250). Pas de Ceph sur ce banc HA.
storage:
  backend: local-path # ceph | local-path

# ─── hardening : axe orthogonal (ADR 0045 §3) — non durci sur ce banc HA
hardening:
  enabled: false

# ─── resources : terrain LOCAL (Lima). 3 VM hyperconvergées, profil léger.
# Pas de disques bruts (local-path). Mesurer le plancher RAM/CP sous charge (#250).
resources:
  cpus: 2
  memory: 6GiB
  disk: 20GiB

# ─── target_kind : banc Lima (garde-fou d'intention, ADR 0053)
target_kind: lima
