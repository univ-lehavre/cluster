# code: language=yaml
#
# topology.yaml — SOURCE DE VÉRITÉ UNIQUE d'une topologie (ADR 0056).
#
# Une topologie complète se DÉCRIT ici ; l'outil `nestor` en DÉRIVE les
# entrées que les outils consomment déjà (inventaire Ansible, group_vars de
# profil, table de nœuds + profils Lima). Aucun moteur à état par-dessus k8s : le
# générateur est SANS ÉTAT, Ansible reste le moteur de convergence (ADR 0056 §7).
#
# Ce `topologies/socle.example.yaml` est VERSIONNÉ avec des valeurs GÉNÉRIQUES
# (ADR 0023) ; le `topology.yaml` réel (symlink d'activation du catalogue) est
# gitignoré. Minimum à écrire : `{ profile, terrain }`
# — tout le reste se dérive (invariant : profil prod → entrées byte-identiques à
# l'inventaire actuel, ADR 0056 §3, palier P1 du plan-modele-declaratif).
#
# Ci-dessous : le profil PROD générique (= bootstrap/hosts.example.yaml régénéré).

# ─── catalog : le tuple arch/terrain/topologie/profil (ADR 0039) hissé en données
catalog:
  arch: x86 # arm64 | x86 (matériel cible — le banc Lima est arm64)
  terrain: baremetal # local | cloud | baremetal
  topology: multi-node-4 # multi-node-3 | multi-node-4 | ha-3cp…
  profile: dataops # base ⊂ store ⊂ obs ⊂ dataops (inclusion cumulative)
  status: cible # buildé | cible | spike (ADR 0030/0040) — `buildé` exige une preuve de run tracée (ADR 0052)

# ─── nodes : UNE seule déclaration nœuds/rôles (résorbe NODES ↔ inventaire)
# `roles` est une liste : un nœud peut cumuler control+worker+storage
# (hyperconvergence, ADR 0007/0055). En prod générique : 1 control + 3 workers.
nodes:
  - name: cp1
    roles: [control]
  - name: node1
    roles: [worker]
  - name: node2
    roles: [worker]
  - name: node3
    roles: [worker]

# ─── network : endpoint stable + (si > 1 CP) le point d'entrée devant les CP
network:
  control_plane_endpoint: cluster-api
  control_plane_port: 6443
  # control_plane_ip:        # optionnel (prod : non posé, résolu par Ansible)
  # control_plane_lb:        # VIP devant les CP — VIDE en mono-CP (ADR 0002).
  #   mode: kube-vip-arp     # kube-vip-arp | kube-vip-lb | external (ADR 0047/0055)
  # pod_subnet / service_subnet / cluster{name,id} : opt-in (ADR 0027), vides = prod.

# ─── exposition : NOUVELLE dimension (ADR 0056 §4 / ADR 0020)
exposition:
  mode: lb-ipam # lb-ipam | nodeport | none
  # plage:                  # plage LB-IPAM (prod : réservée avec l'admin réseau)
  # interface:              # interface L2 d'annonce

# ─── storage : backend + (banc) disques bruts
storage:
  backend: ceph # ceph | local-path
  # osd_expected:           # dérivé (#nœuds-stockage × #disques) si non posé
  # metadata_device:        # NVMe block.db (ADR 0008)

# ─── hardening : axe orthogonal (ADR 0045 §3), enfin dans le modèle
hardening:
  enabled: false # prod générique : durcissement piloté séparément

# ─── resources : terrain LOCAL uniquement (Lima). En baremetal/cloud : ignoré.
# resources:
#   cpus: 2
#   memory: 8GiB
#   disk: 20GiB

# ─── target_kind : garde-fou d'intention (ADR 0053) — prod | bench
target_kind: prod

# ─── kubeconfig : cible de LECTURE déclarée (ADR 0090). Le chemin du kubeconfig
# qui vise CE cluster, pour que `nestor preview`/l'état réel lisent le bon cluster
# sans dépendre du contexte kubectl courant du poste (ambigu). Convention : un
# fichier dédié par stack, HORS du dépôt (credentials réels, jamais commités).
# `nestor` aide à le rapatrier (admin.conf du control-plane) et confirme la cible
# avant toute action prod. None/absent → résolution par défaut.
# kubeconfig: ~/.kube/socle.config
