# Registre des drifts — source de vérité unique (honnêteté des Runs, ADR 0023/0034).
#
# Un « drift » = un écart révélé par un run e2e que le lint ne voyait pas. Ce
# fichier est LE catalogue indexé ; les pages de synthèse (lecons-des-runs.md) et
# les journaux de campagne (bench/lima/RESULTS.md) y RÉFÈRENT par id, sans
# dupliquer le détail. Le drift est la 3e trace EMPIRIQUE de la cartographie
# documentaire, à côté des passages d'audit et de RESULTS.md (ADR 0058 §6).
#
# Champs par entrée :
#   id        : Lnn (stable, citable)
#   campagne  : chantier/issue qui l'a révélé
#   portee    : code (défaut du livrable, vaut pour tous les bancs ET la prod)
#             | env (artefact d'un banc précis)
#             | harnais (outillage de test, pas le livrable)
#   symptome  : ce qu'on a vu
#   cause     : la cause-racine
#   correctif : ce qui a été fait
#   statut    : corrige | caduc (topologie/contexte abandonné) | en-cours | ouvert
#   issue     : '#NNN' — OBLIGATOIRE si statut ouvert/en-cours (ADR 0058 §6 :
#               un écart non corrigé est actionnable → une issue le porte ;
#               un drift ouvert sans issue est un constat orphelin). Omis quand
#               statut = corrige/caduc (clos par construction).
#
# Couverture : L1–L56. Les pages de synthèse (lecons-des-runs.md) et les journaux
# de campagne (bench/RESULTS.md banc Vagrant déprécié, bench/lima/RESULTS.md banc
# courant) RÉFÈRENT à ce registre par id. Le préfixe L = banc Lima (source
# canonique des fiches L1–L40) ; le banc Vagrant numérotait ses propres écarts
# (0a–0e, #3–#26), repris ici par leur Lnn quand il existe — sinon laissés dans
# bench/RESULTS.md (artefacts du banc abandonné, ADR 0038).

drifts:
  # ── Bootstrap K8s sur Lima (#127 / #144) — L1–L11 ────────────────────────
  - id: L1
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Au play `initialisation`, `ansible_user is undefined`.
    cause: >-
      L'inventaire posait l'utilisateur via SSH (ssh.config) mais pas la
      variable `ansible_user`.
    correctif: >-
      Inventaire généré : `cloud.vars.ansible_user: lima`.
    statut: corrige

  - id: L2
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `initialisation` : `Permission denied: /home/lima` (création du `.kube`).
    cause: >-
      Le home Lima est `/home/lima.guest` (≠ `/home/lima`) ; le rôle
      construisait le home via `ansible_user`.
    correctif: >-
      Rôles `k8s-initialization`/`k8s-rollback` : home résolu via
      `ansible_env.HOME` (le vrai home, indépendant de l'utilisateur).
    statut: corrige

  - id: L2bis
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `join-workers` : `Unable to change directory` (/home/debian).
    cause: >-
      `chdir: /home/debian` codé en dur dans `k8s-join-cluster` ; ce chemin
      n'existe pas sur Lima.
    correctif: >-
      `chdir` résolu via `ansible_env.HOME`.
    statut: corrige

  - id: L3
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `initialisation` : `taint "…control-plane" not found`.
    cause: >-
      Sous kubeadm v1.34, le control-plane ne porte pas le taint control-plane
      → l'opération `taint …-` échoue.
    correctif: >-
      Tâche rendue tolérante : `failed_when` ignore « not found ».
    statut: corrige

  - id: L4
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `cni.sh` : `cluster unreachable: localhost:8080`.
    cause: >-
      `cni.sh` lancé en `sudo` → kubectl/cilium pointent sur le kubeconfig root
      absent.
    correctif: >-
      Lancer `cni.sh` en tant qu'utilisateur (sudo interne seulement où
      nécessaire).
    statut: corrige

  - id: L5
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Gate kubeconfig : l'API est injoignable depuis l'hôte.
    cause: >-
      L'IP user-v2 (`192.168.104.x`) n'est pas routable depuis macOS.
    correctif: >-
      Réécrire `server:` sur `127.0.0.1:<portForward>` + `tls-server-name:
      cluster-api`.
    statut: corrige

  - id: L6
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: env
    symptome: >-
      OSD-prepare en CrashLoopBackOff : `binary lvm does not exist`.
    cause: >-
      Le `metadataDevice` (block.db) bascule Rook en mode LVM → `ceph-volume`
      exige `lvm`, absent de l'image Lima.
    correctif: >-
      Installer `lvm2` dans le provision de la VM (`profiles/node.yaml.tmpl`).
    statut: corrige

  - id: L7
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Le gate Ceph passe au vert avec 0 OSD.
    cause: >-
      `ceph health` = HEALTH_OK sur un cluster neuf SANS pool (rien à dégrader).
    correctif: >-
      Gate renforcé : HEALTH_OK ET le nombre d'OSD attendus up (nœuds × disques
      data).
    statut: corrige

  - id: L8
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      cert-manager controller en CrashLoop : « Gateway API CRDs not present ».
    cause: >-
      `cni.sh` active `gatewayAPI` ; ni Cilium ni le bootstrap nu n'embarquent
      ces CRDs.
    correctif: >-
      Phase `platform-prereqs` : pose les CRDs Gateway API v1.4.1.
    statut: corrige

  - id: L9
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      ImagePullBackOff : « HTTP response to HTTPS client » (`registry:80`).
    cause: >-
      containerd tente HTTPS sur le registry interne HTTP ; le nom `registry`
      n'est pas résolu côté nœud.
    correctif: >-
      Phase `platform-prereqs` : `/etc/hosts` + `certs.d/registry:80/hosts.toml`
      en HTTP.
    statut: corrige

  - id: L10
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: harnais
    symptome: >-
      Pod registry Pending : `unbound PersistentVolumeClaim`.
    cause: >-
      Le PVC du registry était figé sur `rook-ceph-block-replicated`, absent du
      banc (local-path).
    correctif: >-
      Override banc : PVC sur `local-path` (paramétré ensuite par profil, cf.
      L41).
    statut: corrige

  - id: L11
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      `kubectl apply -f dagster.yaml` crée les ressources dans `default`.
    cause: >-
      Le helm template figé ne porte pas `metadata.namespace`.
    correctif: >-
      README : `kubectl apply -n dagster …` (corrigé).
    statut: corrige

  # ── Chaîne DataOps shell — phase dataops-chain (#148) — L12–L20 ───────────
  - id: L12
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: harnais
    symptome: >-
      `bootstrap` sort en code 141 (SIGPIPE) — kubeconfig non récupéré.
    cause: >-
      Un `cilium status | grep` ferme le pipe avant `fetch_kubeconfig`.
    correctif: >-
      Contournement : phase `kubeconfig` séparée (le cluster était sain) ; reste
      à durcir dans le bootstrap.
    statut: ouvert
    issue: '#318' # durcissement bootstrap SIGPIPE (ADR 0058 §6)

  - id: L13
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Pull `registry:80` HTTP échoue : « HTTP response to HTTPS client ».
    cause: >-
      containerd v2.2 (Debian 13) route le pull via le transfer service qui
      IGNORE `certs.d`.
    correctif: >-
      `use_local_image_pull = true` dans la config containerd (les 3 nœuds) —
      fix racine.
    statut: corrige

  - id: L14
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      CNPG bloqué : « unknown plugin being required ».
    cause: >-
      `cluster.yaml` exige le plugin Barman, non installé par `dataops-chain`.
    correctif: >-
      Contournement banc initial (retrait du bloc `plugins:`) puis éliminé à la
      racine en #173 (Barman vers RGW Ceph via platform-s3-bucket).
    statut: corrige

  - id: L15
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: harnais
    symptome: >-
      PVC `pg` Pending : « unbound immediate PersistentVolumeClaims ».
    cause: >-
      `cluster.yaml` fige `storageClass: standard`, absent du banc (local-path).
    correctif: >-
      Surcharge banc : `standard → local-path` (paramétré par profil ensuite,
      cf. #158/L41).
    statut: corrige

  - id: L16
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Dagster « too many retries for DB connection » (vrai bug du livrable).
    cause: >-
      `managed.roles` CNPG SANS `passwordSecret` → rôles créés sans mot de passe
      (`rolpassword` NULL).
    correctif: >-
      Fix dépôt : `passwordSecret` par rôle + `role-secrets.example.yaml`.
    statut: corrige

  - id: L17
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Le Secret dérivé applicatif ne correspond pas au mot de passe réel du
      rôle.
    cause: >-
      Il nécessitait une recopie manuelle.
    correctif: >-
      Résolu par L16 : `.example` de rôle et dérivés alignés sur les mêmes
      valeurs de test.
    statut: corrige

  - id: L18
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: env
    symptome: >-
      Build d'images impossible dans les VMs.
    cause: >-
      `git` absent + `buildkitd` présent mais `disabled`.
    correctif: >-
      `apt install git` + `systemctl enable --now buildkit` (intégré à la
      prépa-build).
    statut: corrige

  - id: L19
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Run émetteur en timeout sur le POST OpenLineage (vrai bug du livrable).
    cause: >-
      Aucune NetworkPolicy egress `dagster → marquez:5000` (seul l'ingress côté
      marquez existait).
    correctif: >-
      Fix dépôt : `platform/network-policies/dagster/allow-marquez-egress.yaml`.
    statut: corrige

  - id: L20
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      webserver/daemon Dagster en CrashLoop : « no [tool.dagster] block ».
    cause: >-
      L'orchestrateur vide est lancé sans workspace (`-w`).
    correctif: >-
      Fix dépôt : ConfigMap `dagster-workspace` (`load_from: []`) monté + `-w`
      dans dagster.yaml.
    statut: corrige

  # ── Portage DataOps en rôles Ansible — phase dataops (#173) — L21–L33 ─────
  - id: L21
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      `ansible_user_id is undefined` sur le play cluster.
    cause: >-
      `gather_facts: false` sur le play localhost, alors qu'audit-log le
      requiert.
    correctif: >-
      Retrait de l'audit-log du play cluster (cf. L22).
    statut: corrige

  - id: L22
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      `sudo: a password is required` (audit-log sur localhost).
    cause: >-
      audit-log écrit un log système (`become`) — sans objet sur le poste.
    correctif: >-
      audit-log retiré de `dataops.yaml` (conservé sur les playbooks de nœuds).
    statut: corrige

  - id: L23
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      `SSL: CERTIFICATE_VERIFY_FAILED` (modules get_url/k8s).
    cause: >-
      Le Python d'Ansible (Homebrew) n'utilise pas le CA système.
    correctif: >-
      `SSL_CERT_FILE` via `certifi`, résolu en pré-tâche par le bon interpréteur.
    statut: corrige

  - id: L24
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      Le volet « node » du rôle registry tourne sur localhost.
    cause: >-
      `import_role` charge tout le rôle ; le tag ne filtre pas les blocs
      internes.
    correctif: >-
      Rôle scindé `cluster.yaml`/`node.yaml`, importés via `tasks_from`.
    statut: corrige

  - id: L25
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      Secret dérivé : « namespaces postgres not found ».
    cause: >-
      Les Secrets étaient posés avant que `cluster.yaml` ne crée le namespace.
    correctif: >-
      Namespace `postgres` créé en premier dans `platform-cnpg`.
    statut: corrige

  - id: L26
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      build : « dict has no attribute 'clone_subdir' ».
    cause: >-
      Le ternaire Jinja évalue les deux branches (image locale sans
      `clone_subdir`).
    correctif: >-
      `default('')` sur les attributs optionnels.
    statut: corrige

  - id: L27
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      build : « Dockerfile no such file or directory » sur le nœud.
    cause: >-
      Banc Lima `mounts: []` → les sources du dépôt sont absentes de la VM.
    correctif: >-
      Copier contextes/Dockerfiles sur le nœud avant le build.
    statut: corrige

  - id: L28
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      build `marquez-web` OOM-killed (rc 137).
    cause: >-
      webpack/npm sature la VM 5 GiB (déjà k8s + Ceph + CNPG).
    correctif: >-
      `VM_MEMORY` 5 → 8 GiB (dimensionner pour le pic, pas le repos).
    statut: corrige

  - id: L29
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      Operator CNPG en CrashLoop après un reboot.
    cause: >-
      reboot de `cp1` → Cilium pas reconvergé → ClusterIP du plugin injoignable.
    correctif: >-
      Artefact de reboot (cf. réserve « restore non fidèle ») : redémarrer
      l'operator. Pas un défaut du livrable.
    statut: caduc

  - id: L30
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      Pods Dagster en ImagePullBackOff sur `registry:80` (HTTP/HTTPS).
    cause: >-
      containerd des workers pas rechargé après pose de la config
      insecure-registry.
    correctif: >-
      Restart containerd sur les nœuds (handler à fiabiliser).
    statut: corrige

  - id: L31
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      Preuve de lineage : l'image émetteur est absente du registry.
    cause: >-
      L'émetteur jetable n'était pas dans `build_images` (hors prod, ADR 0022).
    correctif: >-
      `build_emitter_image=true` au banc (câblé conditionnellement).
    statut: corrige

  - id: L32
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      « aucun job ingéré (1 → 1) » alors que le lineage est présent.
    cause: >-
      Le prédicat exigeait un delta ; le run est idempotent (namespace conservé).
    correctif: >-
      `classify_marquez_ingest` teste la présence (`after >= 1`) + bats à jour.
    statut: corrige

  - id: L33
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      « RGW datalake pas Ready » alors que les 3 pods sont 2/2 Running.
    cause: >-
      Le gate datalake testait `readyReplicas == 1`, or le CephObjectStore a
      `instances: 3`.
    correctif: >-
      Gate `>= 1` (au moins une instance up).
    statut: corrige

  # ── storageClass + S3 / monitoring (#158/#186) — L34–L40 ──────────────────
  - id: L34
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      CRDs monitoring rejetées par le module k8s.
    cause: >-
      L'enum « - = » non quoté est rejeté par le SafeLoader PyYAML (tag
      `yaml.org,2002:value`) ; kubectl (Go) les charge.
    correctif: >-
      Appliquer ces CRDs via `kubectl apply --server-side`, pas le module.
    statut: corrige

  - id: L35
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      « no matches for cert-manager.io/v1.Certificate ».
    cause: >-
      Le manifeste monitoring contient des `Certificate`/`Issuer` → cert-manager
      doit exister avant.
    correctif: >-
      `platform-cert-manager` appliqué AVANT monitoring (dans monitoring.yaml).
    statut: corrige

  - id: L36
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      `PrometheusRule` rejetés en masse (HTTP 500 du webhook
      `prometheusrulemutate`).
    cause: >-
      Appliqués avant que l'operator (porteur du webhook d'admission) soit Ready.
    correctif: >-
      Deux passes : stack sauf `PrometheusRule` → attente operator Ready →
      `PrometheusRule`.
    statut: corrige

  - id: L37
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      cert-manager en CrashLoop au démarrage (cause racine de L36).
    cause: >-
      Il tourne avec `--enable-gateway-api` mais les CRDs Gateway API sont
      absentes.
    correctif: >-
      Le rôle `platform-cert-manager` pose lui-même les CRDs Gateway API
      (v1.4.1).
    statut: corrige

  - id: L38
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      Loki en CrashLoop `NoSuchBucket` (compactor), profil RGW uniquement.
    cause: >-
      L'OBC Rook n'expose qu'UN bucket auto-nommé + des creds restreints à ce
      bucket → les buckets nommés `loki-chunks`/`loki-ruler` sont impossibles. Le
      banc léger (creds admin SeaweedFS) masquait la contrainte.
    correctif: >-
      En RGW : résoudre le bucket de l'OBC et l'employer pour chunks ET ruler ;
      init-buckets skippé.
    statut: corrige

  - id: L39
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: harnais
    symptome: >-
      Job init-buckets « prêt » alors que rien n'est créé (profil RGW).
    cause: >-
      Gate faux : le `grep make_bucket` matchait aussi « make_bucket failed ».
    correctif: >-
      Script réécrit (`set -eu`) : échec franc si le bucket n'est ni créé ni
      déjà présent.
    statut: corrige

  - id: L40
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      `platform-prereqs` meurt (EXIT 1) sur banc léger (monitoring sans dataops,
      donc sans namespace registry).
    cause: >-
      `set -e` + `reg_ip=$(kubectl get svc registry …)` : sans le namespace
      `registry`, kubectl sort en 1 → l'assignation tue le script avant le garde
      `[ -z reg_ip ]`. Masqué jusque-là car les runs montaient toujours le
      registry via `dataops`.
    correctif: >-
      `… || true` sur l'assignation (skip propre).
    statut: corrige

  - id: L41
    campagne: 'topologies — DataOps sans Ceph (#158/#186 suite)'
    portee: code
    symptome: >-
      Le déploiement registry (puis CNPG) reste Pending : PVC non lié, pod
      registry 0/1 « Deployment does not have minimum availability ».
    cause: >-
      Le storageClass des PVC (registry, CNPG) était figé sur le profil de la
      phase, sans s'aligner au profil réel du banc — un PVC rook-ceph sur un banc
      local-path (ou l'inverse) reste Pending faute de provisioner.
    correctif: >-
      phase_dataops (run-phases.sh) choisit storageClass + backing S3 selon le
      profil (registry_storage_class / cnpg_storage_class / cnpg_s3_backing /
      cnpg_s3_endpoint), comme phase_monitoring. Le rôle CNPG est par ailleurs
      découplé du RGW via platform-s3-bucket (backing rgw|seaweedfs, ADR 0036).
    statut: corrige

  - id: L42
    campagne: 'topologies — banc single-node (exploratoire)'
    portee: env
    symptome: >-
      Gate « Wait for Dagster webserver and daemon to be Ready » expire alors que
      les pods finissent par devenir Ready peu après.
    cause: >-
      Sur un nœud unique portant tout (k8s + monitoring + CNPG + registry +
      Dagster), le démarrage est plus lent que le timeout du gate, calibré pour
      multi-nœuds.
    correctif: >-
      Aucun (topologie single-node abandonnée — ADR 0040). Consigné pour la
      traçabilité de l'abandon.
    statut: caduc

  - id: L43
    campagne: 'topologies — banc single-node (exploratoire)'
    portee: env
    symptome: >-
      Pods CloudNativePG (pg-1/2/3) évincés : « The node was low on resource:
      ephemeral-storage » ; nœud taint disk-pressure → plus de placement.
    cause: >-
      3 instances pg + build d'images + registry + monitoring sur un seul nœud
      (disque VM 20 Go) saturent l'ephemeral-storage. CNPG ×3 sur 1 nœud n'a de
      toute façon aucun sens (pas de HA mono-nœud).
    correctif: >-
      Aucun (topologie single-node abandonnée — ADR 0040). Aurait exigé CNPG ×1 +
      disque accru ; non représentatif. Consigné pour la traçabilité.
    statut: caduc

  - id: L44
    campagne: 'topologies — DataOps sans Ceph (#158/#186 suite)'
    portee: harnais
    symptome: >-
      Une phase (dataops, monitoring) lancée sans WITH_CEPH=1 sur un banc Ceph
      choisit silencieusement le profil léger (storageClass local-path) → PVC
      Pending sur le banc Ceph, échec en aval.
    cause: >-
      Le profil (léger/Ceph) est porté par la variable d'environnement WITH_CEPH,
      facile à oublier quand on enchaîne les phases à la main. Aucune détection de
      l'état réel du cluster.
    correctif: >-
      À faire (ouvert) : faire que dataops/monitoring DÉTECTENT le profil (présence
      d'un storageClass rook-ceph / du RGW) au lieu de dépendre de WITH_CEPH, ou
      refuser proprement si incohérent. Contournement actuel : passer WITH_CEPH=1
      à toutes les phases d'un banc Ceph.
    statut: ouvert
    issue: '#319' # auto-détection du profil (storageClass réel) (ADR 0058 §6)

  - id: L45
    campagne: 'migration ansible_facts (échéance ansible-core 2.24)'
    portee: code
    symptome: >-
      Au run, `set_fact all_hostnames` échoue : « object of type 'HostVarsVars'
      has no attribute 'ansible_facts.hostname' » (bootstrap k8s-pre-install).
    cause: >-
      La migration ansible_<fact> → ansible_facts.<fact> a transformé
      `map('extract', hostvars, 'ansible_hostname')` en
      `map('extract', hostvars, 'ansible_facts.hostname')` : `extract` attend une
      CLÉ (string plate), pas un chemin pointé — `ansible_facts.hostname` n'existe
      pas comme clé. (Le lint ne le voit pas ; seul le run e2e l'expose, ADR 0034.)
    correctif: >-
      Passer une LISTE de clés pour la descente :
      `map('extract', hostvars, ['ansible_facts', 'hostname'])`. Validé e2e
      (bootstrap vert).
    statut: corrige

  - id: L46
    campagne: 'migration ansible_facts (échéance ansible-core 2.24)'
    portee: harnais
    symptome: >-
      Warnings « discovered Python interpreter could change » persistants malgré
      `interpreter_python = auto_silent` dans bootstrap/ansible.cfg ; et
      `inject_facts_as_vars = False` non appliqué au banc.
    cause: >-
      Le banc lance `ansible-playbook` depuis un CWD ≠ bootstrap/ avec le playbook
      en chemin absolu → Ansible cherche ansible.cfg dans le CWD et ne trouve PAS
      bootstrap/ansible.cfg. La config du dépôt n'était donc jamais chargée par le
      banc (roles_path marchait par chance).
    correctif: >-
      Exporter `ANSIBLE_CONFIG="${REPO}/bootstrap/ansible.cfg"` dans bench/lima/lib.sh
      (couvre toutes les invocations du banc). Validé : warnings disparus, run vert
      sous inject_facts_as_vars=False.
    statut: corrige

  - id: L47
    campagne: 'métrologie du banc (#216/#217/#219)'
    portee: harnais
    symptome: >-
      Échantillonnage Prometheus (#217) toujours `?`, ET le `runs-history.yaml`
      pollué par des lignes ANSI (codes couleur) qui le rendaient invalide.
    cause: >-
      Double piège. (1) `metro_sample_prometheus` interrogeait Prometheus via
      `kubectl exec` dans son pod, mais l'image est DISTROLESS (ni wget ni sh —
      même piège que le drift #14 etcd) → la requête échouait silencieusement.
      (2) La fonction écrit le bloc YAML sur stdout (capturé par l'appelant), or
      ses `log`/`warn` partaient AUSSI sur stdout → ils étaient écrits dans le
      fichier.
    correctif: >-
      Requête via un pod busybox éphémère ciblant le Service `prometheus-operated`
      (pattern de `marquez_job_count`) ; tous les `log`/`warn` routés sur stderr
      (`>&2`). Deux tests bats anti-régression (stdout sans ANSI ; Prometheus
      absent → stdout vide). Métriques réelles obtenues (CPU 272 cœur·s, RAM pic
      7606 MiB).
    statut: corrige

  - id: L48
    campagne: 'socle GitOps Gitea + Argo CD (#230)'
    portee: livrable
    symptome: >-
      `argocd-server` reste 0/1 ; tous les composants Argo CD en
      `CreateContainerConfigError` (« secret "argocd-redis" not found »). Le pod
      `argocd-redis` boucle en `Init:Error` (exit 20).
    cause: >-
      L'initContainer `secret-init` crée le Secret `argocd-redis` via l'API K8s,
      mais la NetworkPolicy préexistante `platform/network-policies/argocd/allow-egress.yaml`
      (`allow-apiserver-egress`) autorisait l'egress apiserver via
      `to.ipBlock 0.0.0.0/0`. Sous Cilium, un `ipBlock` EXCLUT les entités
      réservées (host/kube-apiserver) → apiserver (ClusterIP 10.96.0.1:443 ET
      endpoint :6443) injoignable. Bug LATENT révélé par la 1re mise en service
      d'Argo CD par le banc (avant : kubectl manuel, datapath différent).
    correctif: >-
      Réécrire `allow-apiserver-egress` SANS `to:` (idiome du dépôt pour
      l'apiserver, calque `dagster/allow-apiserver-egress` ; une règle egress
      sans `to` autorise les entités réservées Cilium) + ports 443 et 6443.
      Validé banc : 10.96.0.1:443 joignable, Secret créé, 7 pods Argo CD 1/1.
    statut: corrige

  - id: L49
    campagne: 'socle GitOps Gitea + Argo CD (#230)'
    portee: harnais
    symptome: >-
      Un `run-phases.sh all` relancé sur un socle EN CACHE (#219) consignait dans
      `runs-history.yaml` une entrée présentée comme run complet, mais avec un
      `total_s` tronqué et des `phases` partielles (p. ex. `gitops: 12` seul) —
      fausse preuve qui trompe le garde-fou de fraîcheur (ADR 0042).
    cause: >-
      `record_full_run` était appelé inconditionnellement en fin de `all`, même
      après un cache hit. Or sur cache, up/bootstrap/storage sont sautés → absents
      de `PHASE_DURATIONS` ; seules les phases hors-cache (gitops) y figurent.
    correctif: >-
      Ne consigner que les runs FROM-SCRATCH (flag `socle_built` : 1 seulement si
      la branche else a rejoué up/bootstrap/storage). Run sur cache → message
      explicite, PAS d'entrée. Seul un run from-scratch est une preuve (ADR
      0034/0042 ; NO_CACHE=1 pour forcer). Fausse entrée a855ec8 retirée.
    statut: corrige

  - id: L50
    campagne: "chemins d'installation + scénarios atlas (#237)"
    portee: harnais
    symptome: >-
      `KUBECONFIG=bench/lima/.work/kubeconfig ONLY=… bench/scenarios/run-all.sh`
      (chemin RELATIF) : tous les scénarios échouent ou skippent à tort
      (`connection to localhost:8080 refused`), alors qu'un `kubectl` direct avec
      le même kubeconfig joint bien le cluster.
    cause: >-
      `run-all.sh` fait `cd "$(dirname …)"` (dans bench/scenarios/) au démarrage.
      Un KUBECONFIG en chemin relatif au CWD d'appel devient invalide après ce
      `cd` → kubectl retombe sur le contexte par défaut (localhost:8080).
    correctif: >-
      Résoudre KUBECONFIG en chemin ABSOLU AVANT le `cd` (si défini et relatif).
      Validé : ONLY=24 avec KUBECONFIG relatif passe (Prometheus 22 targets UP).
    statut: corrige

  - id: L51
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      L'Application Argo CD `atlas-workflows` reste InvalidSpecError :
      « application repo http://gitea-http…/atlas/workflows.git is not permitted
      in project 'atlas' », alors que le sourceRepos autorise
      `http://gitea-http…/*`.
    cause: >-
      Le glob `*` d'Argo CD dans sourceRepos ne traverse PAS les `/` : `/*` matche
      `…/atlas` (un segment) mais pas `…/atlas/workflows.git` (deux segments).
    correctif: >-
      sourceRepos `…/**` (double étoile, récursif) dans appproject-atlas.yaml.
      Validé banc : Application acceptée (passe à ComparisonError puis Synced).
    statut: corrige

  - id: L52
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      Application bloquée ComparisonError « dial tcp …:8081 i/o timeout » :
      l'application-controller ne joint pas le repo-server (génération de
      manifeste impossible).
    cause: >-
      Sous default-deny, le bundle Argo CD ouvre l'INGRESS de repo-server/redis
      mais rien n'autorise l'EGRESS des appelants (controller/server) vers
      repo-server:8081 / redis:6379 (trafic INTERNE à argocd).
    correctif: >-
      NetworkPolicy `allow-argocd-internal-egress` (podSelector {} → podSelector
      {} intra-ns, ports 8081/8084/6379/8080/5556/5557) dans allow-egress.yaml.
    statut: corrige

  - id: L53
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      repo-server : « failed to list refs: Get http://gitea-http…/atlas/
      workflows.git/info/refs : context deadline exceeded » — clone du dépôt
      Gitea impossible.
    cause: >-
      DEUX causes cumulées. (1) `allow-reposerver-egress` autorise le port git via
      `to.ipBlock 0.0.0.0/0` ; sous Cilium un ipBlock EXCLUT les IPs des pods du
      cluster (même piège que L48) → Gitea injoignable. (2) Même avec un
      namespaceSelector vers gitea, ouvrir le port 80 (du Service) ne suffit PAS :
      sous Cilium, la NetworkPolicy egress filtre le port du POD de destination
      APRÈS DNAT du Service (gitea écoute 3000, le Service mappe 80→3000) — un
      egress limité à 80 reste bloqué. Symptôme trompeur car un fix appliqué « à
      chaud » lors d'une session antérieure avait paru fonctionner (faux positif).
    correctif: >-
      NetworkPolicy `allow-reposerver-gitea-egress` ciblant le namespace gitea
      par namespaceSelector, ports 3000 (cible réelle du pod après DNAT) ET 80
      (robustesse). Validé banc : repo-server clone, Application Synced/Healthy,
      scénario 27 PASS + 9 scénarios pertinents PASS (10/10).
    statut: corrige

  - id: L54
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: harnais
    symptome: >-
      Le workflow jouet (Job) échoue : OSError/PermissionError Read-only file
      system puis Permission denied sur `/opt/dagster/app/.tmp_dagster_home…` —
      `dagster asset materialize` ne peut pas créer son DAGSTER_HOME temporaire.
    cause: >-
      Le workflow jouet portait un securityContext durci (readOnlyRootFilesystem
      + runAsNonRoot/uid 1000), alors que `dagster asset materialize` écrit dans
      son cwd (/opt/dagster/app, propriété root). L'émetteur de référence
      `dataops_chain_emit_and_verify` tourne SANS securityContext (root) et
      fonctionne.
    correctif: >-
      Aligner le workflow jouet sur l'émetteur de référence : retirer le
      durcissement securityContext (garder drop ALL). Le durcissement global des
      workloads Dagster root relève de #234. Validé : Job Complete + lineage
      Marquez, scénario 27 PASS.
    statut: corrige

  - id: L55
    campagne: 'banc atlas-ceph complet (#232)'
    portee: harnais
    symptome: >-
      En cours de run atlas-ceph (Ceph + dataops complet), des pods sont Evicted
      puis laissés en Error/ContainerStatusUnknown (postgres pg-1/pg-3,
      rook-ceph-rgw-datalake, node-exporter, crashcollector). Kubernetes recrée
      systématiquement un remplaçant Running — la chaîne reste fonctionnelle
      (workflow Completed) — mais les tombstones polluent l'état.
    cause: >-
      Pression ephemeral-storage (PAS la RAM : MemoryPressure=False sur tous les
      nœuds). VM_DISK=20 GiB codé en dur, identique léger et Ceph. Or Ceph+dataops
      empile sur le rootfs : OSD, images applicatives (CNPG, Dagster, Marquez,
      monitoring), logs → le disque éphémère passe sous le seuil kubelet (~2 GiB)
      et déclenche des évictions en cascade. Valeur de disque non dérivée du
      profil (même classe de bug que la RAM hardcodée, ADR 0046).
    correctif: >-
      VM_DISK DÉRIVE du profil (ADR 0046) : 40 GiB en mode Ceph (WITH_CEPH=1),
      20 GiB en léger. Le qcow2 Lima est thin-provisionné → n'occupe le disque
      hôte qu'à l'usage réel. Re-preuve from-scratch atlas-ceph différée → issue
      #251 (ADR 0034). Tombstones du run courant nettoyés (kubectl delete pod
      --field-selector status.phase=Failed).
    statut: corrige

  - id: L56
    campagne: 'portail UI — exposition tout-Cilium (#232, scénario 28)'
    portee: code
    symptome: >-
      Aucune UI joignable via le Gateway. Le Gateway argocd reste PROGRAMMED=Unknown
      « Waiting for controller », la GatewayClass cilium reste Accepted=Unknown, et
      AUCUN Service type=LoadBalancer n'obtient d'IP. Le scénario 28 ne trouve
      qu'une HTTPRoute et ne peut sonder aucune UI.
    cause: >-
      DEUX bugs cumulés. (1) bootstrap/cni.sh arme les FEATURES Cilium
      (gatewayAPI/l2/LB-IPAM via Helm) mais N'APPLIQUE JAMAIS les CRs
      platform/cilium-expo/ (GatewayClass + CiliumLoadBalancerIPPool +
      CiliumL2AnnouncementPolicy) — personne ne les pose. (2) Ordre cassé : l'operator
      Cilium vérifie les CRDs Gateway API UNE FOIS au démarrage (lancé par cni.sh)
      et conclut « Required GatewayAPI resources are not found » ; les CRDs sont
      posées ~7 min plus tard (phase platform-prereqs) → le contrôleur Gateway
      n'est jamais armé, même après apparition des CRDs. Bonus : les CRs de
      platform/cilium-expo/ ciblaient l'ancien banc Vagrant (192.168.67/eth1),
      inadaptés au banc Lima (192.168.104/eth0).
    correctif: >-
      (1) cni.sh applique les CRs inline (heredoc), plage LB-IPAM + interface L2
      paramétrées par env (LB_IPAM_RANGE_START/STOP, L2_INTERFACE) dérivées du
      réseau réel par run-phases.sh (ADR 0023) ; (2) poser les CRDs Gateway API
      AVANT cni.sh (dépendance réelle Gateway-API → Cilium-gateway). Validé À
      CHAUD (HTTP 200 via Gateway, scénario 28 PASS). Re-preuve from-scratch
      différée → issue #251 (ADR 0034/0046).
    statut: en-cours
    issue: '#251' # re-preuve L55/L56 par run atlas-ceph from-scratch (ADR 0058 §6)

  - id: L57
    campagne: 'installation DataOps sur la prod dirqual1-4 (2026-06-22)'
    portee: code
    symptome: >-
      Après l'installation DataOps en prod, les pods Dagster (daemon, webserver)
      restent en ImagePullBackOff : « failed to pull registry:80/dagster-celery-k8s:
      1.13.7 : http: server gave HTTP response to HTTPS client ». L'image existe
      pourtant dans le registry (build/push OK) et un `curl` HTTP vers
      `http://registry:80/v2/` depuis le nœud répond 200 — containerd parle HTTPS
      à un registry HTTP.
    cause: >-
      containerd tournait avec une config PÉRIMÉE. Le rôle platform-registry
      (tasks/node.yaml) écrit la config HTTP du registry (certs.d/hosts.toml +
      use_local_image_pull) et `notify: Restart containerd`, mais le handler n'a
      JAMAIS flushé : le 2026-06-16, la tâche AVALE du même play
      (platform-build-images, qui échouait faute de nerdctl — cf. fix nerdctl-full)
      a fait échouer le play AVANT le flush des handlers (fin de play). Sans
      force_handlers ni flush_handlers explicite, le notify est perdu si une tâche
      ultérieure échoue → containerd a tourné 6 jours sur l'ancienne config
      (constaté : actif depuis le 11/06, config réécrite le 16/06).
    correctif: >-
      Deux parades (ADR 0046/0051, pattern etcd-backup) dans dataops.yaml ET
      mlflow.yaml : (1) `meta: flush_handlers` juste après le rôle registry-node
      → containerd relit sa config AVANT le build/push d'images (qui pousse en
      HTTP) ; (2) `force_handlers: true` au play → le restart joue même si une
      tâche aval échoue (le filet qui manquait le 16/06). Diagnostic à chaud :
      `systemctl restart containerd` sur dirqual1 → pull OK, Dagster Running
      (les autres nœuds recyclés par le reboot de l'os-upgrade). Preuve
      from-scratch prod différée (la prod n'est pas détruite, ADR 0034).
    statut: corrige

  - id: L58
    campagne: 'installation DataOps sur la prod dirqual1-4 (2026-06-22)'
    portee: code
    symptome: >-
      Un client DANS un pod n'atteint pas un service par son FQDN complet
      `<svc>.<ns>.svc.cluster.local` alors que le service est sain et joignable par
      nom court ou par IP. Deux cas vécus : (1) gitea-init `curl` vers
      `gitea-http.gitea.svc.cluster.local` → « Could not resolve host (timeout DNS) » ;
      (2) Dagster workspace pointant `toy-codeloc.dagster.svc.cluster.local` →
      « DagsterUserCodeUnreachableError: gRPC UNAVAILABLE » (pod gRPC pourtant
      ready/0 restart, TCP 4000 ouvert). `DagsterGrpcClient.ping` OK par nom court/IP.
    cause: >-
      Le `resolv.conf` des pods prod porte un search domain EXTERNE de l'organisation
      (ex. `dix.univ-lehavre.fr`) en plus des `*.svc.cluster.local`, avec `ndots:5`.
      Un FQDN à 4 points (< 5) est traité comme RELATIF → glibc/c-ares essaie les
      search domains, dont l'externe qui TIMEOUTE, avant la bonne résolution. c-ares
      (gRPC) et glibc (curl) échouent là où nslookup/`socket.gethostbyname` peuvent
      réussir (diagnostic trompeur). Le banc Lima n'a pas ce search domain externe →
      le FQDN y marche, le bug ne s'y voit pas (drift de PROD pur).
    correctif: >-
      Viser le NOM COURT intra-pod : `<svc>` (même ns) ou `<svc>.<ns>` (cross-ns),
      qui résout via le 1er search domain. Fixes : gitea-init `GITEA_API=localhost:3000`
      (le curl tourne dans le pod gitea) ; workspace Dagster `host: toy-codeloc`
      (univ-lehavre/cluster#458) ; atlas/citation-dagster idem (workspace-patch +
      code-location + definitions._RUN_ENV, univ-lehavre/atlas#428). Documenté dans
      `contract/endpoints.example.yaml` (en-tête) et `docs/guide-dev-data.md`. Pas de
      nouvel ADR (résolution intra-pod, non couverte par 0019/0020/0021 exposition bordure).
    statut: corrige

  # ── Refonte nestor moteur Python (#511) — runs --engine=python banc Lima
  #    from-scratch (2026-06-26/29) — L59–L65 ; Yunix containerd 2.3.x = L66 ──
  - id: L59
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      La phase `monitoring` cassait l'idempotence — 1 tâche `changed` au rejeu
      (« Apply monitoring CRDs (server-side, via kubectl) »).
    cause: >-
      La tâche avait `changed_when: true` → TOUJOURS `changed` même quand
      `kubectl apply --server-side` ne modifie rien (ADR 0051).
    correctif: >-
      `changed_when` dérivé de la sortie réelle de kubectl apply (changed = au
      moins une ligne sans suffixe « unchanged »). Bug isolé : les autres
      `changed_when: true` du bootstrap (build d'image `force_rebuild`, `creates:`,
      postconf) sont légitimes. Commit 7bf2498.
    statut: corrige

  - id: L60
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      Le seed gitops (gitea-init porté en Python) échouait sur tous ses gestes —
      admin/token KO, « Incorrect Usage: flag provided but not defined:
      -request-timeout ».
    cause: >-
      `_kubectl` ajoutait `--request-timeout=5s` EN FIN d'argv. Pour un
      `kubectl exec pod -- gitea …`, le flag GLOBAL atterrissait APRÈS le `--` →
      passé à la commande du conteneur (gitea), pas à kubectl. RACINE de la
      chaîne d'échecs du seed.
    correctif: >-
      Le flag global précède la sous-commande :
      `['kubectl','--request-timeout=5s',*args]`. Prouvé au banc (admin
      idempotent, token généré). Commit b288a62.
    statut: corrige

  - id: L61
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      Le seed reportait SUCCÈS (faux-vert) sur des étapes en échec réel — admin
      avalait tout échec de création, org-repo/webhook retournaient `True` sans
      lire le code HTTP. Masquait la cause d'un échec 2 étapes plus loin.
    cause: >-
      `admin()` faisait `return True` inconditionnel après `gitea admin user
      create` (avalait TOUT, pas seulement « already exists ») ; `org_repo()` et
      `webhook()` ignoraient le code HTTP de l'appel API.
    correctif: >-
      admin distingue créé / « already exists » (idempotent) / vrai échec ;
      `_seed_api_ok` valide le code (2xx/409/422 ok, 401/5xx/vide = échec).
      Trouvé par audit adversarial. Commits 91c212f, 0486a3c.
    statut: corrige

  - id: L62
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      Le seed tentait de créer l'admin Gitea alors que le pod gitea démarrait
      encore → création KO → token KO ensuite.
    cause: >-
      Le câblage seed Python n'attendait pas Gitea/Argo CD Ready avant les gestes
      (alors que run-phases.sh:1082-1085 fait `rollout status` des deux).
    correctif: >-
      Gate `rollout status deploy/gitea` + `deploy/argocd-server` AVANT le moindre
      geste mutant du seed (ADR 0046). Commit 83c520c.
    statut: corrige

  - id: L63
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      En montage from-scratch, la phase `storage-simple` (play localhost, module
      k8s) échouait : « Connection to 10.67.2.11:6443 timed out » — l'IP INTERNE
      de la VM Lima (user-v2, non routable depuis l'hôte).
    cause: >-
      Le moteur Python passait `kubeconfig=os.environ.get('KUBECONFIG')`, VIDE en
      from-scratch (le banc n'existe pas au démarrage de `nestor up`). Sans
      KUBECONFIG, le module k8s tapait l'IP interne de l'inventaire au lieu du
      forward 127.0.0.1.
    correctif: >-
      Repli sur `ctx.kubeconfig_local` (kubeconfig banc rapatrié par bootstrap,
      server 127.0.0.1:6443) quand l'env est vide. Bug visible UNIQUEMENT en
      from-scratch (masqué quand le banc préexiste). Commit 4db9d70.
    statut: corrige

  - id: L64
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      Après `run-phases.sh down`, `nestor up --engine=python` était REFUSÉ par la
      garde d'isolation (« kubeconfig du banc absent »).
    cause: >-
      `_assert_bench_target` exigeait un kubeconfig de banc existant — paradoxe :
      `up` est précisément la commande qui CRÉE le banc (le from-scratch part de
      rien).
    correctif: >-
      La garde reçoit la topo ; si elle déclare `target_kind: lima` (=
      EXPECTED_TARGET_KIND=lima du bash), c'est le signal sûr pour `up`
      from-scratch. Une topo prod reste sous garde stricte. Commit f390a59.
    statut: corrige

  - id: L65
    campagne: 'refonte nestor — moteur Python (#511), runs --engine=python au banc Lima from-scratch (2026-06-26/29)'
    portee: code
    symptome: >-
      La phase `portal` (et potentiellement mlflow) échouait sur « idempotence
      cassée : 2 tâches changed au rejeu » via le moteur Python, alors que le bash
      montait portal sans erreur.
    cause: >-
      portal/mlflow buildent une image à TAG MUTABLE (`force_rebuild: true`) →
      rebuild VOULU à chaque rejeu, donc `changed` légitime. Le moteur Python
      appliquait un double-passage `changed=0` (`launch_phase_idempotent`) à TOUTES
      les phases ; le bash run-phases.sh lance 1× + gate sans ce check.
    correctif: >-
      Le moteur lance 1 passage + gate (parité bash). L'idempotence se prouve par
      le rejeu du CHEMIN entier (`nestor up` 2× → « rien à appliquer », ADR 0052),
      pas par phase. Commits 4ea58dd, 7b5fb43.
    statut: corrige

  - id: L66
    campagne: 'containerd 2.3.x bundlé par nerdctl-full — banc Lima (sous charge, montage dataops)'
    portee: env
    symptome: >-
      Au banc Lima, sous charge (montage dataops, au moment d'attendre le dagster
      webserver), ~13 % des nouveaux pods restent bloqués en ContainerCreating/Init :
      « FailedCreatePodSandBox: failed to start shim: failed to create TTRPC
      connection: unsupported protocol: \b\x03\x12Yunix:// » (octets protobuf
      parasites devant ce qui devrait être « unix:// »). NON lié au reboot (hypothèse
      initiale fausse : VM bootée bien avant le montage, containerd n'avait pas
      redémarré) — survient à la NÉGOCIATION de nouveaux shims.
    cause: >-
      Cause racine PROUVÉE (et non l'abstract→normal socket supposé d'abord) : le
      containerd qui sert de runtime k8s n'est PAS le paquet apt containerd.io —
      c'est celui que `nerdctl-full` (rôle platform-build-images) embarque, extrait
      dans /usr/local/ et dont il pose le service systemd
      (/usr/local/lib/systemd/system/containerd.service), masquant le paquet apt.
      nerdctl-full 2.3.3 embarque containerd 2.3.2, dont le nouveau protocole
      `BootstrapParams` du shim (introduit en 2.3) partage stdout/stderr : si runc
      écrit sur stderr au démarrage, les octets POLLUENT l'adresse socket que
      containerd parse → « Yunix ». Bug de code upstream, PAS réglable par config.toml.
    correctif: >-
      nerdctl_version 2.3.3 → 2.2.2 (embarque containerd 2.2.1, antérieur au protocole
      BootstrapParams, sans le bug) + ses 2 checksums (platform-build-images/defaults).
      PROUVÉ au banc (ADR 0034) : containerd 2.2.1 installé, pods Dagster recréés →
      Running en ~20 s SANS restart manuel, aucune erreur Yunix. Palliatif manuel
      (restart containerd + delete pod --force) plus requis. La piste « restart/drop-in
      post-bootstrap » était fausse (le bug est au montage à chaud, pas au reboot).
      À rebumper vers 2.3.x quand containerd corrige le partage stdout/stderr du shim.
    statut: corrige
    issue: '#513' # corrigé : nerdctl-full 2.2.2 (containerd 2.2.1), prouvé au banc

  # ── Drifts antérieurs à la refonte (postérieurs à L58, d'avant les runs
  #    --engine=python) jamais consignés — L67–L72 ──────────────────────────
  - id: L67
    campagne: 'installation portail (ADR 0092) — banc Lima (2026-06-23)'
    portee: code
    symptome: >-
      Après un rebuild de l'image portail (tag mutable `:dev`), un rollout ne
      tirait jamais la nouvelle image : login/scheme absents après rebuild
      (constaté dirqual) — l'ancienne image restait servie depuis le cache nœud.
    cause: >-
      Le tag `:dev` est mutable (le code/contrat embarqué évolue) mais
      `imagePullPolicy` était à `IfNotPresent` (défaut k8s hors `:latest`), qui
      garde l'image en cache → containerd ne re-tire pas le tag mutable.
    correctif: >-
      `imagePullPolicy: Always` dans `platform/portal/portal.yaml` → re-tire
      l'image à chaque rollout. Commit cb50fd1.
    statut: corrige

  - id: L68
    campagne: 'portail — banc Lima (2026-06-22)'
    portee: code
    symptome: >-
      Preuve banc : TOUS les services déployés ressortaient en DRIFT (present
      mais not ready) alors qu'ils tournent — verdict du portail faux partout.
    cause: >-
      `_endpoints_ready` utilisait le client bas niveau
      `core_v1.api_client.call_api` (params query_params/response_type), qui
      LEVAIT une ApiException silencieusement catchée → `ready=False` partout.
    correctif: >-
      Lecture via le client TYPÉ `DiscoveryV1Api.list_namespaced_endpoint_slice`
      (label_selector `kubernetes.io/service-name`) ; `_apis` renvoie 3 clients
      (Core, Discovery, Custom). Re-déployé au banc : 16 MATCH, 2 MISSING
      (s3-ceph local-path + dashboard non déployé), 1 DRIFT — verdicts conformes
      à l'état réel. Commit eda9ae8.
    statut: corrige

  - id: L69
    campagne: 'portail — banc Lima (2026-06-23)'
    portee: code
    symptome: >-
      Le portail rendait DRIFT pour les UI vendored et n'affichait aucun lien
      vers elles.
    cause: >-
      Il observait le Service du contrat (ClusterIP sans nodePort) ; l'exposition
      L4 passe par un Service séparé `<svc>-nodeport` que le portail ignorait.
    correctif: >-
      Observer aussi `<svc>-nodeport` (le Service d'exposition séparé) ;
      `login_for()` affiche l'IDENTIFIANT à côté de la commande mot de passe ;
      scheme `https` pour les UI qui terminent le TLS (dashboard Ceph). Commit
      ab7f47f.
    statut: corrige

  - id: L70
    campagne: 'audit prod dirqual — etcd backup (2026-06-24)'
    portee: code
    symptome: >-
      Le rendu du template etcd-snapshot échouait : « Syntax error in template:
      unexpected char » — révélant que l'etcd backup n'avait JAMAIS été actif sur
      dirqual (rôle etcd-backup encore jamais joué, cf. bench/RESULTS.md:54).
    cause: >-
      Un commentaire shellcheck (ligne KEEP) contenait `{{ … }}` : Jinja tentait
      d'évaluer l'expression au rendu du template. Bug latent introduit par le fix
      CI 33cf7ec (SC1083), jamais exercé car le rôle n'avait jamais tourné.
    correctif: >-
      Reformuler le commentaire sans accolades Jinja. Le rendu réussit (snapshot
      etcd 63 Mo produit sur control-plane). Commit 23f6aed.
    statut: corrige

  - id: L71
    campagne: 'audit prod dirqual — CoreDNS SPOF (#487, 2026-06-25)'
    portee: code
    symptome: >-
      Le durcissement de l'anti-affinité CoreDNS échouait : le module
      `kubernetes.core.k8s` ne s'exécutait pas sur le control-plane (le rôle
      `k8s-initialization` y tourne en become/sudo car kubeadm init l'exige).
    cause: >-
      La lib Python `kubernetes` est absente du nœud (provisionnée uniquement dans
      le `.venv` du contrôleur, cf. metrics-server.yaml) → le module k8s ne peut
      pas tourner SUR le control-plane.
    correctif: >-
      S'aligner sur les autres opérations k8s du rôle (taint, label) :
      `kubectl patch --type=strategic` avec le kubeconfig local du nœud,
      idempotent (no-op « no change » si déjà en place). Commit fa17a5c.
    statut: corrige

  - id: L72
    campagne: 'chaîne MLOps mono-nœud — banc Lima (2026-06-23)'
    portee: env
    symptome: >-
      La chaîne MLOps complète (monitoring + argocd + gitea + cnpg + registry +
      dagster + mlflow) sur un nœud `banc.yaml` saturait 8 GiO : dagster-daemon
      restait Pending / ProgressDeadlineExceeded (limits memory > 88 %, mesuré).
    cause: >-
      `VM_MEMORY` par défaut à 8 GiO insuffisant pour la charge applicative
      empilée sur un seul nœud (c'est la charge applicative qui dimensionne, pas
      Ceph vs local-path).
    correctif: >-
      `vm_memory_default` porté à 12 GiO (run-phases.sh), indépendant de
      WITH_CEPH (les deux backends en ont besoin). Commit ad08529.
    statut: corrige

  - id: L73
    campagne: 'incident prod dirqual1 — gel du control-plane (inotify, 2026-07-05)'
    portee: livrable
    symptome: >-
      dirqual1 (control-plane UNIQUE) devient non-réactif : l'apiserver et sshd
      stallent, le nœud répond au ping mais gèle tout le userspace → le cluster
      entier est figé jusqu'au reboot manuel. Le lint ne voyait rien ; seul le
      fonctionnement réel a révélé l'écart (198 erreurs « too many open files »
      accumulées depuis le 22 juin). Mes deux premières hypothèses (I/O du
      bootstrap, OOM mlflow) étaient FAUSSES — réfutées par les logs kernel
      (audit docs/audit/2026-07-05-incident-inotify-et-risques-ha-a-chaud.md §1).
    cause: >-
      `fs.inotify.max_user_instances = 128` — le DÉFAUT Linux, jamais relevé
      (aucun tuning inotify dans bootstrap/). containerd, buildkitd, kubelet et
      l'apiserver ouvrent chacun des instances inotify ; sous saturation ils
      échouent en `failed to create inotify fd: too many open files`. À l'épuisement,
      containerd ne crée plus d'inotify fd → `context deadline exceeded`,
      `ttrpc inactive stream` → il ne gère plus les conteneurs → apiserver et sshd
      (sous ce containerd) deviennent injoignables. Défaut UNIVERSEL : tout nœud
      k8s monté par ce code en héritait (d'où la portée livrable). La HA du
      control-plane n'aurait PAS empêché l'incident (bug node), seulement masqué
      le symptôme en important un risque pire (audit §3, verdict « attendre le
      rebuild »).
    correctif: >-
      Relever `fs.inotify.max_user_instances` 128 → 8192 (+ `max_user_watches`
      figé à 1048576 pour la reproductibilité, ADR 0052) en sysctl node-level
      dans `bootstrap/roles/k8s-CRI-install/tasks/main.yaml` (à côté du tuning
      ip_forward), persistant aux reboots, sur les 4 nœuds ; + une assertion de
      vérif (`sysctl --values fs.inotify.max_user_instances >= 8192`) calquée sur
      celle d'ip_forward — un run échoue bruyamment si la valeur retombe. Audit
      #586, fix #587. PROUVÉ sur prod (2026-07-05) : `nestor ansible cri.yaml`
      failed=0 sur les 4 nœuds, `max_user_instances=8192` vérifié runtime + persisté
      dans /etc/sysctl.d/k8s.conf, cluster resté sain (Ceph HEALTH_OK, 4 nœuds
      Ready) après le restart containerd induit.
    statut: corrige

  - id: L74
    campagne: 'aval citation — 1er ge_raw_contract sur datalake COMPLET (prod, 2026-07-05)'
    portee: livrable
    symptome: >-
      Après une ingestion COMPLÈTE réussie (raw_snapshot STEP_SUCCESS en 3h34m,
      691 GiB / 261k objets vérifiés dans le pool datalake), le contrat qualité
      ge_raw_contract échoue en DuckDB « Could not resolve hostname » sur un HTTP HEAD
      vers l'endpoint RGW rook-ceph-rgw-datalake.rook-ceph:80 (fichier part_0949.gz) —
      alors que rclone venait de résoudre LE MÊME endpoint 3h34m sans erreur. Invisible
      au lint et au banc (SeaweedFS host seaweedfs, sans domaine → pas de search-list).
      Ne se déclenche qu'au VOLUME (datalake complet), pas sur l'échantillon →
      raffinement de L58 (qui couvrait « ne résout pas du tout » ; ici « résout, mais
      sature sous charge »).
    cause: >-
      Amplification `ndots:5` × HEAD-par-fichier. Le fix #550 (L58) a raccourci
      l'endpoint DuckDB au nom court ns-qualifié `rook-ceph-rgw-datalake.rook-ceph`
      (1 point < ndots:5) → glibc `getaddrinfo` le traite comme RELATIF et parcourt
      TOUTE la search-list (dont les domaines EXTERNES du resolv.conf,
      `tahr-boga.ts.net`/`dix.univ-lehavre.fr`) AVANT la forme absolue = 5-6 lookups
      par résolution. Or `ge_raw_contract` (DuckDB httpfs = cpp-httplib →
      `getaddrinfo` glibc, PAS c-ares — vérifié à la source) fait un HTTP HEAD PAR
      FICHIER sur des milliers de `part_*.gz`, chacun ouvrant un client neuf → un
      `getaddrinfo` neuf. L'ampli ×5-6 sature le DNS → `EAI_AGAIN` transitoires
      (« Could not resolve hostname »), intermittents (l'erreur tombe sur part_0949,
      loin dans le glob). rclone RÉUTILISE ses connexions (keep-alive) → peu de
      lookups → n'était pas touché (d'où le succès de l'ingestion sur le même nom).
      Diagnostic : workflow adversarial (4 hypothèses + synthèse, source primaire
      cpp-httplib). Mes tests DuckDB glob sur le pod de prod l'ont OOM-killé 2× —
      arrêtés ; le comptage réel via `ceph df` (261k objets) a démenti le
      `list_objects_v2` boto (2446, tronqué par l'index RGW — cf. L75).
    correctif: >-
      REQUALIFIÉ (honnêteté ADR 0052) : le 1er correctif `dnsConfig ndots:1` (atlas#551,
      constante `_DNS_NDOTS_1` sur les pods de run) a été DÉPLOYÉ mais s'est révélé
      INSUFFISANT — ge_raw_contract a re-échoué au même endroit. Mesure décisive : le DNS
      résout parfaitement (300/300 séquentiels, 500/500 concurrents depuis un pod) → le
      `ndots` n'était PAS le goulot. La VRAIE cause est un contrat GE non-scalable (cf.
      L76) : « Could not resolve hostname » était un timeout HTTP déguisé par httpfs. Le
      ndots:1 est GARDÉ (optimisation DNS légitime, pas nuisible) mais requalifié : ce
      n'est pas LE fix. Le vrai correctif est l'échantillonnage du brut (L76, atlas#552).
      Audit docs/audit/2026-07-06-ge-raw-contract-vrai-diagnostic-contrat-non-scalable.md.
    statut: corrige

  - id: L75
    campagne: 'aval citation — diagnostic ge_raw_contract (prod, 2026-07-05)'
    portee: harnais
    symptome: >-
      Pendant le diagnostic de L74, `boto3 list_objects_v2` sur le bucket datalake
      renvoyait ~2446 objets pour `raw/works/` (identique à l'échantillon d'avant) —
      laissant croire que l'ingestion complète de 3h34m N'AVAIT RIEN produit. Piège
      de diagnostic : le sous-comptage aurait pu faire conclure à tort « ingestion
      ratée » et relancer inutilement (ou chercher un faux bug), alors que les
      données étaient bien là.
    cause: >-
      Index bucket RGW incohérent après une écriture massive (261k objets) : le
      listing S3 (`list_objects_v2`, qui lit l'index) SOUS-COMPTE, tandis que les
      données réelles sont intactes dans le pool. Même famille que l'artefact
      d'index déjà vu (radosgw-admin bucket stats renvoyant vide/2002). Le lint ne
      voit rien ; seul le croisement de deux sondes au run révèle l'écart.
    correctif: >-
      Ne PAS faire confiance au `list_objects_v2` / `radosgw-admin bucket stats`
      pour juger le volume réel après une grosse ingestion : croiser avec
      `ceph df` (pool `datalake.rgw.buckets.data` : STORED + OBJECTS) qui, lui, ne
      ment pas (691 GiB / 261k objets confirmés). Règle de méthode consignée (le
      réel = le pool, pas l'index). Pas de fix CODE : c'est une garde de diagnostic
      (le harnais de sonde doit préférer ceph df au list pour le volume).
    statut: corrige

  - id: L76
    campagne: 'aval citation — ge_raw_contract non-scalable au datalake complet (prod, 2026-07-05/06)'
    portee: livrable
    symptome: >-
      La VRAIE cause de L74 : le contrat qualité `ge_raw_contract` (asset check BLOQUANT)
      échoue déterministe à ~73s sur le datalake complet, même APRÈS le fix ndots (L74). Le
      message « Could not resolve hostname » n'est PAS un bug DNS (DNS prouvé OK, 300/300 +
      500/500) : c'est un timeout HTTP S3 déguisé par httpfs. Invisible tant que le datalake
      était échantillonné (2446 petits fichiers) ; casse au datalake complet. Deux fausses
      pistes traversées avant le vrai diagnostic (ndots, puis OOM de MES pods de test — le
      pod de run réel n'a pas de limite mémoire et n'a PAS OOM).
    cause: >-
      `check_raw` (quality.py) matérialisait en pandas (.df()) l'INTÉGRALITÉ du brut via
      read_json_auto('raw/works/**/*.gz'). Sur 261k fichiers .gz OpenAlex (~150-290k works
      chacun au JSON très imbriqué), c'est intraitable : read_json_auto INFÈRE et parse le
      schéma JSON complet de chaque work (abstract_inverted_index…) — mesuré 10-19 s PAR
      fichier. Le run gèle, httpfs déguise le timeout en erreur DNS. Défaut de conception :
      une porte bloquante ne doit JAMAIS lire l'intégralité d'un lac de 691 GiB. Seul
      check_raw touché (les autres check_* lisent le Parquet du run={run_id} courant, bornés).
    correctif: >-
      Échantillonner le brut (contrat de FORME, pas audit exhaustif) : `_sample_raw_files`
      liste les clés via glob() (1 LIST S3) puis prend un échantillon DÉTERMINISTE et RÉPARTI
      (files[::step], couvre toutes les partitions), lu par read_json avec `columns={}`
      EXPLICITES (pas read_json_auto → DuckDB ne parse plus le JSON imbriqué, cf. L77) +
      réglages HTTP (keep-alive/timeout/retries). Défaut N=4 fichiers/entité
      (CITATION_GE_RAW_SAMPLE_FILES). atlas#552. PROUVÉ E2E sur prod : ingestion_job
      RUN_SUCCESS, ge_raw_contract STEP_SUCCESS en 1m9s, 0 « resolve hostname », 0 OOM.
    statut: corrige

  - id: L77
    campagne: 'aval citation — read_json_auto OOM sur le brut OpenAlex (prod, 2026-07-06)'
    portee: livrable
    symptome: >-
      En corrigeant L76, découverte qu'un échantillon de SEULEMENT 4-8 fichiers .gz works
      faisait encore OOM (« Out of Memory Error » DuckDB) — l'échantillonnage du NOMBRE de
      fichiers ne suffisait pas. Le facteur mémoire est le PARSING, pas le nombre de fichiers.
    cause: >-
      read_json_auto INFÈRE le schéma JSON COMPLET de chaque work OpenAlex, dont des champs
      lourds non validés (abstract_inverted_index = MAP imbriquée, ~200k works/fichier) →
      matérialisation mémoire massive avant même la projection. `.df()` puis pandas amplifie.
    correctif: >-
      read_json avec `columns={'id':'VARCHAR','referenced_works':'JSON','authorships':'JSON'}`
      EXPLICITES au lieu de read_json_auto : DuckDB ne lit et ne type QUE les 3 colonnes
      validées (referenced_works/authorships en JSON opaque, non matérialisé), sans inférer ni
      parser le reste. Levier DÉCISIF du fix L76 (sans lui, même 4 fichiers OOM). Mesuré :
      works 725k lignes/41s + authors 751k/19s sans OOM. atlas#552.
    statut: corrige

  - id: L78
    campagne: 'refonte scalable citation — bascule Parquet + Dask écarté (2026-07-06)'
    portee: livrable
    symptome: >-
      Les fixes L76/L77 (échantillonnage + columns= explicites) rendaient le CONTRAT GE
      scalable, mais le TRANSFORM au datalake complet OOM-ait toujours : matérialiser tout
      OpenAlex (250M+ works) avant de filtrer EUNICoast dépasse la RAM. Piste envisagée :
      passer le filtre à Dask (out-of-core distribué) plutôt qu'à DuckDB.
    cause: >-
      Deux causes-racines. (1) Le JSON de forme (.gz) impose read_json_auto qui parse le work
      entier (drift L77) ; le columns= n'était qu'un pansement. (2) Dask, étudié comme moteur
      alternatif, ne sait PAS lire un seul sous-champ imbriqué (authorships[].institutions[].ror)
      — il charge la colonne authorships ENTIÈRE puis l'aplatit en objets Python (10-30× la
      taille disque), et son filtre par métadonnées est bogué sur les colonnes imbriquées OpenAlex.
    correctif: >-
      Abandon du JSON de forme au profit du PARQUET colonnaire OpenAlex (data/parquet/works) :
      lecture par colonne, projection stricte (jamais abstract_inverted_index/referenced_works).
      Filtre EUNICoast déplacé dans un asset Python `mart_eunicoast` qui traite le lac PAR LOTS
      homogènes (cumul num_rows du footer Parquet) → mémoire bornée par lot, plus par les 250M
      works. Moteur = DuckDB (unnest de structs, list_has_any sur les 14 ROR) — Dask écarté (cf.
      cause 2). ADR atlas 0094. Résout L76/L77 à la RACINE (plus de parse JSON). Prouvé banc :
      uplift non vide sur fixtures ; prod-intégration à venir (ADR 0104).
    statut: corrige

  - id: L79
    campagne: 'preuve prod citation Parquet — build node-side (2026-07-06)'
    portee: livrable
    symptome: >-
      Au 1er build node-side du refactoring (ADR atlas 0094) sur prod, `dbt parse` échoue :
      « Model stg_citation_authors depends on a source citation_raw.authors which was not
      found ». Or ce modèle a bien été SUPPRIMÉ par la refonte co-autorat — il n'existe plus
      dans le dépôt. Le banc ne le voyait pas (manifest dbt en cache ; build from-scratch seul
      révèle le full parse).
    cause: >-
      Le play de build (bootstrap/citation.yaml puis code-location-build.yaml) réplique le
      projet dbt node-side via `rsync` SANS `--delete`. Le workdir `/tmp/dataops-build/…`
      PERSISTE entre builds de révisions différentes → un modèle retiré dans la nouvelle
      révision (stg_citation_authors) subsiste en ORPHELIN dans le workdir et est vu par dbt parse.
    correctif: >-
      `delete: true` sur `ansible.posix.synchronize` (le workdir reflète EXACTEMENT la source ;
      exclusions logs/target/pycache protégées, `--delete-excluded` non posé). Appliqué à
      citation.yaml PUIS au play générique code-location-build.yaml (cluster#600). Build prod
      VERT ensuite.
    statut: corrige

  - id: L80
    campagne: 'preuve prod citation Parquet — build node-side (2026-07-06)'
    portee: livrable
    symptome: >-
      Le build mediawatch via le play GÉNÉRIQUE code-location-build.yaml échoue : « Could not
      find or access .../mediawatch-dagster/scripts/ ». Le play copiait `src` ET `scripts` en
      dur, mais `scripts/` est propre à citation (fetch_model.py/ONNX) ; mediawatch v1 n'en a pas.
    cause: >-
      Le play « générique » (paramétré par code_location) copiait une liste de dossiers FIXE
      (src + scripts) sans vérifier leur existence — hérité du cas citation, donc pas vraiment
      générique pour une code-location au périmètre différent.
    correctif: >-
      `ansible.builtin.stat` sur les dossiers candidats + boucle filtrée `selectattr("stat.exists")`
      → on ne copie que les dossiers PRÉSENTS. Le play devient vraiment générique (cluster#600).
      Dette : citation.yaml duplique le play générique — à fusionner.
    statut: corrige

  - id: L81
    campagne: 'preuve prod citation Parquet — build node-side (2026-07-06)'
    portee: livrable
    symptome: >-
      Le pod gRPC citation CRASHE au démarrage (CrashLoopBackOff) : « Detected incompatible
      Protobuf Gencode/Runtime versions … gencode 7.35.0 runtime 6.33.6 ». L'ancienne image
      (même lock, même protobuf 6.33.6) démarrait pourtant. Idem mediawatch (bug jumeau).
    cause: >-
      Le Dockerfile faisait `uv pip install .` qui RÉSOUT À NEUF depuis pyproject et IGNORE
      uv.lock (le commentaire prétendait « reproductible via uv.lock » — faux). Une transitive
      non épinglée (grpcio-health-checking) a floté 1.81→1.82, dont le gencode protobuf 7.35.0
      exige un runtime ≥7.x, incompatible avec le 6.33.6 du lock.
    correctif: >-
      Installer les deps EXACTES du lock (`uv export --frozen --no-dev` → requirements) PUIS le
      paquet `--no-deps`. Le build reflète uv.lock, pas la résolution du jour ; build REPRODUCTIBLE
      (même SHA source → même digest). atlas#560-suite (citation) + atlas#562 (mediawatch).
    statut: corrige

  - id: L82
    campagne: 'preuve prod citation Parquet — déploiement GitOps (2026-07-06)'
    portee: livrable
    symptome: >-
      Après un seed manuel poussant une image saine, le pod citation RE-CRASHE : Argo redéploie
      un digest CASSÉ (protobuf) à chaque push. Impossible de stabiliser le déploiement.
    cause: >-
      DEUX causes conjuguées. (1) La topo pointait un SHA atlas (e3a84575) ANTÉRIEUR au merge du
      fix Dockerfile → toute image buildée de ce SHA est cassée. (2) La chaîne eventful
      (eventsource gitea-push + sensor code-location-build) rebuild à chaque push et re-pousse
      le digest cassé, écrasant le seed manuel (App-of-Apps + selfHeal Argo propagent).
    correctif: >-
      Pointer la topo sur le SHA main À JOUR (7dbe0bfb, fixes mergés). Le build étant désormais
      REPRODUCTIBLE (L81), l'eventful rebuild le MÊME code sain → récidive structurellement
      impossible. Déploiement stable (pod Ready, Argo Synced/Healthy). Enseignement : ne jamais
      épingler un SHA périmé ; le digest et la revision doivent être cohérents avec main.
    statut: corrige

  - id: L83
    campagne: 'preuve prod citation Parquet — run ingestion (2026-07-06)'
    portee: livrable
    symptome: >-
      Le run ingestion_job OOMKill le pod SUR l'étape ge_raw_contract (pas sur le mart). Le
      contrat GE consommait 12,9 GiB puis dépassait 28Gi sur un échantillon de 4 fichiers.
    cause: >-
      check_raw faisait `SELECT id, publication_year, title, authorships, topics … .df()` :
      matérialiser authorships/topics (structs lourds : dizaines d'auteurs × institutions,
      hiérarchie topics) en pandas explose la RAM sur des fichiers récents (~360k works). MÊME
      piège que L77 (colonnes imbriquées lourdes) mais côté contrôle qualité, pas le mart.
    correctif: >-
      Découpler : EXISTENCE des colonnes via le SCHÉMA (`DESCRIBE`, aucune donnée) + VALEURS
      (not_null/regex/row_count) sur la SEULE colonne id (VARCHAR léger). raw_works_expectations
      ne porte plus que id. atlas#560. Prouvé prod : ge_raw_contract PASS en 7s sur le lac COMPLET
      (2446 fichiers, 510M works), 1,1 GiB.
    statut: corrige

  - id: L84
    campagne: 'preuve prod citation Parquet — bootstrap complet (2026-07-06)'
    portee: harnais
    symptome: >-
      Après le pré-vol (1 partition), l'ingestion COMPLÈTE non bornée ne rapatriait quasi rien :
      elle repartait du watermark (2026-06-26 posé par le pré-vol) au lieu de tout OpenAlex.
    cause: >-
      raw_snapshot est incrémental par watermark (max_partitions=0 = « toutes postérieures au
      watermark », pas « toutes »). Aucun flag de bootstrap/reset dans RawSnapshotConfig → un
      pré-vol qui avance le watermark bloque un bootstrap complet ultérieur.
    correctif: >-
      Réinitialiser la clé `works` du raw/_watermark.json (backup fait) → raw_snapshot repart de
      None = bootstrap complet (usage normal du watermark, réversible : le run le réécrit). Prouvé :
      2446 fichiers / 510M works ingérés. Amélioration possible (suivi) : un champ reset_watermark
      explicite plutôt qu'une édition du fichier de contrôle.
    statut: corrige

  - id: L85
    campagne: 'preuve prod citation Parquet — run transform (2026-07-06)'
    portee: livrable
    symptome: >-
      Après une ingestion COMPLÈTE réussie (mart EUNICoast = 98 645 works filtrés de 510M),
      le transform_job échouait dès les modèles staging (stg_citation_works / authorships /
      topics) : « HTTP 404 reading s3://citation/mart_eunicoast/run= ».
    cause: >-
      build_dbt_vars dérive raw_root / curated_root / marts_root du BUCKET_NAME réel de l'OBC
      (citation-datalake-<uuid>, jamais `citation` en prod), mais OUBLIAIT mart_root — pourtant
      la SOURCE de toute la chaîne dbt depuis le refactoring co-autorat (ADR atlas 0094, le mart
      EUNICoast Parquet). dbt retombait donc sur le défaut banc `s3://citation/mart_eunicoast`,
      inexistant en prod. Écart banc/prod invisible au banc : les tests d'intégration passent
      mart_root explicitement.
    correctif: >-
      Dériver mart_root du bucket comme les autres racines (`s3://{bucket}/mart_eunicoast`) +
      2 assertions (dict exact + dérivation depuis BUCKET_NAME). atlas#563. Débloque le transform
      aval (co-autorat + uplift) à l'échelle réelle.
    statut: corrige

  - id: L86
    campagne: 'preuve prod citation Parquet — run transform aval (2026-07-06)'
    portee: livrable
    symptome: >-
      Le fix mart_root (L85) passé, le transform_job matérialise marts_collab_pairs (co-autorat,
      98 645 works), puis TOUT l'aval échoue (18×) : « Not implemented Error: Cannot switch
      temporary directory after the current one has been used » — marts_researchers, uplift,
      embeddings, index pgvector en ERROR/SKIP.
    cause: >-
      profiles.yml dbt tourne DuckDB en `path: ":memory:"` (une base PARTAGÉE sur toute
      l'invocation) et met temp_directory dans `settings`. Or dbt-duckdb ré-émet chaque `setting`
      en `SET k=v` sur le curseur de CHAQUE modèle, et DuckDB REFUSE de changer temp_directory dès
      qu'un spill a eu lieu — même vers la valeur identique (booléen HasTemporaryDirectory).
      marts_collab_pairs (jointure lourde) spille en 50 s → temp_directory verrouillé → le modèle
      suivant re-SET → erreur en cascade. Invisible au banc : données trop petites pour spiller.
    correctif: >-
      Déplacer temp_directory de `settings` vers `config_options` (config de CONNEXION posée UNE
      fois via duckdb.connect(config=…), jamais re-SET) ; memory_limit/threads restent en settings
      (re-SET idempotent). Le spilling vers l'emptyDir survit à N modèles lourds (dbt-duckdb #600).
      atlas fix/citation-duckdb-tempdir-config. Smoke dbt hermétique vert (7 tests).
    statut: corrige

  - id: L87
    campagne: 'preuve prod citation Parquet — run transform aval (2026-07-06)'
    portee: livrable
    symptome: >-
      Les fixes mart_root (L85) + temp_directory (L86) passés, le transform_job matérialise les 43
      modèles dbt (staging, curated, co-autorat, marts_researchers, uplift) — puis échoue sur UN
      test : « FAIL 8786 unique_stg_citation_works_work_id ». dbt build sort en exit 2 → step
      Dagster en échec → aval Python (embeddings, pair_uplift_model, index pgvector) SKIP.
    cause: >-
      OpenAlex publie la MÊME œuvre dans plusieurs snapshots Parquet (records fusionnés/mis à
      jour) → à l'échelle réelle ~8786 work_id apparaissent en double dans le mart EUNICoast.
      stg_citation_works lit la source SANS déduplication, donc le test `unique(work_id)` (sévérité
      error) échoue légitimement et casse toute la chaîne. Invisible au banc : l'échantillon n'a
      pas de doublon multi-snapshot.
    correctif: >-
      Dédupliquer par work_id dans stg_citation_works via `qualify row_number() over (partition by
      work_id order by fwci desc, cited_by_count desc) = 1` — une ligne par work, la plus riche
      (fwci = métrique cible du modèle uplift). Le test unique redevient un invariant vrai ; l'aval
      ne double-compte plus. atlas fix/citation-dedup-work-id. Smoke dbt hermétique vert.
    statut: corrige

  - id: L88
    campagne: 'preuve prod citation Parquet — run transform aval (2026-07-07)'
    portee: livrable
    symptome: >-
      Les 3 fixes dbt (L85-L87) passés, le dbt build est INTÉGRALEMENT vert (Done. PASS=64 ERROR=0
      SKIP=0) — puis le pod de run est OOMKilled (limite 28Gi) dès le STEP_START de
      researcher_embeddings. L'aval (embeddings, pair_uplift_model, index pgvector) ne s'exécute pas.
    cause: >-
      Le K8sRunLauncher lance 1 pod par run ; l'executor multiprocess y parallélise les steps. SANS
      cap de concurrence, researcher_embeddings (charge les vecteurs en RAM) démarre PENDANT que
      plusieurs GE checks tournent — chacun matérialisant un Parquet en pandas `.df()`. Les mémoires
      se cumulent et dépassent 28Gi. Invisible au banc : échantillon trop petit pour saturer, même
      en parallèle.
    correctif: >-
      Config executor `multiprocess.max_concurrent=1` sur transform_job → les steps lourds
      s'exécutent séquentiellement, chacun dispose seul de la mémoire du pod. Aucun refactor des
      assets ; coût = run un peu plus long (acceptable pour un pod à mémoire bornée). atlas
      fix/citation-transform-max-concurrent. Tests definitions verts (9), ruff clean.
    statut: corrige
