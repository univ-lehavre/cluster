# Registre des drifts — source de vérité unique (honnêteté des Runs, ADR 0023/0034).
#
# Un « drift » = un écart révélé par un run e2e que le lint ne voyait pas. Ce
# fichier est LE catalogue indexé ; les pages de synthèse (lecons-des-runs.md) et
# les journaux de campagne (test/lima/RESULTS.md) y RÉFÈRENT par id, sans
# dupliquer le détail.
#
# Champs par entrée :
#   id        : Lnn (stable, citable)
#   campagne  : chantier/issue qui l'a révélé
#   portee    : code (défaut du livrable, vaut pour tous les bancs ET la prod)
#             | env (artefact d'un banc précis)
#             | harnais (outillage de test, pas le livrable)
#   symptome  : ce qu'on a vu
#   cause     : la cause-racine
#   correctif : ce qui a été fait
#   statut    : corrige | caduc (topologie/contexte abandonné) | ouvert
#
# Couverture : L1–L46. Les pages de synthèse (lecons-des-runs.md) et les journaux
# de campagne (test/RESULTS.md banc Vagrant déprécié, test/lima/RESULTS.md banc
# courant) RÉFÈRENT à ce registre par id. Le préfixe L = banc Lima (source
# canonique des fiches L1–L40) ; le banc Vagrant numérotait ses propres écarts
# (0a–0e, #3–#26), repris ici par leur Lnn quand il existe — sinon laissés dans
# test/RESULTS.md (artefacts du banc abandonné, ADR 0038).

drifts:
  # ── Bootstrap K8s sur Lima (#127 / #144) — L1–L11 ────────────────────────
  - id: L1
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Au play `initialisation`, `ansible_user is undefined`.
    cause: >-
      L'inventaire posait l'utilisateur via SSH (ssh.config) mais pas la
      variable `ansible_user`.
    correctif: >-
      Inventaire généré : `cloud.vars.ansible_user: lima`.
    statut: corrige

  - id: L2
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `initialisation` : `Permission denied: /home/lima` (création du `.kube`).
    cause: >-
      Le home Lima est `/home/lima.guest` (≠ `/home/lima`) ; le rôle
      construisait le home via `ansible_user`.
    correctif: >-
      Rôles `k8s-initialization`/`k8s-rollback` : home résolu via
      `ansible_env.HOME` (le vrai home, indépendant de l'utilisateur).
    statut: corrige

  - id: L2bis
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `join-workers` : `Unable to change directory` (/home/debian).
    cause: >-
      `chdir: /home/debian` codé en dur dans `k8s-join-cluster` ; ce chemin
      n'existe pas sur Lima.
    correctif: >-
      `chdir` résolu via `ansible_env.HOME`.
    statut: corrige

  - id: L3
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `initialisation` : `taint "…control-plane" not found`.
    cause: >-
      Sous kubeadm v1.34, le control-plane ne porte pas le taint control-plane
      → l'opération `taint …-` échoue.
    correctif: >-
      Tâche rendue tolérante : `failed_when` ignore « not found ».
    statut: corrige

  - id: L4
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: code
    symptome: >-
      `cni.sh` : `cluster unreachable: localhost:8080`.
    cause: >-
      `cni.sh` lancé en `sudo` → kubectl/cilium pointent sur le kubeconfig root
      absent.
    correctif: >-
      Lancer `cni.sh` en tant qu'utilisateur (sudo interne seulement où
      nécessaire).
    statut: corrige

  - id: L5
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Gate kubeconfig : l'API est injoignable depuis l'hôte.
    cause: >-
      L'IP user-v2 (`192.168.104.x`) n'est pas routable depuis macOS.
    correctif: >-
      Réécrire `server:` sur `127.0.0.1:<portForward>` + `tls-server-name:
      cluster-api`.
    statut: corrige

  - id: L6
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: env
    symptome: >-
      OSD-prepare en CrashLoopBackOff : `binary lvm does not exist`.
    cause: >-
      Le `metadataDevice` (block.db) bascule Rook en mode LVM → `ceph-volume`
      exige `lvm`, absent de l'image Lima.
    correctif: >-
      Installer `lvm2` dans le provision de la VM (`profiles/node.yaml.tmpl`).
    statut: corrige

  - id: L7
    campagne: 'bootstrap K8s — banc Lima (#127)'
    portee: harnais
    symptome: >-
      Le gate Ceph passe au vert avec 0 OSD.
    cause: >-
      `ceph health` = HEALTH_OK sur un cluster neuf SANS pool (rien à dégrader).
    correctif: >-
      Gate renforcé : HEALTH_OK ET le nombre d'OSD attendus up (nœuds × disques
      data).
    statut: corrige

  - id: L8
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      cert-manager controller en CrashLoop : « Gateway API CRDs not present ».
    cause: >-
      `cni.sh` active `gatewayAPI` ; ni Cilium ni le bootstrap nu n'embarquent
      ces CRDs.
    correctif: >-
      Phase `platform-prereqs` : pose les CRDs Gateway API v1.4.1.
    statut: corrige

  - id: L9
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      ImagePullBackOff : « HTTP response to HTTPS client » (`registry:80`).
    cause: >-
      containerd tente HTTPS sur le registry interne HTTP ; le nom `registry`
      n'est pas résolu côté nœud.
    correctif: >-
      Phase `platform-prereqs` : `/etc/hosts` + `certs.d/registry:80/hosts.toml`
      en HTTP.
    statut: corrige

  - id: L10
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: harnais
    symptome: >-
      Pod registry Pending : `unbound PersistentVolumeClaim`.
    cause: >-
      Le PVC du registry était figé sur `rook-ceph-block-replicated`, absent du
      banc (local-path).
    correctif: >-
      Override banc : PVC sur `local-path` (paramétré ensuite par profil, cf.
      L41).
    statut: corrige

  - id: L11
    campagne: 'validation DataOps Dagster — banc Lima (#144)'
    portee: code
    symptome: >-
      `kubectl apply -f dagster.yaml` crée les ressources dans `default`.
    cause: >-
      Le helm template figé ne porte pas `metadata.namespace`.
    correctif: >-
      README : `kubectl apply -n dagster …` (corrigé).
    statut: corrige

  # ── Chaîne DataOps shell — phase dataops-chain (#148) — L12–L20 ───────────
  - id: L12
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: harnais
    symptome: >-
      `bootstrap` sort en code 141 (SIGPIPE) — kubeconfig non récupéré.
    cause: >-
      Un `cilium status | grep` ferme le pipe avant `fetch_kubeconfig`.
    correctif: >-
      Contournement : phase `kubeconfig` séparée (le cluster était sain) ; reste
      à durcir dans le bootstrap.
    statut: ouvert

  - id: L13
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Pull `registry:80` HTTP échoue : « HTTP response to HTTPS client ».
    cause: >-
      containerd v2.2 (Debian 13) route le pull via le transfer service qui
      IGNORE `certs.d`.
    correctif: >-
      `use_local_image_pull = true` dans la config containerd (les 3 nœuds) —
      fix racine.
    statut: corrige

  - id: L14
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      CNPG bloqué : « unknown plugin being required ».
    cause: >-
      `cluster.yaml` exige le plugin Barman, non installé par `dataops-chain`.
    correctif: >-
      Contournement banc initial (retrait du bloc `plugins:`) puis éliminé à la
      racine en #173 (Barman vers RGW Ceph via platform-s3-bucket).
    statut: corrige

  - id: L15
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: harnais
    symptome: >-
      PVC `pg` Pending : « unbound immediate PersistentVolumeClaims ».
    cause: >-
      `cluster.yaml` fige `storageClass: standard`, absent du banc (local-path).
    correctif: >-
      Surcharge banc : `standard → local-path` (paramétré par profil ensuite,
      cf. #158/L41).
    statut: corrige

  - id: L16
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Dagster « too many retries for DB connection » (vrai bug du livrable).
    cause: >-
      `managed.roles` CNPG SANS `passwordSecret` → rôles créés sans mot de passe
      (`rolpassword` NULL).
    correctif: >-
      Fix dépôt : `passwordSecret` par rôle + `role-secrets.example.yaml`.
    statut: corrige

  - id: L17
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Le Secret dérivé applicatif ne correspond pas au mot de passe réel du
      rôle.
    cause: >-
      Il nécessitait une recopie manuelle.
    correctif: >-
      Résolu par L16 : `.example` de rôle et dérivés alignés sur les mêmes
      valeurs de test.
    statut: corrige

  - id: L18
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: env
    symptome: >-
      Build d'images impossible dans les VMs.
    cause: >-
      `git` absent + `buildkitd` présent mais `disabled`.
    correctif: >-
      `apt install git` + `systemctl enable --now buildkit` (intégré à la
      prépa-build).
    statut: corrige

  - id: L19
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      Run émetteur en timeout sur le POST OpenLineage (vrai bug du livrable).
    cause: >-
      Aucune NetworkPolicy egress `dagster → marquez:5000` (seul l'ingress côté
      marquez existait).
    correctif: >-
      Fix dépôt : `platform/network-policies/dagster/allow-marquez-egress.yaml`.
    statut: corrige

  - id: L20
    campagne: 'chaîne DataOps shell — banc Lima (#148)'
    portee: code
    symptome: >-
      webserver/daemon Dagster en CrashLoop : « no [tool.dagster] block ».
    cause: >-
      L'orchestrateur vide est lancé sans workspace (`-w`).
    correctif: >-
      Fix dépôt : ConfigMap `dagster-workspace` (`load_from: []`) monté + `-w`
      dans dagster.yaml.
    statut: corrige

  # ── Portage DataOps en rôles Ansible — phase dataops (#173) — L21–L33 ─────
  - id: L21
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      `ansible_user_id is undefined` sur le play cluster.
    cause: >-
      `gather_facts: false` sur le play localhost, alors qu'audit-log le
      requiert.
    correctif: >-
      Retrait de l'audit-log du play cluster (cf. L22).
    statut: corrige

  - id: L22
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      `sudo: a password is required` (audit-log sur localhost).
    cause: >-
      audit-log écrit un log système (`become`) — sans objet sur le poste.
    correctif: >-
      audit-log retiré de `dataops.yaml` (conservé sur les playbooks de nœuds).
    statut: corrige

  - id: L23
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      `SSL: CERTIFICATE_VERIFY_FAILED` (modules get_url/k8s).
    cause: >-
      Le Python d'Ansible (Homebrew) n'utilise pas le CA système.
    correctif: >-
      `SSL_CERT_FILE` via `certifi`, résolu en pré-tâche par le bon interpréteur.
    statut: corrige

  - id: L24
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      Le volet « node » du rôle registry tourne sur localhost.
    cause: >-
      `import_role` charge tout le rôle ; le tag ne filtre pas les blocs
      internes.
    correctif: >-
      Rôle scindé `cluster.yaml`/`node.yaml`, importés via `tasks_from`.
    statut: corrige

  - id: L25
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      Secret dérivé : « namespaces postgres not found ».
    cause: >-
      Les Secrets étaient posés avant que `cluster.yaml` ne crée le namespace.
    correctif: >-
      Namespace `postgres` créé en premier dans `platform-cnpg`.
    statut: corrige

  - id: L26
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      build : « dict has no attribute 'clone_subdir' ».
    cause: >-
      Le ternaire Jinja évalue les deux branches (image locale sans
      `clone_subdir`).
    correctif: >-
      `default('')` sur les attributs optionnels.
    statut: corrige

  - id: L27
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      build : « Dockerfile no such file or directory » sur le nœud.
    cause: >-
      Banc Lima `mounts: []` → les sources du dépôt sont absentes de la VM.
    correctif: >-
      Copier contextes/Dockerfiles sur le nœud avant le build.
    statut: corrige

  - id: L28
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      build `marquez-web` OOM-killed (rc 137).
    cause: >-
      webpack/npm sature la VM 5 GiB (déjà k8s + Ceph + CNPG).
    correctif: >-
      `VM_MEMORY` 5 → 8 GiB (dimensionner pour le pic, pas le repos).
    statut: corrige

  - id: L29
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: env
    symptome: >-
      Operator CNPG en CrashLoop après un reboot.
    cause: >-
      reboot de `cp1` → Cilium pas reconvergé → ClusterIP du plugin injoignable.
    correctif: >-
      Artefact de reboot (cf. réserve « restore non fidèle ») : redémarrer
      l'operator. Pas un défaut du livrable.
    statut: caduc

  - id: L30
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: code
    symptome: >-
      Pods Dagster en ImagePullBackOff sur `registry:80` (HTTP/HTTPS).
    cause: >-
      containerd des workers pas rechargé après pose de la config
      insecure-registry.
    correctif: >-
      Restart containerd sur les nœuds (handler à fiabiliser).
    statut: corrige

  - id: L31
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      Preuve de lineage : l'image émetteur est absente du registry.
    cause: >-
      L'émetteur jetable n'était pas dans `build_images` (hors prod, ADR 0022).
    correctif: >-
      `build_emitter_image=true` au banc (câblé conditionnellement).
    statut: corrige

  - id: L32
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      « aucun job ingéré (1 → 1) » alors que le lineage est présent.
    cause: >-
      Le prédicat exigeait un delta ; le run est idempotent (namespace conservé).
    correctif: >-
      `classify_marquez_ingest` teste la présence (`after >= 1`) + bats à jour.
    statut: corrige

  - id: L33
    campagne: 'portage DataOps Ansible — banc Lima (#173)'
    portee: harnais
    symptome: >-
      « RGW datalake pas Ready » alors que les 3 pods sont 2/2 Running.
    cause: >-
      Le gate datalake testait `readyReplicas == 1`, or le CephObjectStore a
      `instances: 3`.
    correctif: >-
      Gate `>= 1` (au moins une instance up).
    statut: corrige

  # ── storageClass + S3 / monitoring (#158/#186) — L34–L40 ──────────────────
  - id: L34
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      CRDs monitoring rejetées par le module k8s.
    cause: >-
      L'enum « - = » non quoté est rejeté par le SafeLoader PyYAML (tag
      `yaml.org,2002:value`) ; kubectl (Go) les charge.
    correctif: >-
      Appliquer ces CRDs via `kubectl apply --server-side`, pas le module.
    statut: corrige

  - id: L35
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      « no matches for cert-manager.io/v1.Certificate ».
    cause: >-
      Le manifeste monitoring contient des `Certificate`/`Issuer` → cert-manager
      doit exister avant.
    correctif: >-
      `platform-cert-manager` appliqué AVANT monitoring (dans monitoring.yaml).
    statut: corrige

  - id: L36
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      `PrometheusRule` rejetés en masse (HTTP 500 du webhook
      `prometheusrulemutate`).
    cause: >-
      Appliqués avant que l'operator (porteur du webhook d'admission) soit Ready.
    correctif: >-
      Deux passes : stack sauf `PrometheusRule` → attente operator Ready →
      `PrometheusRule`.
    statut: corrige

  - id: L37
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      cert-manager en CrashLoop au démarrage (cause racine de L36).
    cause: >-
      Il tourne avec `--enable-gateway-api` mais les CRDs Gateway API sont
      absentes.
    correctif: >-
      Le rôle `platform-cert-manager` pose lui-même les CRDs Gateway API
      (v1.4.1).
    statut: corrige

  - id: L38
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      Loki en CrashLoop `NoSuchBucket` (compactor), profil RGW uniquement.
    cause: >-
      L'OBC Rook n'expose qu'UN bucket auto-nommé + des creds restreints à ce
      bucket → les buckets nommés `loki-chunks`/`loki-ruler` sont impossibles. Le
      banc léger (creds admin SeaweedFS) masquait la contrainte.
    correctif: >-
      En RGW : résoudre le bucket de l'OBC et l'employer pour chunks ET ruler ;
      init-buckets skippé.
    statut: corrige

  - id: L39
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: harnais
    symptome: >-
      Job init-buckets « prêt » alors que rien n'est créé (profil RGW).
    cause: >-
      Gate faux : le `grep make_bucket` matchait aussi « make_bucket failed ».
    correctif: >-
      Script réécrit (`set -eu`) : échec franc si le bucket n'est ni créé ni
      déjà présent.
    statut: corrige

  - id: L40
    campagne: 'storageClass + S3 — banc Lima (#158/#186)'
    portee: code
    symptome: >-
      `platform-prereqs` meurt (EXIT 1) sur banc léger (monitoring sans dataops,
      donc sans namespace registry).
    cause: >-
      `set -e` + `reg_ip=$(kubectl get svc registry …)` : sans le namespace
      `registry`, kubectl sort en 1 → l'assignation tue le script avant le garde
      `[ -z reg_ip ]`. Masqué jusque-là car les runs montaient toujours le
      registry via `dataops`.
    correctif: >-
      `… || true` sur l'assignation (skip propre).
    statut: corrige

  - id: L41
    campagne: 'topologies — DataOps sans Ceph (#158/#186 suite)'
    portee: code
    symptome: >-
      Le déploiement registry (puis CNPG) reste Pending : PVC non lié, pod
      registry 0/1 « Deployment does not have minimum availability ».
    cause: >-
      Le storageClass des PVC (registry, CNPG) était figé sur le profil de la
      phase, sans s'aligner au profil réel du banc — un PVC rook-ceph sur un banc
      local-path (ou l'inverse) reste Pending faute de provisioner.
    correctif: >-
      phase_dataops (run-phases.sh) choisit storageClass + backing S3 selon le
      profil (registry_storage_class / cnpg_storage_class / cnpg_s3_backing /
      cnpg_s3_endpoint), comme phase_monitoring. Le rôle CNPG est par ailleurs
      découplé du RGW via platform-s3-bucket (backing rgw|seaweedfs, ADR 0036).
    statut: corrige

  - id: L42
    campagne: 'topologies — banc single-node (exploratoire)'
    portee: env
    symptome: >-
      Gate « Wait for Dagster webserver and daemon to be Ready » expire alors que
      les pods finissent par devenir Ready peu après.
    cause: >-
      Sur un nœud unique portant tout (k8s + monitoring + CNPG + registry +
      Dagster), le démarrage est plus lent que le timeout du gate, calibré pour
      multi-nœuds.
    correctif: >-
      Aucun (topologie single-node abandonnée — ADR 0040). Consigné pour la
      traçabilité de l'abandon.
    statut: caduc

  - id: L43
    campagne: 'topologies — banc single-node (exploratoire)'
    portee: env
    symptome: >-
      Pods CloudNativePG (pg-1/2/3) évincés : « The node was low on resource:
      ephemeral-storage » ; nœud taint disk-pressure → plus de placement.
    cause: >-
      3 instances pg + build d'images + registry + monitoring sur un seul nœud
      (disque VM 20 Go) saturent l'ephemeral-storage. CNPG ×3 sur 1 nœud n'a de
      toute façon aucun sens (pas de HA mono-nœud).
    correctif: >-
      Aucun (topologie single-node abandonnée — ADR 0040). Aurait exigé CNPG ×1 +
      disque accru ; non représentatif. Consigné pour la traçabilité.
    statut: caduc

  - id: L44
    campagne: 'topologies — DataOps sans Ceph (#158/#186 suite)'
    portee: harnais
    symptome: >-
      Une phase (dataops, monitoring) lancée sans WITH_CEPH=1 sur un banc Ceph
      choisit silencieusement le profil léger (storageClass local-path) → PVC
      Pending sur le banc Ceph, échec en aval.
    cause: >-
      Le profil (léger/Ceph) est porté par la variable d'environnement WITH_CEPH,
      facile à oublier quand on enchaîne les phases à la main. Aucune détection de
      l'état réel du cluster.
    correctif: >-
      À faire (ouvert) : faire que dataops/monitoring DÉTECTENT le profil (présence
      d'un storageClass rook-ceph / du RGW) au lieu de dépendre de WITH_CEPH, ou
      refuser proprement si incohérent. Contournement actuel : passer WITH_CEPH=1
      à toutes les phases d'un banc Ceph.
    statut: ouvert

  - id: L45
    campagne: 'migration ansible_facts (échéance ansible-core 2.24)'
    portee: code
    symptome: >-
      Au run, `set_fact all_hostnames` échoue : « object of type 'HostVarsVars'
      has no attribute 'ansible_facts.hostname' » (bootstrap k8s-pre-install).
    cause: >-
      La migration ansible_<fact> → ansible_facts.<fact> a transformé
      `map('extract', hostvars, 'ansible_hostname')` en
      `map('extract', hostvars, 'ansible_facts.hostname')` : `extract` attend une
      CLÉ (string plate), pas un chemin pointé — `ansible_facts.hostname` n'existe
      pas comme clé. (Le lint ne le voit pas ; seul le run e2e l'expose, ADR 0034.)
    correctif: >-
      Passer une LISTE de clés pour la descente :
      `map('extract', hostvars, ['ansible_facts', 'hostname'])`. Validé e2e
      (bootstrap vert).
    statut: corrige

  - id: L46
    campagne: 'migration ansible_facts (échéance ansible-core 2.24)'
    portee: harnais
    symptome: >-
      Warnings « discovered Python interpreter could change » persistants malgré
      `interpreter_python = auto_silent` dans bootstrap/ansible.cfg ; et
      `inject_facts_as_vars = False` non appliqué au banc.
    cause: >-
      Le banc lance `ansible-playbook` depuis un CWD ≠ bootstrap/ avec le playbook
      en chemin absolu → Ansible cherche ansible.cfg dans le CWD et ne trouve PAS
      bootstrap/ansible.cfg. La config du dépôt n'était donc jamais chargée par le
      banc (roles_path marchait par chance).
    correctif: >-
      Exporter `ANSIBLE_CONFIG="${REPO}/bootstrap/ansible.cfg"` dans test/lima/lib.sh
      (couvre toutes les invocations du banc). Validé : warnings disparus, run vert
      sous inject_facts_as_vars=False.
    statut: corrige

  - id: L47
    campagne: 'métrologie du banc (#216/#217/#219)'
    portee: harnais
    symptome: >-
      Échantillonnage Prometheus (#217) toujours `?`, ET le `runs-history.yaml`
      pollué par des lignes ANSI (codes couleur) qui le rendaient invalide.
    cause: >-
      Double piège. (1) `metro_sample_prometheus` interrogeait Prometheus via
      `kubectl exec` dans son pod, mais l'image est DISTROLESS (ni wget ni sh —
      même piège que le drift #14 etcd) → la requête échouait silencieusement.
      (2) La fonction écrit le bloc YAML sur stdout (capturé par l'appelant), or
      ses `log`/`warn` partaient AUSSI sur stdout → ils étaient écrits dans le
      fichier.
    correctif: >-
      Requête via un pod busybox éphémère ciblant le Service `prometheus-operated`
      (pattern de `marquez_job_count`) ; tous les `log`/`warn` routés sur stderr
      (`>&2`). Deux tests bats anti-régression (stdout sans ANSI ; Prometheus
      absent → stdout vide). Métriques réelles obtenues (CPU 272 cœur·s, RAM pic
      7606 MiB).
    statut: corrige

  - id: L48
    campagne: 'socle GitOps Gitea + Argo CD (#230)'
    portee: livrable
    symptome: >-
      `argocd-server` reste 0/1 ; tous les composants Argo CD en
      `CreateContainerConfigError` (« secret "argocd-redis" not found »). Le pod
      `argocd-redis` boucle en `Init:Error` (exit 20).
    cause: >-
      L'initContainer `secret-init` crée le Secret `argocd-redis` via l'API K8s,
      mais la NetworkPolicy préexistante `platform/network-policies/argocd/allow-egress.yaml`
      (`allow-apiserver-egress`) autorisait l'egress apiserver via
      `to.ipBlock 0.0.0.0/0`. Sous Cilium, un `ipBlock` EXCLUT les entités
      réservées (host/kube-apiserver) → apiserver (ClusterIP 10.96.0.1:443 ET
      endpoint :6443) injoignable. Bug LATENT révélé par la 1re mise en service
      d'Argo CD par le banc (avant : kubectl manuel, datapath différent).
    correctif: >-
      Réécrire `allow-apiserver-egress` SANS `to:` (idiome du dépôt pour
      l'apiserver, calque `dagster/allow-apiserver-egress` ; une règle egress
      sans `to` autorise les entités réservées Cilium) + ports 443 et 6443.
      Validé banc : 10.96.0.1:443 joignable, Secret créé, 7 pods Argo CD 1/1.
    statut: corrige

  - id: L49
    campagne: 'socle GitOps Gitea + Argo CD (#230)'
    portee: harnais
    symptome: >-
      Un `run-phases.sh all` relancé sur un socle EN CACHE (#219) consignait dans
      `runs-history.yaml` une entrée présentée comme run complet, mais avec un
      `total_s` tronqué et des `phases` partielles (p. ex. `gitops: 12` seul) —
      fausse preuve qui trompe le garde-fou de fraîcheur (ADR 0042).
    cause: >-
      `record_full_run` était appelé inconditionnellement en fin de `all`, même
      après un cache hit. Or sur cache, up/bootstrap/storage sont sautés → absents
      de `PHASE_DURATIONS` ; seules les phases hors-cache (gitops) y figurent.
    correctif: >-
      Ne consigner que les runs FROM-SCRATCH (flag `socle_built` : 1 seulement si
      la branche else a rejoué up/bootstrap/storage). Run sur cache → message
      explicite, PAS d'entrée. Seul un run from-scratch est une preuve (ADR
      0034/0042 ; NO_CACHE=1 pour forcer). Fausse entrée a855ec8 retirée.
    statut: corrige

  - id: L50
    campagne: "chemins d'installation + scénarios atlas (#237)"
    portee: harnais
    symptome: >-
      `KUBECONFIG=test/lima/.work/kubeconfig ONLY=… test/scenarios/run-all.sh`
      (chemin RELATIF) : tous les scénarios échouent ou skippent à tort
      (`connection to localhost:8080 refused`), alors qu'un `kubectl` direct avec
      le même kubeconfig joint bien le cluster.
    cause: >-
      `run-all.sh` fait `cd "$(dirname …)"` (dans test/scenarios/) au démarrage.
      Un KUBECONFIG en chemin relatif au CWD d'appel devient invalide après ce
      `cd` → kubectl retombe sur le contexte par défaut (localhost:8080).
    correctif: >-
      Résoudre KUBECONFIG en chemin ABSOLU AVANT le `cd` (si défini et relatif).
      Validé : ONLY=24 avec KUBECONFIG relatif passe (Prometheus 22 targets UP).
    statut: corrige

  - id: L51
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      L'Application Argo CD `atlas-workflows` reste InvalidSpecError :
      « application repo http://gitea-http…/atlas/workflows.git is not permitted
      in project 'atlas' », alors que le sourceRepos autorise
      `http://gitea-http…/*`.
    cause: >-
      Le glob `*` d'Argo CD dans sourceRepos ne traverse PAS les `/` : `/*` matche
      `…/atlas` (un segment) mais pas `…/atlas/workflows.git` (deux segments).
    correctif: >-
      sourceRepos `…/**` (double étoile, récursif) dans appproject-atlas.yaml.
      Validé banc : Application acceptée (passe à ComparisonError puis Synced).
    statut: corrige

  - id: L52
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      Application bloquée ComparisonError « dial tcp …:8081 i/o timeout » :
      l'application-controller ne joint pas le repo-server (génération de
      manifeste impossible).
    cause: >-
      Sous default-deny, le bundle Argo CD ouvre l'INGRESS de repo-server/redis
      mais rien n'autorise l'EGRESS des appelants (controller/server) vers
      repo-server:8081 / redis:6379 (trafic INTERNE à argocd).
    correctif: >-
      NetworkPolicy `allow-argocd-internal-egress` (podSelector {} → podSelector
      {} intra-ns, ports 8081/8084/6379/8080/5556/5557) dans allow-egress.yaml.
    statut: corrige

  - id: L53
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: livrable
    symptome: >-
      repo-server : « failed to list refs: Get http://gitea-http…/atlas/
      workflows.git/info/refs : context deadline exceeded » — clone du dépôt
      Gitea impossible.
    cause: >-
      DEUX causes cumulées. (1) `allow-reposerver-egress` autorise le port git via
      `to.ipBlock 0.0.0.0/0` ; sous Cilium un ipBlock EXCLUT les IPs des pods du
      cluster (même piège que L48) → Gitea injoignable. (2) Même avec un
      namespaceSelector vers gitea, ouvrir le port 80 (du Service) ne suffit PAS :
      sous Cilium, la NetworkPolicy egress filtre le port du POD de destination
      APRÈS DNAT du Service (gitea écoute 3000, le Service mappe 80→3000) — un
      egress limité à 80 reste bloqué. Symptôme trompeur car un fix appliqué « à
      chaud » lors d'une session antérieure avait paru fonctionner (faux positif).
    correctif: >-
      NetworkPolicy `allow-reposerver-gitea-egress` ciblant le namespace gitea
      par namespaceSelector, ports 3000 (cible réelle du pod après DNAT) ET 80
      (robustesse). Validé banc : repo-server clone, Application Synced/Healthy,
      scénario 27 PASS + 9 scénarios pertinents PASS (10/10).
    statut: corrige

  - id: L54
    campagne: 'scénario 27 GitOps → workflows atlas (#231)'
    portee: harnais
    symptome: >-
      Le workflow jouet (Job) échoue : OSError/PermissionError Read-only file
      system puis Permission denied sur `/opt/dagster/app/.tmp_dagster_home…` —
      `dagster asset materialize` ne peut pas créer son DAGSTER_HOME temporaire.
    cause: >-
      Le workflow jouet portait un securityContext durci (readOnlyRootFilesystem
      + runAsNonRoot/uid 1000), alors que `dagster asset materialize` écrit dans
      son cwd (/opt/dagster/app, propriété root). L'émetteur de référence
      `dataops_chain_emit_and_verify` tourne SANS securityContext (root) et
      fonctionne.
    correctif: >-
      Aligner le workflow jouet sur l'émetteur de référence : retirer le
      durcissement securityContext (garder drop ALL). Le durcissement global des
      workloads Dagster root relève de #234. Validé : Job Complete + lineage
      Marquez, scénario 27 PASS.
    statut: corrige
