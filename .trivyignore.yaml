# Allowlist Trivy CIBLÉE PAR CHEMIN — findings de posture IaC actés, justifiés.
#
# Règle : on n'ignore JAMAIS sans justification écrite + chemin précis. Le scan
# `trivy config` échoue sur tout HIGH/CRITICAL non listé ici → un nouveau
# manifeste non durci, ou une régression sur un manifeste durci, fait rougir la
# CI. (Format ciblé par `paths:` — un ignore ne couvre QUE les fichiers cités,
# contrairement à l'ancien `.trivyignore` global par ID.)
#
# État au 2026-06-01, après durcissement P6 :
#   - mysql.yaml : durci complètement (non-root + rootfs RO) → AUCUN ignore.
#   - wordpress/rstudio : durcis partiellement (KSV-0118 levé), KSV-0014 acté.
#   - Rook vendored (common/operator/toolbox) : non modifiables → actés.

misconfigurations:
  # ── Rook-Ceph vendored — manifestes amont appliqués tels quels ────────────
  # Durcir le RBAC/securityContext de Rook casserait l'operator et divergerait
  # de l'upstream. On suit Rook.
  - id: KSV-0041 # RBAC « manage secrets » — requis par l'operator Rook
    paths:
      - 'storage/ceph/common.yaml'
  - id: KSV-0053 # RBAC « exec into pods » — requis par l'operator (debug OSD/mon)
    paths:
      - 'storage/ceph/common.yaml'
  - id: KSV-0056 # RBAC networking — requis par le CSI/operator Rook
    paths:
      - 'storage/ceph/common.yaml'
  - id: KSV-0118 # securityContext par défaut (Rook operator + toolbox)
    paths:
      - 'storage/ceph/operator.yaml'
      - 'storage/ceph/toolbox.yaml'
  - id: KSV-0014 # rootfs non read-only (Rook operator + toolbox)
    paths:
      - 'storage/ceph/operator.yaml'
      - 'storage/ceph/toolbox.yaml'

  # ── local-path-provisioner (vendored upstream v0.0.36, banc Lima rapide) ──
  # Manifeste amont non durci : le provisioner crée/supprime des dossiers sur le
  # disque local des nœuds (helper pod) → securityContext par défaut et rootfs
  # non read-only. Durcir divergerait de l'amont sans gain (banc jetable).
  - id: KSV-0118 # securityContext par défaut (provisioner amont)
    paths:
      - 'storage/local-path/local-path-storage.yaml'
  - id: KSV-0014 # rootfs non read-only (provisioner amont)
    paths:
      - 'storage/local-path/local-path-storage.yaml'

  # ── Workloads maison — durcissement partiel, résidu rootfs read-only ──────
  # wordpress (apache, port 80, démarre root) et rstudio (rstudio-server init en
  # root, PAM/sessions) NE PEUVENT PAS tourner en rootfs read-only sans casser.
  # Le reste est durci (seccompProfile, drop caps, allowPrivilegeEscalation
  # false). Cf. ADR 0011/0012 (réseau isolé) et les commentaires des manifestes.
  - id: KSV-0014 # rootfs read-only impossible (apache écrit sa conf/runtime)
    paths:
      - 'storage/ceph/wordpress/wordpress.yaml'
      # REDCap (apps/redcap) : même contrainte qu'apache/wordpress — Apache écrit
      # logs/lock/run, REDCap son cache ; les uploads (edocs) sont sur PVC dédié.
      - 'apps/redcap/redcap.yaml'
  - id: KSV-0014 # rootfs read-only impossible (rstudio-server root + écritures)
    paths:
      - 'apps/rstudio/deployment.yaml'
  # buildkitd rootless (ADR 0110, RÉTABLI 2026-07-12) : le moteur écrit son état de build
  # (couches, cache, montages du snapshotter) dans le rootfs → rootfs read-only le casse.
  # Le reste est durci (non-root uid 1000, drop ALL sauf SETUID/SETGID pour newuidmap) ;
  # seccomp Unconfined + AppArmor unconfined sont les dérogations MINIMALES du rootless.
  # Elles sont REFUSÉES par PodSecurity baseline → le namespace de build n'est PAS labellisé
  # baseline (privilège isolé à ce seul ns, jamais privileged/hostPath). Cf. platform/buildkit/.
  - id: KSV-0014 # rootfs read-only impossible (buildkit rootless écrit son état)
    paths:
      - 'platform/buildkit/deployment.yaml'

  # ── mailpit SMTP : hostPort 1025 assumé (banc-only, ADR 0071) ─────────────
  # Le relais postfix HÔTE (#131) tourne SUR le nœud, hors réseau pods — il joint
  # le SMTP sur NodeIP:1025 via un hostPort routé en eBPF (Cilium), au lieu d'un
  # Service LoadBalancer + LB-IPAM. Exception RÉELLE et tracée (le L7 passe par le
  # Gateway ; ce hostPort L4 est le seul, banc-only, prod = SMTP externe). 1025 est
  # non privilégié → aucune capability ajoutée. Cf. ADR 0071 §amendement state.sh.
  - id: KSV-0024 # hostPort 1025 (relais postfix hôte, banc-only — ADR 0071)
    paths:
      - 'platform/mailpit/mailpit.yaml'

  # ── cert-manager vendored (bundle officiel v1.20.2) — RBAC inhérent ───────
  # Manifeste amont appliqué tel quel (épinglé par digest, cf. ADR 0021). Le
  # RBAC de cert-manager EST sa fonction : le durcir casserait l'émission.
  - id: KSV-0041 # « manage secrets » : cert-manager STOCKE les certs (tls.crt/
    # tls.key) dans des Secrets — objet même du composant.
    paths:
      - 'platform/cert-manager/cert-manager.yaml'
  - id: KSV-0056 # RBAC services/endpoints/ingresses : requis par les solvers
    # ACME et le gateway-shim (réconciliation Gateway/HTTPRoute).
    paths:
      - 'platform/cert-manager/cert-manager.yaml'
  - id: KSV-0114 # le cainjector INJECTE le CA bundle dans les
    # {mutating,validating}webhookconfigurations — sa raison d'être.
    paths:
      - 'platform/cert-manager/cert-manager.yaml'

  # ── Argo CD vendored (bundle officiel v3.4.3) — RBAC inhérent au GitOps ────
  # Manifeste amont appliqué tel quel (épinglé par digest, ADR 0022). Le RBAC
  # large EST la fonction d'Argo CD : réconcilier des manifestes arbitraires.
  - id: KSV-0041 # « manage secrets » : applicationset/repo-server gèrent les
    # creds de dépôts et les Secrets des apps réconciliées.
    paths:
      - 'platform/argocd/argocd.yaml'
  - id: KSV-0044 # wildcard verb : l'application-controller applique tout type
    # de ressource déclaré dans git (cœur du GitOps).
    paths:
      - 'platform/argocd/argocd.yaml'
  - id: KSV-0046 # « manage all resources » : application-controller et server
    # doivent piloter n'importe quelle ressource pour réconcilier l'état désiré.
    paths:
      - 'platform/argocd/argocd.yaml'
  - id: KSV-0118 # securityContext par défaut sur les workloads du bundle amont
    # (server/repo-server/dex/applicationset/controller) — non durci en amont.
    paths:
      - 'platform/argocd/argocd.yaml'

  # ── kube-prometheus-stack vendored (chart 86.1.0) — posture inhérente ─────
  # Helm template figé (épinglé par digest, ADR 0006/0016 palier 2). Ces findings
  # sont la FONCTION même des composants de monitoring système, pas un oubli.
  - id: KSV-0009 # hostNetwork : node-exporter expose les métriques de l'hôte —
    # il DOIT voir le réseau du nœud (interfaces, conntrack). Sa raison d'être.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0010 # hostPID : node-exporter lit /proc de l'hôte (processus, charge)
    # — accès au PID namespace du nœud requis pour les métriques système.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0014 # rootfs read-only : node-exporter/operator du bundle amont non
    # durcis en amont ; durcir casserait le montage des collecteurs hôte.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0041 # « manage secrets » : l'operator gère les Secrets de config
    # générés (alertmanager, web-config, tls-assets) — cœur du Prometheus Operator.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0045 # wildcard verb : RBAC de l'operator pour réconcilier les CRs
    # monitoring.coreos.com (Prometheus/Alertmanager/ServiceMonitor/Rules).
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0056 # RBAC networking : l'operator gère endpoints/services pour le
    # service discovery des cibles de scrape.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'
  - id: KSV-0121 # volumes hostPath : node-exporter monte /proc, /sys, / (root)
    # de l'hôte en lecture seule pour collecter les métriques système.
    paths:
      - 'platform/kube-prometheus-stack/kube-prometheus-stack.yaml'

  # ── Loki / Promtail vendored (charts 7.0.0 / 6.17.1) ──────────────────────
  - id: KSV-0041 # « manage secrets » : Loki lit le Secret de config (creds S3).
    paths:
      - 'platform/loki/loki.yaml'
  - id: KSV-0047 # Promtail (DaemonSet) lit les logs des conteneurs sur chaque
    # nœud via les hostPath /var/log/pods + /var/lib/docker/containers. root REQUIS
    # (re-vérifié #234, pas « fidélité amont ») : ces fichiers sont root:root aux
    # permissions restrictives ; un UID non-root ne peut pas les lire, et `fsGroup`
    # ne s'applique PAS aux hostPath. Le conteneur est durci au maximum compatible
    # (drop ALL caps, allowPrivilegeEscalation:false, readOnlyRootFilesystem). Le
    # non-root reste à prouver sur banc si un jour les perms des logs le permettent.
    paths:
      - 'platform/loki/promtail.yaml'

  # ── CloudNativePG vendored (operator 1.29.1 + plugin Barman) — RBAC inhérent ─
  # Manifestes amont appliqués tels quels (épinglés par digest, ADR 0006/0024).
  # Le RBAC large EST la fonction de l'operator : gérer le cycle de vie Postgres.
  - id: KSV-0041 # « manage secrets » : l'operator génère/gère les Secrets de
    # connexion, TLS et credentials des Clusters Postgres ; le plugin gère les
    # creds S3 des sauvegardes.
    paths:
      - 'platform/cloudnative-pg/operator.yaml'
      - 'platform/cloudnative-pg/plugin-barman-cloud.yaml'
  - id: KSV-0053 # « exec into pods » : l'operator exécute des commandes dans les
    # instances Postgres (switchover, backup, fencing) — cœur du contrôleur.
    paths:
      - 'platform/cloudnative-pg/operator.yaml'
  - id: KSV-0056 # RBAC networking : l'operator gère services/endpoints pour les
    # services -rw/-ro/-r (routage primary/replica).
    paths:
      - 'platform/cloudnative-pg/operator.yaml'
  - id: KSV-0114 # « manage webhookconfigurations » : l'operator pose ses
    # {mutating,validating}webhookconfigurations (validation des CR Postgres).
    paths:
      - 'platform/cloudnative-pg/operator.yaml'

  # ── Dagster vendored (chart 1.13.7, helm template figé) — posture amont ────
  # Le chart Dagster ne durcit pas ses workloads en amont (orchestrateur de data
  # pipelines, image officielle non distroless). Findings inhérents au rendu.
  - id: KSV-0014 # rootfs read-only : le webserver/daemon Dagster écrivent leur
    # état/logs locaux ; le chart amont ne pose pas readOnlyRootFilesystem. Idem
    # la code-location jouet (ADR 0086) : `dagster api grpc -m toy_assets` crée son
    # DAGSTER_HOME dans le cwd → rootfs writable requis (drift L54, aligné sur
    # l'émetteur de référence). Durcissement global des workloads Dagster root = #234.
    paths:
      - 'platform/dagster/dagster.yaml'
      - 'bench/lima/atlas-workflow-sample/code-location.yaml'
  - id: KSV-0014 # rootfs read-only impossible pour MLflow (ADR 0082) : le serveur
    # écrit son cache et le spooling des artefacts S3 dans /tmp → rootfs writable
    # requis. Le reste est durci (non-root, drop ALL, no privilege escalation,
    # seccomp RuntimeDefault dans le manifeste) — seul ce point reste acté.
    paths:
      - 'platform/mlflow/mlflow.yaml'
  - id: KSV-0118 # securityContext par défaut sur les workloads du chart amont
    # (webserver/daemon) — non durci en amont. Idem la code-location jouet (ADR 0086)
    # qui tourne en root comme l'émetteur de référence (Dagster l'exige ; #234).
    paths:
      - 'platform/dagster/dagster.yaml'
      - 'bench/lima/atlas-workflow-sample/code-location.yaml'
  - id: KSV-0109 # ConfigMap référençant des paramètres de connexion : la config
    # Dagster (dagster.yaml interne) référence l'hôte/le nom de la base Postgres ;
    # le mot de passe reste dans un Secret dédié (dagster-pg-auth), pas le ConfigMap.
    paths:
      - 'platform/dagster/dagster.yaml'

  # ── Image Dagster maison (Dockerfile arm64) — fidélité à l'officielle ──────
  # L'image officielle Dagster (amd64) tourne EN ROOT (pas de USER, pas distroless)
  # et le chart ne pose pas de securityContext non-root (cf. KSV-0118 ci-dessus).
  # Notre image arm64 est volontairement FIDÈLE à l'officielle (même base, mêmes
  # packages) : y ajouter un USER non-root divergerait du comportement amont et
  # risquerait de casser les écritures de Dagster ($DAGSTER_HOME). Posture assumée.
  - id: DS-0002 # pas de USER non-root : aligné sur l'image officielle (root).
    paths:
      - 'platform/dagster/image/Dockerfile'
      # Émetteur OpenLineage jetable (validation e2e #148) : même base/posture que
      # l'image Dagster maison ci-dessus (root, fidèle à l'officielle).
      - 'platform/dagster/image-openlineage/Dockerfile'
      # Image MLflow maison (ADR 0082 amendé) : `FROM ghcr.io/mlflow/mlflow + psycopg2`.
      # L'officielle tourne en root (pas de USER) ; on en hérite — y ajouter un USER
      # non-root divergerait de l'amont. Le pod pose déjà un securityContext non-root
      # (runAsNonRoot/runAsUser 1000, KSV-0118 dans platform/mlflow/mlflow.yaml).
      - 'platform/mlflow/image/Dockerfile'
      # Image REDCap maison (apps/redcap) : `FROM php:8.3-apache` — l'officielle PHP
      # tourne en root (Apache doit binder :80 puis déposer ses privilèges vers
      # www-data lui-même). Y forcer un USER divergerait de l'amont et casserait le
      # bind. Le pod pose déjà un securityContext non-root (runAsUser 33/www-data,
      # KSV-0118 dans apps/redcap/redcap.yaml).
      - 'platform/redcap/image/Dockerfile'

  # ── Marquez vendored (chart 0.51.1, helm template figé) — posture amont ────
  # Le chart Marquez ne durcit pas ses workloads en amont (API Java + UI React,
  # images officielles non distroless). Findings inhérents au rendu.
  - id: KSV-0014 # rootfs read-only : l'API Marquez et l'UI web écrivent leur état
    # local (config rendue, build assets) ; le chart amont ne pose pas
    # readOnlyRootFilesystem (ni sur l'init wait-for-db).
    paths:
      - 'platform/marquez/marquez.yaml'
  - id: KSV-0118 # securityContext par défaut sur les workloads du chart amont
    # (API + web) — non durci en amont.
    paths:
      - 'platform/marquez/marquez.yaml'
  - id: KSV-0109 # ConfigMap référençant des paramètres de connexion : la config
    # Marquez (config.yml) interpole ${POSTGRES_PASSWORD} — une RÉFÉRENCE à la
    # variable d'env, alimentée par le Secret dédié marquez-pg-auth, PAS un mot de
    # passe en clair dans le ConfigMap.
    paths:
      - 'platform/marquez/marquez.yaml'

  # ── Images Marquez maison (Dockerfiles arm64) — fidélité à l'officielle ────
  # Les images officielles Marquez (API/web, amd64) tournent EN ROOT (pas de USER).
  # Nos images arm64 sont volontairement FIDÈLES à l'officielle (mêmes Dockerfiles
  # upstream 0.51.1) : y ajouter un USER non-root divergerait du comportement amont
  # (entrypoints écrivant sous /usr/src/app). Posture assumée.
  - id: DS-0002 # pas de USER non-root : aligné sur les images officielles (root).
    paths:
      - 'platform/marquez/image/Dockerfile'
      - 'platform/marquez/image-web/Dockerfile'
  - id: DS-0029 # apt-get sans --no-install-recommends : reproduit À L'IDENTIQUE le
    # Dockerfile API upstream 0.51.1 (postgresql-client/bash/coreutils). Ajouter le
    # flag divergerait du build amont vérifié — posture assumée (image de banc).
    paths:
      - 'platform/marquez/image/Dockerfile'
  - id: DS-0025 # apk add sans --no-cache : reproduit À L'IDENTIQUE le Dockerfile web
    # upstream 0.51.1 (node:18-alpine). Fidélité amont — posture assumée.
    paths:
      - 'platform/marquez/image-web/Dockerfile'
