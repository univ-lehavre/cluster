# Contrat d'interface cluster → atlas — ENDPOINTS (exemple générique)
#
# Services que le socle `cluster` expose à un consommateur intra-cluster
# (`atlas`). Valeurs d'exemple GÉNÉRIQUES (ADR 0023) : les FQDN/ports sont des
# briques stables que le dépôt propose (donc réels), mais aucune valeur propre à
# un déploiement (creds, IP de prod) n'y figure.
#
# Source de vérité pédagogique : docs/guide-dev-data.md (« Points d'accès »).
# Décision : docs/decisions/0043-contrat-interface-cluster-atlas.md.
#
# Tous les endpoints sont INTRA-CLUSTER (FQDN `*.svc.cluster.local`) : le code
# `atlas` tourne dans un pod du cluster. Les UIs sont aussi exposées en bordure
# via Gateway Cilium + cert-manager (hostnames d'exemple `*.cluster.lan`).
#
# ⚠️ RÉSOLUTION DNS — FQDN vs nom court (piège PROD). Le FQDN ci-dessous est la
# référence CANONIQUE (stable, diff-able). MAIS pour une résolution INTRA-POD fiable,
# préférer le NOM COURT : `<svc>` si le consommateur est dans le même namespace, sinon
# `<svc>.<ns>`. En prod, le `resolv.conf` des pods peut porter un search domain EXTERNE
# (DNS de l'organisation) avec `options ndots:5` : un FQDN complet (< 5 points) est
# alors traité comme relatif et le résolveur tente le suffixe externe AVANT le bon →
# TIMEOUT, surtout côté gRPC/c-ares (Dagster) et curl/glibc. Le nom court résout via le
# 1er search domain (`<ns>.svc.cluster.local`). Constaté sur dirqual (2026-06-22) :
# Dagster « gRPC UNAVAILABLE » sur FQDN, OK sur nom court (drift L58,
# univ-lehavre/cluster#458). Le banc Lima n'a pas ce search domain → le bug ne s'y voit pas.

contract_version: '1.0'

endpoints:
  # ── Base de données (CloudNativePG, cluster `pg`, ns postgres) ─────────────
  - id: postgres-rw
    service: pg-rw
    namespace: postgres
    fqdn: pg-rw.postgres.svc.cluster.local
    port: 5432
    protocol: tcp
    auth: secret-role # Secret `pg-role-<rôle>` (cf. namespaces-secrets)
    role: primary read-write
    source: platform/cloudnative-pg/cluster.yaml # Service généré par l'operator CNPG
    note: >-
      Cluster CNPG `pg` (HA 3 instances). Bases logiques : dagster, marquez,
      pgvector (extension SQL `vector`).

  - id: postgres-ro
    service: pg-ro
    namespace: postgres
    fqdn: pg-ro.postgres.svc.cluster.local
    port: 5432
    protocol: tcp
    auth: secret-role
    role: replicas read-only
    source: platform/cloudnative-pg/cluster.yaml
    note: Load-balance les lectures sur les réplicas (analytics/OLAP).

  # ── Lineage (Marquez / OpenLineage, ns marquez) ───────────────────────────
  - id: marquez-api
    service: marquez
    namespace: marquez
    fqdn: marquez.marquez.svc.cluster.local
    port: 5000
    protocol: http
    auth: none # intra-cluster
    source: platform/marquez/marquez.yaml
    note: >-
      API OpenLineage. POST événements sur /api/v1/lineage ; lecture sur
      /api/v1/namespaces/<ns>/jobs. Variable consommateur :
      OPENLINEAGE_URL=http://marquez.marquez.svc.cluster.local:5000

  - id: marquez-web
    service: marquez-web
    namespace: marquez
    fqdn: marquez-web.marquez.svc.cluster.local
    port: 3000
    protocol: http
    auth: none
    layer: dataops
    source: platform/marquez/marquez.yaml
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    note: UI de visualisation du lineage.

  # ── Orchestrateur (Dagster, ns dagster) ───────────────────────────────────
  - id: dagster-webserver
    service: dagster-dagster-webserver
    namespace: dagster
    fqdn: dagster-dagster-webserver.dagster.svc.cluster.local
    port: 80
    protocol: http
    auth: none
    layer: dataops
    source: platform/dagster/dagster.yaml
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    note: >-
      Orchestrateur livré VIDE ; le code (assets/code-locations) est déployé
      par atlas (ADR 0022/0026). Event log dans la base `dagster` (CNPG).
      ⚠️ INJECTION DES ENV DANS LES PODS DE RUN (piège, ADR 0086) : les variables
      d'environnement (MLFLOW_TRACKING_URI, OPENLINEAGE_URL…) posées sur le
      Deployment de la code-location gRPC ne se propagent PAS aux pods de RUN créés
      par le K8sRunLauncher. Un run aboutit alors SUCCESS mais le logging est un
      no-op silencieux (variable absente du pod de run). Le consommateur DOIT
      déclarer ces variables via un tag `dagster-k8s/config`
      (`container_config.env` ou `env_from`) sur ses jobs
      (`define_asset_job(..., tags={"dagster-k8s/config": {...}})`) pour qu'elles
      atteignent les pods de run. Cf. atlas `_RUN_K8S_CONFIG` (definitions.py) et la
      garde `deploy/validate.sh` qui vérifie MLFLOW_TRACKING_URI dans le rendu.

  # ── Suivi de modèles (MLflow, ns mlflow) ──────────────────────────────────
  - id: mlflow-tracking
    service: mlflow
    namespace: mlflow
    fqdn: mlflow.mlflow.svc.cluster.local
    port: 5000
    protocol: http
    auth: none # intra-cluster
    layer: dataops
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/mlflow/mlflow.yaml
    note: >-
      Serveur de suivi de modèles (addon socle, précédent Dagster ADR 0026).
      Backend store = base `mlflow` (CNPG) ; artefact store = bucket S3 (OBC).
      Variable consommateur (pendant de OPENLINEAGE_URL pour Marquez) :
      MLFLOW_TRACKING_URI=http://mlflow.mlflow.svc.cluster.local:5000 — logguer
      runs/params/métriques et enregistrer les modèles depuis atlas. ⚠️ Cette
      variable doit atteindre les PODS DE RUN (pas seulement la code-location) :
      l'injecter via le tag `dagster-k8s/config` — cf. la note de `dagster-webserver`
      ci-dessus (piège ADR 0086, sinon logging MLflow no-op silencieux).
      Chaîne MLOps atlas (maturité 1→2) : la détection de DRIFT (Evidently, asset
      check Dagster à côté des suites Great Expectations) logue ses métriques ici ;
      l'entraînement CONTINU (schedule/sensor Dagster sur transform_job) trace ses
      re-trainings dans les runs MLflow. AUCUNE ancre socle nouvelle : Evidently lit
      les parquets du bucket S3 existant (backing OBC), pas d'infra dédiée.

  # ── Registry d'images interne (ns registry) ───────────────────────────────
  - id: registry
    service: registry
    namespace: registry
    fqdn: registry.registry.svc.cluster.local
    short_ref: registry:80 # alias résolu côté nœud (manifestes : registry:80/<repo>:<tag>)
    port: 80
    protocol: http # HTTP sans auth (ADR 0011, air-gap)
    auth: none
    source: platform/container-registry/service.yaml
    note: >-
      Référencer les images en `registry:80/<repo>:<tag>`. Pull en HTTP sur les
      nœuds (containerd `use_local_image_pull`).

  # ── Stockage objet S3 — DEUX backings selon le profil (ADR 0036) ──────────
  - id: s3-datalake-ceph
    service: rook-ceph-rgw-datalake
    namespace: rook-ceph
    fqdn: rook-ceph-rgw-datalake.rook-ceph.svc.cluster.local
    port: 80
    protocol: http
    auth: secret-obc # creds générés par un ObjectBucketClaim (cf. namespaces-secrets)
    profil: ceph # prod / banc Ceph
    source: storage/ceph/storageClass/datalake/
    note: >-
      RGW Ceph (CephObjectStore `datalake`, 3 instances). Endpoint S3 path-style.
      Un consommateur crée son bucket via un ObjectBucketClaim.

  - id: s3-datalake-light
    service: seaweedfs
    namespace: s3
    fqdn: seaweedfs.s3.svc.cluster.local
    port: 8333
    protocol: http
    auth: secret-static # creds de test génériques (banc uniquement)
    profil: local-path # banc rapide (sans Ceph)
    source: platform/seaweedfs/seaweedfs.yaml
    note: >-
      SeaweedFS — backing S3 LÉGER du banc rapide (ADR 0036). N'existe pas en
      prod : en mode Ceph, viser `s3-datalake-ceph`.

  # ── UI de la plateforme (portail atlas, #232) ──────────────────────────────
  # UI web exposées en bordure (Gateway Cilium + cert-manager). Le `layer`
  # regroupe au portail (socle / monitoring / gitops / dataops). `auth` indique
  # comment l'utilisateur récupère son accès : `none` (réseau privé, ADR 0003),
  # `secret-admin` (mot de passe dans un Secret K8s à lire), `token` (jeton de
  # ServiceAccount). Dagster/Marquez ont déjà leur entrée ci-dessus ; voici les
  # UI restantes de la chaîne (cf. docs/guide-dev-data.md « déployer depuis atlas »).
  - id: grafana-ui
    service: kube-prometheus-stack-grafana
    namespace: monitoring
    fqdn: kube-prometheus-stack-grafana.monitoring.svc.cluster.local
    port: 80
    protocol: http
    auth: secret-admin # Secret kube-prometheus-stack-grafana (clé admin-password)
    layer: monitoring
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/kube-prometheus-stack/gateway.yaml
    note: Tableaux de bord métriques (Prometheus datasource).

  # ── Observabilité INTERROGEABLE (API, pas UI) — un consommateur peut requêter ──
  - id: prometheus-api
    service: kube-prometheus-stack-prometheus
    namespace: monitoring
    fqdn: kube-prometheus-stack-prometheus.monitoring.svc.cluster.local
    port: 9090
    protocol: http
    auth: none # intra-cluster
    layer: monitoring
    source: platform/kube-prometheus-stack/
    note: API PromQL (/api/v1/query). Datasource de Grafana ; requêtable directement.

  - id: alertmanager-api
    service: kube-prometheus-stack-alertmanager
    namespace: monitoring
    fqdn: kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local
    port: 9093
    protocol: http
    auth: none # intra-cluster
    layer: monitoring
    source: platform/kube-prometheus-stack/
    note: API Alertmanager (/api/v2/alerts). État des alertes actives.

  - id: loki-api
    service: loki
    namespace: monitoring
    fqdn: loki.monitoring.svc.cluster.local
    port: 3100
    protocol: http
    auth: none # intra-cluster
    layer: monitoring
    source: platform/loki/
    note: API LogQL (/loki/api/v1/query_range). Logs agrégés ; datasource Grafana.

  - id: metrics-server
    service: metrics-server
    namespace: kube-system
    fqdn: metrics-server.kube-system.svc.cluster.local
    port: 443
    protocol: https
    auth: none # APIService agrégé (metrics.k8s.io) — `kubectl top`
    layer: socle
    source: platform/metrics-server/
    note: Backe `kubectl top` (metrics.k8s.io). Pas d'UI ; consommé par le HPA / top.

  - id: mailpit-ui
    service: mailpit
    namespace: mailpit
    fqdn: mailpit.mailpit.svc.cluster.local
    port: 8025
    protocol: http
    auth: none # intra-cluster / réseau privé
    layer: monitoring
    profil: local-path # BANC only (comme seaweedfs) — SMTP de test, absent en prod
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/mailpit/gateway.yaml
    note: >-
      Boîte mail de test (capture les alertes/notifications du banc). N'existe PAS
      en prod (ns mailpit absent de dirqual) — outil de banc.

  - id: argocd-ui
    service: argocd-server
    namespace: argocd
    fqdn: argocd-server.argocd.svc.cluster.local
    port: 80
    protocol: http
    auth: secret-admin # Secret argocd-initial-admin-secret (clé password)
    layer: gitops
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/argocd/gateway.yaml
    note: >-
      UI GitOps (état des Application, sync/health). CLI gRPC via Gateway non
      fonctionnel en l'état (finding #26) ; UI/REST OK.

  - id: gitea-ui
    service: gitea-http
    namespace: gitea
    fqdn: gitea-http.gitea.svc.cluster.local
    port: 80
    protocol: http
    auth: secret-admin # Secret gitea-admin (créé à l'init du dépôt, clé password)
    layer: gitops
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/gitea/service.yaml
    note: Forge git intra-banc (air-gapped) — source des workflows atlas (ADR 0044).

  - id: k8s-dashboard-ui
    service: kubernetes-dashboard
    namespace: kubernetes-dashboard
    fqdn: kubernetes-dashboard.kubernetes-dashboard.svc.cluster.local
    port: 443
    protocol: https
    auth: token # jeton du ServiceAccount admin-user (kubectl create token), ADR 0010
    layer: socle
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/k8s-dashboard/
    note: Tableau de bord Kubernetes (cluster-admin, ADR 0010).

  - id: portal-ui
    service: portal
    namespace: portal
    fqdn: portal.portal.svc.cluster.local
    port: 80
    protocol: http
    auth: none # vue lecture seule ; aucun secret exposé (ADR 0091 §3)
    layer: socle
    exposed: true # exposé en NodePort L4 (ADR 0092 ; port auto, observé par le portail)
    source: platform/portal/
    note: >-
      Portail d'accès aux UI (ADR 0091) : vue unifiée des endpoints de la plateforme
      (par couche, liens nouvel onglet, commandes pour récupérer les credentials). Se
      liste lui-même (dogfooding du contrat).

# ── Matrice d'accès réseau (NetworkPolicy default-deny) ──────────────────────
# ⚠️ CRITIQUE pour un consommateur. Le socle applique un régime DEFAULT-DENY par
# namespace (platform/network-policies/) : un Service joignable au niveau DNS/port
# peut être DROP par la policy si le namespace SOURCE n'est pas sur l'allowlist
# d'ingress de la cible. Le contrat publie donc, par endpoint restreint, les
# namespaces consommateurs AUTORISÉS. Source de vérité : platform/network-policies/.
#
# RÈGLE pour atlas : tout NOUVEAU namespace consommateur exige une PR cluster qui
# (a) l'AJOUTE à l'allowlist d'ingress de la cible, ET (b) déclare ses propres
# egress (le default-deny s'applique AUSSI aux namespaces atlas). Sans ça : DROP
# silencieux (timeouts/TCP retries, pas une erreur claire).
network_access:
  - endpoint: postgres-rw / postgres-ro
    ingress_from: [dagster, marquez, mlflow, citation-serving]
    source: platform/network-policies/postgres/allow-postgres-ingress.yaml
    note: >-
      citation-ingest / citation-marts / citation-pwa sont BLOQUÉS vers pg-rw/pg-ro
      tant qu'ils ne sont pas ajoutés à cette allowlist (PR cluster).
  - endpoint: marquez-api (POST lineage :5000)
    ingress_from: [dagster]
    source: platform/network-policies/marquez/allow-openlineage-ingress.yaml
    note: >-
      Seul le ns dagster peut POSTer du lineage. Un code atlas émettant depuis son
      PROPRE namespace serait DROP → ajouter ce ns à l'allowlist (PR cluster).
  - endpoint: mlflow-tracking (:5000)
    ingress_from: [] # AUCUNE restriction de source (port-only) — joignable de partout
    source: platform/network-policies/mlflow/allow-web-ingress.yaml
    note: Asymétrie assumée — pas d'allowlist source (contrairement à postgres/marquez).
  - endpoint: registry (:80) / s3 datalake (RGW, rook-ceph)
    ingress_from: [] # pas de default-deny restrictif côté cible — joignables
    note: registry HTTP ouvert (air-gap, ADR 0011) ; rook-ceph sans default-deny.
