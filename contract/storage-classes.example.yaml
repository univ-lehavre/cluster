# Contrat d'interface cluster → atlas — STORAGECLASSES (exemple générique)
#
# StorageClasses que le socle expose, PAR PROFIL (ADR 0035/0036). Un consommateur
# `atlas` choisit sa SC selon le profil actif du déploiement.
#
# Décision : docs/decisions/0043-contrat-interface-cluster-atlas.md.
# Règle : UNE SEULE SC `default` est active à la fois (posée par le banc via
# bench/lima/run-phases.sh::set_default_sc — local-path en mode rapide,
# rook-ceph-block-replicated en mode Ceph).

contract_version: '1.0'

profils:
  # ── Profil Ceph : stockage résilient (prod / preuve e2e) ──────────────────
  ceph:
    description: >-
      Stockage résilient via Rook-Ceph (RBD bloc, CephFS, RGW objet). Profil de
      PRODUCTION et de preuve (ADR 0034). Réplication ×3 ou erasure coding 2+1.
    default_storage_class: rook-ceph-block-replicated
    storage_classes:
      - name: rook-ceph-block-replicated
        provisioner: rook-ceph.rbd.csi.ceph.com
        kind: block # RBD
        durabilite: réplication ×3 (failureDomain host)
        reclaim_policy: Delete
        expansion: true
        default: true
        usage: >-
          SC par défaut. StatefulSets et workloads durables (CNPG l'utilise —
          jamais d'EC pour le stateful, ADR 0001).
        source: storage/ceph/storageClass/block-replicated.yaml

      - name: rook-ceph-block-ec
        provisioner: rook-ceph.rbd.csi.ceph.com
        kind: block # RBD + erasure coding 2+1
        durabilite: metadata ×3 + data EC 2+1 (compact)
        reclaim_policy: Retain
        expansion: true
        default: false
        usage: Archives / données peu accédées. PAS pour le stateful (ADR 0001).
        source: storage/ceph/storageClass/block-ec-retain.yaml

      - name: rook-ceph-block-ec-delete
        provisioner: rook-ceph.rbd.csi.ceph.com
        kind: block # variante reclaim Delete
        durabilite: metadata ×3 + data EC 2+1
        reclaim_policy: Delete
        expansion: true
        default: false
        usage: Données éphémères + erasure coding.
        source: storage/ceph/storageClass/block-ec-delete.yaml

      - name: rook-cephfs
        provisioner: rook-ceph.cephfs.csi.ceph.com
        kind: filesystem # CephFS, ReadWriteMany
        durabilite: réplication ×3
        reclaim_policy: Delete
        expansion: false
        default: false
        usage: Volumes partagés POSIX multi-lecteur (RWX).
        source: storage/ceph/storageClass/filesystem/

    object_store:
      # S3 n'est PAS une StorageClass : on l'obtient via ObjectBucketClaim
      # (cf. contract/namespaces-secrets.example.yaml).
      bucket_storage_class: rook-ceph-datalake
      provisioner: rook-ceph.ceph.rook.io/bucket
      endpoint: rook-ceph-rgw-datalake.rook-ceph.svc.cluster.local:80
      note: Déclarer un ObjectBucketClaim avec cette StorageClass pour un bucket S3.

  # ── Profil local-path : stockage léger (banc rapide, NON résilient) ───────
  local-path:
    description: >-
      Stockage local au nœud (rancher local-path), NON résilient. Profil
      d'ITÉRATION rapide (~11 min sans Ceph, ADR 0035). PAS une preuve : un
      changement validé ici doit repasser en profil Ceph (ADR 0034).
    default_storage_class: local-path
    storage_classes:
      - name: local-path
        provisioner: rancher.io/local-path
        kind: block # filesystem local node-bound
        durabilite: aucune (perte du nœud = perte des données)
        reclaim_policy: Delete
        volume_binding_mode: WaitForFirstConsumer
        default: true
        usage: PVC simples pour itérer vite sur ce qui n'exige pas Ceph.
        source: storage/local-path/local-path-storage.yaml

    object_store:
      endpoint: seaweedfs.s3.svc.cluster.local:8333
      note: >-
        Backing S3 léger = SeaweedFS (ADR 0036), creds de test statiques. Pas
        d'ObjectBucketClaim (pas de provisioner bucket en profil léger).

# ── Dimensionnement des volumes : qui décide quoi ────────────────────────────
# RÈGLE : le cluster fournit des StorageClasses EXTENSIBLES + une capacité ; ATLAS
# DÉCIDE les tailles de SES volumes (il connaît sa volumétrie : embeddings pgvector,
# artefacts MLflow, datasets datalake — le cluster ne peut pas la deviner). Le
# cluster n'IMPOSE pas de taille à atlas.
dimensionnement:
  responsabilite: >-
    atlas dimensionne ses propres PVC/données. Le cluster garantit des SC
    extensibles (expansion: true sur les SC bloc Ceph) et une capacité partagée ;
    il ne fige PAS de taille côté atlas.
  # Volumes possédés par le CLUSTER (atlas n'y touche pas) — valeurs d'exemple
  # (ADR 0023), dérivées des rôles plateforme. Indicatif, pas un quota atlas.
  volumes_cluster:
    - cnpg_postgres: 5Gi par instance ×3 (réplication CNPG) # base pgvector incluse
    - registry: 1Ti # images applicatives
    - prometheus: 10Gi
    - loki: 5Gi
    - gitea: 10Gi
  # Ce qu'atlas dimensionne LUI-MÊME :
  volumes_atlas:
    - pgvector_data: >-
        la base logique pgvector grandit avec les embeddings ; vit dans le PVC CNPG
        (SC rook-ceph-block-replicated, EXTENSIBLE). Étendre = patcher la taille du
        Cluster CNPG (resize en ligne, expansion: true).
    - mlflow_artifacts: objet S3 (datalake RGW) — pas de PVC à dimensionner, croît dans le pool.
    - datalake_objets: objet S3 (ObjectBucketClaim) — capacité = celle du pool Ceph.
  # Capacité du cluster (exemple générique ; valeur RÉELLE lue à chaud, jamais figée
  # au contrat) : interroger `kubectl -n rook-ceph get cephcluster -o
  # jsonpath='{.items[0].status.ceph.capacity}'` (bytesAvailable/Total/Used).
  capacite_note: >-
    capacité partagée Ceph, abondante (ordre de centaines de Tio sur un parc
    multi-nœuds). Lire le disponible réel via le status du CephCluster.
  expansion_procedure: >-
    PVC sur SC `expansion: true` : éditer `.spec.resources.requests.storage` du PVC
    (ou du Cluster CNPG pour pgvector) à une valeur SUPÉRIEURE → resize en ligne
    (Ceph RBD). Jamais de réduction. Les SC `expansion: false` (CephFS) ne se
    redimensionnent pas → recréer.
