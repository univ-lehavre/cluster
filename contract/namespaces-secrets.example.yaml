# Contrat d'interface cluster → atlas — NAMESPACES & SECRETS (exemple générique)
#
# Conventions de namespaces de destination et de secrets que `atlas` doit
# connaître pour se brancher au socle. Valeurs d'exemple GÉNÉRIQUES (ADR 0023) :
# les noms de Secrets/clés sont des conventions stables (réelles), mais les
# VALEURS (mots de passe, creds) sont des exemples de banc — jamais de prod.
#
# Décision : docs/decisions/0043-contrat-interface-cluster-atlas.md.

contract_version: '1.0'

# ── Namespaces de destination applicatifs (AppProject `atlas`) ──────────────
# Déclarés dans platform/argocd/appproject-atlas.yaml : Argo CD n'autorise le
# déploiement de l'applicatif `atlas` QUE dans ces namespaces (ADR 0022).
namespaces:
  applicatif:
    source: platform/argocd/appproject-atlas.yaml
    note: >-
      Les namespaces `citation-*` sont des CIBLES de déploiement (leur contenu
      métier vit dans atlas, ADR 0023). Les addons (dagster/marquez) sont posés
      par le socle ; atlas y ajoute son code.
    items:
      - name: citation-ingest
        usage: ingestion / normalisation des sources (à définir côté atlas)
      - name: citation-marts
        usage: modèles & agrégations
      - name: citation-serving
        usage: API de service
      - name: citation-pwa
        usage: frontend
      - name: dagster
        usage: orchestrateur (addon socle) + code-locations déployées par atlas
      - name: marquez
        usage: store de lineage (addon socle)
      - name: mlflow
        usage: serveur de suivi de modèles (addon socle) — runs/params/modèles d'atlas

  plateforme:
    # Namespaces du socle, gérés par Ansible (pas par atlas) — listés pour
    # référence (un consommateur s'y connecte mais n'y déploie pas).
    items:
      - name: postgres
        usage: cluster CNPG `pg` + bases logiques
      - name: registry
        usage: registry d'images interne
      - name: rook-ceph
        usage: stockage Ceph + RGW datalake
      - name: s3
        usage: SeaweedFS (backing S3 léger, banc only)
      - name: monitoring
        usage: Prometheus / Grafana / Alertmanager
      - name: cert-manager
        usage: CA interne / TLS de bordure
      - name: cnpg-system
        usage: operator CloudNativePG
      - name: argocd
        usage: Argo CD (moteur GitOps) — UI consommée par atlas
      - name: gitea
        usage: forge Git intra-banc — UI/API consommée par atlas
      - name: mailpit
        usage: SMTP de test / boîte mail de bordure (alerting)
      - name: kubernetes-dashboard
        usage: dashboard Kubernetes (UI d'administration)
      - name: portal
        usage: portail d'accès aux UI (vue lecture seule, ADR 0091)

# ── Conventions de secrets ───────────────────────────────────────────────────
# Principe (ADR 0023) : les Secrets vivent HORS dépôt (config locale non
# versionnée) ; seuls des patrons `*.example.yaml` sont versionnés. Ci-dessous,
# les conventions de NOMS et de CLÉS que atlas doit respecter/consommer.
secrets:
  # Rôles PostgreSQL managés par CNPG (cluster `pg`, ns postgres).
  # Type kubernetes.io/basic-auth — clés `username` / `password`.
  postgres_roles:
    type: kubernetes.io/basic-auth
    namespace: postgres
    keys: [username, password]
    items:
      - secret: pg-role-dagster
        role: dagster
        database: dagster
      - secret: pg-role-pgvector
        role: pgvector
        database: pgvector # extension SQL `vector`
      - secret: pg-role-marquez
        role: marquez
        database: marquez
      - secret: pg-role-mlflow
        role: mlflow
        database: mlflow # backend store du serveur de suivi de modèles
      - secret: pg-role-cache
        role: cache
        database: cache # backing service du cache partagé des flux atlas (ADR 0093)
    example_file: platform/cloudnative-pg/role-secrets.example.yaml

  # Secrets DÉRIVÉS attendus par les charts Dagster/Marquez (noms de clés
  # STRICTS, différents de `password`) : recopier la valeur du Secret CNPG.
  derived:
    - secret: dagster-pg-auth
      namespace: dagster
      key: postgresql-password # STRICT (attendu par le chart Dagster)
      derived_from: pg-role-dagster.password
      example_file: platform/dagster/pg-secret.example.yaml
    - secret: marquez-pg-auth
      namespace: marquez
      key: marquez-db-password # STRICT (attendu par le chart Marquez)
      derived_from: pg-role-marquez.password
      example_file: platform/marquez/pg-secret.example.yaml
    - secret: mlflow-pg-auth
      namespace: mlflow
      key: postgresql-password # mot de passe du backend store CNPG `mlflow`
      derived_from: pg-role-mlflow.password
      example_file: platform/mlflow/pg-secret.example.yaml
    # Recopie username+password du rôle CNPG `pgvector` dans le ns `dagster`, pour que
    # les code-locations atlas (transform_job/index_load) injectent POSTGRES_USER/PASSWORD
    # dans leurs pods de run via secretKeyRef (le Secret CNPG vit en ns postgres,
    # inatteignable depuis un pod dagster). Posé par le rôle platform-dagster.
    - secret: pgvector-pg-auth
      namespace: dagster
      keys: [username, password] # 2 clés (≠ les dérivés mono-clé ci-dessus)
      derived_from: pg-role-pgvector.{username,password}
      consumer: atlas transform_job (POSTGRES_USER/POSTGRES_PASSWORD via secretKeyRef)

  # Creds S3 des backups CNPG (Barman) — mêmes noms de clés quel que soit le
  # backing (RGW Ceph en prod, SeaweedFS au banc).
  s3_backup:
    secret: pg-backup-s3
    namespace: postgres
    keys: [ACCESS_KEY_ID, ACCESS_SECRET_KEY]
    example_file: platform/cloudnative-pg/secret.example.yaml

  # Accès S3 datalake (profil Ceph) : un consommateur déclare un ObjectBucketClaim
  # ; Rook provisionne le bucket ET un Secret homonyme avec les creds.
  object_bucket_claim:
    how_to: >-
      Déclarer un ObjectBucketClaim (storageClassName: rook-ceph-datalake) dans son
      namespace ; Rook crée un Secret de MÊME nom portant les creds + coordonnées.
    generated_secret_keys: [AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY]
    generated_configmap_keys: [BUCKET_HOST, BUCKET_NAME, BUCKET_PORT]
    example:
      apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      metadata:
        name: atlas-datalake
        namespace: citation-ingest
      spec:
        bucketName: atlas-datalake
        storageClassName: rook-ceph-datalake

  # Token API Gitea : le Secret gitea-admin ne porte QUE user/password. Le token
  # API (push GitOps) se DÉRIVE dans le pod gitea :
  #   kubectl -n gitea exec <pod-gitea> -- gitea admin user generate-access-token \
  #     --username atlas-admin --scopes all --raw
  gitea_api_token:
    derived_from: gitea-admin (user/password)
    how_to: gitea admin user generate-access-token (dans le pod gitea)
    note: Non stocké en Secret ; généré à la demande (cf. bench/lima/gitea-init.sh).

# ── Infra de bordure PARTAGÉE (pour qu'atlas expose son propre frontend) ─────
# Un consommateur qui veut exposer une UI (ex. citation-pwa) via la même bordure
# que les ui_hostname du contrat a besoin de ces deux objets cluster-scope.
infra_bordure:
  gateway_class:
    name: cilium
    controller: io.cilium/gateway-controller
    note: >-
      GatewayClass à référencer dans un Gateway hostNetwork (ADR 0071) pour exposer
      une route TLS (hostPort 443 sur l'IP du nœud). Cf. platform/mailpit/gateway.yaml.
  ca_interne:
    cluster_issuer: internal-ca # ClusterIssuer cert-manager (ADR 0021)
    ca_secret: root-ca-secret # ns cert-manager, clé ca.crt — CA à truster côté client
    note: >-
      cert-manager signe les certs de bordure avec cette CA interne. Un client qui
      appelle une UI en TLS doit truster ca.crt (ou accepter le cert auto-signé).

# ── Ce que atlas attend du socle (indicatif, non normatif ici) ──────────────
# Détail des schémas/formats de données = dépôt atlas (frontière ADR 0023).
attendu_par_atlas:
  - base CNPG `dagster` joignable (pg-rw.postgres:5432) + Secret pg-role-dagster
  - base CNPG `pgvector` (extension `vector`) + Secret pg-role-pgvector
    (+ dérivé pgvector-pg-auth en ns dagster pour les code-locations)
  - API Marquez OpenLineage (marquez.marquez:5000)
  - endpoint S3 datalake selon profil (RGW Ceph ou SeaweedFS) + mécanisme OBC
  - registry interne joignable (registry:80) pour pousser/tirer les images
  - orchestrateur Dagster vide où déployer ses code-locations
  - serveur MLflow joignable (mlflow.mlflow:5000) pour logguer runs/params/métriques
    et enregistrer les modèles (backend store CNPG `mlflow` + artefact store S3/OBC)
