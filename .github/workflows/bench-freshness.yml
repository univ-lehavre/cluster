name: Bench freshness

# Garde-fou de fraîcheur des preuves de banc (ADR 0042 amendé / ADR 0045 §6). Le
# banc Lima NE PEUT PAS tourner en CI (nested virt, arm64, ~30 min) : ce workflow
# n'EXÉCUTE pas l'e2e — il OBSERVE la date du dernier run de CHAQUE chemin nommé
# (bench/lima/runs-history.yaml, champ `target`) et ALERTE quand l'un dépasse SA
# cadence (atlas 7 j, storage-real 30 j ; cluster-dataops 90 j en warn-only). Un
# run atlas frais ne masque donc plus un storage-real périmé (#244). NON BLOQUANT
# : cron seulement, jamais sur `push`/`pull_request`.
#
# Cron quotidien (08:00 UTC). Si un chemin obligatoire dépasse sa cadence, le job
# échoue de façon VISIBLE et ouvre/met à jour une issue de rappel nommant le(s)
# chemin(s) périmé(s).
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      seuil_jours:
        description: 'Seuil de fraîcheur en jours (défaut 7)'
        required: false
        default: '7'

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
      - run: uv sync

      - name: Vérifier la fraîcheur du dernier run de banc
        id: check
        env:
          SEUIL_JOURS: ${{ github.event.inputs.seuil_jours || '7' }}
        # Verdict porté en Python natif (`artifact check-freshness`, ADR 0101 — ex
        # check-freshness.sh). On capture le code de sortie (0 frais / 1 périmé / 2
        # aucune preuve) sans faire échouer l'étape ici : le verdict est posté en
        # sortie pour piloter l'ouverture d'issue, puis l'étape finale matérialise
        # l'échec.
        run: |
          set +e
          out=$(uv run python scripts/topology.py artifact check-freshness \
            --seuil-jours "${SEUIL_JOURS}" 2>&1); rc=$?
          echo "$out"
          {
            echo "rc=$rc"
            echo "summary<<EOF"
            echo "$out"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      # Ouvre (ou met à jour) une issue de rappel quand la preuve est périmée
      # ou absente (rc != 0). ADR 0042 §1 : signaler, ne pas bloquer.
      #
      # Anti-doublon : l'unicité repose sur le LABEL `bench-freshness`, PAS sur une
      # recherche par titre. Le titre contient emoji + tirets cadratins +
      # parenthèses, que la recherche plein-texte de GitHub tokenise mal
      # (`--search "<titre> in:title"` renvoyait 0 même quand l'issue existe) →
      # une nouvelle issue était créée à chaque run (doublons #273/#288). Le
      # filtre `--label` est un match EXACT et fiable : au plus une issue ouverte.
      - name: Ouvrir/mettre à jour l'issue de rappel
        if: ${{ steps.check.outputs.rc != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          LABEL="bench-freshness"
          TITLE="⏰ Preuve de banc périmée — relancer le(s) chemin(s) concerné(s)"
          NOTE="— Détecté par bench-freshness.yml (ADR 0042 / ADR 0045 §6). Le détail"
          NOTE="${NOTE} ci-dessus nomme le(s) chemin(s) périmé(s) ; relancer ce(s) chemin(s)"
          NOTE="${NOTE} (bench/lima/run-phases.sh <chemin>) et committer le run. Refermer ensuite."
          BODY=$(printf '%s\n\n%s' "$SUMMARY" "$NOTE")
          # Filet de sécurité : crée le label s'il manque (idempotent), sinon le
          # premier run sur un dépôt neuf échouerait au --label.
          gh label create "$LABEL" --color FBCA04 \
            --description "Rappel auto de fraîcheur des preuves de banc — une seule à la fois" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          # Recherche EXACTE par label (pas par titre) → au plus une issue ouverte.
          EXISTING=$(gh issue list --state open --label "$LABEL" --json number --jq '.[0].number // empty' --repo "$GITHUB_REPOSITORY")
          if [ -n "$EXISTING" ]; then
            echo "Issue de rappel #$EXISTING déjà ouverte → commentaire (pas de doublon)."
            gh issue comment "$EXISTING" --body "$BODY" --repo "$GITHUB_REPOSITORY"
          else
            echo "Aucune issue de rappel ouverte → création."
            gh issue create --title "$TITLE" --body "$BODY" --label "$LABEL" --repo "$GITHUB_REPOSITORY"
          fi

      - name: Matérialiser le verdict (visible, non bloquant pour les PR)
        if: ${{ steps.check.outputs.rc != '0' }}
        run: |
          echo "Preuve de banc non fraîche (voir l'issue de rappel)."
          exit 1
