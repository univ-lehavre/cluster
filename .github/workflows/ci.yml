name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege explicite du GITHUB_TOKEN (check OpenSSF Scorecard
# « Token-Permissions », ADR 0080). Tous les jobs sont en lecture seule
# (lint/scan statiques, aucun commentaire/push) : le défaut restrictif suffit ;
# un job qui aurait besoin d'écrire redéclarerait son propre bloc permissions.
permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          config_file: .yamllint.yaml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: warning

  # Scripts qui échappent au job shellcheck par leur extension (audit P3 #36) :
  # le template `.sh.j2` (corps bash, sans jinja) et le script Perl `.pl`.
  scripts-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: shellcheck du template etcd-snapshot.sh.j2
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning --shell=bash \
            bootstrap/roles/etcd-backup/templates/etcd-snapshot.sh.j2
      - name: perl -c des scripts Perl
        run: |
          rc=0
          for f in $(git ls-files '*.pl'); do
            echo "== perl -c $f =="
            perl -c "$f" || rc=1
          done
          exit $rc

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
      # Réutilise `pnpm lint:k8s` (source unique) au lieu de redupliquer le find :
      # cette cible filtre via `git ls-files` (n'inclut pas les .yaml gitignorés)
      # et ses exclusions sont alignées sur le hook pre-push lefthook.
      - name: Validate manifests
        run: pnpm lint:k8s

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Ansible collections in user path
        run: ansible-galaxy collection install --force -r bootstrap/requirements.yml -p ~/.ansible/collections
      - uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0
        with:
          working_directory: bootstrap/

  # Vérification de syntaxe des playbooks (audit P2 / 02-tests) : complète
  # ansible-lint (qui valide les bonnes pratiques) par un `--syntax-check` qui
  # garantit que chaque playbook se PARSE (includes, rôles, templating).
  ansible-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install ansible-core
        run: pipx install ansible-core
      - name: Install collections
        run: ansible-galaxy collection install --force -r bootstrap/requirements.yml
      - name: Syntax-check des playbooks
        working-directory: bootstrap
        run: |
          rc=0
          # Le hosts.yaml réel n'est pas versionné (ADR 0023) ; en CI on utilise
          # le modèle générique versionné comme inventaire.
          inv=hosts.example.yaml
          for p in *.yaml; do
            # Les inventaires (hosts*.yaml) ne sont pas des playbooks → on saute.
            case "$p" in hosts.yaml | hosts.example.yaml) continue ;; esac
            echo "== syntax-check $p =="
            ansible-playbook -i "$inv" --syntax-check "$p" || rc=1
          done
          exit $rc

  jscpd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:dup

  # Python : lint + format (ruff), tests unittest et garde-fou Markdown
  # atteignable (ADR 0029). uv lit pyproject.toml + uv.lock (env reproductible) ;
  # on appelle les outils directement (pas via pnpm) pour ne pas installer Node.
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
      - run: uv sync
      - name: ruff check + format
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: tests unittest + couverture nestor (plancher fail_under, ADR 0080)
        run: |
          uv run coverage run -m unittest discover -s tests
          uv run coverage report
      - name: garde-fou Markdown atteignable (ADR 0029)
        run: uv run python scripts/check_md_orphans.py
      - name: garde-fou bloc « le dépôt en chiffres » à jour (ADR 0060)
        run: uv run python scripts/check_gouvernance.py --stats-check
      - name: garde-fou page registre-drifts.md à jour (générée, ADR 0017)
        run: uv run python scripts/render_drifts.py --check
      - name: garde-fou contrat cluster→atlas aligné sur platform/ (ADR 0043)
        run: uv run python scripts/check_contract.py
      - name: garde-fou parité graphe↔Ansible « Marquez oublié » (ADR 0096)
        run: uv run python scripts/check_topology.py

  # Tests unitaires des fonctions pures de state.sh (bats — audit P9 #12).
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:shell

  # Filet de PORTABILITÉ macOS↔Linux (ADR 0100). Le poste de contrôle est macOS
  # (Apple Silicon, arm64) ou Linux ; tout le reste de la CI tourne sur Ubuntu
  # (x86 / GNU coreutils), donc une dérive BSD/GNU (un `date -d` sans fallback, un
  # `mapfile` non gardé pour le bash 3.2…) n'est jamais détectée avant le poste du
  # mainteneur. Ce job rejoue les tests shell (bats) ET Python sur macOS arm64 —
  # un seul runner couvre l'axe OS (BSD) ET l'axe architecture (arm64). Non
  # bloquant n'est PAS souhaité : on veut casser tôt sur une régression de
  # portabilité réelle.
  portability-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Outils Homebrew (shellcheck + bash récent) — absents/anciens sur le runner
        # Le runner macOS n'a pas shellcheck, et son /bin/bash est en 3.2 (sans
        # `local -A`/`mapfile`). Un VRAI poste macOS utilise le bash Homebrew via
        # `#!/usr/bin/env bash` (ADR 0100) : on installe bash + on le met en tête
        # du PATH pour que bats source les libs avec bash ≥ 5, comme en réel.
        run: |
          brew install shellcheck bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
      - name: shellcheck sur macOS (BSD find/xargs)
        run: pnpm lint:shell
      - name: tests shell (bats) sur macOS arm64 — bash Homebrew du PATH
        run: pnpm test:shell
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
      - run: uv sync
      - name: tests unittest sur macOS arm64
        run: uv run python -m unittest discover -s tests

  # Lint Markdown (structure) — config tolérante (.markdownlint-cli2.yaml) :
  # cible les vrais défauts, pas le style typographique géré par prettier.
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          globs: '**/*.md'

  # NB : la validation des liens internes de la doc est désormais assurée par
  # `starlight-links-validator` (BLOQUANT au build Astro, workflow docs.yml) — il
  # connaît le base /cluster/ et résout les liens du site, ce que lychee (offline,
  # base virtuel) ne savait pas faire (ADR 0089). lychee a donc été retiré, comme
  # côté atlas. Les liens vers le code pointent désormais github.com/blob/main.

  # Scan de posture sécurité IaC (manifestes K8s, Dockerfile-like, config).
  # Échoue sur HIGH/CRITICAL. Les compromis actés sont listés, CIBLÉS PAR
  # CHEMIN et justifiés dans .trivyignore.yaml (cf. ADR 0010/0011/0012 + P6).
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy config/IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore.yaml
          skip-dirs: node_modules

  # Secret scanning : détecte clés/tokens/mots de passe committés par accident,
  # sur tout l'historique (mode `git`). Binaire gitleaks ÉPINGLÉ (version + SHA-256
  # vérifié, ADR 0006) plutôt que l'action wrapper, qui exige une licence pour les
  # dépôts d'organisation — le binaire est MIT, sans clé. Allowlist .gitleaks.toml :
  # ce catalogue n'a QUE des valeurs d'exemple (ADR 0023), les vraies vivent en
  # config locale gitignorée. NON BLOQUANT d'abord (modèle codeql/scorecard) : on
  # éprouve la pertinence avant de gater ; le rapport reste consultable dans le log.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # historique complet : le scan `git` couvre tous les commits
      - name: Installer gitleaks (binaire épinglé + checksum)
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan des secrets (historique git)
        run: |
          # exit-code 0 : non bloquant d'abord (informatif). Le rapport est dans
          # le log + uploadé en artefact. Passer --exit-code 1 pour gater ensuite.
          gitleaks git . \
            --config .gitleaks.toml \
            --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif \
            --exit-code 0
      - name: Archiver le rapport
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 5

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Merge en MERGE COMMIT (PAS squash, ADR 0037) : chaque commit de la PR
      # atterrit dans main → on valide TOUTE la plage de commits (pas le titre de
      # PR, qui n'est plus le commit final). commitlint sur from..to couvre
      # subject-case, longueurs, type/scope sur chacun.
      - name: Validate PR commits
        run: pnpm exec commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose
