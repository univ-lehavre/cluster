name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

  # Scripts qui échappent au job shellcheck par leur extension (audit P3 #36) :
  # le template `.sh.j2` (corps bash, sans jinja) et le script Perl `.pl`.
  scripts-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck du template etcd-snapshot.sh.j2
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning --shell=bash \
            bootstrap/roles/etcd-backup/templates/etcd-snapshot.sh.j2
      - name: perl -c des scripts Perl
        run: |
          rc=0
          for f in $(git ls-files '*.pl'); do
            echo "== perl -c $f =="
            perl -c "$f" || rc=1
          done
          exit $rc

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
      # Réutilise `pnpm lint:k8s` (source unique) au lieu de redupliquer le find :
      # cette cible filtre via `git ls-files` (n'inclut pas les .yaml gitignorés)
      # et ses exclusions sont alignées sur le hook pre-push lefthook.
      - name: Validate manifests
        run: pnpm lint:k8s

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible collections in user path
        run: ansible-galaxy collection install --force -r bootstrap/requirements.yml -p ~/.ansible/collections
      - uses: ansible/ansible-lint@main
        with:
          working_directory: bootstrap/

  # Vérification de syntaxe des playbooks (audit P2 / 02-tests) : complète
  # ansible-lint (qui valide les bonnes pratiques) par un `--syntax-check` qui
  # garantit que chaque playbook se PARSE (includes, rôles, templating).
  ansible-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-core
        run: pipx install ansible-core
      - name: Install collections
        run: ansible-galaxy collection install --force -r bootstrap/requirements.yml
      - name: Syntax-check des playbooks
        working-directory: bootstrap
        run: |
          rc=0
          # Le hosts.yaml réel n'est pas versionné (ADR 0023) ; en CI on utilise
          # le modèle générique versionné comme inventaire.
          inv=hosts.example.yaml
          for p in *.yaml; do
            # Les inventaires (hosts*.yaml) ne sont pas des playbooks → on saute.
            case "$p" in hosts.yaml | hosts.example.yaml) continue ;; esac
            echo "== syntax-check $p =="
            ansible-playbook -i "$inv" --syntax-check "$p" || rc=1
          done
          exit $rc

  jscpd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:dup

  # Tests unitaires des fonctions pures de state.sh (bats — audit P9 #12).
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:shell

  # Lint Markdown (structure) — config tolérante (.markdownlint-cli2.yaml) :
  # cible les vrais défauts, pas le style typographique géré par prettier.
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'

  # Vérification des liens (lychee) — mode hors-ligne : ne valide que les liens
  # internes / fichiers (les liens externes sont flaky en CI et hors de notre
  # contrôle). Couvre les liens cassés vers des fichiers/ancres du dépôt.
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--config lychee.toml --offline --no-progress "**/*.md"'
          fail: true

  # Scan de posture sécurité IaC (manifestes K8s, Dockerfile-like, config).
  # Échoue sur HIGH/CRITICAL. Les compromis actés sont listés, CIBLÉS PAR
  # CHEMIN et justifiés dans .trivyignore.yaml (cf. ADR 0010/0011/0012 + P6).
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config/IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore.yaml
          skip-dirs: node_modules,test/**/.vagrant

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: pnpm exec commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose
