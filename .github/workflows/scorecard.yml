name: Scorecard

# OpenSSF Scorecard — santé supply-chain du dépôt notée /10 (ADR 0080, issue
# #354 axe 1). Publie les résultats sur l'onglet Security (SARIF) et alimente le
# badge Scorecard du README. NON BLOQUANT : informe, ne gate pas (modèle des
# *-freshness.yml). Hebdomadaire + à chaque push sur main (le score reflète main).
on:
  branch_protection_rule:
  schedule:
    - cron: '30 7 * * 1' # tous les lundis 07:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege : le job élève au strict nécessaire (cf. ADR 0080).
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # uploader le SARIF sur l'onglet Security
      id-token: write # publier les résultats (publish_results)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # alimente le badge + l'API publique
          # Le check Branch-Protection LIT les réglages de protection via l'API
          # GraphQL, ce qui exige des droits ADMIN — le GITHUB_TOKEN (read-all)
          # ne les a pas, d'où l'erreur « Resource not accessible by integration ».
          # PAT fine-grained dédié (secret SCORECARD_TOKEN, scope = ce repo :
          # Administration: Read + Contents: Read) pour que Scorecard puisse NOTER
          # Branch-Protection au lieu d'échouer. Lecture seule : aucun pouvoir
          # d'écriture (ne contourne pas la doctrine token, ADR Token-Permissions).
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
