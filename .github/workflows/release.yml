name: Release

# Cadence : UNE release par jour, la nuit — au lieu d'une release par merge sur
# main (qui produisait plusieurs versions/jour, bruyantes). release-please ne
# tourne donc plus sur `push` mais sur un cron : il crée SA PR de release
# (cumulant tous les commits de la journée) ET l'auto-merge dans le même run →
# une seule version/jour. `workflow_dispatch` garde la possibilité de forcer une
# release à la demande.
#
# Cron en UTC (Actions n'a pas de fuseau) : 01:00 UTC = 03:00 Europe/Paris en
# heure d'été (CEST), 02:00 en heure d'hiver (CET). L'écart d'1 h l'hiver est
# sans incidence pour une release nocturne.
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # release-please dépose (ou met à jour) une PR « chore(main): release vX.Y.Z »
      # cumulant les commits depuis la dernière release. Au cron nocturne (1×/jour),
      # ce run la (re)génère puis l'auto-merge ci-dessous la fusionne dès que les
      # checks requis sont verts ; le tag git, la release GitHub et la mise à
      # jour de CHANGELOG.md + package.json suivent automatiquement.
      #
      # IMPORTANT — token : l'organisation univ-lehavre verrouille le GITHUB_TOKEN
      # par défaut en lecture seule (« Write permissions for workflows are
      # disabled by the organization »), ce qui empêche release-please de pousser
      # le tag/la release. On utilise donc un PAT fine-grained dédié
      # (secret RELEASE_PLEASE_TOKEN, scope = ce repo : Contents RW + Pull
      # requests RW). Ce token, contrairement au GITHUB_TOKEN, redéclenche aussi
      # la CI sur la PR de release — sans quoi l'auto-merge resterait bloqué en
      # attente de checks qui ne tournent jamais.
      #
      # La version cible est dérivée des messages Conventional Commits depuis
      # le dernier tag :
      #   - `feat:`               → bump minor (1.0.0 → 1.1.0)
      #   - `fix:` / `perf:`      → bump patch (1.0.0 → 1.0.1)
      #   - `feat!:` ou `BREAKING CHANGE:` → bump major (1.0.0 → 2.0.0)
      #   - Autres types (`chore:`, `docs:`, `ci:`, …) → pas de bump
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Le `bootstrap-sha` initial est posé une fois pour signaler que
          # release-please reprend l'historique à partir du tag v1.0.0
          # (b28e0f2). Voir release-please-config.json + manifest.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Active l'auto-merge (MERGE COMMIT, ADR 0037 — le squash est désactivé au
      # niveau dépôt) sur la PR de release dès qu'elle existe. GitHub la fusionnera
      # tout seul quand les 6 checks requis de la branch protection (prettier,
      # yamllint, shellcheck, kubeconform, ansible-lint, commitlint) seront verts.
      #
      # Garde sur `prs_created` (booléen, toujours valide) et NON sur
      # `fromJSON(outputs.pr)` : sur un run sans PR créée, `outputs.pr` est une
      # chaîne vide et `fromJSON('')` casse l'évaluation du template AVANT que le
      # `if:` ne joue (erreur « The template is not valid … Error reading JToken »
      # observée sur le run du 2026-05-31). On lit donc le numéro de PR dans le
      # `run:` via `outputs.pr` passé en variable (vide = inoffensif là).
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$RELEASE_PR" | jq -r '.number')
          gh pr merge "$PR_NUMBER" --auto --merge --repo "$GITHUB_REPOSITORY"
