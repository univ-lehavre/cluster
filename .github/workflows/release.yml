name: Release

# Cadence : UNE release par jour, la nuit — au lieu d'une release par merge sur
# main (qui produisait plusieurs versions/jour, bruyantes). release-please ne
# tourne donc plus sur `push` mais sur un cron.
#
# CYCLE COMPLET EN UN SEUL RUN (ADR 0093, parité atlas) : release-please est
# idempotent → PASSE 1 ouvre la PR de version (CHANGELOG.md + package.json +
# CITATION.cff), on l'auto-merge et on ATTEND son merge, PASSE 2 rejoue
# release-please qui TAGUE `vX.Y.Z` + crée la GitHub Release. Tag, CHANGELOG et
# publication sortent donc la NUIT MÊME (avant : le tag attendait le cron du
# lendemain). La Release publiée déclenche ensuite `sign-release` (signature des
# assets). `workflow_dispatch` force une release à la demande.
#
# Cron en UTC (Actions n'a pas de fuseau) : 01:00 UTC = 03:00 Europe/Paris en
# heure d'été (CEST), 02:00 en heure d'hiver (CET). L'écart d'1 h l'hiver est
# sans incidence pour une release nocturne.
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  # Signature des assets de release (ADR 0088) : déclenché QUAND la release est
  # publiée par release-please ci-dessous — la release doit exister pour qu'on y
  # attache une archive signée + sa provenance.
  release:
    types: [published]

# Permissions minimales du GITHUB_TOKEN au niveau TOP (lecture seule), élargies
# UNIQUEMENT sur le job qui en a besoin (principe du moindre privilège, OpenSSF
# Scorecard Token-Permissions). NB : le vrai travail (push tag/release, auto-merge)
# passe par le PAT `RELEASE_PLEASE_TOKEN` (l'org verrouille le GITHUB_TOKEN en RO,
# cf. commentaire du step) — ces permissions ne couvrent que d'éventuelles actions
# implicites du GITHUB_TOKEN, gardées au minimum.
permissions:
  contents: read

jobs:
  release-please:
    # Ne tourne QUE sur le cron nocturne / le dispatch manuel — pas quand
    # l'événement déclencheur est la publication d'une release (qui ne sert qu'à
    # déclencher la signature des assets ci-dessous).
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # release-please : tag + release GitHub (via PAT en pratique)
      pull-requests: write # création/maj de la PR de release
    steps:
      # release-please dépose (ou met à jour) une PR « chore(main): release vX.Y.Z »
      # cumulant les commits depuis la dernière release. Au cron nocturne (1×/jour),
      # ce run la (re)génère puis l'auto-merge ci-dessous la fusionne dès que les
      # checks requis sont verts ; le tag git, la release GitHub et la mise à
      # jour de CHANGELOG.md + package.json suivent automatiquement.
      #
      # IMPORTANT — token : l'organisation univ-lehavre verrouille le GITHUB_TOKEN
      # par défaut en lecture seule (« Write permissions for workflows are
      # disabled by the organization »), ce qui empêche release-please de pousser
      # le tag/la release. On utilise donc un PAT fine-grained dédié
      # (secret RELEASE_PLEASE_TOKEN, scope = ce repo : Contents RW + Pull
      # requests RW). Ce token, contrairement au GITHUB_TOKEN, redéclenche aussi
      # la CI sur la PR de release — sans quoi l'auto-merge resterait bloqué en
      # attente de checks qui ne tournent jamais.
      #
      # La version cible est dérivée des messages Conventional Commits depuis
      # le dernier tag :
      #   - `feat:`               → bump minor (1.0.0 → 1.1.0)
      #   - `fix:` / `perf:`      → bump patch (1.0.0 → 1.0.1)
      #   - `feat!:` ou `BREAKING CHANGE:` → bump major (1.0.0 → 2.0.0)
      #   - Autres types (`chore:`, `docs:`, `ci:`, …) → pas de bump
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Le `bootstrap-sha` initial est posé une fois pour signaler que
          # release-please reprend l'historique à partir du tag v1.0.0
          # (b28e0f2). Voir release-please-config.json + manifest.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Active l'auto-merge (MERGE COMMIT, ADR 0037 — le squash est désactivé au
      # niveau dépôt) sur la PR de release dès qu'elle existe. GitHub la fusionnera
      # tout seul quand les 6 checks requis de la branch protection (prettier,
      # yamllint, shellcheck, kubeconform, ansible-lint, commitlint) seront verts.
      #
      # Garde sur `prs_created` (booléen, toujours valide) et NON sur
      # `fromJSON(outputs.pr)` : sur un run sans PR créée, `outputs.pr` est une
      # chaîne vide et `fromJSON('')` casse l'évaluation du template AVANT que le
      # `if:` ne joue (erreur « The template is not valid … Error reading JToken »
      # observée sur le run du 2026-05-31). On lit donc le numéro de PR dans le
      # `run:` via `outputs.pr` passé en variable (vide = inoffensif là).
      # release-please (extra-files générique) ne synchronise que le `version:` de
      # CITATION.cff (marqueur x-release-please-version), PAS `date-released` — qui
      # restait donc figé. On l'estampille ICI, dans la PR de release elle-même
      # (avant l'auto-merge), à la date du jour : le champ suit la date de release
      # (≈ date de fusion de la PR) et voyage dans le MÊME commit série que le bump
      # de version, sans push séparé sur `main`. `docs:`/`chore:` ne rebumpent pas.
      # Checkout de la BRANCHE de la PR de release (le PAT autorise le push retour).
      # release-please-action ne clone rien ; il faut ce checkout pour estampiller.
      - name: Checkout de la branche de release
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Estampiller date-released dans la PR de release (CITATION.cff)
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          BRANCH=$(echo "$RELEASE_PR" | jq -r '.headBranchName')
          TODAY=$(date -u +%Y-%m-%d)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Remplace la valeur de `date-released:` (quel que soit son format actuel).
          sed -i -E "s/^date-released:.*/date-released: '${TODAY}'/" CITATION.cff
          if ! git diff --quiet CITATION.cff; then
            git add CITATION.cff
            git commit --quiet -m "chore: estampille date-released ${TODAY} (release-please)"
            git push --quiet origin "HEAD:${BRANCH}"
          fi

      # CYCLE COMPLET EN UN SEUL RUN (ADR 0093, parité atlas). release-please est
      # idempotent : la PASSE 1 (ci-dessus) ouvre la PR de version ; ici on l'auto-merge
      # PUIS on ATTEND son merge effectif (l'auto-merge est asynchrone : il patiente le
      # vert des checks requis, ~3-5 min) ; enfin la PASSE 2 rejoue release-please — le
      # commit de version étant désormais sur `main` — qui TAGUE `vX.Y.Z` + crée la GitHub
      # Release. Sans l'attente, la passe 2 tournerait avant le merge et ne taguerait rien
      # (ancien comportement : le tag sortait au cron du LENDEMAIN — le décalage supprimé).
      # La publication de la Release déclenche ensuite `sign-release` (on: release published).
      - name: Auto-merge et attente du merge de la PR de release
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$RELEASE_PR" | jq -r '.number')
          echo "PR de release : #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" --auto --merge --repo "$GITHUB_REPOSITORY"
          # Poll jusqu'au MERGED (timeout ~20 min : marge au-dessus de la CI requise).
          for i in $(seq 1 80); do
            state=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state --jq '.state')
            echo "  [$i/80] PR #${PR_NUMBER} → ${state}"
            if [ "$state" = "MERGED" ]; then echo "✅ PR de release mergée." && break; fi
            if [ "$state" = "CLOSED" ]; then echo "::error::PR #${PR_NUMBER} fermée sans merge." && exit 1; fi
            if [ "$i" = "80" ]; then echo "::error::Timeout : PR #${PR_NUMBER} non mergée à temps." && exit 1; fi
            sleep 15
          done

      # --- Passe 2 : le commit de version est sur `main` ; release-please pose le tag
      # `vX.Y.Z` et crée la GitHub Release DANS CE MÊME RUN. No-op si la passe 1 n'avait
      # rien à releaser (garde sur `prs_created`).
      - name: Release Please — tag + GitHub Release (passe 2)
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Signe les assets de release (ADR 0088, scorecard Signed-Releases). Déclenché
  # à la PUBLICATION de la release : crée une archive source `.tar.gz`, la signe
  # en cosign KEYLESS (OIDC GitHub, aucune clé à gérer), attache l'archive + sa
  # signature + son certificat à la release, et expose le hash pour la provenance
  # SLSA (job suivant). Vérification côté consommateur : voir bootstrap/RUNBOOK.md.
  sign-release:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # uploader les assets sur la release
      id-token: write # jeton OIDC pour la signature keyless (Fulcio/Rekor)
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Construire l'archive source de la version
        id: archive
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          NAME="cluster-${TAG}.tar.gz"
          # Archive du code au tag, sans le .git (équivalent stable de l'archive
          # GitHub, mais publiée comme asset signé — fige la version citée DOI).
          git archive --format=tar.gz --prefix="cluster-${TAG}/" -o "$NAME" HEAD
          echo "name=$NAME" >>"$GITHUB_OUTPUT"

      - name: Empreinte SHA-256 (base64) pour la provenance SLSA
        id: hash
        env:
          ARCHIVE: ${{ steps.archive.outputs.name }}
        run: |
          # Le générateur SLSA attend les hashes en base64 (sortie de sha256sum).
          echo "hashes=$(sha256sum "$ARCHIVE" | base64 -w0)" >>"$GITHUB_OUTPUT"

      # Les drapeaux `--output-signature` / `--output-certificate` (couple .sig/.pem,
      # contrat de vérification) sont RETIRÉS en cosign v4 au profit d'un bundle
      # `.sigstore.json` unique → un `cosign-installer@v4` fait échouer `sign-blob`
      # (« create bundle file: open : no such file or directory ») et le job release
      # tombait à CHAQUE release. On épingle v3.x tant que la vérification reste sur
      # le couple .sig/.pem (même pin qu'atlas #547 / ADR 0093).
      - name: Installer cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Signer l'archive (cosign keyless)
        env:
          ARCHIVE: ${{ steps.archive.outputs.name }}
          COSIGN_YES: 'true' # non interactif : accepte le transparency log Rekor
        run: |
          cosign sign-blob \
            --output-signature "${ARCHIVE}.sig" \
            --output-certificate "${ARCHIVE}.pem" \
            "$ARCHIVE"

      - name: Attacher l'archive signée à la release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.archive.outputs.name }}
            ${{ steps.archive.outputs.name }}.sig
            ${{ steps.archive.outputs.name }}.pem

  # Provenance SLSA (build L3) de l'archive : attestation `.intoto.jsonl` liant
  # l'artefact au commit/workflow/déclencheur, attachée à la release. EXCEPTION
  # SHA-pin (ADR 0006) : le générateur SLSA REFUSE d'être appelé par SHA — il
  # vérifie sa propre intégrité et exige un tag sémantique versionné. Pin par
  # `@v2.1.0` (commit f7dd8c5) assumé pour cette seule action.
  provenance:
    if: ${{ github.event_name == 'release' }}
    needs: sign-release
    permissions:
      actions: read # lire le run pour la provenance
      id-token: write # OIDC keyless
      contents: write # attacher l'attestation à la release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.sign-release.outputs.hashes }}
      upload-assets: true # joindre le .intoto.jsonl aux assets de la release
