# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

# Enforce Conventional Commits + reject emails in commit messages
commit-msg:
  commands:
    no-emails:
      run: |
        if grep -qE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' {1}; then
          echo "ERROR: commit message contains an email address." >&2
          exit 1
        fi
    commitlint:
      run: pnpm exec commitlint --edit {1}

# Fast checks on staged files only
pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{yaml,yml,md,json}'
      run: pnpm exec prettier --check {staged_files}
    yamllint:
      glob: '*.{yaml,yml}'
      run: yamllint {staged_files}
    shellcheck:
      glob: '*.sh'
      run: shellcheck {staged_files}

# Checks avant push. Les linters PAR FICHIER (prettier/yamllint/shellcheck) ne portent
# que sur les fichiers du PUSH (`{push_files}`) — un push ne re-scanne plus tout le dépôt
# (lent : ~70s prettier sur `**`). Garde-fou RAPIDE sur ce que le push introduit ; la CI
# reste l'autorité EXHAUSTIVE (tout le dépôt, à chaque PR). Les checks de GRAPHE/SUITE
# (bats/ansible-lint/kubeconform/jscpd) restent complets : pas de découpage fiable par
# fichier (suite de tests, graphe de rôles, liste d'exclusions kubeconform, duplication
# cross-fichiers). `glob` filtre l'extension ; lefthook SKIP la commande si aucun
# `{push_files}` ne matche → un push de code Python ne lance ni prettier ni yamllint.
pre-push:
  parallel: true
  commands:
    no-direct-push-to-main:
      run: |
        branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "${branch}" = "main" ]; then
          echo "ERROR: push direct sur 'main' interdit — crée une branche et ouvre une PR." >&2
          exit 1
        fi
    prettier:
      glob: '*.{yaml,yml,md,json}'
      run: pnpm exec prettier --check {push_files}
    yamllint:
      glob: '*.{yaml,yml}'
      run: yamllint {push_files}
    shellcheck:
      glob: '*.sh'
      run: shellcheck {push_files}
    # Cibles shellcheck HORS glob `*.sh` (toujours vérifiées, peu coûteux) : template
    # bash (.sh.j2, sans jinja), le wrapper `nestor.sh`, et les scripts Perl (#36).
    shellcheck-extra:
      run: |
        shellcheck --shell=bash \
          bootstrap/roles/etcd-backup/templates/etcd-snapshot.sh.j2 \
          nestor.sh
        for f in $(git ls-files '*.pl'); do perl -c "$f"; done
    bats:
      run: pnpm test:shell
    kubeconform:
      run: |
        # On part des seuls fichiers VERSIONNÉS (git ls-files) : exclut
        # nativement les .yaml gitignorés (ex. inventaires/kubeconfig générés par
        # le banc) que `find` ramassait et qui cassaient le push (cf. drift hook
        # pre-push). Les exclusions ci-dessous restent pour les fichiers
        # versionnés non kubeconform-ables.
        git ls-files -z -- '*.yaml' \
          ':!:bootstrap/**' \
          ':!:pnpm-lock.yaml' \
          ':!:pnpm-workspace.yaml' \
          ':!:.yamllint.yaml' \
          ':!:.trivyignore.yaml' \
          ':!:.markdownlint-cli2.yaml' \
          ':!:storage/ceph/crds.yaml' \
          ':!:storage/ceph/common.yaml' \
          ':!:storage/ceph/operator.yaml' \
          ':!:storage/ceph/cluster.yaml' \
          ':!:storage/ceph/dashboard.yaml' \
          ':!:storage/ceph/toolbox.yaml' \
          ':!:platform/k8s-dashboard/values.yaml' \
          ':!:platform/kube-prometheus-stack/values.bench.yaml' \
          ':!:platform/loki/values.bench.yaml' \
          ':!:platform/loki/values.promtail.yaml' \
          ':!:platform/cloudnative-pg/operator.yaml' \
          ':!:platform/cloudnative-pg/plugin-barman-cloud.yaml' \
          ':!:platform/dagster/dagster.yaml' \
          ':!:platform/dagster/values.bench.yaml' \
          ':!:platform/marquez/marquez.yaml' \
          ':!:platform/marquez/values.bench.yaml' \
          ':!:bench/*/inventory.yaml' \
          ':!:docs/architecture/registre-drifts.yaml' \
          ':!:bench/lima/runs-history.yaml' \
          ':!:contract/*.example.yaml' \
          ':!:topologies/*.example.yaml' \
          | xargs -0 -r kubeconform \
            -strict -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
    ansible-lint:
      run: ansible-lint bootstrap/
    jscpd:
      run: pnpm lint:dup
