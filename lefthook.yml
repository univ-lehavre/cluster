# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

# Enforce Conventional Commits + reject emails in commit messages
commit-msg:
  commands:
    no-emails:
      run: |
        if grep -qE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' {1}; then
          echo "ERROR: commit message contains an email address." >&2
          exit 1
        fi
    commitlint:
      run: pnpm exec commitlint --edit {1}

# Fast checks on staged files only
pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{yaml,yml,md,json}'
      run: pnpm exec prettier --check {staged_files}
    yamllint:
      glob: '*.{yaml,yml}'
      run: yamllint {staged_files}
    shellcheck:
      glob: '*.sh'
      run: shellcheck {staged_files}

# Full-repo checks before pushing
pre-push:
  parallel: true
  commands:
    no-direct-push-to-main:
      run: |
        branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "${branch}" = "main" ]; then
          echo "ERROR: push direct sur 'main' interdit — crée une branche et ouvre une PR." >&2
          exit 1
        fi
    prettier:
      run: pnpm exec prettier --check "**/*.{yaml,yml,md,json}"
    yamllint:
      run: yamllint .
    shellcheck:
      run: |
        find . -name '*.sh' \
          -not -path './node_modules/*' \
          -not -path './.git/*' \
          -print0 | xargs -0 shellcheck
        # Template bash (.sh.j2, sans jinja) + scripts Perl (audit P3 #36).
        shellcheck --shell=bash \
          bootstrap/roles/etcd-backup/templates/etcd-snapshot.sh.j2
        for f in $(git ls-files '*.pl'); do perl -c "$f"; done
    bats:
      run: pnpm test:shell
    kubeconform:
      run: |
        # On part des seuls fichiers VERSIONNÉS (git ls-files) : exclut
        # nativement les .yaml gitignorés (ex. inventaires/kubeconfig générés par
        # le banc) que `find` ramassait et qui cassaient le push (cf. drift hook
        # pre-push). Les exclusions ci-dessous restent pour les fichiers
        # versionnés non kubeconform-ables.
        git ls-files -z -- '*.yaml' \
          ':!:bootstrap/**' \
          ':!:pnpm-lock.yaml' \
          ':!:pnpm-workspace.yaml' \
          ':!:.yamllint.yaml' \
          ':!:.trivyignore.yaml' \
          ':!:.markdownlint-cli2.yaml' \
          ':!:storage/ceph/crds.yaml' \
          ':!:storage/ceph/common.yaml' \
          ':!:storage/ceph/operator.yaml' \
          ':!:storage/ceph/cluster.yaml' \
          ':!:storage/ceph/dashboard.yaml' \
          ':!:storage/ceph/toolbox.yaml' \
          ':!:platform/k8s-dashboard/values.yaml' \
          ':!:platform/kube-prometheus-stack/values.bench.yaml' \
          ':!:platform/loki/values.bench.yaml' \
          ':!:platform/loki/values.promtail.yaml' \
          ':!:platform/cloudnative-pg/operator.yaml' \
          ':!:platform/cloudnative-pg/plugin-barman-cloud.yaml' \
          ':!:platform/dagster/dagster.yaml' \
          ':!:platform/dagster/values.bench.yaml' \
          ':!:platform/marquez/marquez.yaml' \
          ':!:platform/marquez/values.bench.yaml' \
          ':!:test/*/inventory.yaml' \
          ':!:docs/architecture/registre-drifts.yaml' \
          | xargs -0 -r kubeconform \
            -strict -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
    ansible-lint:
      run: ansible-lint bootstrap/
    jscpd:
      run: pnpm lint:dup
