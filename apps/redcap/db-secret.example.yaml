# Modèle GÉNÉRIQUE (versionné, ADR 0023) du Secret des identifiants MariaDB.
# Le Secret RÉEL n'est PAS versionné — le créer hors dépôt avec de vraies valeurs :
#
#   kubectl -n redcap create secret generic redcap-db-secret \
#     --from-literal=root-password='<MOT_DE_PASSE_ROOT_FORT>' \
#     --from-literal=password='<MOT_DE_PASSE_REDCAP_FORT>'
#
# `password` = mot de passe de l'utilisateur applicatif `redcap` (utilisé AUSSI dans
# database.php côté frontend) ; `root-password` = compte root MariaDB (init seulement).
---
apiVersion: v1
kind: Secret
metadata:
  name: redcap-db-secret
  namespace: redcap
  labels:
    app: redcap
type: Opaque
stringData:
  root-password: 'changeme-root-generic-example'
  password: 'changeme-redcap-generic-example'
