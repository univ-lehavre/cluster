# Exposition tout-Cilium (ADR 0020) — LB-IPAM.
#
# CiliumLoadBalancerIPPool : pool d'IP attribuées aux Service type=LoadBalancer
# (dont celui créé par le Gateway de bordure). Remplace l'IPAddressPool MetalLB.
# LB-IPAM s'active du seul fait qu'un pool existe (aucun flag Helm).
#
# apiVersion : cilium.io/v2 — le CRD a été PROMU en 1.19 (v2alpha1 déprécié pour
# ce type ; ne pas confondre avec CiliumL2AnnouncementPolicy qui RESTE v2alpha1).
#
# Le pool DOIT être dans le même sous-réseau L2 que les nœuds (l'annonce est de
# l'ARP). Banc Vagrant : 192.168.67.0/24, IP .240-.250 hors plage DHCP host-only.
# PROD (10.67.2.0/22) : TODO — plage à réserver AVEC l'admin réseau (aucune IP
# prod attribuée à l'aveugle : collision possible sur un /22 partagé). Ajouter
# alors un second block (ou un pool dédié) une fois la réservation confirmée.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: banc-vagrant-pool
spec:
  # TODO prod (ADR 0020) — ajouter un second block après arbitrage admin réseau
  # (plage libre de 10.67.2.0/22), p. ex. { start: "10.67.2.X", stop: "10.67.2.Y" }.
  # Aucune IP prod réservée à l'aveugle : collision possible sur un /22 partagé.
  blocks:
    # Plage explicite .240-.250 (un /29 ne couvrirait que .240-.247).
    - start: '192.168.67.240'
      stop: '192.168.67.250'
