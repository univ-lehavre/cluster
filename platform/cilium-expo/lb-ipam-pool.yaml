# Exposition tout-Cilium (ADR 0020) — LB-IPAM. RÉFÉRENCE DOCUMENTAIRE.
#
# ⚠️ Source d'exécution = bootstrap/cni.sh (génère ce CR INLINE, paramétré par
# l'environnement : LB_IPAM_RANGE_START/STOP). cni.sh tourne DANS la VM sans le
# repo monté → il ne peut pas `kubectl apply -f` ce fichier. Ce YAML reste la
# référence versionnée (forme du CR, apiVersion, pièges) ; les VALEURS de plage
# sont dérivées du terrain par cni.sh (banc Lima : .240-.250 du /24 des nœuds ;
# prod : plage réservée avec l'admin réseau). Garder les deux ALIGNÉS.
#
# CiliumLoadBalancerIPPool : pool d'IP attribuées aux Service type=LoadBalancer
# (dont celui créé par le Gateway de bordure). Remplace l'IPAddressPool MetalLB.
# LB-IPAM s'active du seul fait qu'un pool existe (aucun flag Helm).
#
# apiVersion : cilium.io/v2 — le CRD a été PROMU en 1.19 (v2alpha1 déprécié pour
# ce type ; ne pas confondre avec CiliumL2AnnouncementPolicy qui RESTE v2alpha1).
#
# Le pool DOIT être dans le même sous-réseau L2 que les nœuds (l'annonce est de
# l'ARP). Valeur d'exemple GÉNÉRIQUE ci-dessous (réseau privé 10.0.0.0/22,
# CLAUDE.md/ADR 0023) ; le concret est injecté par terrain (cf. cni.sh).
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
spec:
  blocks:
    # Plage explicite .240-.250 (un /29 ne couvrirait que .240-.247).
    - start: '10.0.0.240'
      stop: '10.0.0.250'
