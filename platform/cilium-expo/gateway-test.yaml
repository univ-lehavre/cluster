# Exposition tout-Cilium (ADR 0020) — Gateway de TEST (validation banc).
#
# Gateway HTTP minimal pour valider la chaîne L3+L7 sur le banc multi-node :
# Cilium crée automatiquement un Service type=LoadBalancer derrière ce Gateway ;
# LB-IPAM lui attribue une IP du pool (192.168.67.240-250) ; la
# CiliumL2AnnouncementPolicy l'annonce en ARP sur eth1 → joignable depuis l'hôte
# Vagrant. NE PAS déployer en prod tel quel (c'est un objet de validation).
#
# externalTrafficPolicy : laisser CLUSTER (défaut). En L2, "Local" DROPPE le
# trafic si le nœud annonceur n'héberge pas d'endpoint local (ADR 0020). L'IP
# source client est de toute façon préservée au niveau L7 (X-Forwarded-For).
#
# apiVersion : gateway.networking.k8s.io/v1.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-http
  namespace: default
spec:
  gatewayClassName: cilium
  # Pour une terminaison TLS en bordure (cohérent ADR 0003 : TLS en bordure, pas
  # en interne), ajouter un second listener HTTPS à cette liste. Créer d'abord le
  # Secret : kubectl create secret tls test-tls --cert=tls.crt --key=tls.key -n default
  # puis un listener { name: websecure, protocol: HTTPS, port: 443,
  # tls: { mode: Terminate, certificateRefs: [{ kind: Secret, name: test-tls }] },
  # allowedRoutes: { namespaces: { from: Same } } }. Le 443 sort sur la même IP LB.
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
