# CronWorkflow `builder-reconcile` (ns argo) — FILET event-loss (ADR 0095
# §Coût / plan build événementiel §SPOF, POINT DUR 4 ; étape 7).
#
# ── CE QU'IL EST (honnêteté ADR 0034/0052) ────────────────────────────────────
# L'EventBus NATS tourne en `replicas: 1` (SPOF assumé, cf. eventbus-nats.yaml) :
# un event push perdu pile pendant un redémarrage de NATS n'est JAMAIS construit,
# car le build n'a PAS de polling natif (contrairement à Argo CD, ~3 min côté
# déploiement). Ce CronWorkflow est le FILET de rattrapage : périodiquement, pour
# chaque code-location connue, il compare le HEAD atlas à la révision DÉPLOYÉE (le
# `targetRevision` de `apps/<cl>.yaml` dans cluster/apps) et, s'ils DIFFÈRENT,
# SOUMET le builder `image-builder`.
#
# ⚠️ CE N'EST PAS le rejeu `changed=0` d'Ansible (ADR 0052). C'est un rattrapage
# à latence = la période du Cron (ci-dessous "*/30 * * * *"). Il garantit qu'un
# push finit par être construit ; il ne prouve PAS l'idempotence. À consigner
# aussi dans `bench/lima/RESULTS.md` au run banc.
#
# ── CÂBLAGE (issue #565) ──────────────────────────────────────────────────────
# Le corps `reconcile` est CÂBLÉ (plus un squelette) : HEAD atlas via l'API Gitea
# (`/repos/atlas/atlas/branches/main` → `.commit.id`), énumération des `apps/*.yaml`
# via la Contents API, lecture du `targetRevision` déployé, comparaison, et
# resoumission via `kubectl create` d'un Workflow (`workflowTemplateRef: image-builder`)
# — EXACTEMENT comme le Sensor. AUCUNE image `argocli` requise (on ne fait pas
# `argo submit`) : on RÉUTILISE `dtzar/helm-kubectl` (kubectl + curl + jq), DÉJÀ
# mirrorée au registry interne pour le reconciler workspace (ADR 0103, `mirror_only`).
# RBAC : `builder-sa` (ns argo) porte `create workflows` (builder-rbac.yaml). Reste à
# PROUVER AU BANC le scénario de rattrapage (event volontairement perdu → build soumis
# au tick suivant), consigné dans `bench/lima/RESULTS.md`.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: builder-reconcile
  namespace: argo
spec:
  # Période PRUDENTE — filet, pas temps réel. Compromis latence / charge (git
  # ls-remote + lecture cluster/apps toutes les 30 min). CRD Argo Workflows v4 :
  # `schedules` (LISTE), pas `schedule` (singulier, retiré) — sinon apply 422
  # « spec.schedules: Required value » (prouvé au montage banc 2026-07-02).
  schedules:
    - '*/30 * * * *'
  concurrencyPolicy: Forbid # jamais deux réconciliations concurrentes.
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: reconcile
    # SA du ns argo (create workflows + executor workflowtaskresults) — cf.
    # builder-rbac.yaml. `operate-workflow-sa` vit dans argo-EVENTS (le Sensor),
    # PAS dans argo → un CronWorkflow le référençant échouait « serviceaccount
    # argo/operate-workflow-sa not found » (PROUVÉ AU BANC). On partage `builder-sa`.
    serviceAccountName: builder-sa
    templates:
      - name: reconcile
        container:
          # Image `dtzar/helm-kubectl` (kubectl + curl + jq + sh) — DÉJÀ mirrorée au registry
          # interne pour le reconciler workspace (ADR 0103, mirror_only). On la RÉUTILISE : le
          # filet n'a besoin que de curl (API Gitea) + kubectl (soumission) — PAS d'`argocli`.
          # On soumet le build via `kubectl create` d'un Workflow (workflowTemplateRef), EXACTEMENT
          # comme le Sensor — donc aucune nouvelle image à mirrorer (l'`argocli` du bundle reste un
          # TODO SÉPARÉ, non requis par ce filet). HEAD atlas via l'API Gitea (pas `git ls-remote`).
          image: registry:80/dtzar/helm-kubectl:4.2.2
          command: [sh, -c]
          env:
            - name: HOME # kubectl écrit un cache sous $HOME ; /tmp est writable (emptyDir).
              value: /tmp
          args:
            - |
              set -eu
              # Bases intra-cluster (API Gitea du code atlas + du repo déclaratif cluster/apps).
              ATLAS_API="http://gitea-http.gitea.svc.cluster.local/api/v1/repos/atlas/atlas"
              APPS_API="http://gitea-http.gitea.svc.cluster.local/api/v1/repos/cluster/apps"
              ATLAS_GIT="http://gitea-http.gitea.svc.cluster.local/atlas/atlas.git"

              # HEAD courant du code atlas (le SHA que la chaîne DEVRAIT avoir bâti), via l'API
              # Gitea (pas de git : curl + jq suffisent). C'est le signal `revision` (ADR 0094 §3).
              head=$(curl -fsS "$ATLAS_API/branches/main" | jq -r '.commit.id')
              printf '%s' "$head" | grep -qE '^[0-9a-f]{40}$' \
                || { echo "reconcile: HEAD atlas invalide <${head:-∅}>" >&2; exit 1; }
              echo "reconcile: atlas HEAD=$head"

              # Énumère les code-locations connues = les fichiers `apps/*.yaml` de cluster/apps
              # (Contents API). Le nom de code-location = basename sans `.yaml`. JAMAIS une liste
              # en dur (découverte, comme le Sensor) : une CL neuve `apps/newthing.yaml` est
              # automatiquement couverte par le filet.
              files=$(curl -fsS "$APPS_API/contents/apps" \
                | jq -r '.[] | select(.type=="file") | .name | select(endswith(".yaml"))')

              submitted=0
              for f in $files; do
                cl=${f%.yaml}
                # Révision DÉPLOYÉE = `targetRevision` de l'Application dans apps/<cl>.yaml (le
                # write-back du builder l'écrit au SHA construit, ADR 0095 §1.a). raw = fichier brut.
                deployed=$(curl -fsS "$APPS_API/raw/apps/${f}" \
                  | grep -E '^[[:space:]]*targetRevision:' | head -1 \
                  | sed -E 's/.*targetRevision:[[:space:]]*"?([0-9a-f]+)"?.*/\1/')
                if [ "$deployed" = "$head" ]; then
                  echo "reconcile: $cl à jour ($head) — rien à faire"
                  continue
                fi
                echo "reconcile: $cl DÉRIVE (déployé=<${deployed:-∅}> ≠ HEAD=$head) → resoumission du build"
                # Soumet le WorkflowTemplate `image-builder` via kubectl (pas `argo submit` → pas
                # d'argocli). MÊME shape que le Sensor (workflowTemplateRef + params, ns argo) ; le
                # Workflow hérite du spec du template (dont le nodeSelector, patché au banc).
                wf=$(printf '%s\n' \
                  "apiVersion: argoproj.io/v1alpha1" \
                  "kind: Workflow" \
                  "metadata:" \
                  "  generateName: image-builder-reconcile-" \
                  "  namespace: argo" \
                  "spec:" \
                  "  workflowTemplateRef:" \
                  "    name: image-builder" \
                  "  arguments:" \
                  "    parameters:" \
                  "      - {name: codeLocation, value: \"${cl}\"}" \
                  "      - {name: revision, value: \"${head}\"}" \
                  "      - {name: atlasRepoURL, value: \"${ATLAS_GIT}\"}" \
                  "      - {name: giteaWritebackURL, value: \"${APPS_API}\"}")
                printf '%s' "$wf" | kubectl create -n argo -f -
                submitted=$((submitted + 1))
              done

              # Rattrapage à latence = période du Cron, PAS idempotence changed=0 (ADR 0034) :
              # `submitted=0` = tout à jour (aucun event perdu à rattraper). Un build en cours au
              # moment du tick n'a pas encore mis à jour targetRevision → une resoumission RARE
              # peut survenir (bénigne : même SHA → même digest → write-back idempotent). La
              # période prudente (*/30) laisse un build finir entre deux ticks.
              echo "reconcile: terminé — ${submitted} build(s) resoumis"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
    volumes:
      - name: tmp # /tmp writable (kubectl cache, curl/jq) sous readOnlyRootFilesystem.
        emptyDir: {}
