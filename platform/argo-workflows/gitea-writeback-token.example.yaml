# POINT DUR 3 (ADR 0095 §Coût) — TOKEN GITEA D'ÉCRITURE, surface d'élévation.
#
# Patron VERSIONNÉ (ADR 0023) du Secret qui porte le token Gitea utilisé par le
# step `write-back` du WorkflowTemplate `image-builder` pour écrire
# `apps/<app>.yaml` (référence par digest) dans le repo `cluster/apps`.
#
# ⚠️ SURFACE D'ÉLÉVATION : ce token est monté dans le pod builder. Un build
# compromis qui le lit pourrait réécrire des manifestes de déploiement. Il est
# donc CANTONNÉ au strict nécessaire :
#   - scope `write:repository` (Gitea) — écrire des fichiers, rien d'autre ;
#   - restreint au SEUL repo `cluster/apps` (pas `atlas/atlas`, pas `cluster/cluster`) ;
#   - JAMAIS le token admin Gitea (celui du seed, `gitea-admin`).
#
# ⚠️ VALEUR DE TEST. Sur une topologie réelle : le seed GÉNÈRE le vrai token
# (Gitea API, scope write:repository sur cluster/apps seul) et pose le Secret
# HORS dépôt (config locale non versionnée, patron `gen_secret` ADR 0023) —
# ce fichier `.example` n'est JAMAIS le token réel.
#
# La clé `token` est lue par le step write-back (Authorization: token <…>).
apiVersion: v1
kind: Secret
metadata:
  name: gitea-writeback-token
  namespace: argo
type: Opaque
stringData:
  token: gitea-writeback-test-token # valeur de test (banc) — token réel généré au seed, scopé cluster/apps
