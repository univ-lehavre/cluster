# WorkflowTemplate `image-builder` (étape 6, ADR 0095 §1.b) — la traduction
# IN-POD du build node-side (rôle platform-build-images) : clone atlas@SHA →
# build BuildKit rootless sur un WORKER → push registry:80 → lit le DIGEST →
# write-back `apps/<app>.yaml` par digest dans `cluster/apps`.
#
# Paramétré générique (ADR 0023) : `codeLocation` (ex. `citation`), `revision`
# (SHA git), `atlasRepoURL` (clone), `giteaWritebackURL` (Contents API). Aucune
# valeur d'instance codée en dur.
#
# ── QUATRE POINTS DURS traités par cette chaîne (détail par step ci-dessous) ──
#  1. buildkitd.toml insecure → ConfigMap `buildkitd-config` montée dans build-push.
#  2. Egress build ciblé / air-gap asymétrique → NetworkPolicy allow-build-egress
#     (ns argo SEUL ; le runtime dagster + Argo CD restent air-gappés).
#  3. Token Gitea scopé cluster/apps → Secret `gitea-writeback-token` (patron
#     *.example), monté dans write-back seulement.
#  4. Builder sur WORKER, jamais le control-plane (SPOF) → nodeSelector ci-dessous.
#
# ── DETTES / RÉSERVES tracées honnêtement (ADR 0095 §Coût / plan §SPOF) ──
#  - Registry `replicas:1` sur le chemin build (push) ET deploy (pull), PVC RWO —
#    SPOF amplifié (ADR 0011).
#  - Build NON bit-reproductible : apt / base `python:*-slim` non lockés ; un
#    rebuild du même SHA peut produire un digest différent. Traçabilité
#    commit→image OK, bit-repro NON (tension ADR 0052).
#  - Digest SINGLE-ARCH : un build in-pod mono-arch produit un digest de manifest,
#    pas d'index multi-arch (ADR 0006). Acceptable prod x86-only (ADR 0095 §2).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-builder
  namespace: argo
spec:
  entrypoint: main
  # SA d'exécution — SANS lui le Workflow tourne avec le SA `default` du ns argo, qui
  # n'a PAS le RBAC Argo Workflows (`workflowtaskresults.argoproj.io create/patch`) →
  # l'executor échoue « cannot create workflowtaskresults » (PROUVÉ AU BANC 2026-07-02).
  # `builder-sa` (ns argo) porte ce RBAC exécuteur + la soumission (cf. builder-rbac.yaml).
  serviceAccountName: builder-sa

  # DNS — le PUSH (build-push) et la lecture du DIGEST (digest) ciblent `registry:80`
  # (NOM COURT, cohérent avec tout le dépôt : ADR 0011, buildkitd.toml, kubelet node-side).
  # Or DANS un pod le search domain est celui du ns (`argo.svc.cluster.local svc.cluster.local
  # cluster.local`) → `registry` seul NE RÉSOUT PAS (« lookup registry: no such host », PROUVÉ
  # AU BANC 2026-07-02 ; le build node-side résolvait via le nœud, hors pod). On AJOUTE le
  # search domain `registry.svc.cluster.local` → `registry` résout en
  # `registry.registry.svc.cluster.local` SANS changer le nom d'image (garde `registry:80`
  # partout : output buildctl, buildkitd.toml, digest, write-back). AU NIVEAU WORKFLOW (Argo
  # NE supporte PAS `dnsConfig` par template — « unknown field spec.templates[].dnsConfig »,
  # PROUVÉ AU BANC) ; s'applique à tous les pods du Workflow.
  dnsConfig:
    searches:
      - registry.svc.cluster.local
  arguments:
    parameters:
      - name: codeLocation # ex. `citation` — nom de la code-location atlas (générique)
      - name: revision # SHA git — tag lisible + révision clonée
      - name: atlasRepoURL # ex. http://gitea-http.gitea.svc.cluster.local/atlas/atlas.git
      - name: giteaWritebackURL # base Contents API cluster/apps, ex. http://gitea-http.gitea.svc.cluster.local/api/v1/repos/cluster/apps
      # Overlay kustomize CIBLE du write-back (`overlays/<overlay>`). Défaut `bench`
      # (SeaweedFS) pour un apply autonome ; le rôle platform-eventful PATCHE cette
      # valeur en `prod` (OBC Ceph rook-ceph-datalake) quand EXPECTED_TARGET_KIND=prod
      # — MÊME mécanisme que le patch du nodeSelector worker. Sans ce paramètre, le
      # write-back figeait `overlays/bench` → en prod la code-location déployait sur
      # SeaweedFS au lieu du datalake Ceph (BLOCKER #2, découverte dirqual 2026-07-04).
      - name: overlay
        value: bench

  # POINT DUR 4 — le builder tourne sur un WORKER, JAMAIS le control-plane (SPOF
  # unique, invariant 5 ADR 0095). L'audit prouve qu'un worker l'absorbe (~90 %
  # RAM libre).
  #
  # ⚠️ ÉCART BANC — au banc Lima MONO-NŒUD, le control-plane EST le seul nœud :
  # ce nodeSelector `DoesNotExist` NE MATCHE AUCUN NŒUD → le pod resterait
  # Pending. Un overlay/patch banc l'ASSOUPLIT (retire le nodeSelector), tout
  # comme le scénario 34 documente « au banc, le CP est aussi le builder ». On
  # GARDE le nodeSelector ici (posture prod correcte) ; le banc le patche.
  nodeSelector:
    node-role.kubernetes.io/control-plane: DoesNotExist

  # Volume partagé clone → build (le contexte atlas cloné, lu par buildctl).
  volumes:
    - name: workspace
      emptyDir: {}
    # POINT DUR 1 — buildkitd.toml (registry:80 http/insecure) monté dans build-push.
    - name: buildkitd-config
      configMap:
        name: buildkitd-config
    # POINT DUR 3 — token Gitea scopé cluster/apps, monté dans write-back seulement.
    - name: gitea-writeback-token
      secret:
        secretName: gitea-writeback-token

  templates:
    # ─────────────────────────────────────────────────────────────────────────
    # Orchestration : 3 steps SÉQUENTIELS (build-push → digest → write-back).
    #
    # ⚠️ Le CLONE n'est PAS un step séparé : en Argo Workflows chaque step est un POD
    # DISTINCT et un volume `emptyDir` N'EST PAS partagé entre pods (il vit dans un seul
    # pod). Un clone-step aurait écrit /work dans SON pod ; build-push aurait démarré
    # avec un /work VIDE → `lstat /work/dataops: no such file or directory` (PROUVÉ AU
    # BANC 2026-07-02). Le clone est donc un initContainer DU MÊME POD que build-push :
    # l'emptyDir intra-pod EST partagé entre initContainer et container (sans artifact
    # repository S3 à câbler — inutile ici, ADR 0044 air-gap).
    # ─────────────────────────────────────────────────────────────────────────
    - name: main
      steps:
        - - name: build-push
            template: build-push
        - - name: digest
            template: digest
        - - name: write-back
            template: write-back
            arguments:
              parameters:
                - name: digest
                  value: '{{steps.digest.outputs.parameters.digest}}'

    # ── STEP 1 — build + push (BuildKit rootless), clone en initContainer. ─────
    # Contexte de build = `dataops/` avec `-f citation-dagster/Dockerfile` (le
    # Dockerfile citation embarque le projet dbt frère : contexte multi-dossier,
    # cf. Dockerfile atlas). Ici générique via `{{codeLocation}}` :
    #   context = /work/dataops ; dockerfile = /work/dataops/<codeLocation>-dagster ; filename = Dockerfile.
    #
    # POINT DUR 1 — buildkitd.toml monté à /home/user/.config/buildkit/buildkitd.toml
    # (chemin de config par défaut de l'image rootless, uid 1000) → push HTTP
    # `registry:80` OK (sans lui : handshake TLS sur du HTTP → échec).
    - name: build-push
      # CLONE en initContainer (PAS un step Argo séparé) — l'emptyDir `workspace` est
      # partagé entre l'initContainer et le container DU MÊME pod (un step-pod séparé ne
      # le partagerait pas, cf. le commentaire du template `main`). Le clone prépare
      # /work avant que buildctl lise /work/dataops.
      # RÉSOLU intégration (ADR 0011) : `alpine/git` est une image PUBLIQUE → MIRRORÉE au
      # registry interne (registry:80) par `bootstrap/eventful-mirror.yaml` au banc
      # air-gappé, sinon ImagePullBackOff. Référence par TAG (le mirror node-side repose un
      # manifest SINGLE-ARCH sous ce tag ; écart arm64 assumé ADR 0095 §2).
      initContainers:
        - name: clone
          image: registry:80/alpine/git:2.47.2
          command: [sh, -c]
          args:
            - |
              set -eu
              # safe.directory : le volume /work (emptyDir) appartient à un autre uid que
              # le processus git → git refuse « detected dubious ownership » (PROUVÉ AU BANC).
              # On le pose par ENV (GIT_CONFIG_*) plutôt que `git config --global` : le
              # conteneur tourne runAsNonRoot avec HOME=/ non writable → `--global` échoue
              # « could not lock config file //.gitconfig » (PROUVÉ AU BANC). L'ENV n'écrit rien.
              export GIT_CONFIG_COUNT=1
              export GIT_CONFIG_KEY_0=safe.directory
              export GIT_CONFIG_VALUE_0=/work
              git clone --depth 1 "{{workflow.parameters.atlasRepoURL}}" /work
              cd /work
              git fetch --depth 1 origin "{{workflow.parameters.revision}}"
              git checkout "{{workflow.parameters.revision}}"
          volumeMounts:
            - name: workspace
              mountPath: /work
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      container:
        # Épinglé par DIGEST d'index multi-arch (arm64+amd64 vérifiés crane, ADR 0006),
        # résolu 2026-07-02. RÉSOLU intégration (ADR 0011) : MIRRORÉ au registry:80 par
        # `bootstrap/eventful-mirror.yaml` (comme les 3 autres images publiques du builder) —
        # au banc air-gappé même buildkit doit venir du registry interne.
        image: registry:80/moby/buildkit:v0.18.2-rootless
        command: [buildctl-daemonless.sh]
        args:
          - build
          - --frontend
          - dockerfile.v0
          - --local
          - context=/work/dataops
          - --local
          - dockerfile=/work/dataops/{{workflow.parameters.codeLocation}}-dagster
          - --opt
          - filename=Dockerfile
          - --output
          # Nom d'image = `<cl>-dagster` (PAS `<cl>` seul) : c'est le nom que l'overlay
          # kustomize atlas attend (`registry:80/citation-dagster`, cf. base/code-location.yaml
          # et overlays/*/kustomization.yaml `images: - name: registry:80/citation-dagster`).
          # Un push sous `registry:80/citation` ne serait JAMAIS substitué par le kustomize
          # `images:` (clé ≠ nom source) → le deploy resterait sur l'image mutable :dev du seed
          # (PROUVÉ AU BANC 2026-07-02 : deploy figé sur citation-dagster:dev). Le suffixe
          # `-dagster` fait aussi le lien 1-1 avec le dossier `<cl>-dagster/` du contexte.
          - type=image,name=registry:80/{{workflow.parameters.codeLocation}}-dagster:{{workflow.parameters.revision}},push=true
        env:
          # BuildKit rootless dans un Pod : pas de sandbox de process (Kubernetes
          # n'a pas l'équivalent de systempaths=unconfined). Requis avec le
          # securityContext Unconfined ci-dessous (doc buildkit rootless k8s).
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
        volumeMounts:
          - name: workspace
            mountPath: /work
          - name: buildkitd-config
            mountPath: /home/user/.config/buildkit
            readOnly: true
      # BuildKit rootless en k8s exige seccomp ET AppArmor Unconfined sur CE
      # conteneur (il crée des user-namespaces imbriqués que les profils par
      # défaut interdisent). Justifié : c'est le prix du build rootless (vs Kaniko
      # root, écarté ADR 0095). Cantonné au SEUL pod builder du ns argo.
      # (KSV-0014 / seccomp non-RuntimeDefault → à allowlister .trivyignore.yaml
      #  sur ce seul chemin à l'intégration.)
      #
      # PAS d'annotation `container.apparmor.security.beta.kubernetes.io/<name>` legacy :
      # dans un WorkflowTemplate Argo, le conteneur du step n'a pas le nom du template
      # (« container not found », pod invalide — PROUVÉ AU BANC k8s 1.34). Le champ natif
      # `appArmorProfile` (k8s ≥ 1.30) suffit et ne dépend pas d'un nom de conteneur.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: Unconfined # requis : BuildKit rootless crée des user-namespaces imbriqués
        appArmorProfile:
          type: Unconfined

    # ── STEP 3 — lire le DIGEST poussé. ───────────────────────────────────────
    # En Pod on ne peut pas `nerdctl image inspect` (pas de containerd du nœud) → on
    # interroge le registry en HTTP. On lit le header `Docker-Content-Digest` d'un
    # `HEAD /v2/<name>/manifests/<tag>` — C'EST EXACTEMENT ce que `crane digest` fait
    # sous le capot, mais SANS l'image `crane` : elle est DISTROLESS (pas de `sh` →
    # `command: [sh,-c]` échoue « exec: sh: executable file not found », PROUVÉ AU BANC)
    # et son tag `:debug` (avec busybox) n'est PAS mirroré. `curlimages/curl` (déjà
    # mirrorée, DÉJÀ utilisée par write-back, a un shell) suffit → une image de moins.
    # Les en-têtes `Accept` demandent le manifest v2/OCI (sinon un registry peut répondre
    # un schema1 sans le header). Garde de parité avec build-push : le digest DOIT matcher
    # ^sha256:[0-9a-f]{64}$ (un push raté ne doit pas écrire un digest vide → Argo CD
    # déploierait un manifeste périmé). Écrit dans un output param consommé par write-back.
    - name: digest
      container:
        image: registry:80/curlimages/curl:8.11.1
        command: [sh, -c]
        args:
          - |
            set -eu
            # FQDN registry (PAS le nom court `registry`) : ce curl tourne dans une image
            # ALPINE (musl), dont le resolver N'ITÈRE PAS les search domains de façon fiable
            # (le nom court échoue « Could not resolve host: registry » MÊME avec le dnsConfig,
            # PROUVÉ AU BANC — buildkit résout `registry` via son resolver Go, curl/musl non).
            # Le FQDN complet est sans ambiguïté et musl-safe. HTTP car registry interne
            # insecure (ADR 0011). C'est une lecture HTTP (pas un nom d'image OCI), donc le
            # FQDN ici ne rompt PAS la convention `registry:80` des noms d'image.
            d=$(curl -fsS -I \
                  -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \
                  -H 'Accept: application/vnd.oci.image.manifest.v1+json' \
                  "http://registry.registry.svc.cluster.local:80/v2/{{workflow.parameters.codeLocation}}-dagster/manifests/{{workflow.parameters.revision}}" \
                | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}')
            echo "$d" | grep -qE '^sha256:[0-9a-f]{64}$' \
              || { echo "digest invalide ou vide: <${d:-∅}>" >&2; exit 1; }
            printf '%s' "$d" > /tmp/digest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
      outputs:
        parameters:
          - name: digest
            valueFrom:
              path: /tmp/digest

    # ── STEP 4 — write-back `apps/<codeLocation>.yaml` par digest dans cluster/apps. ──
    # Réutilise le PATRON `push_contents_file` de bootstrap/seed-app-of-apps.sh :
    # base64 du contenu, GET du sha existant (create-or-update idempotent), PUT si
    # présent sinon POST, VÉRIFIE "commit" dans la réponse (un PUT/POST raté ne
    # doit pas laisser l'ancien manifeste — drift ADR 0095 §1.a).
    #
    # POINT DUR 3 — token monté depuis le Secret `gitea-writeback-token` (scopé
    # cluster/apps, write:repository), lu dans l'en-tête Authorization.
    #
    # NOTE FRONTIÈRE (ADR 0094) — le manifeste écrit ici référence l'image PAR
    # DIGEST `registry:80/<codeLocation>@<digest>`. La SUBSTITUTION du digest dans
    # l'overlay atlas suit la logique de nestor/seed.py `substitute_citation_
    # placeholders` (le seed est propriétaire du placeholder ; ici le builder
    # écrit la déclaration Application par digest, cluster/apps = seule surface écrite).
    # RÉSOLU intégration (ADR 0011) : `curlimages/curl` PUBLIQUE → MIRRORÉE au
    # registry:80 par `bootstrap/eventful-mirror.yaml`, épinglée par digest d'index
    # multi-arch (arm64+amd64 vérifiés crane, ADR 0006), tag conservé.
    - name: write-back
      inputs:
        parameters:
          - name: digest
      container:
        image: registry:80/curlimages/curl:8.11.1
        command: [sh, -c]
        args:
          - |
            set -eu
            digest="{{inputs.parameters.digest}}"
            cl="{{workflow.parameters.codeLocation}}"
            base="{{workflow.parameters.giteaWritebackURL}}"        # …/api/v1/repos/cluster/apps
            token="$(cat /var/run/gitea/token)"
            rpath="apps/${cl}.yaml"
            # image_ref = `<cl>-dagster@<digest>` : DOIT matcher le nom d'image poussé par
            # build-push ET la clé kustomize `images:` de l'overlay atlas (registry:80/<cl>-dagster)
            # — sinon la substitution kustomize n'a pas lieu et le deploy reste sur l'image :dev.
            image_ref="registry:80/${cl}-dagster@${digest}"

            # Le fichier apps/<cl>.yaml : une Application Argo CD référençant l'image PAR DIGEST.
            #
            # name = <cl>-dagster : MÊME nom que la déclaration du seed (`citation-dagster`) →
            # le build événementiel REMPLACE la déclaration bootstrap (pas de doublon dans le
            # ns dagster). Le seed pose la 1re Application (image mutable :dev) pour amorcer ;
            # dès le 1er build, cette Application-ci (par DIGEST) prend le relais SOUS LE MÊME NOM.
            #
            # project = `atlas` (le projet APPLICATIF, PAS `cluster-apps`). `cluster-apps` est le
            # périmètre RESTREINT de l'app-of-apps (ADR 0094) : il n'autorise QUE des Application
            # dans le ns argocd, sources `cluster/**`. Un workload MÉTIER (repo atlas, ns dagster,
            # tout kind) doit vivre dans le projet `atlas` — sinon Argo CD REFUSE la sync
            # (« namespace dagster / repo atlas not permitted in project cluster-apps », PROUVÉ
            # AU BANC 2026-07-02). C'est l'app-of-apps `cluster-apps` (lui-même dans son projet)
            # qui INSTANCIE cette Application applicative depuis apps/<cl>.yaml.
            manifest=$(cat <<YAML
            apiVersion: argoproj.io/v1alpha1
            kind: Application
            metadata:
              name: ${cl}-dagster
              namespace: argocd
            spec:
              project: atlas
              source:
                repoURL: http://gitea-http.gitea.svc.cluster.local/atlas/atlas.git
                targetRevision: "{{workflow.parameters.revision}}"
                path: dataops/${cl}-dagster/deploy/overlays/{{workflow.parameters.overlay}}
                kustomize:
                  images:
                    - ${image_ref}
              destination:
                server: https://kubernetes.default.svc
                namespace: dagster
              syncPolicy:
                automated:
                  selfHeal: true
                  prune: true
            YAML
            )
            content=$(printf '%s' "$manifest" | base64 | tr -d '\n')
            auth="Authorization: token ${token}"

            # GET du sha existant (create-or-update idempotent, patron push_contents_file).
            sha=$(curl -fsS -H "$auth" "${base}/contents/${rpath}" 2>/dev/null \
              | grep -oE '"sha":"[a-f0-9]+"' | head -1 | cut -d'"' -f4 || true)
            if [ -n "${sha}" ]; then
              body="{\"content\":\"${content}\",\"sha\":\"${sha}\",\"message\":\"builder: ${cl} @ ${digest}\"}"
              resp=$(curl -fsS -X PUT -H "$auth" -H 'Content-Type: application/json' \
                -d "${body}" "${base}/contents/${rpath}")
            else
              body="{\"content\":\"${content}\",\"message\":\"builder: ${cl} @ ${digest}\"}"
              resp=$(curl -fsS -X POST -H "$auth" -H 'Content-Type: application/json' \
                -d "${body}" "${base}/contents/${rpath}")
            fi
            printf '%s' "$resp" | grep -q '"commit"' \
              || { echo "write-back Contents API de ${rpath} ÉCHOUÉ — réponse: ${resp}" >&2; exit 1; }
            echo "write-back OK: ${rpath} → ${image_ref}"
        volumeMounts:
          - name: gitea-writeback-token
            mountPath: /var/run/gitea
            readOnly: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
