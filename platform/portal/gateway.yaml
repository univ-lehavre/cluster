# Exposition du PORTAIL via le Gateway Cilium hostNetwork + TLS interne (ADR 0091/
# 0071/0020/0021). hostPort 443 sur l'IP du nœud, hostname dédié portail.cluster.lan.
# Même patron que platform/mailpit/gateway.yaml. Secret TLS créé par cert-manager.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: portal
  namespace: portal
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
spec:
  gatewayClassName: cilium
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: portail.cluster.lan # TODO admin réseau (placeholder .lan)
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: portal-server-tls # créé/renouvelé par cert-manager
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portal
  namespace: portal
spec:
  parentRefs:
    - name: portal
      namespace: portal
      sectionName: websecure
  hostnames:
    - portail.cluster.lan # TODO admin réseau (placeholder .lan)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portal
          port: 80 # Service portal:80 → conteneur 8080 (HTTP clair, TLS en bordure)
