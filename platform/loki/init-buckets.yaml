# Job d'initialisation des buckets S3 de Loki.
#
# Loki en backend S3 N'AUTO-CRÉE PAS ses buckets (NoSuchBucket sinon). Ce Job les
# crée (idempotent : `mb` sur un bucket existant est sans effet). À lancer AVANT le
# StatefulSet Loki.
#
# Endpoint/creds PARAMÉTRABLES : défaut SeaweedFS (banc) ; en prod, surcharger vers
# le RGW Ceph (objectstore) via un Secret non versionné (ADR 0023). Image aws-cli
# épinglée par digest d'index multi-arch (ADR 0006).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: loki-init-buckets
  namespace: monitoring
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: loki-init-buckets
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mb
          image: docker.io/amazon/aws-cli:2.31.21@sha256:ae7057ee66673816887b5964ea5e34663ec1c22d5179b234a4118dbc57dd8911
          env:
            # PARAMÉTRABLE (banc = SeaweedFS ; prod = RGW Ceph via Secret non versionné).
            - name: AWS_ACCESS_KEY_ID
              value: 'seaweedadmin'
            - name: AWS_SECRET_ACCESS_KEY
              value: 'seaweedadmin-secret'
            - name: S3_ENDPOINT
              value: 'http://seaweedfs.s3.svc.cluster.local:8333'
            - name: HOME
              value: /tmp # aws-cli écrit ~/.aws/cli/cache → /tmp (rootfs RO)
          command:
            - /bin/sh
            - -c
          args:
            - |
              for b in loki-chunks loki-ruler loki-admin; do
                aws --endpoint-url "$S3_ENDPOINT" s3 mb "s3://$b" 2>&1 | tee /dev/stderr | grep -qE "make_bucket|BucketAlreadyOwnedByYou|already" || true
              done
              echo "buckets Loki prêts"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # aws-cli n'écrit pas hors /tmp (emptyDir)
            capabilities:
              drop:
                - 'ALL'
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
