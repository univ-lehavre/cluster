apiVersion: v1
kind: Namespace
metadata:
  name: buildkit
  labels:
    # Pod Security admission (ADR 0014) : `baseline` enforce (bloque
    # privileged/hostPath/hostNetwork dès l'admission) ; `restricted` en warn.
    # buildkitd rootless a besoin d'une DÉROGATION seccomp `Unconfined` + `/dev/fuse`
    # (syscalls `clone`/`unshare`/`mount` du build sans privilège) — TOLÉRÉE par
    # `baseline` (elle ne couvre ni seccomp ni /dev/fuse), INTERDITE par `restricted`.
    # C'est le point dur d'ADR 0110 : on ne touche JAMAIS à privileged/hostPath (que
    # baseline bloque), on se limite à la dérogation minimale du rootless.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
