apiVersion: v1
kind: Namespace
metadata:
  name: buildkit
  labels:
    # Pod Security admission (ADR 0014) — CONSTAT EMPIRIQUE (Lima k8s 1.34, 2026-07-12) :
    # contrairement à ce que supposait ADR 0110, PodSecurity `baseline` **INTERDIT**
    # `seccompProfile: Unconfined` ET `AppArmor: unconfined` (message d'admission :
    # `forbidden AppArmor profiles … seccompProfile … must not set … to "Unconfined"`).
    # Or buildkitd rootless EXIGE ces deux dérogations (+ CAP_SETUID/SETGID pour
    # newuidmap) pour ses user-namespaces imbriqués — prouvé : le build ne fonctionne
    # PAS sans elles. On N'ENFORCE donc PAS `baseline` sur CE namespace de build :
    # le privilège du builder y est ISOLÉ, le RESTE du cluster garde `enforce: baseline`
    # (doctrine ADR 0014, par namespace) — c'est le « moindre relâchement ». JAMAIS de
    # `privileged`/`hostPath`/`hostNetwork` (le durcissement maximal hors seccomp/fuse).
    # `warn`/`audit: baseline` gardent la VISIBILITÉ des écarts sans les bloquer.
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
