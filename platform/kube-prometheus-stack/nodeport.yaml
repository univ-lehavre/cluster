# Exposition L4 de l'UI Grafana par un Service NodePort (ADR 0092 :
# http://<IP-nœud>:<nodePort>, zéro DNS, zéro LB-IPAM). Service SÉPARÉ qui ne
# touche NI le pod NI le bundle vendored kube-prometheus-stack.yaml (CLAUDE.md
# interdit d'éditer les bundles upstream à la main). Même selector que le Service
# ClusterIP "kube-prometheus-stack-grafana" → Cilium-eBPF route NodeIP:<nodePort>
# vers les mêmes endpoints. Le nodePort n'est PAS figé : Kubernetes l'attribue
# dans la plage 30000-32767 (ADR 0092).
---
apiVersion: v1
kind: Service
metadata:
  name: kube-prometheus-stack-grafana-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: kube-prometheus-stack
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: kube-prometheus-stack
  ports:
    - name: http
      port: 80
      targetPort: grafana
      protocol: TCP
