# Exposition de Grafana via le Gateway Cilium + TLS interne (ADR 0020/0021).
# Même patron que platform/argocd/gateway.yaml : TLS terminé en bordure, backend
# en HTTP clair. Le Secret TLS est créé par cert-manager (gateway-shim) via
# l'annotation cluster-issuer — NE PAS le créer à la main.
#
# Prometheus et Alertmanager ne sont PAS exposés (accès kubectl port-forward) ;
# l'UI Mailpit est exposée séparément (platform/mailpit/gateway.yaml).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: internal-ca # gateway-shim cert-manager
spec:
  gatewayClassName: cilium
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: grafana.cluster.lan # TODO admin réseau (placeholder .lan)
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: grafana-server-tls # créé/renouvelé par cert-manager
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: grafana
      namespace: monitoring
      sectionName: websecure
  hostnames:
    - grafana.cluster.lan # TODO admin réseau (placeholder .lan)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Service Grafana en HTTP clair port 80 (cf. values.bench.yaml service.port).
        - name: kube-prometheus-stack-grafana
          port: 80
