# ServiceAccount + RBAC `operate-workflow-sa` (ns argo-events) — permet au Sensor
# `code-location-build` de SOUMETTRE des Workflows au controller Argo Workflows
# (ns argo) via son trigger `argoWorkflow` (ADR 0095 §1.b).
#
# POURQUOI ce fichier — le Sensor déclare `serviceAccountName: operate-workflow-sa`
# (sensor-code-location.example.yaml) ; sans ce SA + le RBAC de création de Workflow,
# le Deployment du Sensor reste `ReplicaFailure: FailedCreate` (SA introuvable), et un
# trigger ne pourrait de toute façon pas `create workflows`. C'est le patron standard
# Argo Events → Argo Workflows (RBAC de soumission), à part du bundle vendoré.
#
# PROUVÉ AU BANC 2026-07-02 : sans ce RBAC, le pod Sensor ne démarre pas
# (« serviceaccount "operate-workflow-sa" not found »).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operate-workflow-role
rules:
  # Le Sensor crée/suit des Workflows (et lit les WorkflowTemplates référencés).
  - apiGroups: ['argoproj.io']
    resources: ['workflows', 'workflowtemplates', 'cronworkflows', 'workflowtaskresults']
    verbs: ['create', 'get', 'list', 'watch', 'update', 'patch', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operate-workflow-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: operate-workflow-role
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: argo-events
