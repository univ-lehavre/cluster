# Sensor `code-location-build` (Argo Events v1.9.10) — LE CŒUR DE LA DÉCOUVERTE
# (ADR 0095 §1.b, étape 7 ; plan build événementiel §4 « Mécanisme de DÉCOUVERTE
# », voie C tranchée).
#
# ═══════════════════════════════════════════════════════════════════════════════
# DÉCOUVERTE — voie C (App-of-Apps cluster/apps alimenté par le builder)
# ═══════════════════════════════════════════════════════════════════════════════
# Ce Sensor NE FAIT QU'UNE chose : sur un `git push` atlas touchant une
# code-location, SOUMETTRE le WorkflowTemplate `image-builder` (étape 6) avec le
# `codeLocation` DÉRIVÉ DU CHEMIN modifié — JAMAIS énuméré. Il ne déploie RIEN.
#
# La chaîne complète (séparation build / déploiement, frontière ADR 0094) :
#   git push atlas ─▶ EventSource gitea-push (webhook #2) ─▶ EventBus NATS
#     ─▶ CE Sensor : filtre branche + chemin, DÉRIVE codeLocation, SOUMET
#         image-builder ─▶ [Argo Workflows] build → push → write-back
#         `apps/<codeLocation>.yaml` PAR DIGEST dans cluster/apps
#     ─▶ [webhook #1, DÉJÀ câblé] ─▶ Argo CD réconcilie la racine App-of-Apps
#         (`prune: true`) ─▶ Application fille matérialisée ─▶ pod gRPC.
#
# POURQUOI « zéro geste » pour une code-location NOUVELLE : le builder écrit un
# FICHIER NEUF `apps/<nouvelle-cl>.yaml` ; la racine App-of-Apps EXISTANTE
# (`prune: true`) le matérialise en Application sans aucune énumération ni geste.
# Une code-location `dataops/newthing-dagster/…` toute neuve fait donc
# `codeLocation=newthing` → `apps/newthing.yaml` → Application `newthing`,
# automatiquement. La découverte EST la dérivation du chemin, pas une liste.
#
# Garde-fou amont : `scripts/check_code_location_manifest.py` échoue BRUYAMMENT
# sur un `code-location.manifest.yaml` incohérent (la découverte n'installe pas
# n'importe quoi — un manifeste cassé n'atteint jamais un build valide).
#
# Voies écartées (plan §4) : (A) Sensor→kubectl apply (mélange build/déploiement)
# et (B) ApplicationSet (déplace la surface hors cluster/apps). C = seul
# cluster/apps écrit, build et déploiement restent séparés (ADR 0094).
#
# ═══════════════════════════════════════════════════════════════════════════════
# LIMITES À PROUVER AU BANC (honnêteté ADR 0034) — format EXACT du payload Gitea
# ═══════════════════════════════════════════════════════════════════════════════
#  1. FORMAT PAYLOAD GITEA PUSH — les clés `body.ref`, `body.after`,
#     `body.commits[].modified` sont la forme ATTENDUE du webhook Gitea push.
#     La forme RÉELLE (nom exact des champs, HEAD commit vs `commits[]`,
#     encodage) doit être VÉRIFIÉE AU BANC sur un vrai payload (piège :
#     `head_commit` vs `commits[]`, chemins relatifs vs absolus). Le filtre de
#     chemin et l'extraction regex ci-dessous peuvent nécessiter un affinage.
#  2. EXTRACTION regex du codeLocation — `dataKey: body.commits.0.modified.0`
#     ne lit QUE le PREMIER fichier du PREMIER commit. Un push multi-fichiers /
#     multi-commits touchant PLUSIEURS code-locations demanderait une itération
#     (non exprimable en un seul trigger paramétré Argo Events) — à affiner au
#     banc (piste : un trigger par code-location via `filters` répétés, ou un
#     step de dispatch). Ici on couvre le cas NOMINAL (un push = une
#     code-location touchée), suffisant pour la preuve « zéro geste ».
#  3. CROSS-NAMESPACE Sensor(argo-events) → WorkflowTemplate(argo) — voir la note
#     « CROSS-NS » sur le trigger ci-dessous : à PROUVER / arbitrer au banc.
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: code-location-build
  namespace: argo-events
spec:
  # Le Sensor tourne avec un ServiceAccount autorisé à créer des Workflows
  # (RBAC posé au vendoring / à l'intégration — cf. README).
  template:
    serviceAccountName: operate-workflow-sa
  dependencies:
    - name: gitea-push-dep
      # Se rattache à l'EventSource `gitea-push`, endpoint `push` (cf.
      # eventsource-gitea.example.yaml : la clé `push` du bloc `webhook`).
      eventSourceName: gitea-push
      eventName: push
      # ── FILTRE = LE SIGNAL DE DÉTECTION ──────────────────────────────────────
      # Deux conditions ET (dataLogicalOperator: and) :
      #   (a) BRANCHE : ref == refs/heads/main (on n'installe que depuis main) ;
      #   (b) CHEMIN : au moins un fichier modifié SOUS `dataops/<x>-dagster/`
      #       (le `code-location.manifest.yaml` OU le Dockerfile OU src/). C'est
      #       la DÉTECTION d'une code-location touchée. La regex matche tout
      #       chemin `dataops/…-dagster/…` sans énumérer les noms.
      filters:
        dataLogicalOperator: and
        data:
          # (a) branche main uniquement.
          - path: body.ref
            type: string
            value:
              - '^refs/heads/main$'
          # (b) un chemin de code-location touché (modified OU added). La forme
          # `commits.0.<champ>.0` lit le 1er fichier du 1er commit — cas nominal
          # (cf. LIMITE 2). Le `comparator` par défaut sur une `value` regex =
          # match ; on couvre modified ET added par deux entrées OR-groupées.
          - path: body.commits.0.modified.#(%dataops/*-dagster/*)
            type: string
            value:
              - 'dataops/.+-dagster/.+'
  triggers:
    - template:
        name: submit-image-builder
        # ── CROSS-NS (LIMITE 3, à prouver au banc) ────────────────────────────
        # Le Sensor est en `argo-events`, le WorkflowTemplate `image-builder` en
        # `argo`. Un `argoWorkflow` trigger avec `operation: submit` crée le
        # Workflow DANS le namespace du `source.resource` fourni ci-dessous
        # (`metadata.namespace: argo`) et le lie au WorkflowTemplate par
        # `workflowTemplateRef`. Un `workflowTemplateRef` (namespacé) est résolu
        # DANS le namespace du Workflow créé → le WorkflowTemplate DOIT être dans
        # `argo` (il l'est). ⚠️ À VÉRIFIER AU BANC : si Argo Workflows refuse un
        # workflowTemplateRef namespacé résolu cross-Sensor, BASCULER
        # `image-builder` en `ClusterWorkflowTemplate` (`clusterScope: true`) —
        # documenté ici comme repli, pas encore tranché faute de run banc.
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: image-builder-
                namespace: argo
              spec:
                # Réfère le WorkflowTemplate `image-builder` (ns argo, étape 6).
                # Repli cross-ns : `clusterScope: true` + ClusterWorkflowTemplate.
                workflowTemplateRef:
                  name: image-builder
                # `arguments` FANTÔMES — écrasés par les `parameters` du trigger
                # ci-dessous (Argo Events patche ces valeurs depuis le payload).
                arguments:
                  parameters:
                    - name: codeLocation
                      value: ''
                    - name: revision
                      value: ''
                    - name: atlasRepoURL
                      value: http://gitea-http.gitea.svc.cluster.local/atlas/atlas.git
                    - name: giteaWritebackURL
                      value: http://gitea-http.gitea.svc.cluster.local/api/v1/repos/cluster/apps
          # ── PARAMÈTRES EXTRAITS DU PAYLOAD (la DÉRIVATION) ────────────────────
          # Argo Events remplace le champ ciblé par `dest` avec la valeur `src`.
          parameters:
            # codeLocation = DÉRIVÉ DU CHEMIN. `dataTemplate` applique une regex
            # sprig sur le chemin du fichier modifié : `dataops/(<name>)-dagster/`
            # → <name>. JAMAIS une liste en dur — une code-location NOUVELLE
            # `dataops/newthing-dagster/…` donne `codeLocation=newthing` sans
            # énumération. C'EST le point de la découverte.
            #
            # ⚠️ PIÈGE Argo Events v1.9.10 (PROUVÉ AU BANC 2026-07-02) — quand
            # `dataTemplate` est défini, `.Input` N'EST PAS la valeur pointée par
            # `dataKey` : c'est le PAYLOAD RACINE désérialisé (une map). Un template
            # `{{ .Input | regexFind … }}` échoue donc « wrong type for value; expected
            # string; got map[string]interface {} » et Argo RETOMBE sur `dataKey` brut →
            # le codeLocation valait `dataops/citation-dagster/README.md` (chemin ENTIER,
            # pas `citation`). Correctif : NAVIGUER explicitement dans `.Input` avec `index`
            # (`.Input.body.commits[0].modified[0]`) AVANT le regexFind. `dataKey` reste
            # présent pour le fallback/lisibilité mais le template ne s'en sert pas.
            - src:
                dependencyName: gitea-push-dep
                dataKey: body.commits.0.modified.0
                # `>-` replie les lignes en UN SEUL espace (template Go valide sur une ligne).
                dataTemplate: >-
                  {{ (index (index .Input.body.commits 0).modified 0)
                  | regexFind "dataops/[^/]+-dagster"
                  | regexFind "[^/]+-dagster"
                  | trimSuffix "-dagster" }}
              dest: spec.arguments.parameters.0.value
            # revision = body.after — le SHA du push, signal canonique `revision`
            # (ADR 0094 §3) : tag lisible côté image + révision clonée par le
            # builder.
            - src:
                dependencyName: gitea-push-dep
                dataKey: body.after
              dest: spec.arguments.parameters.1.value
