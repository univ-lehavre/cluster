# EventSource `gitea-push` (Argo Events v1.9.10) — WEBHOOK #2 (BUILD) de la
# chaîne événementielle (ADR 0095 §1.b, étape 7 du plan build événementiel).
#
# ── DEUX WEBHOOKS GITEA DISTINCTS (ADR 0095 §1.b) ─────────────────────────────
#  • webhook #1 (DÉPLOIEMENT, DÉJÀ câblé) : push sur `cluster/apps` →
#    argocd-server/api/webhook → Argo CD réconcilie. Posé par `webhook()` du seed
#    (scripts/topology.py) sur le repo des Application.
#  • webhook #2 (BUILD, CE FICHIER) : push sur `atlas/atlas` (code applicatif) →
#    CET EventSource → EventBus NATS → Sensor `code-location-build` → soumet le
#    WorkflowTemplate `image-builder`. Posé par `webhook_build()` du seed sur le
#    repo de CODE atlas. C'est LE déclencheur « git push atlas → build » de la
#    demande utilisateur (« détection d'une code-location → installation, zéro
#    geste »).
#
# L'EventSource webhook OUVRE un serveur HTTP dans le namespace argo-events. Il
# est joignable en intra-cluster via le Service `gitea-push-eventsource-svc`
# (convention Argo Events `<eventsource-name>-eventsource-svc`), sur le port
# ci-dessous. L'URL que Gitea appellera :
#   http://gitea-push-eventsource-svc.argo-events.svc.cluster.local:12000/push
#
# ── SÉCURITÉ : ISOLATION RÉSEAU, pas signature HMAC (PROUVÉ AU BANC 2026-07-02) ──
# PAS d'`authSecret` : dans Argo Events, `webhook.authSecret` compare le header
# `Authorization` à la valeur LITTÉRALE du secret — or Gitea ne pose PAS ce header,
# il signe le corps en HMAC-SHA256 dans `X-Gitea-Signature` (protocole DIFFÉRENT).
# Avec `authSecret`, TOUT payload Gitea est rejeté « invalid auth header » (vécu au
# banc) : les deux ne parlent pas le même langage d'auth. La sécurité vient donc de
# l'ISOLATION RÉSEAU (ADR 0003, air-gap) : SEUL Gitea peut POSTer sur cet endpoint —
# la NetworkPolicy `allow-gitea` n'ouvre l'egress `:12000` que du pod Gitea, et
# `GITEA__webhook__ALLOWED_HOST_LIST` restreint la destination des webhooks Gitea à
# cet hôte. Un POST forgé devrait d'abord être un pod Gitea compromis (surface déjà
# couverte). Le Secret `gitea-webhook-build-hmac` reste posé par le seed (webhook
# #2) mais n'est PAS utilisé ici (garder pour un durcissement HMAC futur si Argo
# Events supporte la vérif `X-Gitea-Signature` nativement).
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitea-push
  namespace: argo-events
spec:
  service:
    # Le Service exposant l'endpoint (nom dérivé = gitea-push-eventsource-svc).
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    # Clé `push` = nom de l'endpoint (repris tel quel par la dépendance du Sensor,
    # `eventName: push`). Un seul endpoint suffit : le webhook Gitea #2 ne pousse
    # que des events `push`.
    push:
      port: '12000'
      endpoint: /push
      method: POST
      # PAS d'authSecret (cf. en-tête) : incompatible avec la signature Gitea
      # (X-Gitea-Signature). Sécurité = isolation réseau (seul Gitea peut POSTer).
