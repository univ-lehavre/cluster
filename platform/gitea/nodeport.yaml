---
# Exposition L4 NodePort de l'UI Gitea (ADR 0092) : http://<IP-nœud>:<nodePort>,
# routable depuis le poste opérateur sans DNS ni LB-IPAM. Service SÉPARÉ — ne
# touche pas le manifeste de Service ClusterIP "gitea-http" (CLAUDE.md), même
# selector {app: gitea} que lui. nodePort NON figé : k8s l'attribue dans la plage
# 30000-32767 (le pinner exposerait une valeur d'instance, ADR 0023).
apiVersion: v1
kind: Service
metadata:
  name: gitea-http-nodeport
  namespace: gitea
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
