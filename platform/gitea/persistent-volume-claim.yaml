apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Dépôt(s) GitOps d'atlas (manifestes + code-locations) + base SQLite
      # interne de Gitea : volume modeste. storageClass paramétré par le rôle
      # Ansible (template) — défaut prod Rook-Ceph ×3, banc surchargé local-path.
      storage: 10Gi
  storageClassName: rook-ceph-block-replicated
