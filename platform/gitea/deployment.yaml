apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1
  # Recreate : un seul pod sur un PVC RWO (RollingUpdate bloquerait sur le
  # volume attaché au pod sortant). Cohérent avec les autres briques stateful.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitea
          # Gitea ROOTLESS — forge git légère (git intra-banc air-gapped, ADR
          # 0044). Variante rootless choisie (vs l'image s6 par défaut) : tourne
          # en uid 1000, entrypoint dumb-init (pas de superviseur s6 écrivant
          # hors volumes), montages explicites /var/lib/gitea + /etc/gitea →
          # readOnlyRootFilesystem tenable. Épinglé par digest d'INDEX multi-arch
          # (ADR 0006) : l'index porte amd64 + arm64 (le banc est arm64 ; un
          # manifeste single-arch donnerait `exec format error`). MAJ renovate.
          image: gitea/gitea:1.26.2-rootless@sha256:c5c21a7705a16f2b2369384a3b7d67c5ed761a818bbb0a55187b5cf98cdc2e68
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            # Configuration par variables d'env (GITEA__section__clé) — pas de
            # ConfigMap app.ini à maintenir. Banc air-gapped : SQLite (aucune
            # dépendance externe, indépendant de CNPG), pas de mirroring sortant,
            # inscription fermée. Valeurs d'exemple génériques (ADR 0023) ;
            # l'admin/déploiement surcharge via le rôle Ansible si besoin.
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__server__DOMAIN
              value: gitea-http.gitea.svc.cluster.local
            - name: GITEA__server__ROOT_URL
              value: http://gitea-http.gitea.svc.cluster.local/
            - name: GITEA__server__HTTP_PORT
              value: '3000'
            # Forge interne, jamais exposée à Internet : pas d'auto-inscription,
            # install déjà verrouillée (lecture des dépôts internes — l'isolement
            # réseau fait la sécurité, cf. ADR 0003).
            - name: GITEA__service__DISABLE_REGISTRATION
              value: 'true'
            - name: GITEA__security__INSTALL_LOCK
              value: 'true'
            # Pas de webhook sortant arbitraire : on n'autorise QUE l'hôte interne du
            # webhook #1 Argo CD (déploiement, ADR 0044) — évite qu'un dépôt configure
            # un webhook vers l'extérieur (cohérent air-gapped). Sans cet hôte, Gitea
            # refuse la livraison (« webhook can only call allowed HTTP servers »).
            # (Le webhook #2 EventSource — chaîne événementielle §1.b — a été RETIRÉ,
            # ADR 0105 ; son hôte a donc disparu de l'allowlist.)
            - name: GITEA__webhook__ALLOWED_HOST_LIST
              value: argocd-server.argocd.svc.cluster.local
          volumeMounts:
            # Données persistantes (dépôts git + base SQLite) — PVC.
            - name: gitea-data
              mountPath: /var/lib/gitea
            # app.ini généré par l'entrypoint au boot : writable, éphémère (la
            # config vient des env GITEA__* ci-dessus, pas d'un app.ini à garder).
            - name: gitea-config
              mountPath: /etc/gitea
            # TMPDIR=/tmp/gitea (cf. env de l'image) — writable sous rootfs RO.
            - name: tmp
              mountPath: /tmp/gitea
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            # /api/healthz sert derrière le même mutex que git-upload-pack /
            # pre-receive ; sous charge de push il a été mesuré à ~4,7 s (défaut
            # timeoutSeconds=1 → readiness FAIL parasite). Tolérer la lenteur.
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            # Idem : sans marge, un push lent (pre-receive hook mesuré à 36 s)
            # faisait échouer la liveness (timeout défaut 1 s) → K8s tuait Gitea
            # EN PLEIN PUSH → un push de seed échouait (crash-loop 12 redémarrages
            # observés). failureThreshold×periodSeconds ≈ 3 min de grâce avant
            # redémarrage.
            timeoutSeconds: 15
            failureThreshold: 6
          resources:
            # Au repos Gitea tient en ~200Mi/8m ; mais un `git push` du monorepo
            # atlas + le hook pre-receive saturaient les DEUX plafonds (mesuré
            # 509Mi/512 et 501m/500 = CPU throttlé 100 %), rendant les opérations
            # git si lentes que les sondes timeoutaient. Enveloppe dimensionnée
            # pour les pics de push (nœuds à 256 Gio, marge sans risque).
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '2Gi'
              cpu: '2'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: gitea-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
