# Patron VERSIONNÉ des Secrets de mot de passe des rôles managés CNPG (ADR 0023).
#
# Le Cluster `pg` (cluster.yaml) déclare un `passwordSecret` par rôle managé
# (dagster, pgvector, marquez). CNPG lit ces Secrets pour POSER le mot de passe du
# rôle. Sans eux, le rôle est créé SANS mot de passe → aucune appli ne peut se
# connecter (validé sur banc).
#
# Type `kubernetes.io/basic-auth` : CNPG attend les clés `username` et `password`.
#
# ⚠️ VALEURS DE TEST. Sur une topologie réelle : créer ces Secrets hors dépôt
# (config locale non versionnée), avec des mots de passe forts générés. Les mêmes
# mots de passe doivent alimenter les Secrets DÉRIVÉS côté appli (dagster-pg-auth,
# marquez-pg-auth) — cf. platform/{dagster,marquez}/pg-secret.example.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-role-dagster
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: dagster
  password: dagster-test-password # valeur de test (banc) — pwd fort hors dépôt en réel
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-role-pgvector
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: pgvector
  password: pgvector-test-password # valeur de test (banc)
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-role-marquez
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: marquez
  password: marquez-test-password # valeur de test (banc)
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-role-mlflow
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: mlflow
  password: mlflow-test-password # valeur de test (banc)
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-role-cache # cache partagé des flux atlas (ADR 0093)
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: cache
  password: cache-test-password # valeur de test (banc)
