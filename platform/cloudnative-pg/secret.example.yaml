# Patron VERSIONNÉ des credentials S3 des sauvegardes CNPG (ADR 0023).
#
# ⚠️ VALEURS DE TEST (banc léger SeaweedFS) — jamais de creds réels ici.
# Sur une topologie réelle : créer le vrai Secret hors dépôt (config locale non versionnée) avec
# les clés d'accès du RGW Ceph, MÊMES noms de clés (ACCESS_KEY_ID / ACCESS_SECRET_KEY).
#
# Appliquer (banc) : kubectl apply -f secret.example.yaml
# (renommer en secret.yaml gitignoré et remplacer les valeurs selon la topologie).
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-s3
  namespace: postgres
type: Opaque
stringData:
  ACCESS_KEY_ID: seaweedadmin # valeur de test (banc) — RGW sur la topologie bare-metal
  ACCESS_SECRET_KEY: seaweedadmin-secret # valeur de test (banc) — RGW sur la topologie bare-metal
