# Cluster PostgreSQL managé par CloudNativePG (étape 1.6, ADR 0024).
#
# Un seul Cluster HA (3 instances : 1 primary + 2 replicas, réplication streaming)
# servant DEUX usages via deux bases logiques (cf. database.yaml) :
#   - event log Dagster (1.7)
#   - index pgvector (recherche sémantique, chargé par atlas)
#
# pgvector posé via Image Volume Extension (PG18, sans image custom) :
# spec.postgresql.extensions monte l'image pgvector ; le CREATE EXTENSION est
# déclaré côté Database (nom SQL = vector).
#
# Images épinglées par digest d'index multi-arch (ADR 0006), arm64 vérifié.
# Sauvegardes vers S3 via le plugin Barman Cloud (cf. objectstore.yaml / backup.yaml).
---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: postgres
spec:
  instances: 3 # HA : 1 primary + 2 replicas (réplication streaming)
  # Operand PostgreSQL 18 (requis par les Image Volume Extensions).
  imageName: ghcr.io/cloudnative-pg/postgresql:18-minimal-trixie@sha256:e14f3ed42b14f3abeefc56468af42deb2abc3d9eddf2c465b875b2f0ec3ce3f6
  postgresql:
    # pgvector monté comme volume d'image (pas de shared_preload_libraries requis).
    extensions:
      - name: pgvector
        image:
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.2-18-trixie@sha256:16410c599bd2bfea40653c05c67d98ab4c04befc53eaa3445a5f4cf898b1e98e
  storage:
    size: 5Gi
    # Défaut versionné = PROD (ADR 0033) : RBD répliqué ×3 (ADR 0001 — JAMAIS
    # EC 2+1 pour ce stateful). Le rôle Ansible platform-cnpg surcharge ce champ
    # par topologie (cnpg_storage_class) ; une autre topologie peut pointer une
    # autre storageClass via group_vars (ADR 0023).
    storageClass: rook-ceph-block-replicated
  # Rôles propriétaires des trois bases logiques (cf. database.yaml). CNPG ne crée
  # pas l'owner automatiquement → on les déclare ici (login, sans superuser).
  #
  # ⚠️ Chaque rôle DOIT porter un `passwordSecret` : sans lui, CNPG crée le rôle
  # SANS mot de passe (rolpassword NULL) et l'appli ne peut pas s'authentifier
  # (validé sur banc — un rôle managé sans passwordSecret = connexion impossible).
  # Le Secret (clés `username`/`password`) est fourni hors dépôt (config locale
  # non versionnée) ; un patron `.example` est versionné (role-secrets.example.yaml).
  managed:
    roles:
      - name: dagster
        login: true
        ensure: present
        passwordSecret:
          name: pg-role-dagster
      - name: pgvector
        login: true
        ensure: present
        passwordSecret:
          name: pg-role-pgvector
      - name: marquez
        login: true
        ensure: present
        passwordSecret:
          name: pg-role-marquez
      - name: mlflow
        login: true
        ensure: present
        passwordSecret:
          name: pg-role-mlflow
      # Cache partagé des flux atlas (ADR 0093) : backing service réutilisant CNPG.
      # passwordSecret OBLIGATOIRE (un rôle managé sans lui = rolpassword NULL,
      # connexion impossible).
      - name: cache
        login: true
        ensure: present
        passwordSecret:
          name: pg-role-cache
  # Sauvegardes/WAL archivés via le plugin Barman Cloud (TLS plugin<->operator par
  # cert-manager). L'ObjectStore S3 est défini dans objectstore.yaml.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pg-backup
