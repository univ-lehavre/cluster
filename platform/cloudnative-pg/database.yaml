# Bases logiques du Cluster CNPG (étape 1.6, ADR 0024).
#
# Trois bases sur le même Cluster HA, une par usage — isolation (sauvegardes,
# rétentions, contention) sans doubler l'infrastructure stateful. Un seul cluster
# PostgreSQL HA (`pg`) porte toutes les bases applicatives (pas un cluster par appli).
#   - dagster  : event log de l'orchestrateur Dagster (1.7)
#   - pgvector : index de recherche sémantique (extension vector, chargé par atlas)
#   - marquez  : store de lineage OpenLineage de Marquez (1.8) — migrations Flyway
#                (d'où une base dédiée, pas un schéma partagé). ADR 0028.
#
# L'operator exécute CREATE DATABASE puis, pour pgvector, CREATE EXTENSION vector.
# ⚠️ Le nom SQL de l'extension est `vector` (PAS `pgvector`).
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: dagster
  namespace: postgres
spec:
  name: dagster
  owner: dagster
  cluster:
    name: pg
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: pgvector
  namespace: postgres
spec:
  name: pgvector
  owner: pgvector
  cluster:
    name: pg
  # CREATE EXTENSION vector (fourni par le volume d'image pgvector du Cluster).
  extensions:
    - name: vector
      version: '0.8.2'
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: marquez
  namespace: postgres
spec:
  name: marquez
  owner: marquez
  cluster:
    name: pg
