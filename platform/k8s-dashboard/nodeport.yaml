# Exposition L4 NodePort du Kubernetes Dashboard (ADR 0092) :
# accès http://<IP-nœud>:<nodePort>, zéro DNS, zéro LB-IPAM.
#
# Service SÉPARÉ : il ne touche NI le pod NI le chart Helm (CLAUDE.md interdit
# d'éditer les bundles vendored). Il sélectionne EXACTEMENT les mêmes labels que
# le Service ClusterIP "kubernetes-dashboard" (le proxy Kong qui termine le TLS
# et reverse-proxie l'UI), et Cilium-eBPF route NodeIP:<nodePort> → endpoints.
#
# Le nodePort n'est PAS figé : Kubernetes l'attribue automatiquement dans la
# plage 30000-32767 (lu ensuite via spec.ports[].nodePort).
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-nodeport
  namespace: kubernetes-dashboard
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: app
    app.kubernetes.io/instance: kubernetes-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 443
      targetPort: 8443
