# Exposition L4 NodePort de l'UI Dagster (webserver) — accès
# http://<IP-nœud>:<nodePort> (ADR 0092). Service SÉPARÉ qui ne touche pas le
# bundle vendored dagster.yaml (CLAUDE.md interdit d'éditer les bundles upstream
# à la main) : il sélectionne les MÊMES labels que le Service ClusterIP
# "dagster-dagster-webserver" et Cilium-eBPF route NodeIP:<nodePort> → endpoints.
# Pas de nodePort figé : Kubernetes l'attribue dans la plage 30000-32767.
---
apiVersion: v1
kind: Service
metadata:
  name: dagster-dagster-webserver-nodeport
  namespace: dagster
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: dagster
    app.kubernetes.io/instance: dagster
    component: dagster-webserver
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
