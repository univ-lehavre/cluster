# Patron VERSIONNÉ du Secret de connexion Postgres de Dagster (ADR 0023).
#
# Dagster (chart) attend un Secret avec la clé `postgresql-password` (pointé par
# global.postgresqlSecretName: dagster-pg-auth). On NE pointe PAS le Secret CNPG
# brut `pg-dagster` (il a les clés `username`/`password`, pas `postgresql-password`).
#
# ⚠️ VALEUR DE TEST. Sur une topologie réelle : créer le vrai Secret hors dépôt
# (config locale non versionnée) en recopiant le mot de passe du rôle `dagster`
# depuis le Secret CNPG :
#   kubectl -n postgres get secret pg-dagster -o jsonpath='{.data.password}' | base64 -d
#   → placer cette valeur dans `postgresql-password` d'un Secret `dagster-pg-auth`
#     dans le namespace `dagster`.
---
apiVersion: v1
kind: Secret
metadata:
  name: dagster-pg-auth
  namespace: dagster
type: Opaque
stringData:
  postgresql-password: dagster-test-password # valeur de test (banc) — recopier le pwd CNPG réel sur une topologie
