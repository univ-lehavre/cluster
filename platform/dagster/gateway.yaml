# Exposition de l'UI Dagster (webserver) via le Gateway Cilium + TLS interne
# (ADR 0020/0021). Même patron que platform/argocd/gateway.yaml et mailpit.
#
# SANS auth : le webserver Dagster n'a pas d'auth native ; le cluster est sur un
# réseau privé de confiance (mono-admin, ADR 0003), comme le registry et le
# dashboard. Une auth en bordure (oauth2-proxy) pourra être ajoutée ultérieurement.
# Secret TLS créé par cert-manager (gateway-shim via l'annotation cluster-issuer).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dagster
  namespace: dagster
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
spec:
  gatewayClassName: cilium
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: dagster.cluster.lan # TODO admin réseau (placeholder .lan)
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: dagster-server-tls # créé/renouvelé par cert-manager
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dagster
  namespace: dagster
spec:
  parentRefs:
    - name: dagster
      namespace: dagster
      sectionName: websecure
  hostnames:
    - dagster.cluster.lan # TODO admin réseau (placeholder .lan)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dagster-dagster-webserver
          port: 80
