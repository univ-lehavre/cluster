# Dagster — orchestrateur (chart dagster/dagster 1.13.7). VENDORED le 2026-06-04.
# Helm template figé (cf. values.bench.yaml). Orchestrateur VIDE : webserver +
# daemon + K8sRunLauncher, event log dans CloudNativePG (base dagster). Le code
# métier vit dans atlas (Phase 2+).
#
# Images : l'image officielle dagster/dagster-celery-k8s est amd64-only → sur arm64
# (banc Lima) on utilise l'image construite en interne (platform/dagster/image/),
# publiée dans le registry interne (ADR 0011). Référence registry:80/...
# postgres (init wait-for-db) épinglé par digest d'index multi-arch (ADR 0006).
# Régénérer : voir README + values.bench.yaml.
#
# RETOUCHE LOCALE (workspace orchestrateur vide) : un orchestrateur SANS
# code-location doit quand même recevoir un workspace, sinon `dagster-webserver`
# et `dagster-daemon` échouent (« No arguments given and no [tool.dagster] block »).
# On monte un ConfigMap `dagster-workspace` (load_from: [] = zéro location) et on
# passe `-w /workspace/workspace.yaml` aux deux commandes (validé sur banc, #167).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-workspace
  namespace: dagster
data:
  workspace.yaml: |
    load_from: []
---
