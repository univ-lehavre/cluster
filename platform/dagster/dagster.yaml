---
# Source: dagster/templates/configmap-instance.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-instance
  labels:
    app: dagster
    chart: dagster-1.13.7
    release: dagster
    heritage: Helm
data:
  dagster.yaml: |
    scheduler:      
      module: dagster._core.scheduler
      class: DagsterDaemonScheduler

    schedule_storage:
      module: dagster_postgres.schedule_storage
      class: PostgresScheduleStorage
      config:        
        postgres_db:
          username: dagster
          password:
            env: DAGSTER_PG_PASSWORD
          hostname: "pg-rw.postgres.svc.cluster.local"
          db_name: dagster
          port: 5432
          params:
            {}

    run_launcher:      
      module: dagster_k8s
      class: K8sRunLauncher
      config:
        load_incluster_config: true
        job_namespace: dagster
        image_pull_policy: IfNotPresent
        service_account_name: dagster
        dagster_home: "/opt/dagster/dagster_home"
        instance_config_map: "dagster-instance"
        postgres_password_secret: "dagster-pg-auth"

    run_storage:
      module: dagster_postgres.run_storage
      class: PostgresRunStorage
      config:        
        postgres_db:
          username: dagster
          password:
            env: DAGSTER_PG_PASSWORD
          hostname: "pg-rw.postgres.svc.cluster.local"
          db_name: dagster
          port: 5432
          params:
            {}

    event_log_storage:
      module: dagster_postgres.event_log
      class: PostgresEventLogStorage
      config:        
        postgres_db:
          username: dagster
          password:
            env: DAGSTER_PG_PASSWORD
          hostname: "pg-rw.postgres.svc.cluster.local"
          db_name: dagster
          port: 5432
          params:
            {}
    run_coordinator:      
      module: dagster._core.run_coordinator
      class: QueuedRunCoordinator
      config:
        
        
        max_concurrent_runs: -1
      
        
        dequeue_use_threads: true
        dequeue_num_workers: 4
      
        
    compute_logs:      
      module: dagster._core.storage.noop_compute_log_manager
      class: NoOpComputeLogManager
    run_monitoring:
      enabled: true
      start_timeout_seconds:  300
      max_resume_run_attempts: 0
      poll_interval_seconds: 120
      free_slots_after_run_end_seconds: 0
    run_retries:
      enabled: true
    sensors:
      use_threads: true
      num_workers: 4
    schedules:
      use_threads: true
      num_workers: 4

    telemetry:
      enabled: true

---
# Source: dagster/templates/role.yaml
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: dagster-role
  labels:
    app: dagster
    chart: dagster-1.13.7
    release: "dagster"
    heritage: "Helm"

# Allow the Dagster service account to read and write Kubernetes jobs, deployments, pods, and events.
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get", "watch", "list"]
  # The empty arg "" corresponds to the core API group
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "watch", "list"]
---
