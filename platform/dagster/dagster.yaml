    app: dagster
    chart: dagster-1.13.7
    release: "dagster"
    heritage: "Helm"
subjects:
- kind: ServiceAccount
  name: dagster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster-role
