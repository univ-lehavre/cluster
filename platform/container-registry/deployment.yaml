apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: registry
          # distribution v3 (CNCF) — successeur de docker/distribution v2.
          # API HTTP Registry V2 inchangée, supporte OCI 1.1.
          # Épinglé par digest d'INDEX multi-arch (ADR 0006) : tag conservé pour
          # lisibilité, digest immuable. MAJ via renovate. Le digest DOIT pointer
          # l'index (image.index.v1+json), pas un manifeste single-arch — sinon
          # `exec format error` sur arm64 (#140).
          image: registry:3.1.1@sha256:85347ed2ecde64161c7a4788a4d7d3dcc9d6f86f7be95834022e3c6a423a945a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            # Active la suppression de blobs (pré-requis pour le garbage-collect
            # mensuel ; cf. garbage-collect-cronjob.yaml).
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: 'true'
          volumeMounts:
            - name: registry-storage
              mountPath: /var/lib/registry
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: registry-storage
          persistentVolumeClaim:
            claimName: registry-pvc
        # /tmp doit rester writable même avec readOnlyRootFilesystem.
        - name: tmp
          emptyDir: {}
