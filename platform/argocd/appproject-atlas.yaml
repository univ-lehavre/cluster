# AppProject "atlas" (ADR 0022) — cadre le périmètre GitOps APPLICATIF.
#
# Garde-fou multi-tenant : restreint, pour les Application rattachées, les
# dépôts git source, les namespaces de destination, et les types de ressources
# déployables. Ici on cadre STRICTEMENT l'applicatif : citation-* + dagster +
# marquez, et le seul dépôt du cluster. Les addons d'INFRA restent gérés par
# Ansible (frontière anti-bootstrap-circulaire, ADR 0022).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: atlas
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: >-
    Périmètre GitOps applicatif Atlas : apps citation-* et composants stateful
    de plateforme (Dagster, Marquez). Les addons d'infra restent gérés par
    Ansible (ADR 0022 — pas de bootstrap circulaire).

  # (a) Dépôts source autorisés.
  #
  # POINT DE SURCHARGE (ADR 0023/0044) — valeurs d'EXEMPLE GÉNÉRIQUES. Le dépôt
  # réel d'un déploiement (le Gitea intra-banc d'atlas, ou un remote git
  # spécifique) est une valeur PROPRE À CE DÉPLOIEMENT : elle n'est PAS gravée
  # ici, elle SURCHARGE ce manifeste à l'application (config locale non
  # versionnée — kustomize patch, sed/envsubst au déploiement, ou ré-apply d'une
  # variante locale). Ne jamais committer ici l'URL réelle d'un atlas.
  sourceRepos:
    # Dépôt du socle cluster (exemple ; un déploiement peut le retirer).
    - https://github.com/univ-lehavre/cluster.git
    # Forge Gitea intra-banc (air-gapped, ADR 0044) : URL d'exemple générique du
    # Service interne. Le déploiement atlas surcharge l'<org>/<repo> réel.
    # `/**` (et PAS `/*`) : le glob Argo CD `*` ne traverse PAS les `/` — `/*`
    # matche `…/atlas` mais pas `…/atlas/workflows.git` (deux segments) → l'app
    # était rejetée « repo not permitted in project » (drift L51). `/**` couvre
    # récursivement org/repo.
    - http://gitea-http.gitea.svc.cluster.local/**
    # Si Argo CD enregistre un remote en SSH, ajouter la forme git@… surchargée.

  # (b) Destinations : cluster local + les SEULS namespaces applicatifs.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: citation-ingest
    - server: https://kubernetes.default.svc
      namespace: citation-marts
    - server: https://kubernetes.default.svc
      namespace: citation-serving
    - server: https://kubernetes.default.svc
      namespace: citation-pwa
    - server: https://kubernetes.default.svc
      namespace: dagster
    - server: https://kubernetes.default.svc
      namespace: marquez

  # (c1) Cluster-scoped : Namespace seul (les apps portent leur namespace.yaml).
  # Pas de group:'*'/kind:'*' → pas de RBAC/CRD/ClusterRole déployables par les
  # apps (l'infra et les CRDs = Ansible, ADR 0022).
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  clusterResourceBlacklist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition

  # (c2) Namespace-scoped : tout type namespacé (Deployment/Service/PVC/Secret/
  # NetworkPolicy + CR applicatifs : Cluster CNPG, code-locations Dagster…).
  # La frontière de sécurité est portée par destinations + clusterResource*.
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
