# AppProject "cluster-apps" (ADR 0094 §2) — cadre l'APP-OF-APPS, PAS l'applicatif.
#
# Pourquoi un projet DISTINCT de `atlas` (appproject-atlas.yaml) ?
# Deux périmètres RBAC fondamentalement différents :
#
#   - `atlas`        : des Application qui déploient du MÉTIER dans `dagster`,
#                      `citation-*`, `marquez`… (workloads applicatifs).
#   - `cluster-apps` : UNE Application racine qui ne déploie AUCUN workload — elle
#                      ne fait que créer/supprimer des objets `Application`
#                      (argoproj.io) DANS le namespace `argocd`.
#
# Une App qui fabrique des Application a besoin de droits que les apps métier ne
# doivent JAMAIS avoir : écrire des `Application` dans `argocd`. Mélanger les deux
# dans `atlas` élargirait la surface RBAC de toutes les apps métier (n'importe
# quelle code-location pourrait alors se forger une Application). On ISOLE donc le
# privilège « créer des Application » dans ce projet dédié, rattaché à la SEULE
# Application racine. Frontière nette = moindre privilège (cf. AppProject atlas,
# garde-fou multi-tenant).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: >-
    Périmètre App-of-Apps (ADR 0094) : la seule Application racine, qui
    réconcilie le repo Gitea cluster/apps et y INSTANCIE les Application
    applicatives. Aucun workload métier — uniquement des Application dans
    argocd (privilège isolé).

  # (a) Dépôts source autorisés — POINT DE SURCHARGE (ADR 0023/0044).
  #
  # La racine surveille le repo Gitea de PROD dédié `cluster/apps`. L'URL réelle
  # est une VALEUR DE DÉPLOIEMENT (org/repo Gitea de l'instance) : jamais gravée
  # ici, surchargée au seed (envsubst/sed/variante locale), exactement comme pour
  # l'AppProject atlas. `/**` (et PAS `/*`) : le glob Argo CD `*` ne traverse pas
  # les `/` — il faut `/**` pour matcher `<gitea>/cluster/apps.git` (org/repo).
  sourceRepos:
    - http://gitea-http.gitea.svc.cluster.local/**

  # (b) Destination : UNIQUEMENT le namespace argocd (là où vivent les Application).
  # La racine n'a aucune raison de toucher dagster/citation-* : ce sont les apps
  # FILLES (projet atlas) qui y déploient.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd

  # (c1) Cluster-scoped : RIEN. La racine ne crée pas de Namespace ni de ressource
  # cluster-scoped — elle ne pose que des Application (namespacées dans argocd).
  clusterResourceWhitelist: []

  # (c2) Namespace-scoped : le SEUL type que la racine a le droit de poser, c'est
  # `Application` (argoproj.io). Pas de group:'*'/kind:'*' : on ne veut surtout pas
  # qu'un fichier poussé dans cluster/apps déploie autre chose qu'une Application.
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: Application
