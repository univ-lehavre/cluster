# Exposition L4 NodePort de l'UI Argo CD (ADR 0092 — http://<IP-nœud>:<nodePort>,
# zéro DNS). Service SÉPARÉ du bundle vendored argocd.yaml (CLAUDE.md : on ne
# touche jamais le bundle upstream volumineux) : il reprend le MÊME selector que
# le ClusterIP "argocd-server" (app.kubernetes.io/name: argocd-server) et son
# port 80 -> 8080.
#
# PAS de nodePort figé : Kubernetes l'attribue dans la plage --service-node-port-range
# (le récupérer via `kubectl -n argocd get svc argocd-server-nodeport`).
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
