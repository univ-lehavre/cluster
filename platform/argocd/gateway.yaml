# Argo CD — exposition de bordure (ADR 0022). Gateway Cilium + HTTPRoute.
# TLS terminé ICI par cert-manager (CA interne, ADR 0021) ; backend
# argocd-server en HTTP clair (server.insecure=true). PAS d'ingress-nginx
# (tout-Cilium, ADR 0020).
#
# hostname = PLACEHOLDER `.lan` à fixer avec l'admin réseau (comme la plage IP
# prod du pool LB-IPAM). gateway-shim cert-manager EXIGE un hostname non vide.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # gateway-shim cert-manager (ADR 0021) : remplit le Secret ci-dessous.
    cert-manager.io/cluster-issuer: internal-ca
spec:
  gatewayClassName: cilium # controllerName io.cilium/gateway-controller
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: argocd.cluster.lan # TODO admin réseau (placeholder .lan)
      tls:
        mode: Terminate # terminaison TLS en bordure
        certificateRefs:
          - kind: Secret
            name: argocd-server-tls # créé/renouvelé par cert-manager
      allowedRoutes:
        namespaces:
          from: Same
---
# Route HOST -> Service argocd-server:80 (port HTTP clair, car insecure=true).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: argocd
      namespace: argocd
      sectionName: websecure
  hostnames:
    - argocd.cluster.lan # TODO admin réseau (placeholder .lan)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80 # Service argocd-server:80 (HTTP clair)
