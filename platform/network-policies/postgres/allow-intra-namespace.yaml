# Trafic INTRA-namespace postgres : réplication streaming entre instances CNPG
# (primary ↔ replicas, port 5432) et communication avec l'operator
# (cnpg-system : probes, management, plugin Barman). Sans ça, la réplication et le
# WAL archiving sont coupés par le default-deny.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: postgres
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
