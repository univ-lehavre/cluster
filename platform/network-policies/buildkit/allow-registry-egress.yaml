# Egress vers le registry interne (ns `registry`, HTTP ADR 0011) : le SEUL flux sortant
# du build. buildkitd PULL la pré-image `citation-deps-base` et PUSH l'image de code
# produite. AUCUN egress 443/Internet (c'est tout l'intérêt de la pré-image, ADR 0110 :
# l'image de code ne télécharge rien). Le build lui-même tourne `--network=none` ; ce flux
# ne sert qu'au pull de base + au push du résultat.
#
# DEUX ports (80 ET 5000) — SUBTILITÉ CILIUM prouvée sur Lima (2026-07-12). Le daemon
# buildkitd pull via la ClusterIP du Service registry (`registry.registry.svc:80`).
# Cilium (kube-proxy-replacement) DNAT ClusterIP:80 → pod:5000 (targetPort, cf.
# platform/container-registry/service.yaml) AVANT d'appliquer l'enforcement egress →
# le paquet vu par la policy porte le port 5000, PAS 80. Autoriser 80 SEUL laisse donc
# tomber le trafic (timeout silencieux au `FROM`). On autorise les DEUX : 80 (chemin
# éventuel sans DNAT / nom court node-side) et 5000 (targetPort réel après DNAT). NB : la
# netpol jumelle dagster (platform/network-policies/dagster/) n'a que 80 car ses pods de
# run pull par un autre chemin (kubelet node-side, hors datapath Cilium pod-à-pod).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-egress
  namespace: buildkit
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 5000
