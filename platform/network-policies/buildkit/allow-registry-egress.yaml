# Egress vers le registry interne (ns `registry`, port 80, HTTP ADR 0011) : le SEUL
# flux sortant du build. buildkitd PULL la pré-image `citation-deps-base` et PUSH
# l'image de code produite. AUCUN egress 443/Internet (c'est tout l'intérêt de la
# pré-image, ADR 0110 : l'image de code ne télécharge rien). Le build lui-même
# tourne `--network=none` ; ce flux ne sert qu'au pull de base + au push du résultat.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-egress
  namespace: buildkit
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
      ports:
        - protocol: TCP
          port: 80
