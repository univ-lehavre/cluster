# Nie tout le trafic (ingress + egress) pour tous les pods du namespace
# `buildkit`. Ré-ouvert par les `allow-*` de ce dossier. Appliqué EN PREMIER
# (préfixe `00-`) : sous default-deny, une fenêtre deny/allow inversée laisserait
# passer du trafic. Cœur de l'air-gap du build (ADR 0044/0110) : le pod de build ne
# doit JAMAIS joindre Internet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: buildkit
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
