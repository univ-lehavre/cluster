# DNS (CoreDNS / kube-system) pour tous les pods du namespace. Indispensable sous
# default-deny egress : buildkitd résout `registry.registry.svc` par le DNS cluster
# (il n'hérite pas du `/etc/hosts` du nœud, ADR 0110).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: buildkit
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
