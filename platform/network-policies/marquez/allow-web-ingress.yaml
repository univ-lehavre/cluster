# Ingress vers l'UI web Marquez (port pod 3000). La terminaison TLS vient du Gateway
# Cilium (ns différent) → on autorise l'ingress depuis le cluster privé (le Gateway
# route le trafic de bordure vers le port du pod web).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: marquez
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
