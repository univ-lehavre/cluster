# Nie tout le trafic (ingress + egress) pour TOUS les pods du namespace `marquez`
# (store de lineage Marquez). Les flux légitimes sont ré-ouverts par les policies
# `allow-*` (ADR 0019 default-deny). NetworkPolicy est additif : sans ce socle, les
# `allow` n'ont aucun effet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: marquez
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
