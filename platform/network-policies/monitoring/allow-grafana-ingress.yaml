# Ingress vers Grafana : autorise le trafic entrant vers le pod Grafana sur son
# port POD (3000, pas le 80 du Service). La terminaison vient du Gateway Cilium
# (ns différent) → on autorise depuis tout le cluster privé (le Gateway route le
# trafic de bordure). Prometheus scrape aussi Grafana sur 3000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
