# DNS (CoreDNS / kube-system) pour tous les pods du namespace `monitoring`.
# INDISPENSABLE sous default-deny egress — sinon Prometheus ne résout plus les
# targets, Grafana ne résout plus ses datasources, Alertmanager ne résout plus le
# smarthost mail.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
