# Autorise la résolution DNS (CoreDNS dans kube-system) pour tous les pods du
# namespace. INDISPENSABLE : le default-deny egress couperait sinon le DNS et
# casserait toute résolution de service (y compris `wordpress-mysql`).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
