# Nie tout le trafic (ingress + egress) pour TOUS les pods du namespace
# `argocd`. Les flux légitimes sont ré-ouverts par les policies `allow-*` de ce
# dossier (ADR 0019 default-deny ; ADR 0022 Argo CD). Sans ce socle, les `allow`
# n'ont aucun effet (NetworkPolicy est additif).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
