# DNS (CoreDNS / kube-system) pour tous les pods du namespace. INDISPENSABLE
# sous default-deny egress — sans ça, repo-server ne résout plus le host git et
# l'application-controller ne résout plus kubernetes.default (tout cassé).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
