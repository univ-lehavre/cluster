# DNS (CoreDNS / kube-system) pour tous les pods du ns. Indispensable sous default-deny
# egress : le runner résout `gitea-http.gitea.svc` et `buildkitd.buildkit.svc` par le DNS
# cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gitea-runner
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
