# Nie tout le trafic (ingress + egress) pour TOUS les pods du namespace `argo`
# (Argo Workflows, dont le pod builder BuildKit-in-pod de l'étape 6). Les flux
# légitimes sont ré-ouverts par `allow-build-egress.yaml` (ADR 0019
# default-deny). NetworkPolicy est ADDITIF : sans ce socle fermé, l'`allow` n'a
# aucun effet et l'egress build ne serait pas VOLONTAIRE (il faut le poser sur
# une base fermée pour que « SEUL le ns argo sort vers Internet » soit vrai).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: argo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
