# Egress API server (kube-apiserver) pour le ns `argo` — le workflow-controller et
# l'argo-server appellent l'API k8s en PERMANENCE (watch de la ConfigMap de config,
# création/suivi des pods de Workflow). Sous le `00-default-deny` du ns, sans cette
# policy le controller ne joint pas `https://<ClusterIP kubernetes>:443` → i/o timeout
# → CrashLoopBackOff (PROUVÉ AU BANC 2026-07-02).
#
# Idiome du dépôt (parité platform/network-policies/dagster/allow-apiserver-egress) :
# egress vers le PORT de l'API (6443 réel + 443 du Service ClusterIP `kubernetes` qui
# DNAT vers 6443), sans restriction d'IP (l'API server n'a pas d'IP fixe portable).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: argo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443 # kube-apiserver réel
        - protocol: TCP
          port: 443 # Service ClusterIP `kubernetes` (DNAT → 6443)
