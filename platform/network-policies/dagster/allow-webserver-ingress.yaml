# Ingress vers le webserver Dagster (port pod 80). La terminaison TLS vient du
# Gateway Cilium (ns différent) → on autorise l'ingress depuis le cluster privé
# (le Gateway route le trafic de bordure vers le port du pod).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webserver-ingress
  namespace: dagster
spec:
  podSelector:
    matchLabels:
      component: dagster-webserver
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
