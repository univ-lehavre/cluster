# DNS (CoreDNS / kube-system) pour tous les pods du namespace `dagster`.
# INDISPENSABLE sous default-deny egress — sinon Dagster ne résout plus le Postgres
# CNPG, le registry, ni l'API server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: dagster
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
