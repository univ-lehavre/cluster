# Egress vers l'API server Kubernetes (port 6443) : le daemon et le K8sRunLauncher
# créent/surveillent les Jobs de run via l'API. Sous default-deny, cet egress est
# indispensable (sinon aucun run ne se lance). L'API server est hors-cluster (IP du
# control-plane) → on autorise par port, sans restreindre le namespace cible.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: dagster
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
