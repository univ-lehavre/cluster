# Egress vers le registry interne (ns `registry`, port 80) : les run workers
# (K8sRunLauncher) et le webserver/daemon tirent leurs images du registry interne
# HTTP (ADR 0011). Sans ce flux, les pods de run ne peuvent pas pull leur image.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-egress
  namespace: dagster
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
      ports:
        - protocol: TCP
          port: 80
