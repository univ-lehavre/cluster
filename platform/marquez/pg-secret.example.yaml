# Patron VERSIONNÉ du Secret de connexion Postgres de Marquez (ADR 0023).
#
# Le chart Marquez attend un Secret existant (pointé par marquez.existingSecretName:
# marquez-pg-auth) avec la clé `marquez-db-password`. On NE pointe PAS le Secret CNPG
# brut `pg-marquez` (il a les clés `username`/`password`, pas `marquez-db-password`).
#
# ⚠️ VALEUR DE TEST. Sur une topologie réelle : créer le vrai Secret hors dépôt
# (config locale non versionnée) en recopiant le mot de passe du rôle `marquez`
# depuis le Secret CNPG :
#   kubectl -n postgres get secret pg-marquez -o jsonpath='{.data.password}' | base64 -d
#   → placer cette valeur dans `marquez-db-password` d'un Secret `marquez-pg-auth`
#     dans le namespace `marquez`.
---
apiVersion: v1
kind: Secret
metadata:
  name: marquez-pg-auth
  namespace: marquez
type: Opaque
stringData:
  marquez-db-password: marquez-test-password # valeur de test (banc) — recopier le pwd CNPG réel sur une topologie
