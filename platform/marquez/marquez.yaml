# Manifeste Marquez — helm template FIGÉ (chart marquezproject/marquez 0.51.1).
# VENDORED le 2026-06-05. Étape 1.8 (ADR 0028). NE PAS éditer à la main : régénérer
# via platform/marquez/values.bench.yaml (cf. README), puis réappliquer les deux
# retouches locales documentées ci-dessous.
#
# Ce fichier ne porte PAS `metadata.namespace` (le rendu helm en est dépourvu) :
# toujours déployer avec `kubectl apply -n marquez -f marquez.yaml`.
#
# Images officielles marquezproject/marquez et marquez-web : amd64-only. Sur arm64
# (banc Lima) on pousse des images maison (platform/marquez/image/ et image-web/)
# dans le registry interne registry:80 (ADR 0011). Topologie bare-metal x86 =
# images officielles re-taguées sous le même registry:80/<repo>:0.51.1.
#
# RETOUCHES LOCALES par rapport au rendu helm brut (à réappliquer après régénération) :
#   1. Deployment `marquez` : ajout d'un initContainer `wait-for-db` (le chart ne le
#      rend que si le subchart postgresql est activé ; ici le store est CNPG externe).
#      Image postgres épinglée par digest d'index multi-arch (ADR 0006), identique à
#      l'init de Dagster.
#   2. Service `marquez-web` : port 3000 (le rendu brut met 5000 ; le pod web écoute
#      3000 — on aligne le port du Service pour un routage Gateway lisible).
#   3. Retrait des deux Pods `helm.sh/hook: test-success` (hooks `helm test`, hors
#      `kubectl apply`).
---
# Source: marquez/templates/marquez/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: marquez-config
  labels:
    app.kubernetes.io/name: marquez
    helm.sh/chart: marquez-0.51.1
    app.kubernetes.io/instance: marquez
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: marquez
data:
  ### HTTP SERVER CONFIG ###

  config.yml: |-
    # Enables HTTP server configuration overrides (see: https://www.dropwizard.io/en/stable/manual/configuration.html#servers)
    server:
      applicationConnectors:
      - type: http
        port: ${MARQUEZ_PORT}
        httpCompliance: RFC7230_LEGACY
      adminConnectors:
      - type: http
        port: ${MARQUEZ_ADMIN_PORT}

    ### DATABASE CONFIG ###

    # Enables database configuration overrides (see: https://www.dropwizard.io/en/stable/manual/configuration.html#database)
    db:
      driverClass: org.postgresql.Driver
      url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    # Enables retention policy configuration for database (default: disabled)
    dbRetention:
      frequencyMins: 15
      numberOfRowsPerBatch: 1000
      retentionDays: 7

    # Enables database migration on startup (default: true)
    migrateOnStartup: ${MIGRATE_ON_STARTUP}
    logging:
      level: ${LOG_LEVEL}
      appenders:
        - type: console
---
# Source: marquez/templates/marquez/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: marquez
  labels:
    app.kubernetes.io/name: marquez
    helm.sh/chart: marquez-0.51.1
    app.kubernetes.io/instance: marquez
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: marquez
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: marquez
    app.kubernetes.io/instance: marquez
    app.kubernetes.io/component: marquez
---
