    app.kubernetes.io/name: marquez
    app.kubernetes.io/instance: marquez
    app.kubernetes.io/component: web
---
# Source: marquez/templates/marquez/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez
  labels:
    app.kubernetes.io/name: marquez
    helm.sh/chart: marquez-0.51.1
    app.kubernetes.io/instance: marquez
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: marquez
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: marquez
      app.kubernetes.io/instance: marquez
      app.kubernetes.io/component: marquez
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marquez
        helm.sh/chart: marquez-0.51.1
        app.kubernetes.io/instance: marquez
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: marquez
    spec:
      serviceAccountName: default
      # Retouche locale (1) : le chart ne rend l'init wait-for-db que si le subchart
      # postgresql est activé. Store = CNPG externe → on l'ajoute. Image postgres
      # épinglée par digest d'index multi-arch (ADR 0006), identique à l'init Dagster.
      initContainers:
        - name: wait-for-db
          image: "docker.io/library/postgres:14.6@sha256:f565573d74aedc9b218e1d191b04ec75bdd50c33b2d44d91bcd3db5f2fcea647"
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until pg_isready -h "pg-rw.postgres.svc.cluster.local" -p 5432 -U marquez; do echo waiting for database; sleep 2; done;']
      containers:
        - name: marquez
          image: registry:80/marquez:0.51.1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: marquez-volume
              mountPath: /usr/src/app/config.yml
              subPath: config.yml
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: http-admin
              containerPort: 5001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http-admin
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http-admin
          env:
            - name: MARQUEZ_PORT
              value: "5000"
            - name: MARQUEZ_ADMIN_PORT
              value: "5001"
            - name: MARQUEZ_CONFIG
              value: /usr/src/app/config.yml
            - name: POSTGRES_HOST
              value: "pg-rw.postgres.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "marquez"
            - name: POSTGRES_USER
              value: "marquez"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marquez-pg-auth
                  key: marquez-db-password
            - name: MIGRATE_ON_STARTUP
              value: "true"
          resources:
            limits:
              memory: 768Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: marquez-volume
          configMap:
            name: marquez-config
---
