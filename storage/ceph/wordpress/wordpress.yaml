apiVersion: v1
kind: Service
metadata:
  name: wordpress
  labels:
    app: wordpress
spec:
  ports:
    - port: 80
  selector:
    app: wordpress
    tier: frontend
  # ClusterIP (audit P6 #25) : pas d'exposition externe directe. Accès via
  # `kubectl port-forward` ou Tailscale. Cohérent avec le réseau isolé (ADR 0003)
  # — l'exemple WordPress n'a pas vocation à être publié sur Internet.
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wp-pv-claim
  labels:
    app: wordpress
spec:
  storageClassName: rook-ceph-block-replicated
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  labels:
    app: wordpress
    tier: frontend
spec:
  selector:
    matchLabels:
      app: wordpress
      tier: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wordpress
        tier: frontend
    spec:
      # Durcissement PARTIEL (cf. audit P6 / trivy). L'image apache écoute sur
      # le port 80 (privilégié) et démarre en root pour le binder puis droppe
      # vers www-data — d'où PAS de runAsNonRoot ni readOnlyRootFilesystem ici
      # (les casserait ; apache écrit /var/run/apache2, la conf, etc.). On
      # applique ce qui tient sans reconfigurer l'exemple. Le résidu KSV-0118/
      # 0014 est acté dans .trivyignore (entrée wordpress justifiée).
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - image: wordpress:7.0-php8.3-apache
          name: wordpress
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
              add: ['NET_BIND_SERVICE', 'SETUID', 'SETGID', 'CHOWN', 'DAC_OVERRIDE']
          env:
            - name: WORDPRESS_DB_HOST
              value: wordpress-mysql
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-secret
                  key: password
          ports:
            - containerPort: 80
              name: wordpress
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim
