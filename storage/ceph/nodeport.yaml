# Exposition L4 NodePort du dashboard Ceph (mgr), ADR 0092 :
# accès https://<IP-nœud>:<nodePort>, zéro DNS, zéro LB-IPAM.
#
# Service SÉPARÉ : il ne touche NI le CephCluster NI le bundle Rook vendored
# (CLAUDE.md). Il reprend le selector du Service ClusterIP rook-ceph-mgr-dashboard
# (le mgr ACTIF) et son port 8443 (HTTPS — le dashboard Ceph termine le TLS).
# Le nodePort n'est PAS figé : k8s l'attribue (lu via spec.ports[].nodePort).
---
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-mgr-dashboard-nodeport
  namespace: rook-ceph
spec:
  type: NodePort
  selector:
    app: rook-ceph-mgr
    mgr_role: active
    rook_cluster: rook-ceph
  ports:
    - name: https-dashboard
      protocol: TCP
      port: 8443
      targetPort: 8443
