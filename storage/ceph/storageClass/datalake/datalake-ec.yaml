apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: datalake
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
      requireSafeReplicaSize: true
    parameters:
      compression_mode: none
  dataPool:
    failureDomain: host
    erasureCoded:
      dataChunks: 2
      codingChunks: 1
    parameters:
      compression_mode: none
  preservePoolsOnDelete: false
  gateway:
    port: 80
    instances: 3
    # RGW = chemin S3 des backups Barman/CNPG et de Loki (audit code-first 2026-07-05).
    # Non borné, Rook n'applique aucun défaut → sous charge multipart/gros objets un RGW
    # gonfle et se fait OOM-kill. requests = plancher de scheduling ; limits.memory = marge.
    # PAS de limits.cpu (CPU compressible, convention du dépôt).
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
