apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-mgr-dashboard-external-https
  namespace: rook-ceph
  labels:
    app: rook-ceph-mgr
    rook_cluster: rook-ceph
spec:
  ports:
    - name: dashboard
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    app: rook-ceph-mgr
    rook_cluster: rook-ceph
    mgr_role: active
  sessionAffinity: None
  # ClusterIP (audit P6 #25) : le dashboard Ceph n'est pas exposé hors cluster.
  # Accès via `kubectl -n rook-ceph port-forward svc/rook-ceph-mgr-dashboard-external-https 8443:8443`.
  type: ClusterIP
