# Patch du workspace Dagster (ADR 0086) — branche la code-location jouet.
#
# Le socle livre le ConfigMap `dagster-workspace` avec `load_from: []` (orchestrateur
# vide, platform/dagster/dagster.yaml). Argo CD REMPLACE ce ConfigMap par celui-ci :
# le webserver/daemon (qui montent /workspace/workspace.yaml) rechargent et découvrent
# la code-location gRPC `toy` (toy-codeloc:4000). Même mécanisme qu'atlas
# (deploy/base/workspace-patch.yaml).
#
# NB : une vraie location atlas ajoutée plus tard fusionne mal par simple replace de
# ConfigMap — sur un banc qui porte ATLAS + jouet, c'est atlas qui pose le workspace
# complet. Ici (banc autonome sans atlas), le jouet suffit à rendre l'orchestrateur
# non-vide. Frontière ADR 0022/0045 : ce patch est du contenu applicatif (réconcilié
# par Argo CD), pas de l'infra.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-workspace
  namespace: dagster
  labels:
    app.kubernetes.io/managed-by: argocd
    atlas.workflow/sample: 'true'
data:
  # host: nom COURT `toy-codeloc` (PAS le FQDN `…svc.cluster.local`). Le résolveur
  # gRPC/c-ares du webserver suit `resolv.conf` (ndots:5) ; en prod, un search domain
  # externe (`dix.univ-lehavre.fr`) fait TIMEOUTER la résolution du FQDN complet →
  # « DagsterUserCodeUnreachableError: gRPC UNAVAILABLE » alors que le pod gRPC est sain
  # (constaté dirqual 2026-06-22 : ping OK par nom court/IP, KO par FQDN). Le nom court
  # résout via le 1er search domain (`dagster.svc.cluster.local`). Même parade que gitea-init.
  workspace.yaml: |
    load_from:
      - grpc_server:
          host: toy-codeloc
          port: 4000
          location_name: toy
