# Cluster « site-a » (cluster.id=1) — spike Cilium Cluster Mesh sous latence.
# CNI et kube-proxy désactivés : Cilium prend le relais (KPR eBPF, comme la prod
# tout-Cilium de l'ADR 0020). podSubnet/serviceSubnet DISJOINTS de site-b
# (kind-c2.yaml) — exigence Cluster Mesh : les CIDR ne doivent pas se chevaucher.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: c1
networking:
  disableDefaultCNI: true # Cilium remplace le CNI kindnet
  kubeProxyMode: none # Cilium en kubeProxyReplacement
  podSubnet: '10.244.0.0/16'
  serviceSubnet: '10.96.0.0/16'
nodes:
  - role: control-plane # spike léger : 1 nœud (HA = chantier séparé)
