# SeaweedFS — objectstore S3-compatible LÉGER pour le banc léger.
# Mode "server" tout-en-un (master + volume + filer + S3) en un seul pod, suffisant
# pour un banc de test (Loki chunks, datalake de test, OBC). Image épinglée par
# digest d'index multi-arch (ADR 0006), arm64 vérifié.
#
# Endpoint S3 : http://seaweedfs.s3.svc.cluster.local:8333
# Identifiants de TEST (génériques — banc jetable, jamais de vraies clés) :
#   access key = seaweedadmin / secret key = seaweedadmin-secret
---
apiVersion: v1
kind: Namespace
metadata:
  name: s3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
  namespace: s3
data:
  # Config S3 : un compte admin de test avec accès complet.
  s3.json: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            { "accessKey": "seaweedadmin", "secretKey": "seaweedadmin-secret" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: s3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seaweedfs
          image: docker.io/chrislusf/seaweedfs:4.31@sha256:e14ad400e28c811fe8426dc08abf248ec722b9f017713290a9b84a54557f45c2
          args:
            - server
            - -dir=/data
            - -s3
            - -s3.config=/etc/seaweedfs/s3.json
            - -s3.port=8333
            - -master.volumeSizeLimitMB=512
          ports:
            - name: s3
              containerPort: 8333
            - name: master
              containerPort: 9333
            - name: filer
              containerPort: 8888
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # écrit dans /data (PVC) et /tmp (emptyDir)
            capabilities:
              drop:
                - 'ALL'
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3config
              mountPath: /etc/seaweedfs
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
        - name: s3config
          configMap:
            name: seaweedfs-s3-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: s3
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard # local-path-provisioner (défaut kind)
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: s3
spec:
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: filer
      port: 8888
      targetPort: 8888
