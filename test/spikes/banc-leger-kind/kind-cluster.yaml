# Banc léger applicatif — cluster kind Kubernetes HA (3 control-plane + 1 worker).
#
# But : valider la couche PLATEFORME/APPLICATIVE (Argo CD, Prometheus, Grafana,
# Loki, Dagster, Great Expectations, Mailpit…) SANS le poids de Vagrant/Ceph.
# Stockage : local-path-provisioner (inclus dans kind) + SeaweedFS S3 (manifests/).
# Ce banc NE teste PAS Ceph — c'est le rôle du banc lourd test/multi-node (Vagrant).
#
# HA : 3 nœuds control-plane (etcd quorum 3) + 1 worker. kindnet/kube-proxy par
# défaut (pas de tout-Cilium ici : ce banc cible l'applicatif, pas le réseau).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: leger
nodes:
  - role: control-plane
  - role: control-plane
  - role: control-plane
  - role: worker
